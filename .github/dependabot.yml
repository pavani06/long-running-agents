version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      github-actions:
        patterns:
          - "*"
    labels:
      - "ci-cd"
      - "security"
    commit-message:
      prefix: "chore(ci):"
    open-pull-requests-limit: 5
