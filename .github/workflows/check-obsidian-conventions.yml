name: Check Obsidian Conventions

on:
  push:
    paths:
      - '**.md'
      - '**.canvas'
      - 'scripts/validate-obsidian.ts'
      - 'package.json'
  pull_request:
    paths:
      - '**.md'
      - '**.canvas'
      - 'scripts/validate-obsidian.ts'
      - 'package.json'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Run Obsidian convention checks
        run: npm run validate:obsidian
