# =============================================================================
# EXECUTION RULES (leia antes de começar)
# =============================================================================

execution_rules:
  serial_tasks:
    - reason: "Tasks 1-5 modificam o mesmo arquivo SKILL.md. Devem ser executadas em ordem sequencial."
      task_ids: [1, 2, 3, 4, 5]
  parallel_ok:
    - reason: "Tasks 6-9 não conflitam entre si (arquivos diferentes). Podem rodar em paralelo após task 5."
      task_ids: [6, 7, 8, 9]
  commit_policy:
    - "NÃO commitar — o Commit Gate pertence ao orquestrador (AGENTS.md Rule 6)"
  workdir:
    - "Todos os comandos devem ser executados a partir de: /mnt/c/Users/pavan/long-running-agents"
  touching_policy:
    - "Modificar apenas os 6 arquivos listados em files_affected (AGENTS.md Rule 3)"
    - "NÃO modificar AGENTS.md, system-of-record.md, ou qualquer outro arquivo"

# =============================================================================
# PRE-IMPLEMENTATION CHECKS
# =============================================================================

pre_implementation_checks:
  - id: "check-0"
    description: "Verificar que os 5 arquivos alvo existem e estão no estado esperado"
    command: |
      for f in \
        .opencode/skills/analyze-and-improve/SKILL.md \
        PROGRESS.md \
        docs/canonical/ice-craft-separation.md \
        curriculum/05-core-concepts/04-sprint-contracts.md \
        curriculum/01-nivel-1-fundamentals/02-token-budgeting.md; do
        test -f "$f" && echo "EXISTS: $f" || echo "MISSING: $f"
      done
    expected: "Todos os 5 arquivos EXISTEM"

  - id: "check-1"
    description: "Confirmar que SKILL.md tem a seção Anti-Patterns e Phase 6"
    command: 'grep -n "## Anti-Patterns\|## Phase 6" .opencode/skills/analyze-and-improve/SKILL.md'
    expected: "2 linhas: Anti-Patterns (~960) e Phase 6 (~844)"

  - id: "check-2"
    description: "Contar blocos run_in_background=false que serão alterados"
    command: 'grep -c "run_in_background=false" .opencode/skills/analyze-and-improve/SKILL.md'
    expected: "7 ocorrências (Phase 0×2, Phase 1, Phase 2, Phase 3, Phase 4 Agent 4, Phase 5, Phase 6). Serão alteradas: Phases 0-3 (5 ocorrências)."

  - id: "check-3"
    description: "Confirmar que PROGRESS.md tem as seções a remover (linhas 27-45)"
    command: 'sed -n "27,45p" PROGRESS.md | head -3'
    expected: 'Deve mostrar "## In Progress" como primeira linha'

  - id: "check-4"
    description: "Verificar status do git — workspace deve estar limpo ou apenas com alterações esperadas"
    command: "git status --short"
    expected: "Apenas os 6 arquivos alvo aparecem (se houver alterações prévias). Sem arquivos não relacionados."

