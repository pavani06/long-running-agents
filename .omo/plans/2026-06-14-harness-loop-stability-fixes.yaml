#   evaluated_by: null → "evaluator", mas nunca seta passes: true.
#   Mesmo defeito de contrato que o skill harness.
# =============================================================================

task_3:
  id: 3
  title: "Bash harness — PASS seta passes: true"
  file: "harness/harness-analysis.sh"
  severity: CRITICAL
  estimated_minutes: 10
  depends_on: []

  step_a_add_passes_true_in_while_loop:
    description: "No bloco while do evaluate_phase(), adicionar substituição passes: false → true antes de evaluated_by"
    edit:
      filePath: "/mnt/c/Users/pavan/long-running-agents/harness/harness-analysis.sh"
      oldString: |
        # Mark as evaluated using bash builtins (no python3 dependency)
        local tmpfile="${RESULTS_FILE}.tmp"
        local in_target=false
        while IFS= read -r line; do
            if [[ "$line" =~ ^[[:space:]]*\"$feature\"[[:space:]]*:[[:space:]]*\{$ ]]; then
                in_target=true
                echo "$line"
            elif $in_target && [[ "$line" =~ \"evaluated_by\"[[:space:]]*:[[:space:]]*null ]]; then
                echo "${line/null/\"evaluator\"}"
            else
                if $in_target && [[ "$line" =~ ^[[:space:]]*\},?$ ]]; then
                    in_target=false
                fi
                echo "$line"
            fi
        done < "$RESULTS_FILE" > "$tmpfile" && command mv "$tmpfile" "$RESULTS_FILE" 2>/dev/null || true
        return 0
      newString: |
        # Mark as evaluated and passed using bash builtins (no python3 dependency)
        local tmpfile="${RESULTS_FILE}.tmp"
        local in_target=false
        while IFS= read -r line; do
            if [[ "$line" =~ ^[[:space:]]*\"$feature\"[[:space:]]*:[[:space:]]*\{$ ]]; then
                in_target=true
                echo "$line"
            elif $in_target && [[ "$line" =~ \"passes\"[[:space:]]*:[[:space:]]*false ]]; then
                echo "${line/false/true}"
            elif $in_target && [[ "$line" =~ \"evaluated_by\"[[:space:]]*:[[:space:]]*null ]]; then
                echo "${line/null/\"evaluator\"}"
            else
                if $in_target && [[ "$line" =~ ^[[:space:]]*\},?$ ]]; then
                    in_target=false
                fi
                echo "$line"
            fi
        done < "$RESULTS_FILE" > "$tmpfile" && command mv "$tmpfile" "$RESULTS_FILE" 2>/dev/null || true
        return 0
    verify:
      - item: "Bloco while tem elif para passes: false → true ANTES do elif de evaluated_by"
      - item: "Comentário alterado para 'Mark as evaluated and passed'"
      - command: "sed -n '469,492p' harness/harness-analysis.sh"

