  phase_5:
    name: "wikilinks no corpo do texto das analises"
    priority: "P3 - enriquece navegacao inline"
    description: >
      Alem do `relates-to` no frontmatter, adicionar [[wikilinks]] inline
      no corpo do texto onde o documento menciona conceitos que tem pagina
      propria no vault. Isso e complementar e de menor prioridade.
    strategy: >
      Para cada analysis.md, identificar mencoes a nomes de canonicos
      ou outras analises no corpo do texto e converter em [[wikilinks]].
      Nao converter links em blocos de codigo ou inline code.

  # -------------------------------------------------------------------
  # REGRAS GERAIS
  # -------------------------------------------------------------------
  rules:
    - "NUNCA modificar o corpo do texto alem de adicionar wikilinks (fase 5) ou converter links raw (fase 3)"
    - "NUNCA alterar tags existentes no frontmatter"
    - "NUNCA remover campos existentes do frontmatter"
    - "Adicionar `relates-to` APENAS se o arquivo ainda nao tem esse campo"
    - "Se o arquivo ja tem `relates-to`, adicionar novos itens ao array existente"
    - "Formato do array: ['[[path|Display]]', '[[path2|Display2]]']"
    - "Manter wikilinks em uma linha so (single-line array)"
    - "Respeitar a indentacao existente do frontmatter YAML (2 espacos)"
    - "NAO adicionar `sources` em arquivos que nao sao canonicos"
    - "Verificar que cada [[wikilink]] aponta para um arquivo existente"

