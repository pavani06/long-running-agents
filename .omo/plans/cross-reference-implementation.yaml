  # -------------------------------------------------------------------
  # FASE 7: Wikilinks inline no corpo do texto (curriculum + docs/analysis)
  # -------------------------------------------------------------------
  phase_7:
    name: "converter referencias em texto puro para [[wikilinks]] no corpo"
    priority: "P1 — transforma 'Referencias Cruzadas' textuais em arestas reais no Obsidian"
    description: >
      Muitos arquivos tem sessoes como "Referencias Cruzadas" ou "Pre-requisito"
      que listam paths como `curriculum/XX/YY.md` em texto puro (backticks).
      Essas nao criam conexoes no Graph View. Converter para [[wikilinks]].
    rules:
      - "Converter `curriculum/XX/YY.md` no corpo para [[curriculum/XX/YY|display text]]"
      - "Converter `docs/XX/YY.md` no corpo para [[docs/XX/YY|display text]]"
      - "NAO converter paths dentro de blocos de codigo (```) ou inline code com backticks que sejam parte de comandos"
      - "NAO converter URLs externas (https://...)"
      - "NAO converter caminhos de arquivos que nao sao .md (ex: .py, .json, .yaml)"
      - "Preservar o texto display que ja existe junto ao path"
    target_directories:
      - "curriculum/" (todos os .md)
      - "docs/analysis/" (todos os .md)
    skip:
      - "docs/canonical/" (ja usa wikilinks extensivamente)"
      - "index.md" (ja usa wikilinks)"
      - "docs/system-of-record.md" (ja usa wikilinks)"

  # -------------------------------------------------------------------
  # VERIFICACAO
  # -------------------------------------------------------------------
  verification:
    - "Rodar: bash scripts/check-obsidian-conventions.sh"
    - "Check 6 (broken wikilinks) deve passar sem erros"
    - "Check 7 (cross-reference tag gaps) pode emitir warnings -- serao tratados separadamente"
    - "Abrir Obsidian e inspecionar Graph View local de alguns arquivos para confirmar conexoes"
    - "Verificar que nenhum arquivo foi corrompido (frontmatter YAML continua valido)"
