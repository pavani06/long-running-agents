task_3:
  id: "harness-step6-quality-gate"
  file: ".opencode/skills/harness-analyze-and-improve/SKILL.md"
  effort: "30 min"
  description: "Reescrever Step 6 para incluir quality gate com agente avaliador independente"
  dependencies: ["task_1", "task_2"]
  changes:

    # ------------------------------------------------------------------
    # Edicao 3a: Expandir descricao do Step 6
    # ------------------------------------------------------------------
    - edit_id: "step6-expand-header"
      type: "edit"
      file: ".opencode/skills/harness-analyze-and-improve/SKILL.md"
      old_string: |-
        ### Step 6: Evaluate

        Run a self-check:
        - Do output files exist and have substantial content?
        - Does content match the phase objective?
        - Are Obsidian conventions followed (if applicable)? Check for mandatory fields: `type`, `tags`, `aliases`, `relates-to`.
        - Run `bash scripts/check-obsidian-conventions.sh` (if available)

        If PASS:
        - Write `completed_at` (ISO 8601 UTC) to `harness/test-results.json` for the current phase
        - Calculate `duration_seconds` = elapsed seconds between `started_at` and `completed_at`.
          Use shell arithmetic: compute epoch difference with `date -d` (GNU) or
          a tool available in the execution environment. Store as integer seconds
          in `harness/test-results.json`.
        - Set `evaluated_by` to `"evaluator"` for that phase
        - Update PROGRESS.md: use edit com oldString/newString precisos.
          Prefira editar a secao '## Done' e '## To Do' individualmente.
          Se edit falhar (whitespace mismatch), leia o arquivo novamente
          e tente com contexto adicional.

        If NEEDS_WORK:
        - Increment `retry_count` in `harness/test-results.json` for the current phase.
          This tracks how many times the phase was retried before eventually passing —
          essential for identifying pipeline bottlenecks.
        - Write findings to `NEXT_FINDINGS.md`
        - Do NOT change `passes` or `evaluated_by` (so harness retries on next run)
      new_string: |-
        ### Step 6: Evaluate

        A avaliacao tem dois estagios. Execute ambos em sequencia.

        #### Step 6a: Form Check (self-check)

        Run a self-check:
        - Do output files exist and have substantial content?
        - Does content match the phase objective?
        - Are Obsidian conventions followed (if applicable)? Check for mandatory fields: `type`, `tags`, `aliases`, `relates-to`.
        - Run `bash scripts/check-obsidian-conventions.sh` (if available)

        If form NEEDS_WORK:
        - Increment `retry_count` in `harness/test-results.json` for the current phase.
        - Write findings to `NEXT_FINDINGS.md`
        - Do NOT change `passes` or `evaluated_by` (so harness retries on next run)
        - STOP. Do not proceed to quality check.

        If form PASS, proceed to Step 6b.

        #### Step 6b: Quality Check (delegated to independent evaluator)

        After form passes, delegate a QUALITY evaluation to an independent agent.
        This implements the [[docs/canonical/generator-evaluator|Generator-Evaluator]]
        pattern: the phase agent is the Generator, the quality evaluator is the
        independent Evaluator.

        **Evaluator model selection:**
        - If phase was executed by `deep` → evaluator uses `ultrabrain`
        - If phase was executed by `ultrabrain` → evaluator uses `deep`
        - If phase was executed by `quick` → evaluator uses `ultrabrain`

        **Quality thresholds by phase:**
        | Phase | Checkpoint | Threshold | Bar |
        |-------|-----------|-----------|-----|
        | phase-0 | CP-1 | low | Modelo mental capturou estrutura real do repo? |
        | phase-1 | CP-2 | medium | Extracao e fiel ao artigo fonte? Sem vies, sem omissao? |
        | phase-2 | CP-3 | medium | Patterns tem 6 campos preenchidos? Nomes sao precisos? |
        | phase-3 | CP-4 | high | Evidencias da classificacao sao solidas? NOT_FOUND tem lista de locais? |
        | phase-4 | CP-5 | high | Cada artefato atende ao contrato? Conceitualmente correto? |
        | phase-5 | CP-6 | low | System-of-record e indices foram atualizados corretamente? |
        | phase-6 | CP-7 | medium | Curriculum modificado preserva formato e estilo? |

        **Delegation contract for the evaluator:**

        ```typescript
        task(
          category="<evaluator-model>",
          load_skills=[],
          run_in_background=false,
          prompt="TASK: Evaluate the quality of the phase output below. You are an
        INDEPENDENT evaluator — you did NOT generate this output. Your job is to
        find what is wrong, missing, or conceptually incorrect.

        TARGET_REPOSITORY:
          path: <absolute-path-to-repo>
          name: <repo-name>
          output_dir: <absolute-path-to-repo>/docs/analysis/<date>-<source-slug>/
          system_of_record: <absolute-path-to-repo>/docs/system-of-record.md
          branch: main

        CURRENT PHASE: <phase-N>
        QUALITY THRESHOLD: <low|medium|high>

        EVALUATION RUBRIC — Quality Brake Questions (from Manual Brake pattern,
        translated for quality):

        1. 'Quem vai usar este artefato, e o que quebra se ele estiver errado?'
           → Se ninguem usaria ou o erro for inofensivo: barra mais baixa
           → Se for referenciado por 5+ outros docs: barra mais alta

        2. 'Ainda publicariamos este artefato se auditar sua qualidade custasse
           uma semana?'
           → Restaura o custo-proxy: se a resposta for 'nao', o artefato precisa
             de mais revisao antes de ser publicado

        3. 'Quem e o dono de dizer este artefato nao esta pronto, refaca?'
           → O harness registra quem avaliou e quem pode vetar

        PHASE-SPECIFIC CHECKS:

        [Phase 0 — Repository Mental Model]:
        - O modelo cobre goals, arquitetura, padroes, abstracoes, terminologia e gaps?
        - As abstracoes estao nomeadas corretamente (batem com system-of-record.md)?
        - Ha gaps obvios que o modelo deveria ter capturado mas nao capturou?

        [Phase 1 — Knowledge Extraction]:
        - A sintese capturou corretamente os frameworks, patterns e tradeoffs do artigo fonte?
        - Ha vies de interpretacao? Algum conceito foi mal compreendido?
        - O analysis.md filtra marketing, anedotas e filler conforme as regras?
        - As secoes (Frameworks, Patterns, Lessons, Tradeoffs, Failures, Synthesis)
          tem conteudo substancial e nao-obvio?

        [Phase 2 — Pattern Extraction]:
        - Cada pattern tem os 6 campos obrigatorios (name, problem_solved, inputs,
          outputs, benefits, limitations) preenchidos com conteudo real?
        - Os nomes dos patterns sao precisos e descritivos?
        - Nao ha patterns duplicados ou triviais (ex: 'testar e importante')?
        - Os patterns sao aplicaveis a sistemas agenticos (escopo declarado)?

        [Phase 3 — Classification]:
        - Cada classificacao tem evidencias file:line concretas?
        - NOT_FOUND inclui a lista de locais buscados (nao apenas 'NOT_FOUND')?
        - A tabela-sumario confere com as classificacoes detalhadas?
        - As fontes de evidencia respeitam a precedencia do system-of-record.md?
        - Alguma classificacao parece errada? (ex: marcou Missing mas o repo tem
          coverage clara em canonical docs)

        [Phase 4 — Improvement Generation]:
        - Cada canonical doc cobre: Problem, Solution, Implementation in this repo,
          Tradeoffs, Relationship to Other Patterns, References?
        - Cada canonical doc esta conceitualmente alinhado com o pattern original?
        - Skills tem: What I Do, When to Use, Anti-Pattern, Pattern, Quality Gates?
        - Exercises seguem o formato do curriculum (narrative, scenario, requirements,
          skeleton code, acceptance criteria)?
        - Artefatos para Missing tem canonical doc + skill + exercise?
        - Artefatos para P1 tem canonical doc?
        - NAO foram criados artefatos para Already Exists ou Better Implementation?

        [Phase 5 — Integration]:
        - system-of-record.md reflete o novo estado com data atualizada?
        - Indices (INDEX.md, README.md, MASTER_PLAN.md) foram atualizados?
        - git diff --stat mostra apenas arquivos relacionados a esta sessao?

        [Phase 6 — Curriculum Deep Integration]:
        - Apenas curriculum/ foi modificado (docs/canonical/ intocado)?
        - Nenhum arquivo novo foi criado no curriculum/?
        - Formato, estilo e idioma (PT-BR) foram preservados?
        - Missing patterns tem integracao profunda (subsecoes, checklists, gates),
          nao apenas cross-references?

        INPUTS — Read these files:
        1. The phase output files (evidence paths from test-results.json):
           <list evidence paths for this phase>
        2. The original source/input for this phase:
           <paste relevant input — source document for Phase 1, patterns.md for Phase 2, etc.>
        3. The repository mental model (for context):
           docs/analysis/<date>-<source-slug>/<date>-<source-slug>-mental-model.md

        OUTPUT: Emit a structured verdict in this EXACT format:

        VERDICT: <pass|redo|partial-redo>

        JUSTIFICATION: <2-5 sentences explaining the verdict. Reference specific
        findings with file:line when applicable.>

        FINDINGS:
        - <finding 1 — specific, actionable>
        - <finding 2>
        - ...

        CORRECTIONS_NEEDED (only for partial-redo):
        - file: <path>, issue: <what to fix>, suggestion: <how to fix>
        - ...

        REDO_FEEDBACK (only for redo):
        <Precise instructions for the next agent attempting this phase.
        Include: what was wrong, what the correct approach is, what to
        avoid, and any constraints the next agent must respect.>"
        )
        ```

        #### Step 6c: Process Evaluator Verdict

        Read the evaluator's output and extract VERDICT from the first line.

        **If VERDICT = pass:**
        - Write `completed_at` (ISO 8601 UTC) to `harness/test-results.json`
        - Calculate `duration_seconds` = elapsed seconds between `started_at` and `completed_at`
        - Set `evaluated_by` to `"evaluator"` for that phase
        - Set `quality_check_passed` to `true`
        - Set `quality_evaluated_by` to the evaluator model name (e.g., `"ultrabrain"`)
        - Set `quality_feedback` to the evaluator's JUSTIFICATION (first 200 chars)
        - Update PROGRESS.md: use edit com oldString/newString precisos

        **If VERDICT = redo:**
        - Increment `quality_redo_count` in `harness/test-results.json`
        - Write the evaluator's REDO_FEEDBACK to `NEXT_FINDINGS.md`
        - Do NOT change `passes` or `evaluated_by` (harness retries with feedback)
        - Set `quality_check_passed` to `false`
        - Set `quality_evaluated_by` to the evaluator model name
        - Set `quality_feedback` to the evaluator's JUSTIFICATION
        - For CP-4 (phase-3 → phase-4): BLOCK phase-4. The harness must NOT
          advance to phase-4 until phase-3 passes quality check.

        **If VERDICT = partial-redo:**
        - Apply the specific corrections listed in CORRECTIONS_NEEDED
          using `edit` tool with oldString/newString from the suggestion
        - After corrections, mark as pass (no re-delegation needed)
        - Increment `quality_redo_count` for tracking (even partial counts)
        - Set `quality_check_passed` to `true` after corrections applied
        - Set `quality_feedback` to "partial-redo: <summary of corrections applied>"

        #### Quality Gate Flow Summary

        ```
        Step 6a: Form Check
              │
              ├── NEEDS_WORK → increment retry_count, write NEXT_FINDINGS.md, STOP
              │
              ▼ PASS
        Step 6b: Delegate Quality Evaluator (independent agent)
              │
              ▼
        Step 6c: Process Verdict
              │
              ├── pass → mark complete, advance
              │
              ├── redo → increment quality_redo_count, write feedback, STOP
              │         (harness retries same phase on next run with feedback)
              │
              └── partial-redo → apply corrections, mark pass, advance
        ```
      verification:
        - "Step 6 agora tem subsecoes 6a, 6b, 6c"
        - "Step 6a e o form check original (com NEEDS_WORK tratado primeiro)"
        - "Step 6b contem a tabela de quality thresholds por fase"
        - "Step 6b contem o bloco task() com o prompt template do avaliador"
        - "Step 6b contem phase-specific checks para todas as 7 fases"
        - "Step 6b menciona Generator-Evaluator como fundamento"
        - "Step 6c processa os 3 veredictos (pass, redo, partial-redo)"
        - "Step 6c menciona que CP-4 (phase-3) BLOQUEIA phase-4"
        - "Fluxograma ASCII no final confirma o fluxo"

