          Se deep gerou → ultrabrain avalia. Se ultrabrain gerou → deep avalia.
          Mesmo modelo = confirmation bias = quality gate inutil.
        - Tratar partial-redo como redo. Se o avaliador diz 'partial-redo' com
          correcoes pontuais (frontmatter, typo, tabela), aplique os edits e
          avance. Nao re-delegue a fase inteira para corrigir um campo aliases.
        - Ignorar o veredicto do quality evaluator e marcar pass mesmo assim.
          Se o avaliador disse redo, a fase nao passou. O harness NAO tem
          autoridade para sobrepor o avaliador de qualidade.
        - Delegar o quality evaluator com run_in_background=true. A avaliacao
          de qualidade e sincrona — o harness precisa do veredicto para decidir
          se avanca ou re-delega. Background evaluation quebra a cadeia de decisao.
        - Executar qualidade sem ler o output da fase. O prompt do avaliador
          DEVE incluir os paths dos arquivos de output (evidence) e o insumo
          original da fase. Sem isso, o avaliador avalia contra nada.

        ## Reference
      verification:
        - "6 novos anti-patterns adicionados antes de ## Reference"
        - "Anti-pattern sobre CP-4 menciona custo comparativo"
        - "Anti-pattern sobre modelo menciona Generator-Evaluator"
        - "Anti-pattern sobre partial-redo vs redo explica criterio"
        - "Anti-pattern sobre background menciona cadeia de decisao"

