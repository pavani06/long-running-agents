# Schema:
#   meta: {title, type, last_updated, description}
#   executions: [list of past pipeline executions with metrics]
#   skill_debt: {audit_count_this_month, last_deep_audit_date, assessment}
#   dependence_debt: {pipeline_model_dependencies, degradation_risk}
#   carry_debt: [list of artifacts with quality issues, redo_count > 0]
# =============================================================================

task_6:
  id: "create-deferred-ledger"
  file: "docs/analysis/.deferred-ledger.yaml"
  effort: "15 min"
  description: "Criar o deferred ledger YAML com schema inicial e seed data"
  dependencies: []
  type: "write"
  content: |-
    # Deferred Ledger for Agentic Work — Pipeline analyze-and-improve
    # =============================================================================
    # Rastreia 3 categorias de divida acumulada pelas execucoes do pipeline:
    #   Skill Debt: quantas auditorias profundas foram feitas este mes?
    #   Dependence Debt: o pipeline depende de quais modelos? Algum degradou?
    #   Carry Debt: artefatos com problemas de qualidade que persistem?
    #
    # Este arquivo NAO bloqueia o pipeline — e um artefato informativo que
    # o orquestrador consulta para decidir "precisamos de auditoria profunda?"
    #
    # Atualizado pelo harness apos cada execucao completa (todas as fases).
    # =============================================================================

    meta:
      title: "Deferred Ledger — Pipeline analyze-and-improve"
      type: "ledger"
      last_updated: "2026-06-12"
      description: >
        Risk tracking ledger for the analyze-and-improve pipeline. Tracks skill
        debt (human audit atrophy), dependence debt (model degradation risk),
        and carry debt (low-quality artifacts in permanent inventory).

    # ---------------------------------------------------------------------------
    # Execucoes do pipeline — uma entrada por execucao completa
    # ---------------------------------------------------------------------------
    executions:
      - execution_id: "2026-06-12-quality-gates"
        date: "2026-06-12"
        source_slug: "idsd-method"
        phases_completed: 4
        total_retries: 0
        total_quality_redos: 0
        artifacts_created: 0
        artifacts_with_redo: 0
        notes: "Execucao inicial do quality-gated harness. Fases 0-3 completas, Phase 4 pendente."

    # ---------------------------------------------------------------------------
    # Skill Debt — Julgamento humano nao exercitado atrofia
    # ---------------------------------------------------------------------------
    skill_debt:
      deep_audits_this_month: 0
      last_deep_audit_date: null
      assessment: >
        Nenhuma auditoria profunda foi realizada neste mes. A capacidade humana
        de julgar qualidade de canonical docs esta em risco de atrofia.
        Recomendacao: agendar uma sessao de auditoria de 1-2h para revisar
        canonical docs criados nas ultimas 4 semanas.
      next_recommended_audit: "2026-07-01"

    # ---------------------------------------------------------------------------
    # Dependence Debt — Dependencia em modelos que podem degradar
    # ---------------------------------------------------------------------------
    dependence_debt:
      pipeline_dependencies:
        - model: "deep"
          used_in: ["phase-1", "phase-3", "phase-4", "phase-6"]
          degradation_risk: "medium"
          notes: "Modelo principal para extracao, classificacao, geracao. Se degradar, quality gate deve detectar via redo counts."
        - model: "ultrabrain"
          used_in: ["phase-0", "phase-2"]
          degradation_risk: "low"
          notes: "Modelo para sintese e modelo mental. Degradacao afeta qualidade do modelo mental e extracao de patterns."
        - model: "quick"
          used_in: ["phase-5"]
          degradation_risk: "low"
          notes: "Usado apenas para integracao (atualizar indices). Impacto limitado."
      degradation_indicators:
        - "Aumento sustentado de quality_redo_count (>2 por execucao por 3 execucoes)"
        - "Avaliador comeca a detectar mesmos tipos de erro repetidamente"
        - "Fase especifica consistentemente mais lenta (>2x baseline)"
      last_health_check: null

    # ---------------------------------------------------------------------------
    # Carry Debt — Artefatos de baixa qualidade viram inventario permanente
    # ---------------------------------------------------------------------------
    carry_debt:
      artifacts_with_quality_issues: []
      # Formato de cada entrada:
      #   - artifact_path: path relativo ao repo
      #   - created_in_execution: execution_id
      #   - quality_redo_count: quantas vezes precisou de redo
      #   - last_review_date: quando foi revisado pela ultima vez
      #   - dependents: [paths que referenciam este artefato via wikilinks]
      #   - risk: "low" | "medium" | "high" (quantos artefatos dependem deste)
      artifacts_sunset_candidates: []
      # Artefatos com review_due_at vencido — candidatos a auditoria ou remocao
      total_carry_artifacts: 0
      notes: >
        Todo artefato criado na Phase 4 recebe review_due_at = criacao + 6 meses
        no frontmatter. Artefatos com review_due_at vencido aparecem em
        artifacts_sunset_candidates e devem ser auditados na proxima execucao.

    # ---------------------------------------------------------------------------
    # Meta-ledger: o proprio ledger tambem acumula carry debt
    # ---------------------------------------------------------------------------
    ledger_health:
      last_updated_by: "harness"
      update_cadence: "after_each_full_pipeline_execution"
      notes: "Este arquivo e atualizado pelo harness — nao requer manutencao manual."
  verification:
    - "Arquivo e YAML valido (python3 -c 'import yaml; yaml.safe_load(open(...))')"
    - "Tem as 3 secoes de debt: skill_debt, dependence_debt, carry_debt"
    - "Meta tem last_updated e type: ledger"
    - "Executions tem a execucao atual como seed data"
    - "Schema de carry_debt.artifacts_with_quality_issues documentado em comentario"

