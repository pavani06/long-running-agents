# =============================================================================
# RESPOSTAS AS QUESTOES-CHAVE DO BRIEF
# =============================================================================

key_questions_answered:
  - question: "O agente avaliador deve ser o mesmo modelo da fase que ele avalia ou um modelo diferente?"
    answer: |
      DIFERENTE. Este e o cerne do Generator-Evaluator. O gerador (agente da
      fase) e o avaliador devem ser modelos distintos para evitar confirmation
      bias. Regra pratica:
      - Fase executada por deep → avaliador usa ultrabrain
      - Fase executada por ultrabrain → avaliador usa deep
      - Fase executada por quick (Phase 5) → avaliador usa ultrabrain
      Isso garante que o vies do gerador nao contamina a avaliacao.

  - question: "O quality gate CP-4 deve BLOQUEAR Phase 4 ou apenas EMITIR warning?"
    answer: |
      BLOQUEAR. CP-4 (Phase 3 → Phase 4) e o checkpoint mais critico.
      Se a classificacao esta errada, 4 agentes deep em paralelo (Phase 4)
      criam canonical docs, skills, exercises baseados em gaps incorretos.
      Custo: redo da Phase 3 (~30-50K tokens) vs. custo de 4 agentes deep
      criando artefatos errados (~200-400K tokens + custo de limpeza).
      A barra e ALTA: se o avaliador encontrar evidencias fracas, redo na
      Phase 3 ANTES de disparar Phase 4.

  - question: "O .deferred-ledger.yaml e atualizado pelo harness ou por um agente separado?"
    answer: |
      Pelo harness (orquestrador). E um artefato simples (YAML com listas
      de entradas por categoria) que o orquestrador atualiza inline apos
      cada execucao completa do pipeline. Nao requer delegacao — o harness
      le o estado atual, adiciona a nova entrada, e sobrescreve o arquivo.
      A complexidade esta no schema, nao na operacao de append.

  - question: "Os campos quality_checked_at/review_due_at vao no frontmatter dos canonical docs ou em um arquivo separado?"
    answer: |
      No frontmatter dos canonical docs. Segue a convencao existente de
      metadados no frontmatter (AGENTS.md Rule 16). Campos sao opcionais —
      docs existentes sem esses campos continuam validos. Docs novos criados
      na Phase 4 recebem review_due_at = hoje + 6 meses automaticamente.
      Campos: quality_checked_at, review_due_at, quality_owner, redo_count.

  - question: "Como o harness distingue redo de partial-redo na pratica?"
    answer: |
      O harness le o veredicto do avaliador e classifica:
      - redo: problemas estruturais. Ex: "o analysis.md nao capturou o
        insight central do artigo", "3 dos 6 campos dos patterns estao
        vazios". A fase inteira e re-delegada com feedback.
      - partial-redo: gaps pontuais. Ex: "faltou preencher o campo aliases
        no frontmatter", "a tabela-sumario tem um erro de contagem".
        O harness faz edits cirurgicos nos arquivos de output (usando edit).
      Criterio: se o problema pode ser corrigido com <5 edits pontuais
      e nao altera a estrutura conceitual do output → partial-redo.
      Caso contrario → redo.

  - question: "Qual o custo em tokens de adicionar um agente avaliador por fase?"
    answer: |
      Estimativa por fase (agente le output ~500-2000 linhas + insumo +
      emite veredicto ~200-500 linhas):
      - CP-1 a CP-3: ~8-15K tokens cada
      - CP-4: ~15-25K tokens (leitura mais profunda, evidencias)
      - CP-5: ~20-40K tokens total (4 artefatos, avaliados separadamente)
      Total adicional: ~60-115K tokens por execucao completa.
      Justificativa: um erro na Phase 1 que contamina Phase 2→3→4 custa
      ~400-600K tokens (4 agentes deep em paralelo + reexecucao). O custo
      do quality gate e ~15-20% do custo total do pipeline, e previne
      o cenario de falha em cascata que custa 3-5x mais.

