        - curriculum/05-core-concepts/05-state-persistence.md:1836
        - curriculum/05-core-concepts/05-state-persistence.md:1840
      not_found:
        claim: Explicit stable-harness-prompt preservation rule during context reduction was not found outside this analysis output.
        searched_locations:
          - docs/decisions/
          - docs/canonical/
          - docs/evidence/
          - curriculum/
          - .opencode/skills/
    missing_mechanics:
      - Invariant that system/harness instructions are not part of reducible payload.
      - Explicit separation between stable prompt and context bulk during truncation.

  - id: 6
    name: Late-Failure Regression Suite
    classification: Partial Coverage
    integration_value: High
    justification: >-
      Regression sets, incident examples, shadow tests, and canary gates exist.
      The missing formalization is a suite specifically for late-session context
      degradation and follow-up forgetting.
    evidence:
