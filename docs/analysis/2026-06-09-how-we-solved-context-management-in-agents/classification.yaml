  - id: 4
    name: N+1 Long-Session Evals
    classification: Partial Coverage
    integration_value: High
    justification: >-
      The repo has long-conversation shadow tests and regression batteries, but
      does not define the exact N+1 eval contract: load N prior turns, apply the
      production context strategy, then grade the next turn.
    evidence:
      source_pattern:
