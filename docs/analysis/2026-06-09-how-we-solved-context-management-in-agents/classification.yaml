patterns:
  - id: 1
    name: Head-Tail Context Truncation with Recoverable Middle
    classification: Partial Coverage
    integration_value: High
    justification: >-
      The repo teaches sliding windows, structured summaries, state persistence,
      retrieval, and server-side compaction, but does not formalize the exact
      head + tail active context with recoverable omitted middle and retrieval
      handles.
    evidence:
      exists:
        - curriculum/01-nivel-1-fundamentals/exercises/exercise-01-windowing.md:13
        - curriculum/01-nivel-1-fundamentals/exercises/exercise-01-windowing.md:14
