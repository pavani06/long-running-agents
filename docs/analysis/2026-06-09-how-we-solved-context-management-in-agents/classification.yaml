        - curriculum/07-implementation-guides/06-harness-evolution-playbook.md:768
      not_found:
        claim: Named N+1 long-session eval was not found outside this analysis output.
        searched_locations:
          - docs/decisions/
          - docs/canonical/
          - docs/evidence/
          - curriculum/
          - .opencode/skills/
    missing_mechanics:
      - Fixture contract for N prior turns plus the N+1 prompt.
      - Production context builder required inside the eval.
      - Continuity-specific grading for the next turn.

  - id: 5
    name: Stable Harness Prompt During Context Reduction
    classification: Partial Coverage
    integration_value: Medium
    justification: >-
      Prompt and context builder are separated conceptually, and prompt versions
      are recommended for replay. The missing piece is a formal context-reduction
      invariant that protects stable harness instructions while trimming payload,
      history, or tool bulk.
    evidence:
      exists:
        - docs/canonical/owned-agent-control-loop.md:20
        - docs/canonical/owned-agent-control-loop.md:22
        - docs/canonical/owned-agent-control-loop.md:30
