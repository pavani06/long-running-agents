        - curriculum/05-core-concepts/05-state-persistence.md:1864
        - curriculum/05-core-concepts/05-state-persistence.md:1870
      not_found:
        claim: Explicit addressable omitted-memory catalog with id, location, and preview was not found.
        searched_locations:
          - docs/decisions/
          - docs/canonical/
          - docs/evidence/
          - curriculum/
          - .opencode/skills/
    missing_mechanics:
      - Stable IDs for omitted conversation/tool blobs.
      - Compact previews sized for retrieval decisions.
      - Conversational location metadata for omitted spans.

  - id: 3
    name: Context-Scoped Sub-Agent Delegation
    classification: Already Exists
    integration_value: Low
    justification: >-
      Scoped delegation is already documented and operationalized through HoP,
      the analyze-and-improve workflow, and the curriculum's multi-agent pipeline.
      The repo teaches that each agent receives only necessary context and returns
      structured outputs or evidence.
