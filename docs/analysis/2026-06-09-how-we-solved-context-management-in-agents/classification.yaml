        - curriculum/07-implementation-guides/03-harness-design-checklist.md:276
        - curriculum/07-implementation-guides/03-harness-design-checklist.md:277
        - curriculum/07-implementation-guides/03-harness-design-checklist.md:278
        - curriculum/03-nivel-3-advanced-architecture/04-server-side-compaction.md:327
        - curriculum/03-nivel-3-advanced-architecture/04-server-side-compaction.md:330
        - curriculum/03-nivel-3-advanced-architecture/04-server-side-compaction.md:331
        - curriculum/03-nivel-3-advanced-architecture/04-server-side-compaction.md:332
        - curriculum/03-nivel-3-advanced-architecture/04-server-side-compaction.md:333
      not_found:
        claim: Exact head-tail recoverable-middle pattern was not found outside this analysis output.
        searched_locations:
          - docs/decisions/
          - docs/canonical/
          - docs/evidence/
          - curriculum/
          - .opencode/skills/
    missing_mechanics:
      - Preserve both head and latest tail as active anchors.
      - Store omitted middle as exact recoverable content.
      - Provide retrieval handles for omitted middle.

  - id: 2
    name: Addressable Memory Catalog
    classification: Partial Coverage
    integration_value: High
    justification: >-
      Retrieval, manifests, output references, and trace handles exist, but the
      repo does not define a compact catalog of omitted items with stable IDs,
      location metadata, and previews for recovering truncated context.
    evidence:
      exists:
        - curriculum/05-core-concepts/01-context-management.md:580
        - curriculum/05-core-concepts/01-context-management.md:582
