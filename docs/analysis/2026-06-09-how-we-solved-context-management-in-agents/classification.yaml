    name: Memory Tier Separation (Active / Short-Term / Long-Term / Cross-Session)
    classification: Better Implementation
    integration_value: Low
    justification: >-
      The repo has a richer memory-tier model than the source pattern, including
      context window, hot state, durable state, audit trail, curated summary,
      external state, working memory, medium-term state, and long-term memory.
