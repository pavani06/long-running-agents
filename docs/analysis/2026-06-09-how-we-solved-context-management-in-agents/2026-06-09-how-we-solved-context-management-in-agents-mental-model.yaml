meta:
  title: "Mental Model: long-running-agents"
  date: "2026-06-09"
  repo: "long-running-agents"
  type: "mental-model"

goals:
  - "Build and manage long-running AI agent workflows with `.opencode/` as the agent system, Node >= 20.18.0 as stack, and `.runtime/` plus `artifacts/` as runtime state. Sources: AGENTS.md:7, AGENTS.md:9, AGENTS.md:10, AGENTS.md:11, README.md:3."
  - "Teach a 12-week curriculum for building reliable long-running agents, applied to KODA WhatsApp supplement-sales conversations. Sources: docs/system-of-record.md:41, curriculum/README.md:5, curriculum/README.md:11, curriculum/README.md:25, curriculum/README.md:26."
  - "Teach harness patterns that manage memory/context, decompose work, and separate generation from evaluation. Sources: curriculum/README.md:19, curriculum/README.md:20, curriculum/README.md:21, curriculum/README.md:22, curriculum/README.md:23."
  - "Operationalize agent work through issue claim, isolated branch/worktree, validation, draft PR, second-agent review, explicit merge approval, and cleanup. Sources: .opencode/skills/issue-start/SKILL.md:14, .opencode/skills/issue-review/SKILL.md:14, .opencode/skills/issue-finish/SKILL.md:14."
  - "Maintain documentation governance through explicit precedence: accepted ADRs, active canonical docs, validated evidence, analysis docs, archive docs, then READMEs and operational summaries. Sources: docs/system-of-record.md:5, docs/system-of-record.md:7, docs/system-of-record.md:8, docs/system-of-record.md:9, docs/system-of-record.md:10, docs/system-of-record.md:11, docs/system-of-record.md:12."

