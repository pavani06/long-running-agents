        - "curriculum/INDEX.md:101"
        - "curriculum/02-nivel-2-practical-patterns/exercises/exercise-04-error-context-hygiene.md:1"
    - name: "Level 3 - Advanced Architecture"
      duration: "8-10h"
      focus: "Multi-agent systems, state persistence, file-based coordination, server-side compaction, harness evolution."
      exercises:
        - "Planner/Generator/Evaluator multi-agent system"
        - "State persistence"
        - "Harness evolution"
      sources:
