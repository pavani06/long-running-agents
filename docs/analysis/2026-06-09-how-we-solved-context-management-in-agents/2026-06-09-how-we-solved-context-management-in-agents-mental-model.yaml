terminology:
  - term: "Agent"
    definition: "Entidade autônoma de IA que toma ações, usa ferramentas e executa tarefas em sequência."
    source: "curriculum/GLOSSARY.md:9, curriculum/GLOSSARY.md:10"
  - term: "Agent Loop"
    definition: "Ciclo input -> pensar -> agir -> receber resultado -> repetir."
    source: "curriculum/GLOSSARY.md:20, curriculum/GLOSSARY.md:21"
  - term: "Context Window"
    definition: "Total de tokens que um modelo processa por vez; memória imediata do agente."
    source: "curriculum/GLOSSARY.md:82, curriculum/GLOSSARY.md:83"
  - term: "Context Rot"
    definition: "Perda gradual de coerência conforme o agente avança na janela de contexto."
    source: "curriculum/GLOSSARY.md:73, curriculum/GLOSSARY.md:74"
  - term: "Harness"
    definition: "Infraestrutura e padrões que envolvem agentes para torná-los confiáveis por períodos longos."
    source: "curriculum/GLOSSARY.md:197, curriculum/GLOSSARY.md:198"
  - term: "Contract / Sprint Contract"
    definition: "Acordo entre generator e evaluator sobre o que pronto significa antes de começar."
    source: "curriculum/GLOSSARY.md:95, curriculum/GLOSSARY.md:96"
  - term: "Generator"
    definition: "Agente responsável por construir ou criar algo."
    source: "curriculum/GLOSSARY.md:147, curriculum/GLOSSARY.md:148"
  - term: "Evaluator"
    definition: "Agente separado responsável por avaliar e dar nota ao trabalho de um Generator."
    source: "curriculum/GLOSSARY.md:109, curriculum/GLOSSARY.md:110"
  - term: "Evaluation Rubric"
    definition: "Conjunto de critérios mensuráveis para avaliar qualidade subjetiva."
    source: "curriculum/GLOSSARY.md:125, curriculum/GLOSSARY.md:126"
  - term: "Memory / State"
    definition: "Informações que o agente retém entre operações, incluindo short-term, long-term e file-based."
    source: "curriculum/GLOSSARY.md:260, curriculum/GLOSSARY.md:261, curriculum/GLOSSARY.md:263"
  - term: "Multi-Agent System"
    definition: "Sistema com múltiplos agentes independentes que coordenam entre si."
    source: "curriculum/GLOSSARY.md:287, curriculum/GLOSSARY.md:288"
  - term: "Planner"
    definition: "Agente especializado em quebrar problema em etapas."
    source: "curriculum/GLOSSARY.md:305, curriculum/GLOSSARY.md:306"
  - term: "KODA"
    definition: "Agente conversacional de IA para venda de suplementos esportivos via WhatsApp."
    source: "curriculum/GLOSSARY.md:232, curriculum/GLOSSARY.md:233"
  - term: "Deterministic Tool Dispatch"
    definition: "Reframe de tool use como JSON + código determinístico testável."
    source: "docs/canonical/deterministic-tool-dispatch.md:22, docs/canonical/deterministic-tool-dispatch.md:24, docs/canonical/deterministic-tool-dispatch.md:26"
  - term: "Owned Agent Control Loop"
    definition: "Loop próprio composto por prompt, context builder, switch statement e loop explícito."
    source: "docs/canonical/owned-agent-control-loop.md:20, docs/canonical/owned-agent-control-loop.md:22, docs/canonical/owned-agent-control-loop.md:24"
  - term: "Serializable Pause/Resume State"
    definition: "Serialização de estado para pausar e retomar long-running tools sem perda do estado do agente."
    source: "docs/canonical/serializable-pause-resume-state.md:11, docs/canonical/serializable-pause-resume-state.md:13, docs/canonical/serializable-pause-resume-state.md:22, docs/canonical/serializable-pause-resume-state.md:24"
  - term: "Error Context Hygiene"
    definition: "Curadoria do que o modelo vê sobre falhas, evitando blind-append de erros."
    source: "docs/canonical/error-context-hygiene.md:19, docs/canonical/error-context-hygiene.md:21, docs/canonical/error-context-hygiene.md:23"
  - term: "Architecture Decision Record"
    definition: "Documento que registra decisão arquitetural, contexto e consequências."
    source: "curriculum/GLOSSARY.md:40, curriculum/GLOSSARY.md:41"

curriculum:
  levels:
    - name: "Level 1 - Fundamentals"
      duration: "3-4h"
      focus: "Why agents fail in long tasks: context windows, token budgeting, and basic harness patterns."
      exercises:
        - "History Windowing"
        - "Structured Output"
      sources:
