meta:
  title: "Context Management in Agents (Arize / Alex) - Extracao de Conhecimento Nao-Obvio"
  source: "/tmp/opencode/aggregated-context-management.md"
  date: "2026-06-09"
  type: "analysis"

frameworks:
  - name: "Context Engineering as Strategic Selection"
    components:
      - "Choose what the model sees instead of merely fitting under a token limit."
      - "Remember information needed for continuity, follow-ups, and correct task execution."
      - "Forget bulk, duplicates, intermediate reasoning, and stale context that should not compete for attention."
      - "Recover omitted content from memory when the agent judges it relevant."
      - "Evaluate degradation through long-session behavior, not prompt size alone."
  - name: "Context vs Memory Separation"
    components:
      - "Context is the active material visible to the model now."
      - "Memory is the material that survives outside the active window."
      - "The active window keeps system prompt, head, tail, light chat history, and latest result."
      - "The memory store keeps omitted middle content, older messages, long tool calls, IDs, locations, and previews."
      - "Long-term memory is a separate unsolved capability for continuity across chats."
  - name: "Agent Analyzing Agent Data Feedback Loop"
    components:
      - "The analyzed object is trace/span data containing prompts, metadata, inputs, outputs, and tool calls."
      - "The analyzing agent must consume the same kind of data that its own runs generate."
      - "Retries produce additional spans, making the next attempt larger."
      - "The system analyzing telemetry becomes constrained by the telemetry it must analyze."
      - "Breaking the loop requires external memory, smarter active-context selection, and sub-agent partitioning."
  - name: "Context Quality as Eval-Observed Behavior"
    components:
      - "Formal context-quality metrics are absent."
      - "Long-session evals act as an operational proxy for context quality."
      - "Load N turns and test N+1 to expose late-session forgetting."
      - "Failures are judged by whether behavior changes after accumulated context."
      - "The eval validates the context strategy through the agent's next answer."

patterns:
  - name: "Smart Truncation: Head + Tail + Memory"
    problem: "Large context objects must be reduced without destroying continuity, follow-up references, or access to important tool calls."
    mechanism: "Keep the beginning and end in the active context, preserve the system prompt and latest result, move the middle into a retrievable memory store, and let the agent fetch omitted content by tool when needed."
  - name: "Memory Store with IDs, Location, and Preview"
    problem: "A retrievable memory store is useless if the agent cannot decide what omitted content to fetch without reloading everything."
    mechanism: "Save omitted content in a database, expose stable IDs, conversational location, message distance, and compact previews, then retrieve only selected items on demand."
  - name: "Long-Session Evals: Load N, Test N+1"
    problem: "Context bugs often appear only after enough turns have accumulated, after basic tests have already passed."
    mechanism: "Load ten prior turns under the normal context strategy and grade the eleventh turn for forgetting, lost references, or degraded behavior."
  - name: "Sub-Agents for Heavy Context Isolation"
    problem: "Search and trace analysis can require hundreds of spans, multiple queries, and intermediate reasoning that should not live in the main conversation."
    mechanism: "Keep the main agent focused on chat history and light context, delegate data-intensive work to sub-agents with separate context windows, and return compact results."
  - name: "Main Conversation as Lightweight UX Surface"
    problem: "Users want to stay in one chat while moving through the product, but the implementation cannot keep every data payload in that chat."
    mechanism: "Use the main conversation for continuity and final results while external memory and sub-agents hold bulky data and intermediate work."
  - name: "Iterative Context Strategy Loop"
    problem: "No single compaction technique handles all ways an agent's context grows over time."
    mechanism: "Try simple strategies, observe where they break, convert failures into evals, move bulk into memory or sub-agents, and revise heuristics as real usage changes."

operational_lessons:
  - lesson: "Over-truncation breaks reasoning before it visibly breaks execution."
    context: "First-only truncation worked for simple tasks but made follow-up questions look like new conversations because recent references disappeared."
  - lesson: "Summarization failed because it lacked control over importance, not because it lacked compression."
    context: "LLM-generated summaries compressed context but inconsistently decided what mattered for trace analysis."
  - lesson: "Real product adoption changes the context regime."
    context: "Alex moved from sub-10-turn conversations to 20-plus-turn workflows as users navigated across the product in one chat."
  - lesson: "Sub-agents became the recurring answer for context that remains too large after truncation."
    context: "Very large prompts, inputs, traces, and histories still hit provider limits, so heavy work kept moving into separate agents."
  - lesson: "Context management requires product, evals, and observability together."
    context: "Arize frames context as a UX problem, detects degradation with long-session evals, and grounds the issue in trace/span analysis workloads."
  - lesson: "Conversation memory is not long-term memory."
    context: "Alex can retrieve omitted context inside a conversation, but users also want to reference issues from previous chats."

tradeoffs:
  - decision: "Naive first-only truncation"
    benefit: "Simple implementation and immediate token reduction."
    cost: "Loses continuity, makes follow-ups look like new conversations, and breaks multi-turn reasoning."
  - decision: "Full summarization"
    benefit: "Aggressively compresses context into fewer tokens."
    cost: "Lets the model decide what matters, producing unreliable and hard-to-audit omissions."
  - decision: "Smart truncation with head, tail, and memory"
    benefit: "Preserves stable anchors, keeps recent state, and makes omitted middle content recoverable."
    cost: "Remains heuristic and requires storage, IDs, previews, and retrieval tooling."
  - decision: "Preserve the system prompt during truncation"
    benefit: "Keeps harness instructions stable while bulk payloads move out of context."
    cost: "Requires separating invariant instructions from truncatable payload and saves fewer tokens than uniform truncation."
  - decision: "Memory retrieval by ID and preview"
    benefit: "Avoids reloading all history while giving the agent selective access to omitted content."
    cost: "Depends on preview quality and can still fail if the agent selects the wrong omitted item."
  - decision: "Long-session evals"
    benefit: "Turns late-session forgetting into a reproducible regression signal."
    cost: "Only covers modeled conversation paths and does not replace formal context-quality metrics."
  - decision: "Sub-agents for heavy data"
    benefit: "Keeps the main conversation small and isolates data-intensive reasoning."
    cost: "Adds delegation, result composition, and coordination complexity across context windows."
  - decision: "Heuristic first-100/last-100 selection"
    benefit: "Predictable, cheap, and operationally stable for months."
    cost: "Lacks a principled context budget and may preserve the wrong parts when payload structure changes."
  - decision: "Prioritize long-term memory over cache sophistication"
    benefit: "Addresses the user-visible complaint about cross-session continuity."
    cost: "Defers deeper work on cache invalidation and provider-efficiency optimization."

failure_patterns:
  - pattern: "Vicious context loop"
    cause: "The agent analyzing trace data generates more trace data, making each retry larger until provider or reasoning limits are hit."
    mitigation: "Use smart truncation, external memory, and sub-agents to keep active analysis context bounded."
  - pattern: "First-only truncation"
    cause: "Recent state and conversational references disappear when only the beginning of a context blob survives."
    mitigation: "Keep both head and tail, and move the middle to retrievable memory."
  - pattern: "Lossy summarization drift"
    cause: "An LLM summary chooses what matters without a deterministic or auditable importance policy."
    mitigation: "Prefer recoverable truncation with external storage when exact details may matter later."
  - pattern: "Late-session forgetting"
    cause: "Users keep using one chat until accumulated history stresses the context strategy."
    mitigation: "Add long-session evals that load prior turns and test the next turn."
  - pattern: "Monolithic heavy search context"
    cause: "Chat history, heavy data, search, and intermediate reasoning all occupy the same agent context."
    mitigation: "Delegate data-intensive search or trace analysis to sub-agents with separate windows."
  - pattern: "Provider-limit collision"
    cause: "Customer prompts, messages, histories, and traces are themselves the object of analysis and can exceed provider limits."
    mitigation: "Partition analysis across sub-agents and return compact results to the main agent."
  - pattern: "Context heuristic blind spot"
    cause: "Fixed head/tail heuristics lack a context-quality metric and may fail when payload distributions change."
    mitigation: "Use evals as a proxy signal while developing principled context budgets and metrics."
  - pattern: "Conversation memory mistaken for long-term memory"
    cause: "A memory store for omitted in-session context does not preserve continuity across new chats."
    mitigation: "Implement distinct long-term memory for cross-session references."

synthesis: >
  Context management in Alex is best understood as an architecture for allocating model attention, not as a token-buffer utility. The active conversation, retrievable memory, sub-agent context windows, and long-session evals form one system: decide where information lives, decide when it enters the model, and detect when those decisions fail. The non-obvious contribution is the composition rather than the first-100/last-100 heuristic itself: preserve anchors, make omitted bulk addressable, test degradation at the next turn, and move data-intensive work into separate context owners. As agents become more useful, users stay in sessions longer, so context architecture becomes the product reliability limit.
