terminology:
  - term: "Agent"
    definition: "Autonomous AI entity (usually LLM-based) that can take actions, use tools, and execute task sequences"
    source: "curriculum/GLOSSARY.md:17-19"
  - term: "Agent Loop"
    definition: "Repetitive cycle: receive input → think → act → get result → repeat"
    source: "curriculum/GLOSSARY.md:28-29"
  - term: "Context Amnesia"
    definition: "Agent forgetting prior context after exceeding context window"
    source: "curriculum/GLOSSARY.md:37-39"
  - term: "Context Window"
    definition: "Total tokens a model can process at once — the agent's immediate memory"
    source: "curriculum/GLOSSARY.md:145-146"
  - term: "Harness"
    definition: "Infrastructure and patterns wrapping agents for long-term reliability"
    source: "curriculum/GLOSSARY.md:329-338"
  - term: "Harness Engineering"
    definition: "Discipline of building support infrastructure around the model to ensure reliability on long executions"
    source: "README.md:20-21"
  - term: "Generator"
    definition: "Agent responsible for building/creating — pairs with Evaluator"
    source: "curriculum/GLOSSARY.md:279-280"
  - term: "Evaluator"
    definition: "Separate agent that evaluates Generator's work against rubrics with impartial judgment"
    source: "curriculum/GLOSSARY.md:179-181"
  - term: "Generator/Evaluator Pattern"
    definition: "Two entities collaborate: one generates, another evaluates — separates creation from quality control"
    source: "curriculum/GLOSSARY.md:292-293"
  - term: "Sprint Contract"
    definition: "Negotiated agreement between Generator and Evaluator on what done means before starting"
    source: "curriculum/GLOSSARY.md:165-166"
  - term: "Evaluation Rubric"
    definition: "Measurable criteria set for evaluating subjective quality"
    source: "curriculum/GLOSSARY.md:195-196"
  - term: "Compaction"
    definition: "Process of summarizing or compressing old context to make space for new while preserving key information"
    source: "curriculum/GLOSSARY.md:68-69"
  - term: "Context Progressive Disclosure"
    definition: "Context architecture where instructions load on-demand via resolver triggers, not monolithic prompt"
    source: "curriculum/GLOSSARY.md:158-160"
  - term: "Fuzzy Compiler"
    definition: "Mental model: LLM = compiler backend, harness = optimization passes, code = disposable build artifact"
    source: "curriculum/GLOSSARY.md:230-241"
  - term: "Constraint Budget Gate"
    definition: "Hard limit of 5-7 directional, unconditional, business-language constraints per task"
    source: "curriculum/GLOSSARY.md:93-101"
  - term: "Goal Atomicity Split"
    definition: "Each goal must be one sentence without conjunctions — 'and' triggers split into atomic goals"
    source: "curriculum/GLOSSARY.md:263-271"
  - term: "KODA"
    definition: "Reference agent: e-commerce supplement sales via WhatsApp with 2+ hour conversations"
    source: "README.md:21"
  - term: "HoP (Handoff Protocol)"
    definition: "Agent system model: each agent has closed scope, an owner, and validation gates"
    source: "docs/system-of-record.md:27"
  - term: "System of Record"
    definition: "Documentation precedence and conflict resolution: ADR > canonical > evidence > analysis > archive > README"
    source: "docs/system-of-record.md:1-2, 14-21"
  - term: "Wikilinks"
    definition: "[[path/relative/to/repo/root|Display Text]] format for all cross-references in markdown documents"
    source: "AGENTS.md:166-168"

