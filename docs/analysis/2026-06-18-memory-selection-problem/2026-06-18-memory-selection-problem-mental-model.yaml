      kind: "composed of"
    - from: "External State Persistence"
      to: "Head-Tail Context Truncation"
      kind: "composed of"
    - from: "External State Persistence"
      to: "Serializable Pause/Resume State"
      kind: "composed of"
    - from: "Plan-Execute-Verify"
      to: "Owned Agent Control Loop"
      kind: "depends on"
    - from: "LLM as Fuzzy Compiler"
      to: "Invariant-Compensation Split"
      kind: "depends on"
    - from: "LLM as Fuzzy Compiler"
      to: "Measured Harness Evolution Lifecycle"
