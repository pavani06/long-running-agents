meta:
  title: "Mental Model — long-running-agents Repository"
  date: "2026-06-18"
  repo: "long-running-agents"
  type: "mental-model"

goals:
  - "Build and teach harness engineering for long-running AI agent reliability"
  - "Document 85+ canonical agentic architecture patterns extracted from production, talks, and analyses"
  - "Deliver a 12-week curriculum program (4 levels, 8 core concepts, 35+ diagrams) for building agents that operate reliably for hours/days"
  - "Operationalize the analyze-and-improve pipeline: external knowledge → patterns → classification → canonical docs + skills + exercises"
  - "Address three structural failure modes: context loss, fragile planning, blind self-evaluation"
  - "Serve as reference architecture for any agentic system via canonical docs, ADRs, and system-of-record governance"

architecture:
  abstractions:
    - name: "Harness"
      description: "Infrastructure and patterns wrapping agents for long-term reliability — the central abstraction"
      source: "curriculum/GLOSSARY.md:329-338"
    - name: "Owned Agent Control Loop"
      description: "4-component decomposition: Prompt, Context Builder, Switch Statement, Loop — with explicit intervention points"
      source: "docs/canonical/owned-agent-control-loop.md:31-52"
    - name: "Generator-Evaluator"
      description: "Two-agent architecture separating generation from evaluation — Generator creates, Evaluator verifies against constraints"
      source: "docs/canonical/generator-evaluator.md:29-31"
    - name: "External State Persistence"
      description: "Decoupling agent memory from model memory — critical state externalized, loaded every turn"
      source: "docs/canonical/external-state-persistence.md:57"
    - name: "Plan-Execute-Verify"
      description: "Three-phase task decomposition with per-phase contracts and checkpoints"
      source: "docs/canonical/plan-execute-verify.md:31-73"
    - name: "LLM as Fuzzy Compiler"
      description: "Mental model: LLM = compiler backend, harness = optimization passes, code = disposable build artifact"
      source: "docs/canonical/llm-as-fuzzy-compiler.md:33-67"
    - name: "HoP (Handoff Protocol)"
      description: "Agent system with closed scopes, owners, validation gates — 3 agents, 28 skills"
      source: "docs/system-of-record.md:27"
    - name: "System of Record"
      description: "Documentation precedence (ADR > canonical > evidence > analysis > archive > README) and domain map"
      source: "docs/system-of-record.md:14-21"
    - name: "Obsidian Vault"
      description: "Wikilink-based knowledge management with cross-vault navigation via obsidian-eval CLI"
      source: "README.md:159"
  relationships:
