    - {name: "Implementation Guides", location: "curriculum/07-implementation-guides/", description: "Setup guide, team progression, harness design checklist, rubric template"}
    - {name: "Templates", location: "curriculum/08-tools-templates/", description: "Sprint contract, rubric, ADR, progress tracker"}
    - {name: "Case Studies", location: "curriculum/09-case-studies/", description: "5 cases: retro-game-maker, browser-daw, 3x KODA"}
    - {name: "References", location: "curriculum/10-references/", description: "External references, model capability timeline"}
  entry_points:
