meta:
  title: "Repository Mental Model"
  date: "2026-06-26"
  repo: "ecossistema-pavan"
  type: "mental-model"
  purpose: "Structured understanding of the repository ecosystem before analyzing external source documents."
  key_thesis: "LLMs are capable but fragile in long-running tasks — the solution is harness engineering, not better prompts or bigger models."

goals:
  - "Agentic Engineering (Harness Engineering): Build infrastructure that surrounds LLMs and guarantees reliability across hours-long execution. Core axiom: humans steer, agents execute. Engineer's role shifts from writing code to defining work, specifying quality bars, building guardrails, removing blockers."
  - "Knowledge Management: Multi-vault Obsidian ecosystem with typed ontologies, cross-vault wikilinks, and automated pipelines (analyze-and-improve, reflection loop) that transform raw sources into interlinked canonical knowledge."
  - "LLM Pipelines: Production-grade pipelines closing the learning loop — analyze-and-improve (7 phases), Knowledge Pipeline (C2-C6: handoff→compress→score→promote→provenance→drift→append→simulation), Reflection Loop (Gather→Analyze→Synthesize→Apply), Learning Flywheel (failure→findings→correction→canonical docs)."
  - "KODA Application: WhatsApp-based e-commerce agent for supplement sales, maintaining quality in 2+ hour conversations, serving as the practical anchor for all patterns."
  - "Curriculum & Education: 12-week program teaching harness engineering across 4 levels (N1-N4) with 8 core concepts, 35+ diagrams, 5 case studies."

architecture:
  vaults:
    - {name: "long-running-agents", path: "/mnt/c/Users/pavan/long-running-agents/", purpose: "Knowledge base: 118 canonical patterns, N1-N4 curriculum, ADRs, analyses, articles, harness", public: true}
    - {name: "raw-knowledge", path: "/mnt/c/Users/pavan/raw-knowledge/", purpose: "Ingested sources ontology: 110 concepts, entities, typed relationships (LLM Wiki/Karpathy pattern)", public: true}
    - {name: "mhc-knowledge-base", path: "/mnt/c/Users/pavan/mhc-knowledge-base/", purpose: "KODA e-commerce domain knowledge, templates, validation scripts", public: false}
    - {name: "sisyphus-runtime", path: "~/sisyphus-runtime/", purpose: "Private runtime vault: session handoffs, durable facts, runtime state, telemetry.db", public: false}

  projects:
    - {name: "obsidian-eval", path: "/mnt/c/Users/pavan/obsidian-eval/", role: "CLI & npm library (@pavani/obsidian-eval): scan, query, graph, write, epistemic graph, cross-vault wikilinks"}
    - {name: "agent-analysis", path: "/mnt/c/Users/pavan/agent-analysis/", role: "Architectural diagnosis of KODA using 8 lenses from long-running-agents"}
    - {name: "livro-agentico", path: "/mnt/c/Users/pavan/livro-agentico/", role: "Quarto book: 10 chapters, 70+ canonical patterns mapped"}
    - {name: "telemetry", path: "~/scripts/telemetry/", role: "Observability pipeline: tracer, collector, scavenger, SLO checker, 80 tests in 13 suites"}

  abstractions:
    - {name: "Vault", description: "Markdown knowledge repository managed by obsidian-eval; declares exports/imports in MANIFEST.md", location: "obsidian-eval/src/types.ts"}
    - {name: "MANIFEST.md", description: "Cross-vault dependency declaration listing exports and imports per vault", location: "obsidian-eval/src/manifest.ts"}
    - {name: "Cross-vault Wikilink", description: "[[vault:<name>/<path>]] syntax referencing documents in another vault", location: "obsidian-eval/src/index.ts"}
    - {name: "Telemetry DB", description: "SQLite database storing session metrics (tokens, traces, SLOs)", location: "~/scripts/telemetry/collector.ts"}
    - {name: "Trace Span", description: "Instrumented record of a task() call: category, subagent, duration, tokens, success", location: "~/scripts/telemetry/trace-cli.ts"}
    - {name: "Execution Graph", description: "DAG of tasks modeling session orchestration with TaskNode status/parents/children/estimate", location: "obsidian-eval/src/execution-graph.ts"}
    - {name: "Handoff", description: "Snapshot of session state persisted as note (type: session-handoff)", location: "session-handoff skill"}
    - {name: "Durable Fact", description: "Persisted knowledge with type (constraint/preference/baseline/diagnostic/principle) and temporal validity", location: "obsidian-eval/src/types.ts"}
    - {name: "Memory Layers", description: "3-layer pipeline: Working Memory → Session Memory → Long-term Memory", location: "obsidian-eval/src/memory-layers.ts"}
    - {name: "Relevance Score", description: "0-1 score across 5 dimensions: recency, importance, frequency, similarity, confidence", location: "obsidian-eval/src/relevance.ts"}
    - {name: "Promotion Candidate", description: "Pattern detected in ≥3 similar handoffs, candidate for principle", location: "obsidian-eval/src/types.ts"}
    - {name: "Reflection Loop", description: "Cross-session pipeline: Gather→Analyze→Synthesize→Apply (automated daily)", location: "reflection-runner skill"}
    - {name: "Canonical Doc", description: "Authoritative reference document (type: canonical) defining a reusable agent design pattern", location: "long-running-agents/docs/canonical/"}
    - {name: "Skill", description: "Domain-specific instructions and workflows loaded by orchestrator via skill(name='...')", location: "~/.config/opencode/skills/ (30 skills)"}
    - {name: "Harness", description: "Control infrastructure surrounding the agent: tests, reviews, conventions, skills, docs", location: "various"}
    - {name: "Token Budget", description: "Token budget per session: Green (>50%), Yellow (30-50%), Orange (20-30%), Red (≤20%)", location: "budget-monitor skill"}
    - {name: "Epistemic Graph", description: "Auto-extracted entity/relationship graph from runtime vault (174 nodes, 191 edges)", location: "obsidian-eval/src/epistemic-graph.ts"}
    - {name: "Ground Truth", description: "Human-defined immutable assertions blocking knowledge pipeline contamination (5 active)", location: "obsidian-eval/src/ground-truth.ts"}
    - {name: "Drift Detection", description: "Verification that candidate principles don't contradict ground truths", location: "obsidian-eval/src/ground-truth.ts:25-89"}
    - {name: "Provenance Chain", description: "Audit trail recording origin of each durable fact: derived_from, reasoning_summary, premises", location: "obsidian-eval/src/types.ts:102-116"}
    - {name: "Simulation", description: "Synthetic handoff generation to test emergent pipeline properties (5 asserts)", location: "obsidian-eval/src/simulate.ts"}
    - {name: "System of Record", description: "Precedence document: ADRs > canonical > evidence > analysis > archive > READMEs", location: "long-running-agents/docs/system-of-record.md"}
    - {name: "Harness Engineering", description: "Operational discipline: humans steer, agents execute; code is free, human attention is scarce", location: "raw-knowledge/concepts/harness-engineering.md"}
    - {name: "Generator/Evaluator", description: "Two-agent architecture separating creative generation from impartial evaluation (11% silent failure gap)", location: "long-running-agents/docs/canonical/generator-evaluator.md"}
    - {name: "Plan-Execute-Verify", description: "Decompose each task into three phases with explicit checkpoints and contracts per phase", location: "long-running-agents/docs/canonical/plan-execute-verify.md"}
    - {name: "3-Layer Evaluation Architecture", description: "Deterministic (regex, cost zero) → Semantic (LLM-as-Judge) → Behavioral (trace path analysis)", location: "long-running-agents/docs/canonical/3-layer-evaluation-architecture.md"}

  relationships:
    - {from: "raw-knowledge", to: "long-running-agents", type: "feeds (analyze-and-improve pipeline extracts concepts → canonical docs)"}
    - {from: "long-running-agents", to: ".opencode/skills/", type: "implements (canonical patterns become operational skills)"}
    - {from: ".opencode/skills/", to: ".opencode/agents/", type: "loaded_by (skills are loaded by agent definitions)"}
    - {from: ".opencode/agents/", to: "sisyphus-runtime", type: "persists_to (handoffs, durable facts, telemetry)"}
    - {from: "sisyphus-runtime", to: "obsidian-eval", type: "managed_by (cross-vault wikilinks powered by obsidian-eval)"}
    - {from: "obsidian-eval", to: "telemetry", type: "feeds (scheduler estimates feed trace spans)"}
    - {from: "telemetry", to: "sisyphus-runtime", type: "writes_to (telemetry.db in runtime vault)"}
    - {from: "mhc-knowledge-base", to: "long-running-agents", type: "informs (KODA domain feeds curriculum and canonical patterns)"}
    - {from: "agent-analysis", to: "mhc-knowledge-base", type: "analyzes (architectural diagnosis of KODA)"}
    - {from: "livro-agentico", to: "long-running-agents", type: "publishes (Quarto book from canonical patterns)"}

