terminology:
  - {term: "Agent (Agente)", definition: "Autonomous AI entity that takes actions, uses tools, executes tasks in sequence", source: "curriculum/GLOSSARY.md"}
  - {term: "Amnesia (Context Amnesia)", definition: "Agent forgets earlier context after exceeding context window", source: "curriculum/GLOSSARY.md"}
  - {term: "Agent Degradation Loop", definition: "4-link cycle: uneven attention → compounding errors → state fragmentation → inert memory feedback", source: "curriculum/GLOSSARY.md"}
  - {term: "Context Window", definition: "Token limit the model can process in a single session", source: "curriculum/GLOSSARY.md"}
  - {term: "Harness", definition: "Scaffolding that supports the agent: memory management, tool integration, error handling, state persistence", source: "curriculum/GLOSSARY.md"}
  - {term: "Harness Engineering", definition: "Operational discipline: humans steer, agents execute; engineer's role shifts to defining work, specifying quality bars, building guardrails", source: "raw-knowledge/concepts/harness-engineering.md"}
  - {term: "Generator/Evaluator", definition: "Two-agent architecture separating creative generation from impartial evaluation", source: "curriculum/GLOSSARY.md"}
  - {term: "Sprint Contract", definition: "Explicit agreement on what agent will deliver in a bounded execution block", source: "curriculum/GLOSSARY.md"}
  - {term: "Rubric", definition: "Structured scoring criteria for evaluating agent output quality", source: "curriculum/GLOSSARY.md"}
  - {term: "Trace", definition: "Instrumented record of agent execution path (tool calls, decisions, timing)", source: "curriculum/GLOSSARY.md"}
  - {term: "Compaction", definition: "Summarizing conversation history to reclaim context window space", source: "curriculum/GLOSSARY.md"}
  - {term: "Control Plane", definition: "Orchestration layer managing agent lifecycle (start, pause, resume, handoff)", source: "curriculum/GLOSSARY.md"}
  - {term: "Vault", definition: "Markdown knowledge repository managed by obsidian-eval; declares exports/imports in MANIFEST.md", source: "ecosystem-glossary.md"}
  - {term: "Handoff", definition: "Snapshot of session state persisted as note (type: session-handoff) in runtime vault", source: "ecosystem-glossary.md"}
  - {term: "Durable Fact", definition: "Persisted knowledge with temporal validity (valid_from/valid_to) and provenance chain", source: "ecosystem-glossary.md"}
  - {term: "Knowledge Pipeline", definition: "Full flow: handoff → compressWorkingMemory → relevanceScore → promotePatterns → checkDrift → appendFact → simulation", source: "ecosystem-glossary.md"}
  - {term: "Reflection Loop", definition: "Cross-session pipeline: Gather→Analyze→Synthesize→Apply (automated daily at 09:00 BRT)", source: "ecosystem-glossary.md"}
  - {term: "Epistemic Graph", definition: "Auto-extracted entity/relationship graph from runtime vault (174 nodes, 191 edges)", source: "ecosystem-glossary.md"}
  - {term: "Ground Truth", definition: "Human-defined immutable assertions blocking knowledge pipeline contamination (5 active)", source: "ecosystem-glossary.md"}
  - {term: "System of Record", definition: "Precedence document resolving documentation conflicts: ADRs > canonical > evidence > analysis > archive > READMEs", source: "ecosystem-glossary.md"}
  - {term: "MOC (Map of Content)", definition: "Index file aggregating wikilinks for a thematic cluster (prefix _moc-)", source: "ecosystem-glossary.md"}
  - {term: "Cross-vault Wikilink", definition: "[[vault:<name>/<path>]] syntax referencing documents in another vault", source: "ecosystem-glossary.md"}
  - {term: "Token Budget", definition: "Budget per session: Green (>50%), Yellow (30-50%), Orange (20-30%), Red (≤20%, mandatory handoff)", source: "ecosystem-glossary.md"}
  - {term: "Canonical Doc", definition: "Authoritative reference document (type: canonical) defining a reusable agent design pattern", source: "ecosystem-glossary.md"}
  - {term: "Skill", definition: "Domain-specific instructions loaded by orchestrator; 30 operational skills with 237 tests, 26/26 suites passing", source: "ecosystem-glossary.md"}
  - {term: "12-Factor Agents", definition: "Agent engineering framework by Dex Horthy (AI Engineer 2025); source of 3+ canonical patterns", source: "long-running-agents/docs/analysis/2026-06-09-12-factor-agents/"}
  - {term: "KODA", definition: "WhatsApp-based e-commerce agent for supplement sales; practical anchor for all patterns and curriculum", source: "mhc-knowledge-base/"}
  - {term: "Hot/Warm/Cold Context", definition: "Tiered-context-storage: hot (active window), warm (addressable memory), cold (archival storage)", source: "long-running-agents/docs/canonical/tiered-context-storage.md"}
  - {term: "QI Loop (Quality Improvement)", definition: "Review findings → corrective action → canonical docs update cycle", source: "learning flywheel infrastructure"}
  - {term: "Scavenger Pipeline", definition: "Post-hoc inference of trace spans from session transcripts with is_inferred=1 (lower quality)", source: "~/scripts/telemetry/scavenge-sessions.sh"}

curriculum:
  overview: "12-week program, 4 levels, 8 core concepts, 35+ Mermaid diagrams, 5 case studies"
  levels:
    - {level: "N1", name: "Fundamentals", duration: "3-4h", focus: "Context windows, token budgeting, basic harness patterns", key_lessons: ["why-agents-lose-plot", "token-budgeting", "basic-harness-patterns"]}
    - {level: "N2", name: "Practical Patterns", duration: "6-8h", focus: "Generator/Evaluator, Sprint Contracts, Rubric Design, Trace Reading", key_lessons: ["generator-evaluator-pattern", "sprint-contracts", "rubric-design", "trace-reading"]}
    - {level: "N3", name: "Advanced Architecture", duration: "8-10h", focus: "Multi-agent systems, state persistence, file-based coordination, harness evolution", key_lessons: ["multi-agent-systems", "state-persistence", "file-based-coordination", "server-side-compaction", "harness-evolution"]}
    - {level: "N4", name: "KODA-Specific", duration: "continuous", focus: "KODA architecture, customer journeys, feature patterns, implementation", key_lessons: ["koda-architecture", "customer-journey-flows", "feature-design-patterns", "evaluation-rubrics-koda", "harness-improvements"]}
  core_concepts:
    - "Context Management"
