      focus: "Generator/Evaluator, Sprint Contracts, Rubric Design e Trace Reading."
      duration: "6-8h"
      exercises: ["Generator/Evaluator", "Sprint Contracts", "Rubric Design", "Error Context Hygiene"]
      sources:
        - "/mnt/c/Users/pavan/long-running-agents/curriculum/README.md:194"
        - "/mnt/c/Users/pavan/long-running-agents/curriculum/INDEX.md:105"
        - "/mnt/c/Users/pavan/long-running-agents/curriculum/INDEX.md:109"
    - name: "Level 3 - Advanced Architecture"
      focus: "Multi-agent systems, state persistence, file-based coordination, server-side compaction e harness evolution."
