glossario:
  termos:
    - termo: "Harness"
      definicao: "Infraestrutura que sustenta agentes (memória, planejamento, avaliação, coordenação)"
      nivel: 1
    - termo: "Context Window"
      definicao: "Memória imediata do modelo. Opus 4.6: ~1M tokens (~6h de trabalho)"
      nivel: 1
    - termo: "Token Budget"
      definicao: "Gerenciamento consciente de quantos tokens estão disponíveis vs. usados"
      nivel: 1
    - termo: "Generator/Evaluator"
      definicao: "Padrão onde um agente gera e outro avalia — evita sycophancy"
      nivel: 2
    - termo: "Sprint"
      definicao: "Unidade de trabalho de 30-120 minutos de execução do agente"
      nivel: 2
    - termo: "Sprint Contract"
      definicao: "Acordo negociado entre Generator e Evaluator sobre critérios de conclusão"
      nivel: 2
    - termo: "Rubric"
      definicao: "Conjunto de critérios mensuráveis (escala 1-10) para avaliar qualidade subjetiva"
      nivel: 2
    - termo: "Trace"
      definicao: "Log detalhado de cada passo do agente — ferramenta principal de debugging"
      nivel: 2
    - termo: "Sycophancy"
      definicao: "Tendência do LLM de agradar/aprovar trabalho ruim"
      nivel: 2
    - termo: "Context Amnesia"
      definicao: "Quando o agente 'esquece' contexto anterior por ter excedido a janela"
      nivel: 1
    - termo: "Context Anxiety"
      definicao: "Comportamento ansioso do agente ao se aproximar do limite de contexto"
      nivel: 1
    - termo: "Context Rot"
      definicao: "Perda gradual de coerência conforme avança na janela de contexto"
      nivel: 1
    - termo: "Harness Evolution"
      definicao: "Remover componentes de harness quando o modelo subjacente melhora"
      nivel: 3
    - termo: "Planner"
      definicao: "Agente especializado em decompor problemas em sprints"
      nivel: 2
    - termo: "Compaction"
      definicao: "Resumir/comprimir contexto antigo mantendo informações-chave"
      nivel: 3
    - termo: "MCP (Model Context Protocol)"
      definicao: "Protocolo para agentes usarem ferramentas/APIs externas"
      nivel: 2
    - termo: "METR"
      definicao: "Model Evaluation Task Completion Rate — % de tarefas completadas com sucesso"
      nivel: 1
    - termo: "Ralph Loop"
      definicao: "Técnica de loop incremental (Jeffrey Huntley, jul/2025) — substituída por Generator/Evaluator"
      nivel: 2
    - termo: "ADR"
      definicao: "Architecture Decision Record — documento de decisão arquitetural"
      nivel: 3
    - termo: "Self-Evaluation"
      definicao: "Quando um agente avalia seu próprio trabalho (ruim: sycophancy)"
      nivel: 2
    - termo: "Verification Loop"
      definicao: "Ciclo onde gerador cria, verificador testa, feedback é retornado"
      nivel: 2

cronograma:
  semanas_totais: 12
  fases:
    - semanas: "1-2"
      fase: "Fundação"
      nivel: 1
      entregaveis:
        - "Todos entendem os 3 problemas"
        - "Exercícios do Nível 1 completos"
        - "Documento de síntese criado"
    - semanas: "3-4"
      fase: "Padrões"
      nivel: 2
      entregaveis:
        - "Generator/Evaluator para 1 feature KODA"
        - "Sprint contracts escritos"
        - "Rubrics iniciais criadas"
    - semanas: "5-6"
      fase: "Arquitetura"
      nivel: 3
      entregaveis:
        - "Multi-agent design para KODA"
        - "State persistence implementada"
        - "Harness evolution plan"
    - semanas: "7-12"
      fase: "Aplicação"
      nivel: 4
      entregaveis:
        - "Melhorias contínuas no KODA"
        - "Equipe mentoreia novos membros"
        - "Features novas usando padrões aprendidos"

metricas_sucesso:
  - marco: "Semana 2"
    criterio: "100% da equipe entende os 3 problemas"
  - marco: "Semana 4"
    criterio: "100% domina padrões práticos; rubrics para 2+ features KODA"
  - marco: "Semana 6"
    criterio: "60-80% em Nível 3; arquitetura melhorada proposta"
  - marco: "Semana 12"
    criterio: "50%+ em Nível 4; equipe mentoreia; KODA significativamente melhorado"

padroes_design:
  - nome: "Generator/Evaluator Pattern"
    descricao: "Separa criação de julgamento. Generator cria, Evaluator avalia contra rubric + testes."
    por_que_funciona: "Generator não sofre de sycophancy porque não avalia o próprio trabalho. Evaluator é treinado para ser crítico."
    fluxo:
      - "Generator cria artefato"
      - "Evaluator avalia contra rubric + testes"
      - "Feedback estruturado retorna ao Generator"

  - nome: "Multi-Agent System"
    descricao: "Planner decompõe em sprints, Generator executa, Evaluator verifica. Coordenação via estado persistente (arquivos)."
    papeis:
      - agente: "Planner"
        funcao: "Decompõe problema em sprints"
      - agente: "Generator"
        funcao: "Executa cada sprint"
      - agente: "Evaluator"
        funcao: "Verifica qualidade contra rubric"

  - nome: "Sprint Contract"
    descricao: "Acordo negociado entre Generator e Evaluator ANTES da execução sobre o que 'pronto' significa."
    exemplo:
      generator: "Vou implementar checkout com Stripe"
      evaluator: "Aceito se: (1) testa com 3 cartões reais, (2) maneja erros, (3) não expõe dados"
      resultado: "Contrato firmado — ambos sabem o que é sucesso"

  - nome: "Harness Evolution"
    descricao: "Conforme o modelo melhora, componentes de harness se tornam desnecessários."
    exemplo_evolucao:
      - componente: "Context reset"
        opus_45: "Essencial"
        opus_46: "Não precisa"
      - componente: "Sprint decomposition"
        opus_45: "Necessário"
        opus_46: "Opcional"
      - componente: "Eval cadence"
        opus_45: "Per-sprint"
        opus_46: "Single pass"

