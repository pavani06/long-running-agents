# Modelo Mental: Curriculum Long-Running Agents
# Data: 2026-06-09 | Tipo: Síntese | Escopo: curriculum/

meta:
  titulo: "Modelo Mental: Curriculum Long-Running Agents"
  data: "2026-06-09"
  tipo: "Síntese / Modelo Mental"
  escopo: "Diretório curriculum/"
  versao: "1.0"

visao_geral:
  o_que_e: >
    Programa educacional de 12 semanas para ensinar uma equipe a construir agentes
    de IA que operam de forma confiável por horas (long-running agents).
  caso_pratico:
    nome: KODA
    descricao: "Agente de vendas de suplementos esportivos via WhatsApp"
    desafio: "Manter coerência em conversas de 2+ horas"

problema_raiz:
  descricao: "Agentes de IA falham em tarefas longas por três motivos"
  causas:
    - nome: "Context Amnesia"
      descricao: "Esquecem informações críticas após 30-60 minutos (overflow da context window)"
    - nome: "Planning Collapse"
      descricao: "Misturam planejar, executar e verificar num único passo, perdendo o fio"
    - nome: "Self-Evaluation Collapse"
      descricao: "Aprovam o próprio trabalho ruim (sycophancy: tendência a agradar)"

solucao:
  conceito_chave: "Harness"
  analogia: "Se o agente é o piloto, o harness é o avião + torre de controle + combustível"
  definicao: "Infraestrutura que envolve o agente para torná-lo confiável por períodos longos"
  componentes:
    - "Gerenciamento de memória e contexto"
    - "Decomposição de tarefas em etapas"
    - "Separação entre geração e avaliação"
    - "Coordenação multi-agente"

