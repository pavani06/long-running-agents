terminology:
  - term: "Agent"
    definition: "Autonomous AI entity, usually LLM-based, that can take actions, use tools, and execute tasks in sequence."
    source: "curriculum/GLOSSARY.md:17, curriculum/GLOSSARY.md:18"
  - term: "Agent Loop"
    definition: "Repetitive cycle where an agent receives input, thinks, acts, receives a result, and repeats."
    source: "curriculum/GLOSSARY.md:28, curriculum/GLOSSARY.md:29"
  - term: "Context Window"
    definition: "Total tokens a model can process at once, acting as immediate memory."
    source: "curriculum/GLOSSARY.md:97, curriculum/GLOSSARY.md:98"
  - term: "Context Amnesia"
    definition: "Agent forgetting prior context after exceeding the context window."
    source: "curriculum/GLOSSARY.md:37, curriculum/GLOSSARY.md:38"
  - term: "Context Rot"
    definition: "Gradual coherence loss as the agent advances through the context window."
    source: "curriculum/GLOSSARY.md:88, curriculum/GLOSSARY.md:89"
  - term: "Context Anxiety"
    definition: "Rushed or anxious behavior near the context limit."
    source: "curriculum/GLOSSARY.md:77, curriculum/GLOSSARY.md:78, curriculum/GLOSSARY.md:80"
  - term: "Token Budget"
    definition: "Conscious accounting of available and consumed tokens."
    source: "curriculum/GLOSSARY.md:552, curriculum/GLOSSARY.md:553"
  - term: "Harness"
    definition: "Infrastructure and patterns around agents that make them reliable for long periods."
    source: "curriculum/GLOSSARY.md:265, curriculum/GLOSSARY.md:266, curriculum/GLOSSARY.md:268, curriculum/GLOSSARY.md:276"
  - term: "Harness Evolution"
    definition: "Simplifying or removing harness components as models improve."
    source: "curriculum/GLOSSARY.md:282, curriculum/GLOSSARY.md:283, curriculum/GLOSSARY.md:292"
  - term: "Generator"
    definition: "Agent responsible for building or creating output."
    source: "curriculum/GLOSSARY.md:215, curriculum/GLOSSARY.md:216"
  - term: "Evaluator"
    definition: "Separate agent responsible for evaluating and grading Generator work."
    source: "curriculum/GLOSSARY.md:131, curriculum/GLOSSARY.md:132"
  - term: "Generator/Evaluator Pattern"
    definition: "Two separate LLM entities collaborate: one generates, the other evaluates."
    source: "curriculum/GLOSSARY.md:228, curriculum/GLOSSARY.md:229, curriculum/GLOSSARY.md:231"
  - term: "Sprint Contract"
    definition: "Pre-work agreement between Generator and Evaluator about what done means."
    source: "curriculum/GLOSSARY.md:117, curriculum/GLOSSARY.md:118, curriculum/GLOSSARY.md:516, curriculum/GLOSSARY.md:517"
  - term: "Evaluation Rubric"
    definition: "Measurable criteria for evaluating subjective quality."
    source: "curriculum/GLOSSARY.md:147, curriculum/GLOSSARY.md:148"
  - term: "Trace"
    definition: "Detailed log of each agent step and the primary debugging tool for agent behavior."
    source: "curriculum/GLOSSARY.md:566, curriculum/GLOSSARY.md:567, curriculum/GLOSSARY.md:575, curriculum/GLOSSARY.md:579"
  - term: "Memory / State"
    definition: "Information retained between operations, including short-term, long-term, and file-based storage."
    source: "curriculum/GLOSSARY.md:328, curriculum/GLOSSARY.md:329, curriculum/GLOSSARY.md:331, curriculum/GLOSSARY.md:334"
  - term: "Multi-Agent System"
    definition: "System with multiple independent agents that coordinate, commonly Planner plus Generator plus Evaluator."
    source: "curriculum/GLOSSARY.md:355, curriculum/GLOSSARY.md:356, curriculum/GLOSSARY.md:358"
  - term: "Planner"
    definition: "Agent specialized in breaking a problem into steps."
    source: "curriculum/GLOSSARY.md:373, curriculum/GLOSSARY.md:374"
  - term: "KODA"
    definition: "WhatsApp supplement-sales conversational AI agent and applied case study for the program."
    source: "curriculum/GLOSSARY.md:300, curriculum/GLOSSARY.md:301, curriculum/GLOSSARY.md:303, curriculum/GLOSSARY.md:309"
  - term: "Skillify Pipeline"
    definition: "Hardening pipeline that turns a one-off workflow into a routable, tested, resolvable skill."
    source: "curriculum/GLOSSARY.md:449, curriculum/GLOSSARY.md:450"
  - term: "Closed-Loop Company"
    definition: "Operational model where agents read real company state and write next work, bugs, and decisions back into durable loops."
    source: "curriculum/GLOSSARY.md:61, curriculum/GLOSSARY.md:62"
  - term: "Fuzzy Compiler"
    definition: "Mental model where LLM is a fuzzy compiler, harnesses are optimization passes, and generated code is disposable build output."
    source: "curriculum/GLOSSARY.md:182, curriculum/GLOSSARY.md:183, curriculum/GLOSSARY.md:187"
  - term: "Persona-Based Documentation"
    definition: "Durable NFR documents by specialty that are loaded by relevant agents or reviewers."
    source: "curriculum/GLOSSARY.md:400, curriculum/GLOSSARY.md:401, curriculum/GLOSSARY.md:405"
  - term: "Verification Loop"
    definition: "Cycle where Generator creates, tests or Evaluator verifies, and feedback returns to Generator."
    source: "curriculum/GLOSSARY.md:587, curriculum/GLOSSARY.md:588, curriculum/GLOSSARY.md:590"

curriculum:
  levels:
    - name: "Level 1 - Fundamentals"
      focus: "Why agents fail in long tasks, context windows, token budgeting, and basic harness patterns."
      progression: "3-4h overview; execution plan expands weeks 1-2 with History Windowing and Structured Output exercises plus metrics, tradeoffs, and gotchas. Sources: curriculum/README.md:182, curriculum/README.md:185, curriculum/README.md:190, curriculum/EXECUTION_PLAN.md:65, curriculum/EXECUTION_PLAN.md:83, curriculum/EXECUTION_PLAN.md:84, curriculum/EXECUTION_PLAN.md:96."
    - name: "Level 2 - Practical Patterns"
      focus: "Generator/Evaluator, Sprint Contracts, Rubric Design, and Trace Reading."
      progression: "6-8h; exercises cover generator/evaluator, sprint contracts, rubric design, and Error Context Hygiene. Sources: curriculum/README.md:196, curriculum/README.md:199, curriculum/README.md:205, curriculum/INDEX.md:105, curriculum/INDEX.md:106, curriculum/INDEX.md:109, curriculum/EXECUTION_PLAN.md:158, curriculum/EXECUTION_PLAN.md:189."
    - name: "Level 3 - Advanced Architecture"
      focus: "Multi-agent systems, state persistence, file-based coordination, server-side compaction, and harness evolution."
      progression: "8-10h; exercises cover multi-agent design, state persistence, harness evolution, LLM as Fuzzy Compiler, and Persona-Based Documentation. Sources: curriculum/README.md:211, curriculum/README.md:214, curriculum/README.md:220, curriculum/INDEX.md:111, curriculum/INDEX.md:112, curriculum/INDEX.md:116, curriculum/EXECUTION_PLAN.md:196, curriculum/EXECUTION_PLAN.md:217."
    - name: "Level 4 - KODA-specific"
      focus: "KODA architecture, customer journeys, feature patterns, KODA rubrics, harness improvements, real-world exercises, and case studies."
      progression: "Continuous application in weeks 7-12, including KODA architecture review, rubrics, real-world trace analysis, improvements, implementation, deployment, and mentoring. Sources: curriculum/README.md:226, curriculum/README.md:229, curriculum/README.md:235, curriculum/INDEX.md:56, curriculum/INDEX.md:118, curriculum/EXECUTION_PLAN.md:238, curriculum/EXECUTION_PLAN.md:268, curriculum/EXECUTION_PLAN.md:288."
