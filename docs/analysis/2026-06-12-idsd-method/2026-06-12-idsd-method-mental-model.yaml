meta:
  title: "Mental Model: IDSD Method"
  date: "2026-06-12"
  repo: "long-running-agents"
  type: "mental-model"
goals:
  - "Manter uma base de conhecimento e programa curricular para construir sistemas de IA que operam por horas ou dias sem perder contexto, planejamento ou julgamento de qualidade. Source: README.md:3-13."
  - "Ensinar builders de negócio e de sistemas agenticos, de iniciantes até operadores em produção que precisam elevar confiabilidade. Source: README.md:15-17."
  - "Tratar harnesses como a resposta central para perda de contexto, planejamento frágil e autoavaliação cega. Source: README.md:7-13; curriculum/README.md:21-34."
  - "Entregar um currículo de 12 semanas, 4 níveis, 8 conceitos core, 35+ diagramas, exercícios, templates e KODA como caso aplicado. Source: curriculum/README.md:13; curriculum/README.md:57-181."
  - "Operacionalizar trabalho agentic com `.opencode/`, Handoff Protocol, lifecycle de issues, gates de validação e documentação Obsidian. Source: AGENTS.md:7-12; docs/system-of-record.md:25-49; .opencode/skills/issue-start/SKILL.md:12-15."
  - "Executar análises externas futuras por um pipeline controlado que começa com este modelo mental e só depois extrai padrões da fonte externa. Source: .opencode/skills/analyze-and-improve/SKILL.md:47-57; .opencode/skills/analyze-and-improve/SKILL.md:166-244; PROGRESS.md:16-18."
architecture:
  abstractions:
    - name: "System of Record"
      role: "Fonte de verdade de precedência documental e mapa de domínios do projeto."
      source: "docs/system-of-record.md:12-21; docs/system-of-record.md:23-49"
    - name: "Operational Contract"
      role: "AGENTS.md define escopo de sessão, mudança mínima, validação, segurança, convenções Obsidian e disciplina de background agents."
      source: "AGENTS.md:14-32; AGENTS.md:53-63; AGENTS.md:77-85; AGENTS.md:120-253"
    - name: "Canonical Pattern Library"
      role: "Biblioteca autoritativa de padrões de harness, contexto, evals, governança e arquitetura agentic."
      source: "docs/system-of-record.md:131-197; directory inspection: docs/canonical -> 57 markdown files"
    - name: "Curriculum"
      role: "Produto principal: programa de 12 semanas com 4 níveis, 8 conceitos core, exercícios, knowledge graphs, guias, templates e estudos de caso."
      source: "docs/system-of-record.md:53-79; curriculum/README.md:13; curriculum/MASTER_PLAN.md:173-263"
    - name: "KODA Case Domain"
      role: "Agente WhatsApp de venda de suplementos usado como caso aplicado para jornadas, features, rubricas e melhorias de harness."
      source: "README.md:26-30; curriculum/GLOSSARY.md:300-311; curriculum/04-nivel-4-koda-specific/01-koda-architecture.md"
    - name: "HoP Agent System"
      role: "Camada `.opencode` com orquestrador primário, subagentes KODA e handoff operacional entre inicialização e teste live."
      source: "docs/system-of-record.md:25-49; .opencode/agents/hop-orchestrator-rezek.md:21-39; .opencode/agents/koda-hop-init-basic.md:18-52; .opencode/agents/hop-live-whatsapp-tester.md:18-76"
    - name: "Issue Lifecycle"
      role: "Fluxo claim -> worktree -> brief -> validação -> draft PR -> review -> aprovação explícita -> merge -> cleanup."
      source: ".opencode/skills/issue-start/SKILL.md:12-15; .opencode/skills/issue-review/SKILL.md:12-15; .opencode/skills/issue-finish/SKILL.md:12-15"
    - name: "Analyze-and-Improve Harness"
      role: "Pipeline de 7 fases que transforma fontes externas em modelo mental, extração, padrões, classificação, melhorias e integração."
      source: ".opencode/skills/analyze-and-improve/SKILL.md:47-57; .opencode/skills/harness-analyze-and-improve/SKILL.md:12-41; .opencode/skills/harness-analyze-and-improve/SKILL.md:60-78"
    - name: "Mental Model Cache"
      role: "`mapa-mental-repo/` versiona modelos mentais por data e source slug para modo incremental; nesta tarefa, os modelos anteriores foram usados apenas como contexto e não copiados."
      source: ".opencode/skills/analyze-and-improve/SKILL.md:145-163; mapa-mental-repo/2026-06-10-stanford-cs153-ai-native-company-1000x-engineer-mental-model.md:12-17; docs/analysis/2026-06-12-idsd-method/delta-report.md:26-28"
    - name: "Stack and Validation Tooling"
      role: "Projeto Node ESM com ESLint e scripts reais de lint/test; documentação validada por script Obsidian."
      source: "README.md:107-113; package.json:1-21; scripts/check-obsidian-conventions.sh:18-323"
  relationships:
    - from: "System of Record"
      to: "Documentation surfaces"
      relationship: "ADRs aceitos vencem canonicals, que vencem evidências, análises, arquivo e READMEs/resumos operacionais."
      source: "docs/system-of-record.md:14-21; AGENTS.md:64-75"
    - from: "Canonical Pattern Library"
      to: "Curriculum"
      relationship: "Os canonicals formalizam padrões que o currículo ensina como níveis, conceitos, exercícios, templates e rotas por pergunta."
      source: "docs/system-of-record.md:131-197; curriculum/INDEX.md:179-234; curriculum/MASTER_PLAN.md:340-357"
    - from: "Curriculum"
      to: "KODA Case Domain"
      relationship: "O currículo ensina padrões genéricos e os aplica em KODA no Nível 4 e em case studies KODA."
      source: "curriculum/README.md:232-243; curriculum/INDEX.md:56-65; curriculum/INDEX.md:119-137"
    - from: "HoP Agent System"
      to: "Issue Lifecycle"
      relationship: "Agentes e skills transformam trabalho agentic em sessões com escopo, worktree, brief, validação, review e cleanup."
      source: "docs/system-of-record.md:25-49; .opencode/skills/issue-start/SKILL.md:24-171; .opencode/skills/issue-review/SKILL.md:44-100"
    - from: "Application-Owned Control Plane"
      to: "Owned Agent Control Loop"
      relationship: "O control plane une prompt versionado, Context Builder, ação estruturada, dispatch determinístico, loop policy, estado persistente e gates."
      source: "docs/canonical/application-owned-agent-control-plane.md:27-75; docs/canonical/owned-agent-control-loop.md:29-75"
    - from: "Hybrid Context Stack"
      to: "External State and Memory Catalog"
      relationship: "Contexto ativo é montado por camadas com prompt estável, estado durável, head/tail anchors, summaries e catálogo recuperável."
      source: "docs/canonical/hybrid-context-stack.md:28-42; docs/canonical/addressable-memory-catalog.md; docs/canonical/external-state-persistence.md"
    - from: "Eval Tier Stratification"
      to: "PR and Production Quality Gates"
      relationship: "Evals são estratificados em fast, medium e deep para preservar inner loop rápido e ainda bloquear PRs/releases quando necessário."
      source: "docs/canonical/eval-tier-stratification.md:20-72; .github/PULL_REQUEST_TEMPLATE.md:20-58"
    - from: "Manual Brake and Deferred Ledger"
      to: "Agent Execution"
      relationship: "Gates de valor e ledger de dívida impedem que tokens baratos transformem trabalho de baixo valor em inventário permanente."
      source: "docs/canonical/manual-brake-question-gate.md:21-73; docs/canonical/deferred-ledger-agentic-work.md:21-78"
    - from: "Mental Model Cache"
      to: "Current IDSD Rebuild"
      relationship: "Modelos anteriores em `mapa-mental-repo/` orientam contexto incremental, mas o delta count forçou rebuild completo e os dois outputs desta análise são artefatos novos do Phase 0."
      source: ".opencode/skills/analyze-and-improve/SKILL.md:145-179; PROGRESS.md:16-18; docs/analysis/2026-06-12-idsd-method/delta-report.md:26-28"
