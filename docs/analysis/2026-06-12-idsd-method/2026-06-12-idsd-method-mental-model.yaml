terminology:
  - term: "Agent"
    definition: "Entidade autônoma baseada em LLM que toma ações, usa ferramentas e executa tarefas em sequência."
    source: "curriculum/GLOSSARY.md:17-24"
  - term: "Agent Loop"
    definition: "Ciclo input -> pensa -> ação -> resultado -> repete."
    source: "curriculum/GLOSSARY.md:28-35"
  - term: "Context Amnesia"
    definition: "Perda de contexto anterior quando a janela de contexto é excedida."
    source: "curriculum/GLOSSARY.md:37-45"
  - term: "Context Anxiety"
    definition: "Comportamento apressado ou ansioso perto do limite de contexto."
    source: "curriculum/GLOSSARY.md:77-85"
  - term: "Context Rot"
    definition: "Perda gradual de coerência ao longo da janela de contexto."
    source: "curriculum/GLOSSARY.md:88-94"
  - term: "Context Window"
    definition: "Número total de tokens que um modelo pode processar de uma vez."
    source: "curriculum/GLOSSARY.md:97-107"
  - term: "Context Progressive Disclosure"
    definition: "Capacidades e instruções ficam em skills acionadas por resolver, não em prompt monolítico."
    source: "curriculum/GLOSSARY.md:110-113; docs/canonical/resolver-based-context-progressive-disclosure.md"
  - term: "Sprint Contract"
    definition: "Acordo prévio sobre o que pronto significa antes da execução."
    source: "curriculum/GLOSSARY.md:117-126; curriculum/GLOSSARY.md:516-520"
  - term: "Evaluator"
    definition: "Agente separado que avalia e critica o trabalho de um Generator contra rubrics."
    source: "curriculum/GLOSSARY.md:131-143"
  - term: "Evaluation Rubric"
    definition: "Critérios mensuráveis para avaliar qualidade subjetiva."
    source: "curriculum/GLOSSARY.md:147-163"
  - term: "Failure Pattern Classification Loop"
    definition: "Ritual semanal que classifica falhas recorrentes e as converte em guardrails automatizados."
    source: "curriculum/GLOSSARY.md:169-179; docs/canonical/failure-pattern-classification-loop.md:20-64"
  - term: "LLM as Fuzzy Compiler"
    definition: "LLM é compilador fuzzy, harness é pipeline de otimização e código gerado é artefato de build descartável."
    source: "curriculum/GLOSSARY.md:182-197; docs/canonical/llm-as-fuzzy-compiler.md"
  - term: "Garbage Collection Day"
    definition: "Meta-loop semanal que transforma feedback humano e falhas de produção em guardrails de harness."
    source: "curriculum/GLOSSARY.md:202-212; docs/canonical/garbage-collection-day-meta-loop.md"
  - term: "Generator"
    definition: "Agente responsável por construir ou criar output."
    source: "curriculum/GLOSSARY.md:215-225"
  - term: "Generator/Evaluator Pattern"
    definition: "Duas entidades separadas colaboram: uma gera, outra avalia."
    source: "curriculum/GLOSSARY.md:228-248; docs/canonical/generator-evaluator.md:27-71"
  - term: "Harness"
    definition: "Infraestrutura e padrões que envolvem agentes para torná-los confiáveis por períodos longos."
    source: "curriculum/GLOSSARY.md:265-278"
  - term: "Harness Evolution"
    definition: "Simplificar ou remover componentes de harness conforme modelos melhoram."
    source: "curriculum/GLOSSARY.md:282-295; docs/canonical/measured-harness-evolution-lifecycle.md"
  - term: "KODA"
    definition: "Agente conversacional de IA para venda de suplementos via WhatsApp e case study do programa."
    source: "curriculum/GLOSSARY.md:300-311"
  - term: "Memory / State"
    definition: "Informações retidas entre operações, em memória curta, longa ou arquivo."
    source: "curriculum/GLOSSARY.md:328-339"
  - term: "Multi-Agent System"
    definition: "Sistema com Planner, Generator, Evaluator ou outros agentes independentes coordenados."
    source: "curriculum/GLOSSARY.md:355-368"
  - term: "Planner"
    definition: "Agente especializado em quebrar problemas em etapas."
    source: "curriculum/GLOSSARY.md:373-388"
  - term: "Persona-Based Documentation"
    definition: "NFRs por persona especialista carregados por agentes implementadores e revisores."
    source: "curriculum/GLOSSARY.md:400-416; docs/canonical/persona-based-documentation.md"
  - term: "Skillify Pipeline"
    definition: "Hardening de workflow que funcionou uma vez em skill roteável, testada e resolvível."
    source: "curriculum/GLOSSARY.md:449-452; docs/canonical/skill-resolver-skillify-capability-pipeline.md"
  - term: "Self-Evaluation"
    definition: "Anti-padrão em que um agente avalia o próprio trabalho."
    source: "curriculum/GLOSSARY.md:456-476"
  - term: "Token Budget"
    definition: "Gerenciamento consciente de tokens disponíveis e consumidos."
    source: "curriculum/GLOSSARY.md:552-563; docs/canonical/explicit-token-budget-ledger.md"
  - term: "Trace"
    definition: "Log detalhado de inputs, reasoning, ações e outputs do agente."
    source: "curriculum/GLOSSARY.md:566-581"
  - term: "Verification Loop"
    definition: "Ciclo Generator -> Test -> Evaluator -> Feedback."
    source: "curriculum/GLOSSARY.md:587-600"
  - term: "Manual Brake Question Gate"
    definition: "Gate com três perguntas de valor antes de autorizar construção por agente."
    source: "docs/canonical/manual-brake-question-gate.md:27-47"
  - term: "Deferred Ledger"
    definition: "Ledger estratégico que classifica dívida agentic em skill debt, dependence debt e carry debt."
    source: "docs/canonical/deferred-ledger-agentic-work.md:27-55"
  - term: "Architecture-as-Agent-Affordance"
    definition: "Arquitetura avaliada como affordance para futuras sessões de agentes: deep modules, boundary tests e baixo acoplamento."
    source: "docs/canonical/architecture-as-agent-affordance.md:28-42"
curriculum:
  levels:
    - name: "Nível 1 - Fundamentos"
      focus: "Por que agentes falham: contexto, token budget e harness básico."
      duration: "3-4h no overview; semanas 1-2 expandidas para 13-16h/semana no plano de execução."
      artifacts:
      - "3 lições"
      - "2 exercícios hands-on"
      - "koda-applications/nivel-1-koda.md"
      - "soluções"
      source: "curriculum/README.md:186-199; curriculum/MASTER_PLAN.md:175-192; curriculum/EXECUTION_PLAN.md:65-154"
    - name: "Nível 2 - Padrões Práticos"
      focus: "Generator/Evaluator, Sprint Contracts, Rubric Design e Trace Reading."
      duration: "6-8h no overview; semanas 3-4 no plano."
      artifacts:
      - "4 lições"
      - "4 exercícios incluindo Error Context Hygiene"
      - "koda-applications/nivel-2-koda.md"
      - "rubrics KODA"
      source: "curriculum/README.md:202-214; curriculum/INDEX.md:105-110; curriculum/EXECUTION_PLAN.md:158-193"
    - name: "Nível 3 - Arquitetura Avançada"
      focus: "Multi-agent systems, state persistence, file-based coordination, compaction e harness evolution."
      duration: "8-10h; semanas 5-6 para membros avançados."
      artifacts:
      - "5 lições"
      - "5 exercícios avançados"
      - "03-nivel-arquiteto/exercise-04-owner-of-no-role.md"
      - "koda-applications/nivel-3-koda.md"
      source: "curriculum/README.md:217-228; curriculum/INDEX.md:111-118; curriculum/EXECUTION_PLAN.md:196-235"
    - name: "Nível 4 - KODA-Específico"
      focus: "Arquitetura KODA, customer journeys, feature patterns, rubricas KODA, harness improvements e exercícios reais."
      duration: "Contínuo; semanas 7-12 no plano de execução."
      artifacts:
      - "5 lições KODA"
      - "4 real-world exercises"
      - "3 case studies locais"
      - "soluções Python/JSON/Markdown"
      source: "curriculum/README.md:232-243; curriculum/INDEX.md:119-137; curriculum/EXECUTION_PLAN.md:238-306"
  concepts:
    - name: "Context Management"
      source: "curriculum/README.md:247-264; curriculum/MASTER_PLAN.md:348-357"
