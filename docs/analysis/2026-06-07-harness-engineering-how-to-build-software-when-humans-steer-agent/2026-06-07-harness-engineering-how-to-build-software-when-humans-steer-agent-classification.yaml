patterns:
  - number: 1
    name: "Durable Non-Functional Requirements Memory"
    classification: "Better Implementation"
    justification: >
      The repository's AGENTS.md is a mature, agent-loaded durable NFR document that
      the pattern's source describes as the target outcome. The repo has gone further
      than the pattern by combining three enforcement layers: a single loaded rules
      document, mechanical enforcement via ESLint, and format-level enforcement via
      .editorconfig.
    integration_value: "Low"
    evidence:
      - "AGENTS.md:1-238 — 16 rules governing agent behavior. Rule 6 at lines 43-51 defines naming, format, and traceability conventions. Rule 9 at lines 77-84 encodes no-secrets, no-type-suppressions, no-empty-catch, no-eslint-disable, and side-effect approval gates. Rule 10 at lines 86-90 demands following existing module patterns, small explicit testable functions, and central config/client/logger helpers. Rule 16 at lines 120-238 is a comprehensive standard for documentation authoring."
      - "eslint.config.js:1-99 — Mechanical enforcement of code standards: no-var, no-unused-vars, prefer-const, eqeqeq, no-await-in-loop, preserve-caught-error, plus custom rules no-catch-message and no-raw-console-in-scripts."
      - ".editorconfig:1-10 — Format-level uniformity: UTF-8, LF, indent 2 spaces."

  - number: 2
    name: "Reviewer Agents as CI Gates"
    classification: "Already Exists"
    justification: >
      The repository's issue-review workflow implements a second-agent review exactly
      as the pattern describes: automated review of PR diffs against standards,
      blocking vs. advisory findings, and CI-style quality gates that run before merge.
    integration_value: "Low"
    evidence:
      - ".opencode/skills/issue-review/SKILL.md:12-14 — Validates worktree, creates draft PR, runs second-agent review, surfaces findings."
      - ".opencode/skills/issue-review/SKILL.md:166-188 — Step 6: structured review scope with BLOCKING/ADVISORY classification."
      - ".opencode/skills/issue-review/SKILL.md:57-85 — Eval-sensitive PR validation with baseline/candidate comparison and merge recommendation."
      - "docs/canonical/pr-gated-eval-enforcement.md:28-53 — Formalizes eval-specific PR gates with waiver policy and merge policy."
      - "AGENTS.md:108-110 — Rule 13: Significant implementation should receive a second-pass review before merge."

  - number: 3
    name: "Garbage Collection Day Meta-Loop"
    classification: "Partial Coverage"
    justification: >
      The repository has strong mechanisms that align with parts of the pattern but
      the specific weekly cadence where human review feedback gets systematically
      converted into automated harness guardrails is not formalized as a recurring meta-loop.
    integration_value: "High"
    existing_pieces:
