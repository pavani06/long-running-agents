      - "docs/canonical/measured-harness-evolution-lifecycle.md:29-62 — BUILD/STABILIZE/SIMPLIFY/REMOVE lifecycle with quarterly cadence."
      - "docs/canonical/pain-signal-eval-progression-gate.md:28-51 — Maps pain signals to minimum eval investments."
      - "docs/canonical/production-failure-regression-flywheel.md:28-40 — Converts production failures into durable regression cases."
      - "docs/canonical/invariant-compensation-split.md:31-50 — Classifies harness components before simplification or removal."
    missing:
