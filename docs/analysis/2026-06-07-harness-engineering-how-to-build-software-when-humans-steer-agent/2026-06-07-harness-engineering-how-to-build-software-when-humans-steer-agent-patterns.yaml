meta:
  title: "Reusable Agentic Patterns from Harness Engineering"
  source: "/mnt/c/Users/pavan/long-running-agents/docs/2026-06-07-harness-engineering-how-to-build-software-when-humans-steer-agent-analysis/2026-06-07-harness-engineering-how-to-build-software-when-humans-steer-agent/2026-06-07-harness-engineering-how-to-build-software-when-humans-steer-agent-analysis.md"
  date: "2026-06-11"
  type: "patterns"
patterns:
  - name: "Durable Non-Functional Requirements Memory"
    problem_solved: "Agents make hundreds of underspecified style, architecture, naming, error-handling, and async decisions when team preferences are not durable context."
    inputs:
      - "Team conventions for style, naming, structure, error handling, async patterns, and testing."
      - "Persona-specific quality knowledge from product, frontend, reliability, security, and architecture owners."
      - "Repository documentation surfaces that agents reliably load during work."
    outputs:
      - "Durable non-functional requirement documents."
      - "Reusable quality criteria for implementers, reviewers, linters, and skills."
      - "Agent-visible defaults for otherwise ambiguous implementation choices."
    benefits:
      - "Reduces random style and architecture choices from model pretraining diversity."
      - "Makes human taste reusable across many agent runs instead of repeated in chat."
      - "Creates a source of truth that can feed review agents and automated checks."
    limitations:
      - "Requires human experts to externalize tacit preferences precisely."
      - "Stale NFRs can institutionalize old decisions after the codebase changes."
      - "Does not replace executable checks when a preference can be enforced mechanically."
    source_reference:
      - "/mnt/c/Users/pavan/long-running-agents/docs/2026-06-07-harness-engineering-how-to-build-software-when-humans-steer-agent-analysis/2026-06-07-harness-engineering-how-to-build-software-when-humans-steer-agent/2026-06-07-harness-engineering-how-to-build-software-when-humans-steer-agent-analysis.md:41"
      - "/mnt/c/Users/pavan/long-running-agents/docs/2026-06-07-harness-engineering-how-to-build-software-when-humans-steer-agent-analysis/2026-06-07-harness-engineering-how-to-build-software-when-humans-steer-agent/2026-06-07-harness-engineering-how-to-build-software-when-humans-steer-agent-analysis.md:45"
    components:
      - "NFR document set."
      - "Persona ownership map."
      - "Repository source-of-truth policy."
      - "Agent loading rule."
      - "Review and lint consumers."
    flow:
      - "Collect recurring human review preferences and domain-specific standards."
      - "Assign each quality dimension to the persona or owner who understands it best."
      - "Write durable NFR guidance in the repository source-of-truth surface."
      - "Load or surface the guidance during implementation and review."
      - "Update the NFRs when review feedback reveals a missing or stale rule."
  - name: "Instruction Injection Surface Map"
    problem_solved: "Agent instructions become brittle when all operational guidance must fit in the initial prompt."
    inputs:
      - "Repository instruction files, lint rules, test failures, review comments, skills, rules files, and SDK-driven checks."
      - "A taxonomy of when each surface appears in the agent trajectory."
      - "Rules for which guidance belongs in each surface."
    outputs:
      - "A map of prompt-injection surfaces available to the harness."
      - "Placement decisions for new instructions."
      - "Phase-specific guidance delivered through code, tests, review, or skills."
    benefits:
      - "Turns the whole engineering environment into a structured context-delivery system."
      - "Reduces base prompt bloat by moving guidance to the surface where it becomes relevant."
      - "Makes instruction placement a design decision instead of ad hoc prompt editing."
    limitations:
      - "Requires coordination so surfaces do not contradict each other."
      - "Hidden or inconsistent injection points can make behavior hard to debug."
      - "The map must evolve when tooling, CI, or review workflows change."
    source_reference:
      - "/mnt/c/Users/pavan/long-running-agents/docs/2026-06-07-harness-engineering-how-to-build-software-when-humans-steer-agent-analysis/2026-06-07-harness-engineering-how-to-build-software-when-humans-steer-agent/2026-06-07-harness-engineering-how-to-build-software-when-humans-steer-agent-analysis.md:69"
      - "/mnt/c/Users/pavan/long-running-agents/docs/2026-06-07-harness-engineering-how-to-build-software-when-humans-steer-agent-analysis/2026-06-07-harness-engineering-how-to-build-software-when-humans-steer-agent/2026-06-07-harness-engineering-how-to-build-software-when-humans-steer-agent-analysis.md:83"
    components:
      - "Surface inventory."
      - "Trigger phase for each surface."
      - "Instruction ownership policy."
      - "Conflict resolution rule."
      - "Observability for delivered guidance."
    flow:
      - "Inventory every mechanism that can deliver text or constraints to the agent."
      - "Classify each surface by phase, authority, and expected payload size."
      - "Place each new instruction on the narrowest effective surface."
      - "Test that the agent receives the guidance when the relevant failure occurs."
      - "Resolve conflicts through the repository source-of-truth hierarchy."
  - name: "Just-in-Time Context Surfacing"
    problem_solved: "Front-loading all instructions wastes context and exposes agents to guidance before it is actionable."
    inputs:
      - "Task objective and current implementation phase."
      - "Lint, test, review, or harness events that reveal a specific missing constraint."
      - "Corrective guidance written for the phase where the constraint matters."
    outputs:
      - "Context injected at lint, test, review, or repair time."
      - "Agent edits that respond to the newly relevant constraint."
      - "A smaller initial prompt with fewer premature instructions."
    benefits:
      - "Conserves the active context window for the current reasoning step."
      - "Improves instruction salience by presenting guidance at the moment of use."
      - "Allows exploratory implementation before applying structural cleanup constraints."
    limitations:
      - "Late guidance can cause rework if the agent built too far in the wrong shape."
      - "Auto-compaction can remove earlier context before the corrective phase arrives."
      - "Requires reliable phase triggers such as lint failures, tests, or review gates."
    source_reference:
      - "/mnt/c/Users/pavan/long-running-agents/docs/2026-06-07-harness-engineering-how-to-build-software-when-humans-steer-agent-analysis/2026-06-07-harness-engineering-how-to-build-software-when-humans-steer-agent/2026-06-07-harness-engineering-how-to-build-software-when-humans-steer-agent-analysis.md:85"
      - "/mnt/c/Users/pavan/long-running-agents/docs/2026-06-07-harness-engineering-how-to-build-software-when-humans-steer-agent-analysis/2026-06-07-harness-engineering-how-to-build-software-when-humans-steer-agent/2026-06-07-harness-engineering-how-to-build-software-when-humans-steer-agent-analysis.md:93"
    components:
      - "Thin initial prompt."
      - "Phase detector."
      - "Corrective instruction payload."
      - "Lint, test, or review trigger."
      - "Repair loop."
    flow:
      - "Let the agent start with only the context needed for the current phase."
      - "Detect when a later phase makes a constraint relevant."
      - "Inject the targeted corrective instruction through the active feedback surface."
      - "Have the agent revise the work to satisfy the constraint."
      - "Persist recurring corrective instructions as durable harness rules."
  - name: "Reviewer Agents as CI Gates"
    problem_solved: "Human-only review becomes the bottleneck when agents produce many PRs faster than humans can synchronously inspect them."
    inputs:
      - "Pull request diff, repository standards, NFR documents, acceptance criteria, and verification evidence."
      - "Persona-specific reviewer prompts or skills."
      - "A severity threshold for issues that should block merge."
    outputs:
      - "Automated review findings focused on merge-blocking issues."
      - "Pass, fail, acknowledge, defer, or reject signals for the implementation agent."
      - "CI-visible quality gates that run on push or PR update."
    benefits:
      - "Scales review capacity with agent throughput."
      - "Applies documented NFRs consistently instead of relying on memory."
      - "Moves many quality checks earlier and makes them asynchronous."
    limitations:
      - "Reviewer prompts must be calibrated to avoid noisy P3 findings."
      - "Agents can miss nuanced product judgment that humans would catch."
      - "If every finding is mandatory, the implementer can enter endless correction loops."
    source_reference:
      - "/mnt/c/Users/pavan/long-running-agents/docs/2026-06-07-harness-engineering-how-to-build-software-when-humans-steer-agent-analysis/2026-06-07-harness-engineering-how-to-build-software-when-humans-steer-agent/2026-06-07-harness-engineering-how-to-build-software-when-humans-steer-agent-analysis.md:95"
      - "/mnt/c/Users/pavan/long-running-agents/docs/2026-06-07-harness-engineering-how-to-build-software-when-humans-steer-agent-analysis/2026-06-07-harness-engineering-how-to-build-software-when-humans-steer-agent/2026-06-07-harness-engineering-how-to-build-software-when-humans-steer-agent-analysis.md:104"
    components:
      - "Persona reviewer definitions."
      - "Diff and evidence reader."
      - "NFR and rubric context."
      - "Severity threshold."
      - "CI gate integration."
      - "Implementer response protocol."
    flow:
      - "Trigger reviewer agents on push or PR update."
      - "Load the relevant persona rubric and repository standards."
      - "Review the diff and verification evidence for P2 or higher issues."
      - "Emit findings with severity and rationale."
      - "Allow the implementation agent or human owner to accept, defer, or reject each finding."
  - name: "Implementation Agent Feedback Autonomy"
    problem_solved: "Mandatory compliance with every reviewer comment can trap agents in loops where reviewers continuously steer the patch away from completion."
    inputs:
      - "Reviewer findings from human or agent reviewers."
      - "Merge policy, severity labels, and acceptance criteria."
      - "Implementation agent judgment about whether feedback is correct, blocking, or out of scope."
    outputs:
      - "Explicit acknowledge, defer, or reject decisions per finding."
      - "A patch that addresses blocking feedback without chasing every minor suggestion."
      - "Follow-up issues for valid non-blocking feedback."
    benefits:
      - "Prevents reviewer-agent bullying and infinite correction loops."
      - "Keeps the workflow biased toward accepted working code rather than perfect code."
      - "Makes disagreement visible instead of silently ignoring or blindly applying feedback."
    limitations:
      - "Requires a clear severity policy so real blockers are not rejected casually."
      - "Incorrect deferrals can merge defects that should have been fixed immediately."
      - "Works best when reviewers produce grounded findings rather than vague preferences."
    source_reference:
      - "/mnt/c/Users/pavan/long-running-agents/docs/2026-06-07-harness-engineering-how-to-build-software-when-humans-steer-agent-analysis/2026-06-07-harness-engineering-how-to-build-software-when-humans-steer-agent/2026-06-07-harness-engineering-how-to-build-software-when-humans-steer-agent-analysis.md:95"
      - "/mnt/c/Users/pavan/long-running-agents/docs/2026-06-07-harness-engineering-how-to-build-software-when-humans-steer-agent-analysis/2026-06-07-harness-engineering-how-to-build-software-when-humans-steer-agent/2026-06-07-harness-engineering-how-to-build-software-when-humans-steer-agent-analysis.md:104"
      - "/mnt/c/Users/pavan/long-running-agents/docs/2026-06-07-harness-engineering-how-to-build-software-when-humans-steer-agent-analysis/2026-06-07-harness-engineering-how-to-build-software-when-humans-steer-agent/2026-06-07-harness-engineering-how-to-build-software-when-humans-steer-agent-analysis.md:124"
      - "/mnt/c/Users/pavan/long-running-agents/docs/2026-06-07-harness-engineering-how-to-build-software-when-humans-steer-agent-analysis/2026-06-07-harness-engineering-how-to-build-software-when-humans-steer-agent/2026-06-07-harness-engineering-how-to-build-software-when-humans-steer-agent-analysis.md:130"
    components:
      - "Finding severity taxonomy."
      - "Acceptance criteria."
      - "Acknowledge, defer, reject actions."
      - "Follow-up issue path."
      - "Merge owner decision."
    flow:
      - "Collect reviewer findings after automated or human review."
      - "Classify each finding against severity and acceptance criteria."
      - "Apply fixes for true blockers."
      - "Defer valid non-blockers into follow-up work."
      - "Reject incorrect or out-of-scope feedback with a short rationale."
  - name: "Weekly Harness Garbage Collection Loop"
    problem_solved: "Teams keep paying for the same agent slop when recurring review feedback never becomes automated harness behavior."
    inputs:
      - "Human review feedback, QA findings, agent failure traces, and repeated slop categories from the previous work cycle."
      - "A categorization rubric for root causes and prevention surfaces."
      - "Documentation, lint, skill, test, or reviewer-agent update mechanisms."
    outputs:
      - "Categorized failure classes."
      - "New or updated guardrails that eliminate a class of misbehavior."
      - "Reduced future need for synchronous human correction."
    benefits:
      - "Converts human observations into accumulating harness leverage."
      - "Attacks classes of behavior instead of one patch at a time."
      - "Creates a regular cadence for harness learning and cleanup."
    limitations:
      - "Requires recurring time allocation even when feature pressure is high."
      - "Poor categorization can create narrow rules that miss the real failure class."
      - "New guardrails can add false positives or token cost if not measured."
    source_reference:
      - "/mnt/c/Users/pavan/long-running-agents/docs/2026-06-07-harness-engineering-how-to-build-software-when-humans-steer-agent-analysis/2026-06-07-harness-engineering-how-to-build-software-when-humans-steer-agent/2026-06-07-harness-engineering-how-to-build-software-when-humans-steer-agent-analysis.md:47"
      - "/mnt/c/Users/pavan/long-running-agents/docs/2026-06-07-harness-engineering-how-to-build-software-when-humans-steer-agent-analysis/2026-06-07-harness-engineering-how-to-build-software-when-humans-steer-agent/2026-06-07-harness-engineering-how-to-build-software-when-humans-steer-agent-analysis.md:57"
    components:
      - "Weekly review ritual."
      - "Failure-class backlog."
      - "Root-cause categorizer."
      - "Guardrail implementation surface."
      - "Post-change observation loop."
    flow:
      - "Collect recurring feedback and failures from the week."
      - "Group observations into behavior classes rather than individual incidents."
      - "Find why humans spent time correcting each class."
      - "Implement the smallest durable guardrail that prevents the class."
      - "Observe whether the same class recurs in later work."
  - name: "Deep Skill Capability Wrappers"
    problem_solved: "Agents waste context and make brittle tool assumptions when infrastructure workflows are explained shallowly in prompts."
    inputs:
      - "A small set of high-value operational workflows such as app launch, browser control, observability, deployment, or prompt-writing."
      - "Current tooling commands, environment setup, failure modes, and verification steps."
      - "A resolver or trigger contract that loads the skill only when relevant."
    outputs:
      - "Five to ten deep skills that hide infrastructure churn behind stable capability interfaces."
      - "Agent-executable procedures for complex operational tasks."
      - "Updated skills when underlying tools change."
    benefits:
      - "Keeps infrastructure complexity out of the base prompt."
      - "Lets agents operate changing tools through a stable workflow contract."
      - "Improves reliability more than many shallow skills that only restate obvious advice."
    limitations:
      - "Each deep skill needs maintenance and realistic trigger examples."
      - "Too few skills can leave important workflows unsupported."
      - "Skills become dangerous if they perform side effects without approval gates."
    source_reference:
      - "/mnt/c/Users/pavan/long-running-agents/docs/2026-06-07-harness-engineering-how-to-build-software-when-humans-steer-agent-analysis/2026-06-07-harness-engineering-how-to-build-software-when-humans-steer-agent/2026-06-07-harness-engineering-how-to-build-software-when-humans-steer-agent-analysis.md:106"
      - "/mnt/c/Users/pavan/long-running-agents/docs/2026-06-07-harness-engineering-how-to-build-software-when-humans-steer-agent-analysis/2026-06-07-harness-engineering-how-to-build-software-when-humans-steer-agent/2026-06-07-harness-engineering-how-to-build-software-when-humans-steer-agent-analysis.md:113"
    components:
      - "Capability selection policy."
      - "Deep workflow instructions."
      - "Resolver triggers."
      - "Operational commands and checks."
      - "Skill maintenance owner."
    flow:
      - "Identify recurring workflows whose tool details are costly or volatile."
      - "Write a deep skill that teaches the full workflow and verification surface."
      - "Define positive and negative triggers for loading the skill."
      - "Have agents use the skill instead of rediscovering infrastructure details."
      - "Update the skill when the infrastructure changes."
  - name: "Codebase Uniformity as Agent Affordance"
    problem_solved: "Agents spend attention choosing among local styles and duplicated patterns when a codebase permits many ways to do the same thing."
    inputs:
      - "Repository architecture, package boundaries, dependency choices, language choices, helper libraries, and CI script patterns."
      - "Uniformity standards for canonical implementation paths."
      - "Migration capacity from parallel agents when consolidation is needed."
    outputs:
      - "One canonical way to perform common operations."
      - "Predictable file, package, dependency, and helper patterns."
      - "Large-scale migrations that reduce future agent ambiguity."
    benefits:
      - "Reduces model attention spent inferring which local convention to follow."
      - "Makes context from one part of the repository transfer to another."
      - "Improves reliability of autonomous implementation and review."
    limitations:
      - "Can reduce local flexibility and require strong architectural governance."
      - "Migrations still need isolation, review, and integration discipline."
      - "Uniformity is harmful when it hides real domain differences behind one abstraction."
    source_reference:
      - "/mnt/c/Users/pavan/long-running-agents/docs/2026-06-07-harness-engineering-how-to-build-software-when-humans-steer-agent-analysis/2026-06-07-harness-engineering-how-to-build-software-when-humans-steer-agent/2026-06-07-harness-engineering-how-to-build-software-when-humans-steer-agent-analysis.md:114"
      - "/mnt/c/Users/pavan/long-running-agents/docs/2026-06-07-harness-engineering-how-to-build-software-when-humans-steer-agent-analysis/2026-06-07-harness-engineering-how-to-build-software-when-humans-steer-agent/2026-06-07-harness-engineering-how-to-build-software-when-humans-steer-agent-analysis.md:122"
    components:
      - "Canonical pattern catalog."
      - "Package and dependency boundaries."
      - "Migration plan."
      - "Structural checks."
      - "Review policy for exceptions."
    flow:
      - "Identify places where multiple equivalent patterns compete."
      - "Choose the canonical implementation path for each common operation."
      - "Use agents to migrate old variants into the canonical pattern."
      - "Add checks or reviews that prevent new variants from appearing."
      - "Document justified exceptions when one way is not actually valid."
  - name: "Structural Micro-Harnesses"
    problem_solved: "Agents optimize for local coherence and can duplicate utilities or violate architectural boundaries without breaking behavioral tests."
    inputs:
      - "Architecture rules such as package privacy, dependency direction, schema ownership, canonical helpers, and allowed imports."
      - "Repository graph, source files, tests, and lint infrastructure."
      - "Failure examples from review or QA showing structural drift."
    outputs:
      - "Structural checks that assert code organization rather than user behavior."
      - "Actionable failures that guide agents back to canonical utilities and boundaries."
      - "Reduced need for humans to spot repeated local reinventions."
    benefits:
      - "Catches architecture drift that normal tests may not observe."
      - "Turns implicit repository structure into executable feedback."
      - "Keeps parallel agent edits aligned with shared abstractions."
    limitations:
      - "Can become brittle when architecture is actively evolving."
      - "Requires careful messages so agents can repair failures without guessing."
      - "Overuse can encode taste as rigid structure where flexibility is needed."
    source_reference:
      - "/mnt/c/Users/pavan/long-running-agents/docs/2026-06-07-harness-engineering-how-to-build-software-when-humans-steer-agent-analysis/2026-06-07-harness-engineering-how-to-build-software-when-humans-steer-agent/2026-06-07-harness-engineering-how-to-build-software-when-humans-steer-agent-analysis.md:134"
      - "/mnt/c/Users/pavan/long-running-agents/docs/2026-06-07-harness-engineering-how-to-build-software-when-humans-steer-agent-analysis/2026-06-07-harness-engineering-how-to-build-software-when-humans-steer-agent/2026-06-07-harness-engineering-how-to-build-software-when-humans-steer-agent-analysis.md:139"
    components:
      - "Structural rule definition."
      - "Repository graph or AST scanner."
      - "CI or lint integration."
      - "Repair-focused error messages."
      - "Exception policy."
    flow:
      - "Identify recurring structural mistakes agents make during implementation."
      - "Express the intended structure as a deterministic check."
      - "Attach repair guidance to the failure message."
      - "Run the micro-harness in CI or the agent feedback loop."
      - "Refine or retire the check when architecture changes."
  - name: "Continual Context Refresh for Compacted Sessions"
    problem_solved: "Long sessions silently lose important instructions when auto-compaction pages earlier context out of the active window."
    inputs:
      - "Stable harness instructions, current task state, durable decisions, omitted context handles, and compaction events."
      - "Rules for which facts must be refreshed after summarization or phase changes."
      - "Just-in-time context surfaces such as tests, linters, skills, and review comments."
    outputs:
      - "Refreshed instructions at the point they are needed again."
      - "Active context that preserves current state and critical constraints despite compaction."
      - "Reduced dependence on one large initial prompt."
    benefits:
      - "Supports long-running sessions without requiring constant human continue prompts."
      - "Makes compaction a managed design constraint rather than a hidden failure mode."
      - "Keeps rarely used constraints recoverable without always loading them."
    limitations:
      - "Requires awareness of compaction risk even when the platform hides compaction details."
      - "Poor refresh policies can either miss needed guidance or reintroduce prompt bloat."
      - "Critical state still needs durable storage outside the active context."
    source_reference:
      - "/mnt/c/Users/pavan/long-running-agents/docs/2026-06-07-harness-engineering-how-to-build-software-when-humans-steer-agent-analysis/2026-06-07-harness-engineering-how-to-build-software-when-humans-steer-agent/2026-06-07-harness-engineering-how-to-build-software-when-humans-steer-agent-analysis.md:151"
