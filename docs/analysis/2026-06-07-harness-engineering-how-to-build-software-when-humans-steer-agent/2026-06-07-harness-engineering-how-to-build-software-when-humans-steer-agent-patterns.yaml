      - "Stable instruction set."
      - "Current-state summary."
      - "Refresh triggers."
      - "Addressable memory handles."
      - "Phase-specific injection surfaces."
    flow:
      - "Mark which instructions and decisions must survive compaction."
      - "Store durable state and omitted context in recoverable locations."
      - "Detect phase changes, failures, or compaction-risk points."
      - "Re-surface the relevant instruction or memory handle just in time."
      - "Verify that the agent can continue without human prompting."
  - name: "Reviewed Plans as Execution Artifacts"
    problem_solved: "Unreviewed agent-generated plans can inject bad instructions that the implementation agent follows faithfully."
    inputs:
      - "Agent-generated plan, requirements, repository constraints, risk areas, and reviewer judgment."
      - "Policy deciding when planning is skipped, reviewed inline, or reviewed as a separate artifact."
      - "Acceptance criteria and explicit deferrals."
    outputs:
      - "Approved plan artifact or decision to bypass plan mode."
      - "Rejected or corrected plan assumptions before execution begins."
      - "Execution instructions that have been reviewed at the right level of rigor."
    benefits:
      - "Prevents low-quality plans from becoming hidden implementation prompts."
      - "Makes planning overhead proportional to task risk."
      - "Separates design review from mechanical execution when the plan is consequential."
    limitations:
      - "Adds human review cost before implementation."
      - "Can slow small tasks where the harness already supplies enough structure."
      - "A reviewed plan can still become stale if implementation discovers new facts."
    source_reference:
      - "/mnt/c/Users/pavan/long-running-agents/docs/2026-06-07-harness-engineering-how-to-build-software-when-humans-steer-agent-analysis/2026-06-07-harness-engineering-how-to-build-software-when-humans-steer-agent/2026-06-07-harness-engineering-how-to-build-software-when-humans-steer-agent-analysis.md:155"
      - "/mnt/c/Users/pavan/long-running-agents/docs/2026-06-07-harness-engineering-how-to-build-software-when-humans-steer-agent-analysis/2026-06-07-harness-engineering-how-to-build-software-when-humans-steer-agent/2026-06-07-harness-engineering-how-to-build-software-when-humans-steer-agent-analysis.md:157"
    components:
      - "Plan-risk classifier."
      - "Plan artifact."
      - "Human or independent reviewer."
      - "Correction and deferral ledger."
      - "Execution handoff."
    flow:
      - "Classify whether the task needs a plan or can rely on the harness directly."
      - "If a plan is needed, generate it as a reviewable artifact."
      - "Review assumptions, sequencing, and scope before execution."
      - "Approve, correct, or reject the plan."
      - "Use only the reviewed plan as execution context."
  - name: "PR Broadcast Hub for Agent Collaboration"
    problem_solved: "Multi-agent and human collaboration fragments when feedback, verification, decisions, and ownership are spread across private sessions."
    inputs:
      - "Implementation branch, PR description, diffs, CI results, reviewer comments, agent status updates, and human decisions."
      - "Policy for blocking, non-blocking, deferred, and rejected feedback."
