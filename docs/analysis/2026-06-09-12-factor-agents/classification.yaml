meta:
  title: "Comparative Classification: 12-Factor Agentic Patterns vs. long-running-agents Repo"
  date: 2026-06-09
  repo: "pavani06/long-running-agents"
  patterns_source: "Dex Horthy — 12-Factor Agents (AI Engineer, 2025)"
  evidence_sources:
    - "docs/analysis/mhc-backend/"
    - "curriculum/"
    - "docs/system-of-record.md"
    - "AGENTS.md"

classification_legend:
  already_exists: "Pattern is documented, implemented, or taught with equivalent depth"
  partial_coverage: "Elements exist but missing key mechanics, reframe, or formalization"
  missing: "Not present in any form"
  better_implementation: "Repo has a superior or more mature version of the same idea"

patterns:
  - id: 1
    name: "Structured Output Contract"
    classification: "Already Exists"
    integration_value: "Low — repo has equivalent depth"
    evidence:
      - "Nivel 1 exercise-02-structured-output.md teaches as basic harness pattern"
      - "20+ DynamicStructuredTool with Zod schemas in mhc-backend"
      - "4-layer output validation pipeline documented in analysis"
      - "Harness diagnostic rates Output Validation at Nivel 2-3 maturity"
    gap: >
      The 12FA reframe calls this 'the most magical thing LLMs can do' and positions it as
      THE primitive. The repo treats it as assumed infrastructure. Repo framing is
      engineering-focused (contracts, schemas, validation) while 12FA is architectural
      (NL→JSON is the agentic primitive).

  - id: 2
    name: "Deterministic Tool Dispatch"
    classification: "Partial Coverage"
    integration_value: "Medium — reframe adds teachable framing"
    evidence_exists:
      - "Every tool is DynamicStructuredTool with Zod schema + typed return"
      - "Sprint Contracts curriculum module (Nivel 2) teaches I/O contract design"
      - "Dispatch chain fully documented in output-validation-state-persistence.md"
    what_is_missing:
      - "The provocative reframe: 'tool use is harmful' / 'tools are just JSON + deterministic code'"
      - "Emphasis on testing dispatch handler without LLM"
      - "Audit-logging each dispatch as a software operation"
      - "Circuit-breaking at the switch statement level"
    integration_note: >
      The 12FA reframe would give the repo's existing tool architecture a memorable,
      teachable name and a philosophical anchor.

  - id: 3
    name: "Owned Agent Control Loop"
    classification: "Partial Coverage"
    integration_value: "Medium — 4-component decomposition adds precision"
    evidence_exists:
      - "Nivel 1 basic-harness-patterns.md (1,436 lines) teaches harness ownership"
      - "Nivel 3 harness-evolution.md covers lifecycle"
      - "Core Concept 6 (Harness Evolution) formalizes the concept"
      - "OrchestratorAgent.processMessage() is a production control loop"
    what_is_missing:
      - "Decomposition into 4 specific owned components: prompt, switch, context builder, loop"
      - "Each component's specific intervention points (summarize, LM-as-judge, human gate, force terminate)"
      - "LangGraph delegates loop control to framework; 12FA argues for direct ownership"
    integration_note: >
      The 4-component decomposition would add precision to harness teaching.
      Intervention points are practical techniques the curriculum could absorb.

  - id: 4
    name: "Serializable Pause/Resume State"
    classification: "Partial Coverage"
    integration_value: "High — complementary mechanism to existing state model"
    evidence_exists:
      - "4 persistence layers: semantic memory, conversation context, transactional, cache"
      - "PostgreSQL multi-table + Redis + in-memory"
      - "Memory extraction via secondary LLM in background"
      - "Core Concept 5 (State Persistence) and Nivel 3 topic 2"
    what_is_different:
      - "Repo rebuilds state from scratch each turn via ConversationStateBuilder (15+ parallel queries)"
      - "LangGraph compiled WITHOUT checkpointer — state lives in DB, not serialized context"
      - "12FA serializes entire context window to DB, reconstitutes transparently"
    gap_analysis_quote: >
      'Sem checkpointer no LangGraph. O estado é reconstruído do zero a cada turno
      pelo ConversationStateBuilder.' — output-validation-state-persistence.md
    integration_note: >
      Repo's state model is richer; 12FA's serialization is simpler and more portable.
      Complementary mechanism for scenarios where token-level fidelity across pauses matters.

  - id: 5
    name: "Token-Level Prompt and Context Builder"
    classification: "Already Exists"
    integration_value: "Low — repo exceeds 12FA depth"
    evidence:
      - "Core Concept 1: Context Management (2,126 lines)"
      - "Token budgeting, windowing, metadata layering all taught in Nivel 1"
      - "Server-side compaction in Nivel 3"
      - "Adaptive windowing (20-60 messages) with 4 metadata layers that never expire"
      - "Token construction detail: user msgs get timestamps, assistant msgs don't"
    nuance: >
      The repo has MORE depth here than the 12FA pattern. The 12FA version is a concise
      principle; the repo is a full curriculum with production evidence.

  - id: 6
    name: "Error Context Hygiene"
    classification: "Missing"
    integration_value: "High — addresses documented gap"
    evidence_exists:
      - "10 fallback & retry mechanisms documented in harness diagnostic"
      - "Errors caught via try/catch, logged, generic fallback messages returned"
      - "Memory extraction failures silently swallowed (.catch() non-blocking)"
      - "Redis failures fall back to direct DB queries (fail-open)"
    what_is_missing:
      - "Clear pending errors from context after a valid tool call succeeds"
      - "Summarize errors instead of dumping stack traces"
      - "Never blind-append to context window"
      - "Keep only what the model needs for the next decision, not a forensic record"
    analysis_gap_quote: >
      'Sem retry loop com feedback — o sistema atual apenas re-processa na fila
      sem modificar o prompt.' — nivel-2-diagnostic.md
    integration_note: >
      The repo's error handling is infrastructure-level. 12FA's is context-level.
      These are complementary but the context-level hygiene is absent.
      This would address a documented failure mode (context pollution causing spiral-out).

  - id: 7
    name: "Human Contact Intent Tool"
    classification: "Partial Coverage"
    integration_value: "Medium — niche mechanism, domain-appropriate alternatives exist"
    evidence_exists:
      - "WhatsApp flow model for requesting missing data (address, CPF, email)"
      - "CreateOrderTool checkout pipeline saves state and pauses for human input"
      - "ConversationContext.status tracks waiting states"
    what_is_missing:
      - "First-token intent routing: tool-call vs. message-to-human decision in NL tokens"
      - "Open-ended intent vocabulary ('need clarification' vs 'need manager approval')"
      - "Teaching of the tradeoff: fuzzy NL parsing vs. structural schema guarantees"
    integration_note: >
      The first-token mechanism is clever but niche. The repo's WhatsApp flow model
      is more appropriate for its domain. 12FA's strength here is the design rationale,
      not the specific mechanism.

  - id: 8
    name: "Micro-Agent Islands in a Deterministic DAG"
    classification: "Already Exists"
    integration_value: "Low — repo's architectural thesis already"
    evidence:
      - "Core Concept 7: Multi-Agent Coordination (2,533 lines)"
      - "Search Agent, Filter Agent, Ranking Agent, Recommendation Agent as specialized micro-agents"
      - "Nivel 3 multi-agent-systems.md teaches decomposition"
      - "Nivel 4 case studies: KODA product discovery, order processing, fulfillment workflows as DAGs"
      - "mhc-backend: 3 agents (coach, ecommerce/KODA, voturuna) + routerNode + OrchestratorAgent"
      - "Harness diagnostic rates Multi-Agent Routing at Nivel 3 maturity"
    nuance: >
      Repo's multi-agent model is more complex (router + specialized agents + tools).
      12FA's is simpler (DAG nodes with small LLM loops). The 3-10 step bound and
      deploy pipeline example are specific instantiations the repo doesn't use.

summary:
  already_exists: [1, 5, 8]
  partial_coverage: [2, 3, 4, 7]
  missing: [6]
  better_implementation: []
  key_insight: >
    The long-running-agents repo is an implementation-heavy, curriculum-driven codebase
    that already covers 5 of 8 patterns at equivalent or greater depth. The 12FA patterns
    add value primarily through NAMING (giving memorable handles to practices the repo
    already implements) and through two novel contributions: Error Context Hygiene
    (missing, high value) and the Deterministic Tool Dispatch reframe (partial coverage,
    adds philosophical clarity).
