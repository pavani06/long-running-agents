meta:
  title: "Token Budgeting Analysis"
  source: "curriculum/01-nivel-1-fundamentals/02-token-budgeting.md"
  date: "2026-06-10"
  type: "analysis"
frameworks:
  - name: "Token budgeting as resource allocation"
    components:
      - "Total context window as the hard upper bound"
      - "Processed history as accumulated input load"
      - "Response buffer as reserved output capacity"
      - "Remaining budget as operational room for continuation"
      - "Available space equals total context minus processed history minus response buffer"
  - name: "Four-component budget model"
    components:
      - "Input tokens: prior conversation, system instruction, and current prompt"
      - "Output tokens: generated answer length reserved before generation"
      - "Context window: model-specific maximum token capacity"
      - "Burn rate: input plus output divided by conversation minutes"
  - name: "Phase-based token health model"
    components:
      - "Green phase continues normally while ample budget remains"
      - "Yellow phase monitors decline before constraint becomes urgent"
      - "Orange phase compresses or summarizes older material"
      - "Red phase starts a new session or performs aggressive compaction"
  - name: "Conversation viability calculator"
    components:
      - "Identify the model context window"
      - "Sum fixed and accumulated token consumption"
      - "Reserve response and safety buffer"
      - "Compute remaining budget"
      - "Estimate remaining message count from typical message size"
      - "Convert message budget into minutes using message rate"
patterns:
  - name: "Selective history"
    problem: "Full transcript inclusion gives high early quality but creates late-session failure as history grows."
    mechanism: "Keep recent history plus critical structured context, separating durable facts from transient turns."
  - name: "Windowed History"
    problem: "Long conversations exceed predictable input limits when every turn remains in context."
    mechanism: "Keep only the last N messages in the prompt and drop older turns from active context."
  - name: "Summary Buffer"
    problem: "Older conversation may contain critical state but cannot remain verbatim forever."
    mechanism: "Periodically summarize older or full conversation into a compact buffer included with recent messages."
  - name: "Compression Algorithm"
    problem: "Individual messages contain redundant wording that consumes context without adding semantic value."
    mechanism: "Rewrite text to preserve critical meaning under a target token budget."
  - name: "Semantic Bucketing"
    problem: "Chronological transcripts mix topics and make selective retention harder."
    mechanism: "Classify messages into topical buckets and summarize each topic group independently."
  - name: "Hybrid Context Stack"
    problem: "No single budgeting strategy handles all session phases and information types."
    mechanism: "Layer fixed critical facts, summaries of older turns, and a recent-message window."
  - name: "Token Health Monitor"
    problem: "Agents often discover token pressure only after behavior degrades or the context limit is reached."
    mechanism: "Estimate tokens continuously, subtract a safety buffer, compute available percentage, and return actions such as continue, monitor, compress, or new_session."
operational_lessons:
  - lesson: "Token exhaustion appears before hard failure as quality degradation."
    context: "Short answers, rushed assumptions, reduced empathy, and weaker reasoning are warning signs near context pressure."
  - lesson: "Output capacity must be reserved before generation."
    context: "Response length is unknown until generated, so useful answers require a response buffer."
  - lesson: "Burn rate is a runtime risk signal."
    context: "The same remaining context can be safe or risky depending on token consumption per minute."
  - lesson: "Summarization should happen before critical pressure."
    context: "Waiting until the limit is near leaves too little room for safe compaction."
  - lesson: "Safety buffers enable proactive control."
    context: "Subtracting a fixed buffer turns context management into threshold-driven intervention."
  - lesson: "Critical facts should outlive transcript pruning."
    context: "User constraints such as allergies, budget, and purchase history need structured storage separate from message windows."
  - lesson: "Session transition can be a product flow."
    context: "Starting a fresh session can be preferable to hidden degradation when budget is low."
tradeoffs:
  - decision: "Use full history vs. selective history"
    benefit: "Full history maximizes immediate context early; selective history bounds input and preserves chosen critical facts."
    cost: "Full history grows without bound; selective history requires deciding what may be omitted."
  - decision: "Use Windowed History"
    benefit: "Simple, predictable, and strong token control."
    cost: "Loses old context and can fail when distant dependencies matter."
  - decision: "Use Summary Buffer"
    benefit: "Reduces token use dramatically while retaining older information."
    cost: "May lose nuance and requires extra model calls."
  - decision: "Use Compression"
    benefit: "Preserves core semantics with significant token reduction."
    cost: "Can make content sound artificial and requires tuning to avoid semantic loss."
  - decision: "Use Semantic Bucketing"
    benefit: "Preserves logical structure and supports topic-specific summaries."
    cost: "Depends on reliable topic classification and struggles with multi-topic messages."
  - decision: "Use a Hybrid strategy"
    benefit: "Adapts to multiple conversation shapes and can change strategy in real time."
    cost: "Increases system complexity and requires monitoring."
  - decision: "Start a new session vs. aggressively compact current context"
    benefit: "New sessions reset budget cleanly; aggressive compaction maintains continuity."
    cost: "New sessions require state handoff; aggressive compaction risks semantic loss and may fail if too late."
failure_patterns:
  - pattern: "Complete-history prompt growth"
    cause: "Every model call includes all previous messages without budgeting."
    mitigation: "Use recent history plus critical structured context instead of the full transcript."
  - pattern: "Missing response buffer"
    cause: "Budget calculations reserve only input capacity and forget output generation."
    mitigation: "Subtract response and safety buffers before calculating available context."
  - pattern: "Accelerating burn rate"
    cause: "Conversation intensity increases input and output per minute faster than expected."
    mitigation: "Monitor burn rate over time and trigger compression, old-history removal, or summary generation when acceleration appears."
  - pattern: "Low-budget anxious behavior"
    cause: "The model operates near context pressure, reducing answer length, reasoning depth, and communication quality."
    mitigation: "Compact immediately or transition to a fresh session before remaining budget becomes too low."
  - pattern: "Summary information loss"
    cause: "Compression or summarization removes details that later become relevant."
    mitigation: "Preserve critical facts in structured context and use topic-aware summaries for older content."
  - pattern: "Topic classifier weakness"
    cause: "Semantic bucketing depends on assigning messages to correct topics."
    mitigation: "Use simple domain-specific buckets for structured workflows and avoid relying only on buckets when messages are multi-topic."
  - pattern: "Late intervention"
    cause: "The system waits until crash or visible quality degradation before managing context."
    mitigation: "Use phase thresholds and token-health actions that intervene while there is still room to summarize safely."
synthesis: "Token budgeting is a runtime control system for preserving decision quality under a finite context window, not merely truncation. Reliable long-running agents separate memory types: stable critical facts, compressed older history, and recent conversational texture should not compete in one undifferentiated transcript. Burn rate adds a time dimension to context engineering, turning context health from a static token count into a forecast of operational runway. The practical architecture is a layered context builder plus a monitor that decides when to continue, summarize, compress, or hand off to a new session. Long-running reliability emerges less from larger context windows and more from explicit, measurable, phase-aware context allocation."
