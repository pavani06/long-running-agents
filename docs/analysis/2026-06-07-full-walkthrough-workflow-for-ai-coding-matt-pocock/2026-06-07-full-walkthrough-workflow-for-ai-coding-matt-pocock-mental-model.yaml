meta:
  title: "Mental Model: Full Walkthrough Workflow for AI Coding Matt Pocock"
  date: "2026-06-07"
  repo: "long-running-agents"
  type: "mental-model"

goals:
  - "Build and manage long-running AI agent workflows through .opencode, Node >= 20.18.0, ESLint, runtime state in .runtime and artifacts, and accepted decisions under docs/decisions. Sources: AGENTS.md:7, AGENTS.md:9, AGENTS.md:10, AGENTS.md:11, AGENTS.md:12."
  - "Serve as a knowledge base and curriculum for AI systems that operate reliably for hours, days, or as long as needed without losing context, planning ability, or quality judgment. Sources: README.md:3."
  - "Teach the structural failure model for long-running agents: context loss, fragile planning, and blind self-evaluation, with harnesses as structures that manage context, decompose work, and separate generation from evaluation. Sources: README.md:7, README.md:9, README.md:10, README.md:11, README.md:13."
  - "Deliver a 12-week curriculum with 4 levels, 8 core concepts, and 35+ diagrams applied to KODA, the WhatsApp supplement-sales agent used as the practical case. Sources: curriculum/README.md:11, curriculum/README.md:13, curriculum/README.md:19, curriculum/README.md:33, curriculum/README.md:34."
  - "Maintain documentation governance through accepted ADRs, active canonical docs, validated evidence, analyses, archives, then READMEs and operational summaries. Sources: docs/system-of-record.md:14, docs/system-of-record.md:16, docs/system-of-record.md:17, docs/system-of-record.md:18, docs/system-of-record.md:19, docs/system-of-record.md:20, docs/system-of-record.md:21."
  - "Operationalize repository work through issue claim, isolated worktree, execution brief, validation, draft PR, second-agent review, explicit merge approval, and cleanup. Sources: .opencode/skills/issue-start/SKILL.md:12, .opencode/skills/issue-start/SKILL.md:14, .opencode/skills/issue-review/SKILL.md:12, .opencode/skills/issue-review/SKILL.md:14, .opencode/skills/issue-finish/SKILL.md:12, .opencode/skills/issue-finish/SKILL.md:14."

