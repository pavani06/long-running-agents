terminology:
  - term: "Agent"
    definition: "Autonomous AI entity that can take actions, use tools, and execute tasks in sequence."
    source: "curriculum/GLOSSARY.md:17, curriculum/GLOSSARY.md:18"
  - term: "Agent Loop"
    definition: "Repetitive cycle where an agent receives input, thinks, acts, receives result, and repeats."
    source: "curriculum/GLOSSARY.md:28, curriculum/GLOSSARY.md:29"
  - term: "Context Window"
    definition: "Total tokens a model can process at once, acting as immediate memory."
    source: "curriculum/GLOSSARY.md:97, curriculum/GLOSSARY.md:98"
  - term: "Context Amnesia"
    definition: "Agent forgetting prior context after exceeding the context window."
    source: "curriculum/GLOSSARY.md:37, curriculum/GLOSSARY.md:38"
  - term: "Context Rot"
    definition: "Gradual coherence loss as the agent advances through the context window."
    source: "curriculum/GLOSSARY.md:88, curriculum/GLOSSARY.md:89"
  - term: "Context Anxiety"
    definition: "Rushed or anxious behavior near context limit."
    source: "curriculum/GLOSSARY.md:77, curriculum/GLOSSARY.md:78, curriculum/GLOSSARY.md:80"
  - term: "Token Budget"
    definition: "Conscious accounting of tokens available and consumed."
    source: "curriculum/GLOSSARY.md:488, curriculum/GLOSSARY.md:489"
  - term: "Harness"
    definition: "Infrastructure and patterns around agents that make them reliable for long periods."
    source: "curriculum/GLOSSARY.md:219, curriculum/GLOSSARY.md:220, curriculum/GLOSSARY.md:222, curriculum/GLOSSARY.md:230"
  - term: "Harness Evolution"
    definition: "Simplifying or removing harness components as models improve."
    source: "curriculum/GLOSSARY.md:236, curriculum/GLOSSARY.md:237, curriculum/GLOSSARY.md:246"
  - term: "Generator"
    definition: "Agent responsible for building or creating output."
    source: "curriculum/GLOSSARY.md:169, curriculum/GLOSSARY.md:170"
  - term: "Evaluator"
    definition: "Separate agent responsible for evaluating and grading Generator work."
    source: "curriculum/GLOSSARY.md:131, curriculum/GLOSSARY.md:132"
  - term: "Generator/Evaluator Pattern"
    definition: "Two separate LLM entities collaborate: one generates and the other evaluates."
    source: "curriculum/GLOSSARY.md:182, curriculum/GLOSSARY.md:183, curriculum/GLOSSARY.md:185"
  - term: "Sprint Contract"
    definition: "Pre-work agreement about what done means before the Generator starts."
    source: "curriculum/GLOSSARY.md:117, curriculum/GLOSSARY.md:118, curriculum/GLOSSARY.md:452, curriculum/GLOSSARY.md:453"
  - term: "Evaluation Rubric"
    definition: "Measurable criteria for evaluating subjective quality."
    source: "curriculum/GLOSSARY.md:147, curriculum/GLOSSARY.md:148"
  - term: "Memory / State"
    definition: "Information retained between operations, including short-term, long-term, and file-based storage."
    source: "curriculum/GLOSSARY.md:282, curriculum/GLOSSARY.md:283, curriculum/GLOSSARY.md:285, curriculum/GLOSSARY.md:288"
  - term: "Multi-Agent System"
    definition: "Multiple independent agents coordinating, commonly Planner plus Generator plus Evaluator."
    source: "curriculum/GLOSSARY.md:309, curriculum/GLOSSARY.md:310, curriculum/GLOSSARY.md:312"
  - term: "Planner"
    definition: "Agent specialized in breaking a problem into steps."
    source: "curriculum/GLOSSARY.md:327, curriculum/GLOSSARY.md:328"
  - term: "Compaction"
    definition: "Summarizing or compressing old context while preserving key information."
    source: "curriculum/GLOSSARY.md:68, curriculum/GLOSSARY.md:69"
  - term: "Trace"
    definition: "Detailed log of each agent step and main debugging tool for agent behavior."
    source: "curriculum/GLOSSARY.md:502, curriculum/GLOSSARY.md:503, curriculum/GLOSSARY.md:511, curriculum/GLOSSARY.md:515"
  - term: "KODA"
    definition: "WhatsApp supplement-sales conversational AI agent and applied case study for the program."
    source: "curriculum/GLOSSARY.md:254, curriculum/GLOSSARY.md:255, curriculum/GLOSSARY.md:257, curriculum/GLOSSARY.md:263"
  - term: "Deterministic Tool Dispatch"
    definition: "Tools are model-emitted JSON plus deterministic application code."
    source: "docs/canonical/deterministic-tool-dispatch.md:24, docs/canonical/deterministic-tool-dispatch.md:25, docs/canonical/deterministic-tool-dispatch.md:26, docs/canonical/deterministic-tool-dispatch.md:33, docs/canonical/deterministic-tool-dispatch.md:35"
  - term: "Owned Agent Control Loop"
    definition: "Agent loop decomposed into Prompt, Context Builder, Switch Statement, and Loop with intervention points."
    source: "docs/canonical/owned-agent-control-loop.md:31, docs/canonical/owned-agent-control-loop.md:33, docs/canonical/owned-agent-control-loop.md:56, docs/canonical/owned-agent-control-loop.md:60, docs/canonical/owned-agent-control-loop.md:64, docs/canonical/owned-agent-control-loop.md:68"
  - term: "Application-Owned Agent Control Plane"
    definition: "Contract joining prompt versioning, context construction, structured action schema, deterministic dispatch, loop policy, state, and gates."
    source: "docs/canonical/application-owned-agent-control-plane.md:29, docs/canonical/application-owned-agent-control-plane.md:66, docs/canonical/application-owned-agent-control-plane.md:70, docs/canonical/application-owned-agent-control-plane.md:73, docs/canonical/application-owned-agent-control-plane.md:74, docs/canonical/application-owned-agent-control-plane.md:75"
  - term: "Addressable Memory Catalog"
    definition: "Compact omitted-context catalog with stable id, kind, location, preview, scope, and fetch."
    source: "docs/canonical/addressable-memory-catalog.md:28, docs/canonical/addressable-memory-catalog.md:30, docs/canonical/addressable-memory-catalog.md:34, docs/canonical/addressable-memory-catalog.md:35, docs/canonical/addressable-memory-catalog.md:36, docs/canonical/addressable-memory-catalog.md:37, docs/canonical/addressable-memory-catalog.md:38, docs/canonical/addressable-memory-catalog.md:39"
  - term: "External State Persistence"
    definition: "Critical state is extracted, written externally, loaded on the next turn, merged with current context, and used for generation/evaluation."
    source: "docs/canonical/external-state-persistence.md:31, docs/canonical/external-state-persistence.md:39, docs/canonical/external-state-persistence.md:42, docs/canonical/external-state-persistence.md:48, docs/canonical/external-state-persistence.md:51, docs/canonical/external-state-persistence.md:54"
  - term: "Hybrid Context Stack"
    definition: "Budget-aware context-builder policy with ordered layers and decision trace instead of one raw transcript."
    source: "docs/canonical/hybrid-context-stack.md:30, docs/canonical/hybrid-context-stack.md:34, docs/canonical/hybrid-context-stack.md:36, docs/canonical/hybrid-context-stack.md:41, docs/canonical/hybrid-context-stack.md:83"
  - term: "Eval Tier Stratification"
    definition: "Fast, medium, and deep eval tiers with runtime, cost, flakiness, trigger, threshold, reporting, owner, and escalation metadata."
    source: "docs/canonical/eval-tier-stratification.md:28, docs/canonical/eval-tier-stratification.md:32, docs/canonical/eval-tier-stratification.md:38"
  - term: "Skillify Pipeline"
    definition: "Workflow promotion path from one-off work to routable skill with resolver metadata, tests, evals, storage expectations, and smoke evidence."
    source: "docs/canonical/skill-resolver-skillify-capability-pipeline.md:28, docs/canonical/skill-resolver-skillify-capability-pipeline.md:30, docs/canonical/skill-resolver-skillify-capability-pipeline.md:32, docs/canonical/skill-resolver-skillify-capability-pipeline.md:42"

curriculum:
  levels:
    - name: "Level 1 - Fundamentals"
      focus: "Why agents fail in long tasks, context windows, token budgeting, and basic harness patterns."
      progression: "Overview says 3-4h; execution plan expands weeks 1-2 with History Windowing and Structured Output exercises plus metrics, tradeoffs, and gotchas."
      sources: ["curriculum/README.md:180", "curriculum/README.md:183", "curriculum/README.md:184", "curriculum/README.md:185", "curriculum/README.md:186", "curriculum/EXECUTION_PLAN.md:65", "curriculum/EXECUTION_PLAN.md:83", "curriculum/EXECUTION_PLAN.md:84", "curriculum/EXECUTION_PLAN.md:87"]
    - name: "Level 2 - Practical Patterns"
      focus: "Generator/Evaluator, Sprint Contracts, Rubric Design, Trace Reading."
      progression: "6-8h; exercises cover Generator/Evaluator, Sprint Contracts, Rubric Design, and Error Context Hygiene."
      sources: ["curriculum/README.md:194", "curriculum/README.md:197", "curriculum/README.md:198", "curriculum/README.md:199", "curriculum/README.md:200", "curriculum/README.md:201", "curriculum/INDEX.md:105", "curriculum/INDEX.md:106", "curriculum/INDEX.md:107", "curriculum/INDEX.md:108", "curriculum/INDEX.md:109"]
    - name: "Level 3 - Advanced Architecture"
