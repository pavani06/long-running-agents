frameworks:
  - name: "Software engineering fundamentals as AI coding substrate"
    model: "Agents are faster implementers inside the existing software engineering system, not a replacement for architecture, tests, review, and decomposition."
    components:
      - "Vertical slices"
      - "Deep modules"
      - "TDD and executable feedback"
      - "Issue decomposition"
      - "Code review and QA"
    non_obvious_implication: "The scarce resource shifts from typing code to task framing, module boundaries, feedback quality, and review attention."
  - name: "Smart zone / dumb zone"
    model: "Context windows have a practical reasoning-quality band well below nominal capacity."
    components:
      - "Small always-loaded instructions"
      - "Task sizing below the smart-zone ceiling"
      - "Sub-agent exploration"
      - "Clear-context resets"
      - "Fresh-context reviews"
    non_obvious_implication: "More context can reduce coding quality even when it fits technically."
  - name: "Shared design concept before plans"
    model: "The planning asset is mutual human-agent understanding, not the plan text itself."
    components:
      - "Relentless interview"
      - "One-question-at-a-time decision traversal"
      - "Agent recommended answers"
      - "Conversation history as alignment artifact"
      - "PRD as downstream summary"
    non_obvious_implication: "A thin PRD can be enough if the alignment conversation was rich."
  - name: "PRD as destination"
    model: "A PRD points the workflow toward a target state but is not an executable spec or permanent truth source."
    components:
      - "Problem and solution framing"
      - "User stories"
      - "Implementation decisions"
      - "Testing expectations"
      - "Out-of-scope boundaries"
    non_obvious_implication: "A PRD can become harmful after implementation if stale and still retrievable."
  - name: "Human-in-loop versus AFK"
    model: "Route tasks by whether they require judgment during execution."
    components:
      - "Human-in-loop planning"
      - "Human-in-loop ambiguity resolution"
      - "Human-in-loop QA and final review"
      - "AFK bounded implementation"
      - "Feedback-loop-gated delegation"
    non_obvious_implication: "The workflow automates implementation, not taste or accountability."
  - name: "Architecture as agent affordance"
    model: "Codebase structure determines how well agents can navigate, change, and verify behavior."
    components:
      - "Deep modules"
      - "Simple public interfaces"
      - "Behavioral test boundaries"
      - "Human-owned module design"
      - "Architecture-improvement skill"
    non_obvious_implication: "Architecture work increases future agent throughput and reduces review burden."
patterns:
  - name: "Grill-me skill"
    problem: "Initial prompts hide assumptions and produce premature plans."
    architecture: "Alignment interview before any PRD or implementation backlog."
    workflow:
      - "Clear context"
      - "Invoke a short interviewing skill"
      - "Ask one question at a time"
      - "Provide recommended answers"
      - "Continue until assumptions are resolved or deferred"
    output: "Shared design context and decision trail"
  - name: "Destination PRD"
    problem: "Plan artifacts become brittle when treated as code-generation contracts."
    architecture: "A navigational artifact between alignment and issue generation."
    workflow:
      - "Summarize the grilling conversation"
      - "Capture problem, solution, stories, implementation decisions, tests, and exclusions"
      - "Use the PRD to generate work"
      - "Avoid treating it as permanent truth"
    output: "Direction-setting artifact for backlog creation"
  - name: "Vertical-slice issue generation"
    problem: "Horizontal layer-by-layer implementation delays integration feedback."
    architecture: "Issue graph where each task cuts through layers to observable behavior."
    workflow:
      - "Transform PRD goals into end-to-end slices"
      - "Ensure each slice is reviewable and testable"
      - "Represent dependencies as blockers"
      - "Keep slices small enough for one AFK session"
    output: "Independent or blocker-aware work items"
  - name: "Agent Kanban"
    problem: "Linear plans waste parallel capacity and hide independence."
    architecture: "Concurrency-control board for agent tasks."
    workflow:
      - "Label tasks as AFK or human-in-loop"
      - "Track blockers"
      - "Let agents pick ready implementation tasks"
      - "Feed QA findings back as issues"
    output: "Continuously replenished implementation queue"
  - name: "Ralph / AFK implementation loop"
    problem: "Agents need repeatable execution after decomposition."
    architecture: "Loop that consumes ready issues and runs feedback checks."
    workflow:
      - "Load ready issues"
      - "Explore repo context"
      - "Pick a bounded task"
      - "Write or run tests"
      - "Implement"
      - "Run tests, types, and linters"
      - "Record status and continue or stop"
    output: "Reviewable implementation changes"
  - name: "Fresh-context review"
    problem: "Implementation contexts inherit assumptions and context degradation."
    architecture: "Builder/evaluator separation."
    workflow:
      - "Clear context or start a separate reviewer"
      - "Read diff and standards fresh"
      - "Run verification"
      - "Evaluate behavior and architecture"
    output: "Independent review signal"
  - name: "Sandboxed parallel agents"
    problem: "Parallel agents conflict in shared branches and filesystems."
    architecture: "Per-issue isolated worktrees and containers with later integration."
    workflow:
      - "Create isolated worktree"
      - "Run one agent per issue"
      - "Review branch output"
      - "Merge accepted branches"
      - "Resolve conflicts and rerun checks"
    output: "Safe parallel implementation pipeline"
  - name: "Sub-agent exploration"
    problem: "Exploration burns main-context tokens."
    architecture: "Isolated contexts for expensive discovery."
    workflow:
      - "Delegate codebase exploration"
      - "Allow high token spend in the sub-agent"
      - "Return condensed findings"
      - "Verify summaries before acting"
    output: "Compressed repo understanding"
  - name: "Improve-codebase-architecture skill"
    problem: "Shallow coupled codebases are hostile to agent navigation."
    architecture: "Architecture-analysis skill that proposes deeper boundaries."
    workflow:
      - "Inspect dependency clusters"
      - "Identify coupled behavior"
      - "Propose deep modules"
      - "Define behavioral tests around boundaries"
    output: "More navigable, testable module structure"
operational_lessons:
  - lesson: "Feedback loops are the quality ceiling."
    detail: "Tests, types, linters, runtime checks, and manual QA determine how well agents can correct themselves."
  - lesson: "TDD is agent steering, not just test coverage."
    detail: "Red-green-refactor gives the model immediate evidence and narrows the implementation search space."
  - lesson: "Token visibility is operational telemetry."
    detail: "Humans need token awareness to decide when to clear context, stop, delegate, or review fresh."
  - lesson: "Planning remains human-in-loop."
    detail: "Taste, domain judgment, scope, and architecture cannot be delegated as if they were implementation."
  - lesson: "PRD review has diminishing returns after strong alignment."
    detail: "The high-value review target becomes issue decomposition and working behavior."
  - lesson: "QA should replenish the backlog."
    detail: "Findings become new issues, keeping the workflow iterative instead of terminal."
  - lesson: "Doc hygiene is agent safety."
    detail: "Stale documents become misleading context for future agents."
  - lesson: "Owning the workflow improves debuggability."
    detail: "Opaque planning stacks make it harder to locate whether failure came from alignment, decomposition, execution, or verification."
  - lesson: "Parallel agents amplify decomposition quality."
    detail: "Good vertical slices become throughput; bad slices create parallel chaos."
  - lesson: "Architecture work increases future agent throughput."
    detail: "Deep modules and simple interfaces reduce context burden and review complexity."
tradeoffs:
  - decision: "Clear context instead of compacting"
    benefit: "Predictable reset into a known smart-zone state"
    cost: "Lost conversational continuity and need for durable artifacts"
  - decision: "Grill before planning"
    benefit: "Exposes hidden assumptions and creates shared design context"
    cost: "Consumes human time and may involve many questions"
  - decision: "PRD as destination, not spec"
    benefit: "Avoids brittle spec-to-code behavior"
    cost: "Requires continued human engagement with code and behavior"
  - decision: "Vertical slices over horizontal layers"
    benefit: "Early integration feedback"
    cost: "More careful issue design and blocker mapping"
  - decision: "Kanban over linear plan"
    benefit: "Parallelism and dynamic backlog growth"
    cost: "Metadata and curation overhead"
  - decision: "Human QA at boundaries"
    benefit: "Preserves taste, intent, and accountability"
    cost: "Moves labor into review and QA"
  - decision: "Deep modules over shallow modules"
    benefit: "Better navigability and behavioral tests"
    cost: "Requires deliberate architectural shaping"
  - decision: "Close or remove stale PRDs"
    benefit: "Reduces doc-rot poisoning"
    cost: "Historical context must be preserved elsewhere with status"
  - decision: "Fresh-context review"
    benefit: "Independent reasoning with less context degradation"
    cost: "Extra orchestration and model/token spend"
  - decision: "Sandboxed worktrees"
    benefit: "Safe parallel implementation"
    cost: "Docker, worktree, and merge infrastructure"
  - decision: "Sub-agent exploration"
    benefit: "Preserves main-context quality"
    cost: "Summaries must be checked and can omit important details"
failure_patterns:
  - pattern: "Premature planning"
    cause: "The agent plans before interrogating assumptions."
    failure_mode: "Hidden decisions surface later as rework or wrong scope."
    counterpattern: "Use grilling before PRD generation."
  - pattern: "Spec-to-code drift"
    cause: "Humans treat the PRD as the only control surface."
    failure_mode: "Prose looks aligned while architecture, behavior, or tests drift."
    counterpattern: "Review modules, tests, runtime behavior, and QA findings."
  - pattern: "Dumb-zone continuation"
    cause: "Long sessions, repeated compaction, large prompts, or raw exploration traces fill context."
    failure_mode: "The agent forgets constraints, makes worse decisions, or reviews poorly."
    counterpattern: "Size tasks, clear context, use sub-agents, and review fresh."
  - pattern: "Horizontal implementation"
    cause: "The agent decomposes by layer instead of behavior."
    failure_mode: "Integration feedback arrives late and defects accumulate."
    counterpattern: "Generate vertical-slice issues with observable outputs."
  - pattern: "Shallow-module sprawl"
    cause: "Agents create many tiny files or functions without module design."
    failure_mode: "Dependency graphs become hard to navigate and tests verify fragments."
    counterpattern: "Design deep modules and test meaningful boundaries."
  - pattern: "Blind coding"
    cause: "Weak or missing feedback loops."
    failure_mode: "The agent optimizes for plausible code instead of working behavior."
    counterpattern: "Require tests, types, linters, runtime checks, and QA."
  - pattern: "Rotten-document poisoning"
    cause: "Stale PRDs and plans remain discoverable as current context."
    failure_mode: "Future agents implement against obsolete intent."
    counterpattern: "Close issues, remove stale active docs, and preserve history with clear status."
  - pattern: "Parallel chaos"
    cause: "Multiple agents work from bad slices or shared branches."
    failure_mode: "Conflicts, duplication, incompatible assumptions, and hard integration."
    counterpattern: "Use blocker-aware Kanban, isolated worktrees, and integration review."
  - pattern: "Taste collapse from over-automation"
    cause: "Judgment-heavy work is delegated like implementation."
    failure_mode: "Outputs pass mechanical checks but miss product intent or design quality."
    counterpattern: "Keep humans in planning, ambiguity resolution, QA, and final review."
synthesis:
  summary: "The talk describes an agentic coding control system rather than a prompting recipe. Alignment interviews reduce ambiguity, PRDs preserve direction, vertical-slice Kanban exposes safe work, feedback loops steer implementation, context resets preserve reasoning quality, and human QA injects taste and judgment back into the queue."
  core_claims:
    - "Agents make architecture more important, not less."
    - "Documentation is phase-scoped operational state."
    - "Parallelization depends on decomposition quality before tooling."
    - "The human role shifts from typing code to designing constraints, queues, interfaces, and verification."
  practical_formula: "Grill -> PRD destination -> vertical-slice Kanban -> AFK implementation loop -> fresh-context review -> QA-created issues -> context reset."
