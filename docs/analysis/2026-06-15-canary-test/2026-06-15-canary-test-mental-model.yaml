meta:
  title: "Mental Model: long-running-agents"
  date: "2026-06-15"
  repo: "long-running-agents"
  type: "mental-model"

goals:
  - "Build and manage long-running AI agent workflows with `.opencode/` as the agent system, Node >= 20.18.0/ESM as stack, and `.runtime/` plus `artifacts/` as runtime state. Sources: AGENTS.md:7, AGENTS.md:9, AGENTS.md:10, AGENTS.md:11, README.md:107, README.md:113."
  - "Teach why agents fail during long executions: context loss, fragile planning, and blind self-evaluation, then teach harnesses that manage context, decompose work, and separate generation from evaluation. Sources: README.md:3, README.md:7, README.md:13."
  - "Provide a 12-week, 4-level curriculum with 8 core concepts and 35+ diagrams for business people and builders of agentic systems. Sources: README.md:15, README.md:17, curriculum/README.md:11, curriculum/README.md:13."
  - "Apply the curriculum to KODA, a WhatsApp supplement-sales agent that must stay reliable across 2+ hour conversations. Sources: curriculum/README.md:33, curriculum/README.md:34, curriculum/04-nivel-4-koda-specific/01-koda-architecture.md:144, curriculum/04-nivel-4-koda-specific/01-koda-architecture.md:159."
  - "Govern documentation by explicit precedence: accepted ADRs, active canonical docs, validated evidence, analyses, archive docs, then READMEs and operational summaries. Sources: docs/system-of-record.md:14, docs/system-of-record.md:21, AGENTS.md:64, AGENTS.md:75."
  - "Run a repeatable analyze-and-improve pipeline from repository mental model through extraction, patterns, classification, concrete artifacts, integration, and curriculum integration. Sources: .opencode/skills/analyze-and-improve/SKILL.md:47, .opencode/skills/analyze-and-improve/SKILL.md:57, .opencode/skills/analyze-and-improve/SKILL.md:171, .opencode/skills/analyze-and-improve/SKILL.md:234."

architecture:
  abstractions:
    - name: "System of Record"
      role: "Resolves documentation conflicts, maps project domains, and inventories active sources and gaps."
