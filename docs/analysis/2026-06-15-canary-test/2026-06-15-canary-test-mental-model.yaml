        - "docs/system-of-record.md:12"
        - "docs/system-of-record.md:14"
        - "docs/system-of-record.md:23"
    - name: "Documentation Precedence"
      role: "Orders authority from accepted ADRs through canonical docs, evidence, analyses, archive docs, and operational summaries."
      sources:
        - "docs/system-of-record.md:16"
        - "docs/system-of-record.md:21"
        - "AGENTS.md:64"
        - "AGENTS.md:75"
    - name: "Canonical Pattern Catalog"
      role: "Authoritative layer for active agentic architecture patterns; the current SOR lists 55 active canonical patterns."
      sources:
        - "docs/system-of-record.md:133"
        - "docs/system-of-record.md:135"
        - "docs/system-of-record.md:137"
