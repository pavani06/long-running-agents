terminology:
  - term: "Agent"
    definition: "Autonomous LLM-based entity that can take actions, use tools, and execute tasks in sequence."
    source: "curriculum/GLOSSARY.md:17, curriculum/GLOSSARY.md:24"
  - term: "Agent Loop"
    definition: "Repeated input -> think -> action -> result -> repeat cycle."
    source: "curriculum/GLOSSARY.md:28, curriculum/GLOSSARY.md:35"
  - term: "Context Window"
    definition: "Total number of tokens a model can process at once; the agent's immediate memory."
    source: "curriculum/GLOSSARY.md:97, curriculum/GLOSSARY.md:106"
  - term: "Context Amnesia"
    definition: "Forgetting prior context after exceeding the useful context window."
    source: "curriculum/GLOSSARY.md:37, curriculum/GLOSSARY.md:44"
  - term: "Context Rot"
    definition: "Gradual loss of coherence as the agent advances through the context window."
    source: "curriculum/GLOSSARY.md:88, curriculum/GLOSSARY.md:94"
  - term: "Token Budget"
    definition: "Planning and controlling token use and available space before the next model call."
    source: "docs/canonical/explicit-token-budget-ledger.md:20, docs/canonical/explicit-token-budget-ledger.md:30"
  - term: "Harness"
    definition: "Infrastructure and patterns around agents that make them reliable over long periods."
    source: "curriculum/GLOSSARY.md:265, curriculum/GLOSSARY.md:278"
  - term: "Harness Evolution"
    definition: "Process of simplifying or removing harness components as models improve."
    source: "curriculum/GLOSSARY.md:282, curriculum/GLOSSARY.md:294"
  - term: "Generator"
    definition: "Agent responsible for creating a solution without trying to self-validate the final result."
    source: "curriculum/GLOSSARY.md:215, curriculum/GLOSSARY.md:224, curriculum/02-nivel-2-practical-patterns/01-generator-evaluator-pattern.md:108, curriculum/02-nivel-2-practical-patterns/01-generator-evaluator-pattern.md:119"
  - term: "Evaluator"
    definition: "Separate agent that critically evaluates a solution against a rubric, checklist, or contract."
    source: "curriculum/GLOSSARY.md:131, curriculum/GLOSSARY.md:143, curriculum/02-nivel-2-practical-patterns/01-generator-evaluator-pattern.md:120, curriculum/02-nivel-2-practical-patterns/01-generator-evaluator-pattern.md:131"
  - term: "Sprint Contract"
    definition: "Prior agreement between generator and evaluator about what done means."
    source: "curriculum/GLOSSARY.md:117, curriculum/GLOSSARY.md:125"
  - term: "Evaluation Rubric"
    definition: "Measurable criteria for evaluating subjective quality."
    source: "curriculum/GLOSSARY.md:147, curriculum/GLOSSARY.md:163"
  - term: "Memory / State"
    definition: "Information retained between operations, including short-term, long-term, and file-based state."
    source: "curriculum/GLOSSARY.md:380, curriculum/GLOSSARY.md:390"
  - term: "Multi-Agent System"
    definition: "System with multiple coordinated agents, often Planner + Generator + Evaluator."
    source: "curriculum/GLOSSARY.md:407, curriculum/GLOSSARY.md:419"
  - term: "Planner"
    definition: "Agent specialized in breaking a problem into steps."
    source: "curriculum/GLOSSARY.md:425, curriculum/GLOSSARY.md:439"
  - term: "KODA"
    definition: "WhatsApp conversational agent for selling sports supplements and the curriculum's applied case study."
    source: "curriculum/GLOSSARY.md:352, curriculum/GLOSSARY.md:363"
  - term: "Deterministic Tool Dispatch"
    definition: "Model where the LLM emits JSON and deterministic application code parses, routes, validates, executes, and handles results."
    source: "docs/canonical/deterministic-tool-dispatch.md:20, docs/canonical/deterministic-tool-dispatch.md:36"
  - term: "Application-Owned Control Plane"
    definition: "Application contract for prompt, context, action schema, dispatch, loop, state, and gates."
    source: "docs/canonical/application-owned-agent-control-plane.md:27, docs/canonical/application-owned-agent-control-plane.md:75"
  - term: "External State Persistence"
    definition: "Persist critical facts outside the context window and reload them on every turn."
    source: "docs/canonical/external-state-persistence.md:29, docs/canonical/external-state-persistence.md:64"
  - term: "Stable Harness Prompt"
    definition: "Harness prompt preserved, versioned, and evaluated separately from reducible payload."
    source: "docs/canonical/stable-harness-prompt.md:26, docs/canonical/stable-harness-prompt.md:41"
  - term: "Head-Tail Context Truncation"
    definition: "Policy that keeps head and tail in active context and moves middle into recoverable memory."
    source: "docs/canonical/head-tail-context-truncation.md:26, docs/canonical/head-tail-context-truncation.md:39"
  - term: "Eval Tier"
    definition: "Fast, medium, or deep eval taxonomy that declares cost, trigger, threshold, owner, and blocking power."
    source: "docs/canonical/eval-tier-stratification.md:26, docs/canonical/eval-tier-stratification.md:50"
  - term: "Manual Brake"
    definition: "Three value questions before building: who needs it, would it still be worth real engineering cost, and who owns saying no."
    source: ".opencode/skills/manual-brake-question-gate/SKILL.md:13, .opencode/skills/manual-brake-question-gate/SKILL.md:21"
  - term: "Intent Five-Part Primitive"
    definition: "Intent with five required fields: description, constraints, failure scenarios, success scenarios, and connections."
    source: ".opencode/skills/intent-five-part-primitive/SKILL.md:13, .opencode/skills/intent-five-part-primitive/SKILL.md:25"

curriculum:
  levels:
    - name: "Nivel 1 - Fundamentals"
      focus: "Why agents fail: context amnesia, planning/execution collapse, and weak self-evaluation."
      duration: "3-4h in the master plan; weeks 1-2 in the execution plan."
      progression: "Three lessons, two exercises, and KODA application; prepares learners for Level 2."
      evidence:
        - "README.md:81"
        - "README.md:86"
        - "curriculum/MASTER_PLAN.md:173"
        - "curriculum/MASTER_PLAN.md:192"
        - "curriculum/QUICK_START.md:35"
        - "curriculum/QUICK_START.md:90"
    - name: "Nivel 2 - Practical Patterns"
      focus: "Generator/Evaluator, Sprint Contracts, Rubric Design, and Trace Reading."
      duration: "6-8h."
      progression: "Exercises for generator/evaluator, contracts, rubrics, error hygiene, and intent primitive; applies patterns to KODA."
      evidence:
        - "README.md:83"
        - "README.md:85"
        - "curriculum/MASTER_PLAN.md:196"
        - "curriculum/MASTER_PLAN.md:215"
        - "curriculum/INDEX.md:105"
        - "curriculum/INDEX.md:111"
    - name: "Nivel 3 - Advanced Architecture"
      focus: "Multi-agent systems, state persistence, file-based coordination, server-side compaction, and harness evolution."
      duration: "8-10h."
      progression: "Exercises for 3-agent design, state persistence, harness evolution, fuzzy compiler, persona docs, presence metric, and Owner-of-No."
      evidence:
        - "README.md:84"
        - "README.md:86"
        - "curriculum/MASTER_PLAN.md:219"
        - "curriculum/MASTER_PLAN.md:238"
        - "curriculum/INDEX.md:112"
