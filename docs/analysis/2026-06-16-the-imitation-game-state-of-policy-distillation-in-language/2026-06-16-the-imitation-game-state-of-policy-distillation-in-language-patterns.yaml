patterns:
  - name: "On-Policy Rollout Feedback Loop"
    problem_solved: "Agents trained or evaluated only on curated scripts fail when their own production trajectories contain early mistakes, strange tool outputs, or context drift that never appeared in the static data."
    inputs:
      - "Production-like prompts, replay prompts, or live task seeds."
      - "Current agent loop, prompt, tools, context builder, and state policy."
      - "Full trajectory trace with model decisions, tool calls, tool results, errors, and context snapshots."
      - "Teacher, evaluator, verifier, or human review signal over the agent's own prefixes."
      - "Update target such as prompt rules, skills, eval cases, memory policy, or model fine-tuning data."
    outputs:
      - "On-policy trajectory dataset generated by the current agent rather than by an idealized teacher."
      - "Step and trajectory feedback attached to the actual prefixes the agent produced."
      - "Updated harness, prompts, evals, or training examples that reflect the inference distribution."
    benefits:
      - "Closes the exposure-bias gap between clean training examples and messy runtime trajectories."
      - "Turns production drift, failed tool calls, and late-session context errors into high-value learning data."
      - "Makes compounding errors visible before they become silent O(eT^2)-style cascades in long workflows."
    limitations:
      - "Rollouts are expensive and can be low quality early in the agent lifecycle."
      - "Requires privacy, safety, and sampling controls before production traces become learning data."
      - "Needs a reliable evaluator; otherwise the loop converts runtime noise into training noise."
    components:
      - name: "rollout_runner"
        role: "Runs the current agent on production-like prompts and preserves its actual prefixes."
      - name: "trace_store"
        role: "Stores decisions, tool calls, context snapshots, errors, and outcomes."
      - name: "teacher_or_evaluator"
        role: "Scores or critiques the generated trajectory without replacing it with an ideal trace."
      - name: "update_target"
        role: "Prompt, skill, eval, memory policy, or training dataset that absorbs the learning."
    flow:
      - "Select prompts or tasks from the target operating distribution."
      - "Run the current agent and capture the full trajectory."
      - "Score the agent's own prefixes with a teacher, evaluator, verifier, or human."
      - "Attach feedback to the trace and convert it into the chosen update target."
      - "Re-run the updated agent on comparable trajectories to confirm compounding errors shrink."
    provenance:
      phase1_sections:
        - "1.1 O Loop On-Policy como Acoplamento entre Geracao de Dados e Treinamento"
        - "6 Sintese"
      analysis_refs:
        - "2026-06-16-the-imitation-game-state-of-policy-distillation-in-language-analysis.md:33-46"
        - "2026-06-16-the-imitation-game-state-of-policy-distillation-in-language-analysis.md:235-240"
      source_refs:
        - "l44-53"
        - "l122-144"
    applicability_to_agents: "Directly applicable to long-running agents because they generate their own tool and context trajectories at inference time, so replaying and learning from those trajectories targets the same distribution the agent will face later."

  - name: "Autonomy Curriculum Sampling"
    problem_solved: "Fully supervised agents never practice autonomous recovery, while fully autonomous agents produce unusable traces before their loop is stable."
    inputs:
      - "Expert, human, or stronger-agent demonstrations."
      - "Current-agent rollouts on the same task family."
      - "Autonomy mix parameter such as lambda, readiness thresholds, or phase gates."
      - "Metrics for task success, evaluator confidence, repair rate, and unsafe-action rate."
      - "Schedule policy that decides when to increase self-generated work."
    outputs:
      - "Mixed curriculum that starts teacher-heavy and gradually increases self-generated trajectories."
      - "Explicit autonomy schedule for each task class or agent capability."
      - "Gate evidence showing when the agent can move from observe to assist to own."
    benefits:
      - "Reduces cold-start collapse by avoiding pure student rollouts before the agent can recover from basic errors."
      - "Creates one visible dial for autonomy instead of an implicit jump from manual operation to full agent ownership."
      - "Keeps the agent exposed to its own mistakes as soon as those mistakes become learnable."
    limitations:
      - "Requires tuning the schedule; too slow hides autonomy failures, too fast floods the loop with noise."
      - "Demonstrations can overfit the agent to expert paths and reduce exploration."
      - "Readiness metrics must be task-specific enough to avoid promoting brittle autonomy."
    components:
      - name: "teacher_rollout_pool"
        role: "Stable demonstrations from humans or stronger agents."
      - name: "student_rollout_pool"
        role: "Self-generated trajectories from the current agent."
      - name: "autonomy_dial"
        role: "Lambda-like control that sets the mix between supervised and self-generated work."
      - name: "readiness_gate"
        role: "Metric threshold that allows the schedule to advance."
      - name: "schedule_controller"
        role: "Moves the task class from demonstration-heavy to autonomy-heavy operation."
    flow:
      - "Start with a high proportion of teacher or human demonstrations."
      - "Introduce a small share of current-agent rollouts and score their recoverability."
      - "Increase the autonomy dial only when success and safety thresholds pass."
      - "Keep hard or unsafe task classes teacher-heavy until they become learnable."
      - "Record autonomy phase per capability so deployment does not silently overtrust the agent."
    provenance:
      phase1_sections:
        - "2.1 Teacher-Mixed Sampling como Ponte entre Off-Policy e On-Policy"
      analysis_refs:
        - "2026-06-16-the-imitation-game-state-of-policy-distillation-in-language-analysis.md:90-97"
        - "2026-06-16-the-imitation-game-state-of-policy-distillation-in-language-analysis.yaml:139-152"
      source_refs:
        - "l177-178"
        - "l187-205"
        - "l224"
    applicability_to_agents: "Applicable whenever a team is moving from human-operated workflows to agent-owned execution and needs a measured path between demonstration, assisted operation, and autonomous rollout."

  - name: "Privileged Context Self-Distillation"
    problem_solved: "Long-running agents often need design-time information such as full logs, complete documents, or troubleshooting playbooks that cannot fit in the runtime context window."
    inputs:
      - "Same base agent or model in two views: runtime view without privileged information and teacher view with privileged information."
      - "Privileged information such as full session logs, stack traces, reference solutions, architecture diagrams, or complete source documents."
      - "Paired task prompts where the teacher view can explain, correct, or compress better than the runtime view."
      - "Difference signal between the two views, such as log-ratio, critique delta, or structured before/after correction."
      - "Target surface such as prompt instructions, skills, memory writeback, eval examples, or fine-tuning data."
    outputs:
      - "Runtime-usable behavior distilled from full-context or oracle-context runs."
      - "Compact rules, skills, eval cases, or summaries that reduce dependence on loading the privileged source every time."
      - "Evidence of which privileged facts changed the agent's action and which did not."
    benefits:
      - "Converts expensive full-context analysis into reusable operating knowledge."
      - "Supports context-management systems where the training or review phase sees more than production can carry."
      - "Does not require a larger teacher model when the same model can be compared under different context views."
    limitations:
      - "Privileged information can leak into outputs as false confidence or unreachable assumptions."
      - "Secrets or private data must not be distilled into reusable artifacts."
      - "Calibration must be measured under the runtime view, not under the privileged teacher view."
    components:
      - name: "student_view"
        role: "Runtime context available to the deployed agent."
      - name: "teacher_view"
        role: "Same agent with additional privileged information."
      - name: "view_delta"
        role: "Difference in output, confidence, critique, or token preference between the two views."
      - name: "distillation_target"
        role: "Artifact that receives the transferable behavior without exposing the privileged source."
      - name: "runtime_calibration_check"
        role: "Measures whether the distilled behavior remains calibrated without privileged information."
    flow:
      - "Run the same task under the runtime view and the privileged teacher view."
      - "Identify where privileged context changed the decision, reasoning, or confidence."
      - "Convert the useful delta into a prompt rule, skill, memory policy, eval, or training example."
      - "Remove secret or non-runtime assumptions from the distilled artifact."
      - "Evaluate the result under the runtime view to catch leakage or overconfidence."
    provenance:
      phase1_sections:
        - "1.3 Self-Distillation como Dissociacao entre Professor e Modelo Externo"
        - "2.2 Log-Ratio como Advantage sem Reward Model Explicito"
        - "6 Sintese"
      analysis_refs:
        - "2026-06-16-the-imitation-game-state-of-policy-distillation-in-language-analysis.md:60-70"
        - "2026-06-16-the-imitation-game-state-of-policy-distillation-in-language-analysis.md:98-109"
        - "2026-06-16-the-imitation-game-state-of-policy-distillation-in-language-analysis.md:249-252"
      source_refs:
        - "l312-320"
        - "l340-348"
    applicability_to_agents: "Strong fit for context engineering: review-time full context can teach runtime behavior without permanently loading the full transcript, playbook, or source document into every agent call."

  - name: "Consensus-Gated Privileged Information"
    problem_solved: "Retrieved documents, sub-agent findings, and teacher traces can be wrong or stale, so treating every privileged signal as equally trustworthy turns partial information into durable agent errors."
    inputs:
      - "Candidate privileged information such as retrieved docs, logs, generated plans, reference answers, or sub-agent outputs."
      - "Multiple tutor, evaluator, or sub-agent rollouts over the same candidate information."
      - "Agreement metric such as exact answer match, rubric agreement, semantic consensus, or conflict count."
      - "Trust threshold that decides whether the information can influence the next update or action."
      - "Audit record of dissenting outputs and accepted consensus."
    outputs:
      - "Accepted privileged information when independent rollouts agree above threshold."
      - "Rejected, deferred, or escalated information when consensus is weak."
      - "Evidence bundle that records why the signal was trusted."
    benefits:
      - "Filters noisy retrieved context before it is promoted into prompts, skills, plans, or memory."
      - "Maps naturally to multi-agent review councils where agreement is a gate, not a decoration."
      - "Makes trust in privileged information explicit and inspectable."
    limitations:
      - "Adds latency and token cost through repeated tutor or evaluator calls."
      - "Correlated agents can agree on the same wrong answer."
      - "High-value minority dissent may be lost if the consensus rule is too strict."
    components:
      - name: "candidate_pi"
        role: "Privileged signal that may inform a decision or update."
      - name: "rollout_sampler"
        role: "Produces multiple independent interpretations or tutor answers."
      - name: "agreement_metric"
        role: "Measures whether the sampled outputs converge."
      - name: "trust_gate"
        role: "Accepts, rejects, defers, or escalates the candidate signal."
      - name: "consensus_record"
        role: "Stores accepted evidence and dissent for later review."
    flow:
      - "Collect candidate privileged information for a task or update."
      - "Run multiple tutor or evaluator passes conditioned on that information."
      - "Compute agreement and inspect dissent."
      - "Allow the information to influence the agent only when the gate passes."
      - "Escalate or defer when consensus is weak or disagreement reveals risk."
    provenance:
      phase1_sections:
        - "1.4 A Taxonomia de PI como Espectro de Confianca"
        - "6 Sintese"
      analysis_refs:
        - "2026-06-16-the-imitation-game-state-of-policy-distillation-in-language-analysis.md:72-85"
        - "2026-06-16-the-imitation-game-state-of-policy-distillation-in-language-analysis.md:243-244"
      source_refs:
        - "l415"
        - "l464"
    applicability_to_agents: "Directly applicable to multi-agent review, retrieval-augmented planning, and sub-agent orchestration because these systems routinely consume partial privileged signals whose trust level must be explicit."

  - name: "Asymmetric Failure Correction Router"
    problem_solved: "Positive examples and negative failures have different mechanics, but many agent improvement loops route both through the same feedback path and let noisy failures dominate or stagnate."
    inputs:
      - "Agent trace with decisions, tool calls, errors, user-visible outcome, and evaluator notes."
      - "Success or failure signal at the step and trajectory levels."
      - "Negative-feedback criteria such as verifier rejection, constraint failure, repeated retry, or confidence drop."
      - "Stable correction channel for failures, such as targeted repair prompts, top-K alternatives, regression creation, or human review."
      - "Reinforcement channel for successes, such as exemplars, demonstrations, or promoted prompt rules."
    outputs:
      - "Failures routed to repair, regression, root-cause classification, or escalation."
      - "Successes routed to examples, confidence-building, or reduced supervision."
      - "Separate learning logs for what to imitate and what to correct."
    benefits:
      - "Prevents failure feedback from being treated as a mirror image of success reinforcement."
      - "Gives severe or high-variance failures a stabilizing path instead of repeatedly asking the same agent to self-correct."
      - "Produces cleaner eval and backlog artifacts because every failure has a correction route."
    limitations:
      - "Depends on reliable failure classification; false positives can over-route normal exploration into heavy review."
      - "The correction channel must be tested, or it becomes another unverified fallback."
      - "Low-risk tasks may not justify separate success and failure machinery."
    components:
      - name: "feedback_classifier"
        role: "Separates positive, neutral, and negative feedback based on trace evidence."
      - name: "failure_router"
        role: "Sends failures to repair, regression, root-cause analysis, or escalation."
      - name: "success_router"
        role: "Sends successful behavior to examples, reduced supervision, or confidence calibration."
      - name: "correction_channel"
        role: "Stable mechanism for handling high-variance failure cases."
      - name: "learning_log"
        role: "Records what was imitated, what was corrected, and why."
    flow:
      - "Score a trace at both step and trajectory levels."
      - "Classify feedback as positive, neutral, or negative."
      - "Route negative cases to correction machinery instead of normal reinforcement."
      - "Route positive cases to exemplar or confidence-building paths."
      - "Track the outcomes separately so failure repair can be evaluated on its own."
    provenance:
      phase1_sections:
        - "2.3 AOPD: Separacao Assimetrica entre Tokens Positivos e Negativos"
      analysis_refs:
        - "2026-06-16-the-imitation-game-state-of-policy-distillation-in-language-analysis.md:110-117"
        - "2026-06-16-the-imitation-game-state-of-policy-distillation-in-language-analysis.yaml:169-182"
      source_refs:
        - "l255-274"
    applicability_to_agents: "Applicable to agent QA, retry, and improvement pipelines where failures have heavier tails and need repair-specific handling instead of being mixed with ordinary examples."

  - name: "Magnitude-Direction Verifier Split"
    problem_solved: "An agent's internal confidence can reveal which decisions matter, but it cannot by itself prove whether the correction should push toward or away from that behavior."
    inputs:
      - "Internal magnitude signal such as self-distillation delta, confidence gap, log-ratio, attention hotspot, or disagreement intensity."
      - "External direction signal such as deterministic tests, verifier result, evaluator rubric, user approval, or human review."
      - "Trace segment or output span to update."
      - "Policy for combining confidence magnitude with verified direction."
      - "Escalation rule when magnitude is high but direction is uncertain."
    outputs:
      - "Weighted correction plan that spends effort where the agent signal is strong and the verifier has grounded the direction."
      - "Approved, rejected, or escalated updates with separated rationale for magnitude and direction."
      - "Audit trail showing whether a change was driven by model confidence, verifier result, or both."
    benefits:
      - "Formalizes trust but verify for agent improvement loops."
      - "Preserves dense model signal without letting the model be the sole judge of correctness."
      - "Reduces information-leakage and overconfidence risks from pure self-distillation."
    limitations:
      - "The verifier becomes a bottleneck; bad tests or rubrics can point confidently in the wrong direction."
      - "Extra verification adds latency and operational cost."
      - "Conflicting magnitude and direction signals need explicit tie-breaking or human escalation."
    components:
      - name: "magnitude_signal"
        role: "Internal measure of where the agent believes change matters."
      - name: "direction_verifier"
        role: "External test, rubric, human, or deterministic checker that decides sign."
      - name: "combiner_policy"
        role: "Weights updates by magnitude while respecting verified direction."
      - name: "conflict_escalation"
        role: "Handles high-magnitude cases with unclear or disputed direction."
      - name: "audit_record"
        role: "Separates confidence evidence from correctness evidence."
    flow:
      - "Detect high-magnitude segments from internal agent signal."
      - "Run external verification to decide whether the behavior should be encouraged or discouraged."
      - "Combine magnitude and direction into a weighted correction."
      - "Escalate when the agent is confident but the verifier is absent, weak, or contradictory."
      - "Record the split so reviewers can see what was trusted and what was verified."
    provenance:
      phase1_sections:
        - "2.5 RLSD: Split entre Magnitude do Self-Distillation e Direcao do Verifier"
        - "6 Sintese"
      analysis_refs:
        - "2026-06-16-the-imitation-game-state-of-policy-distillation-in-language-analysis.md:126-133"
        - "2026-06-16-the-imitation-game-state-of-policy-distillation-in-language-analysis.md:241-242"
      source_refs:
        - "l435-464"
    applicability_to_agents: "Strong fit for harnesses with tests, rubrics, or human approval because the agent can propose where learning should focus while deterministic or human checks decide correctness."

  - name: "Adaptive Style Compression Teacher"
    problem_solved: "Fixed summarization or token-budget heuristics either compress easy tasks too little, compress hard tasks too much, or remove uncertainty markers that downstream agents need."
    inputs:
      - "Full trace, context, or reasoning artifact to compress."
      - "Style instruction such as be concise or a domain-specific brevity rule."
      - "Task difficulty signals such as verifier uncertainty, number of unresolved constraints, failed attempts, or dependency depth."
      - "Candidate compressed output with explicit uncertainty, hedging, and unresolved-decision markers preserved."
      - "Eval cases that compare downstream task success using compressed versus full context."
    outputs:
      - "Compression behavior that is terse on easy tasks and preserves deliberation on hard tasks."
      - "Summary or response format that keeps uncertainty markers instead of flattening them into false confidence."
      - "Compression policy examples suitable for prompt, skill, or context-builder updates."
    benefits:
      - "Saves tokens without reducing context management to a fixed truncation rule."
      - "Aligns summary length with task difficulty rather than with a static budget alone."
      - "Protects downstream agents from epistemic suppression caused by overconfident summaries."
    limitations:
      - "Style compression can still suppress important hedging if not explicitly evaluated."
      - "A single style instruction may conflict with domain requirements for auditability or legal precision."
      - "Requires downstream evals; shorter traces are not automatically better traces."
    components:
      - name: "full_trace_input"
        role: "Complete reasoning, session history, or context artifact before compression."
      - name: "style_teacher"
        role: "Instruction-conditioned view that demonstrates the desired compression style."
      - name: "difficulty_estimator"
        role: "Signals when the task needs more deliberation or can be compressed aggressively."
      - name: "uncertainty_preserver"
        role: "Keeps hedging, unknowns, and unresolved decisions explicit."
      - name: "downstream_eval"
        role: "Checks whether compressed context preserves task success and calibration."
    flow:
      - "Generate or evaluate a compressed version of the full trace under a style instruction."
      - "Condition compression strength on task difficulty and unresolved constraints."
      - "Preserve uncertainty markers and open decisions in the compressed artifact."
      - "Test downstream agent performance with the compressed context."
      - "Promote compression examples only when they save budget without harming calibration."
    provenance:
      phase1_sections:
        - "2.4 CRISP: PI como Instrucao de Estilo para Compressao Automatica"
        - "3.6 Epistemic Suppression"
        - "5.6 Epistemic Suppression por Compressao"
      analysis_refs:
        - "2026-06-16-the-imitation-game-state-of-policy-distillation-in-language-analysis.md:118-125"
        - "2026-06-16-the-imitation-game-state-of-policy-distillation-in-language-analysis.md:170-175"
        - "2026-06-16-the-imitation-game-state-of-policy-distillation-in-language-analysis.md:225-229"
      source_refs:
        - "l417-433"
        - "l561"
    applicability_to_agents: "Applicable to token-budgeted agents that summarize traces, handoffs, or context windows and need compression that preserves uncertainty instead of producing confident but lossy summaries."

  - name: "Trajectory Failure Pattern Classifier"
    problem_solved: "Long-running agent failures are often labeled generically as bad output or tool failure, hiding whether the root mechanism was proxy metric drift, early-prefix drift, supervision expiry, diversity collapse, PI leakage, calibration gap, or epistemic suppression."
    inputs:
      - "Complete trajectory trace with step-level events, tool calls, context snapshots, compressed summaries, and final outcome."
      - "Step-level scores, verifier confidence, evaluator notes, and final task-level success metric."
      - "Evidence of privileged-information use, summary compression, retry loops, and alternative sampled strategies."
      - "Failure taxonomy derived from Phase 1 mechanisms."
      - "Routing table from failure class to mitigation."
    outputs:
      - "Failure classification attached to the trace."
      - "Mitigation route such as trajectory-level eval, early re-anchoring, adaptive supervision stop, diversity restoration, verifier grounding, calibration check, or uncertainty-preserving summary."
      - "Regression case or backlog item with the mechanism named, not just the symptom."
    benefits:
      - "Prevents teams from optimizing step-level proxies when the real failure is trajectory-level."
      - "Gives debugging and eval work a shared vocabulary grounded in failure mechanics."
      - "Routes different failure modes to different fixes instead of adding generic retries."
    limitations:
      - "Requires rich traces; without context snapshots and evaluator confidence over time, many classes collapse into unknown."
      - "Boundaries between classes can be subjective and need reviewer calibration."
      - "This is a learning-loop classifier, not a substitute for ordinary code or infrastructure debugging."
    components:
      - name: "trajectory_trace"
        role: "Complete record of the agent run, including context and tool state."
      - name: "step_and_outcome_scores"
        role: "Both proxy metrics and final task-level results."
      - name: "failure_taxonomy"
        role: "Classes such as proxy drift, prefix drift, supervision expiry, diversity collapse, PI leakage, calibration gap, and epistemic suppression."
      - name: "mitigation_router"
        role: "Maps each class to a repair path, eval, re-anchor, verifier, or escalation."
      - name: "regression_writer"
        role: "Turns classified failures into durable test or backlog artifacts."
    flow:
      - "Collect the full trace and compare step-level proxy scores with final task outcome."
      - "Inspect where evaluator confidence, context fidelity, or alternative-strategy diversity degraded."
      - "Assign the most specific failure class supported by evidence."
      - "Route the class to the corresponding mitigation instead of a generic retry."
      - "Write a regression or backlog item that preserves the failure mechanism."
    provenance:
      phase1_sections:
        - "3 Licoes Operacionais"
        - "5 Padroes de Falha"
        - "6 Sintese"
      analysis_refs:
        - "2026-06-16-the-imitation-game-state-of-policy-distillation-in-language-analysis.md:136-175"
