  title: "Mental Model: long-running-agents"
  date: "2026-06-16"
  repo: "long-running-agents"
  type: "mental-model"
  scope: "Phase 0 repository mental model only; external policy-distillation source was not analyzed."
  target_repository: "/mnt/c/Users/pavan/long-running-agents"
