goals:
  - "Build and manage long-running AI agent workflows with `.opencode/` as the agent/skill system, Node >= 20.18.0 + ESLint as stack, `.runtime/` and `artifacts/` as runtime state, and `docs/decisions/` as the accepted-ADR location. Sources: AGENTS.md:5-12, package.json:4-13."
  - "Teach why long-running agents fail through context loss, fragile planning, and blind self-evaluation, then teach harnesses that manage context, decompose work, and separate generation from evaluation. Sources: README.md:3, README.md:7-13, curriculum/README.md:21-31."
  - "Deliver a 12-week, 4-level curriculum with 8 core concepts and 35+ diagrams for people building agentic systems. Sources: curriculum/README.md:11-13, curriculum/README.md:251-270."
  - "Apply the curriculum to KODA, a WhatsApp supplement-sales agent with conversations from 30 minutes to 4 hours, 8 internal agents, SQLite + JSON checkpoints, file-based coordination, and a sales pipeline from discovery through fulfillment. Sources: curriculum/README.md:33-34, curriculum/04-nivel-4-koda-specific/01-koda-architecture.md:144-159."
  - "Govern documentation with explicit precedence: accepted ADRs, active canonical docs, validated evidence, analysis docs, archive docs, then READMEs and operational summaries. Sources: docs/system-of-record.md:12-21, AGENTS.md:80-91."
  - "Transform external knowledge into repository improvements via analyze-and-improve: mental model, extraction, patterns, classification, concrete artifacts, integration, and curriculum integration. Sources: .opencode/skills/analyze-and-improve/SKILL.md:171-270, .opencode/skills/analyze-and-improve/SKILL.md:49-57."

