terminology:
  - term: "Agent"
    definition: "Autonomous LLM-based entity that can take actions, use tools, and execute tasks in sequence."
    source: "curriculum/GLOSSARY.md:17-24"
  - term: "Agent Loop"
    definition: "Repeated cycle where an agent receives input, thinks, acts, receives result, and repeats."
    source: "curriculum/GLOSSARY.md:28-35"
  - term: "Context Amnesia"
    definition: "Forgetting prior context after exceeding the context window; a core KODA risk when customer constraints vanish during long conversations."
    source: "curriculum/GLOSSARY.md:37-44; docs/canonical/external-state-persistence.md:21-27"
  - term: "Context Window"
    definition: "Maximum tokens a model can process at once; the agent's immediate memory."
    source: "curriculum/GLOSSARY.md:145-154"
  - term: "Context Progressive Disclosure"
    definition: "Context architecture where instructions and capabilities live in trigger-loaded skills rather than a monolithic prompt."
    source: "curriculum/GLOSSARY.md:158-160"
  - term: "Harness"
    definition: "Infrastructure and patterns around agents that make long-running execution reliable."
    source: "curriculum/GLOSSARY.md:329-342"
  - term: "Harness Evolution"
    definition: "Simplifying or removing harness components as model capability improves."
    source: "curriculum/GLOSSARY.md:346-358"
  - term: "Generator"
    definition: "Agent responsible for creating or building an output."
    source: "curriculum/GLOSSARY.md:279-288"
  - term: "Evaluator"
    definition: "Separate agent responsible for evaluating generator output against rubrics."
    source: "curriculum/GLOSSARY.md:179-191"
  - term: "Generator/Evaluator Pattern"
    definition: "Two-LLM collaboration where one generates and another evaluates critically."
    source: "curriculum/GLOSSARY.md:292-310"
  - term: "Sprint Contract"
    definition: "Negotiated agreement between generator and evaluator about what done means before execution."
    source: "curriculum/GLOSSARY.md:165-173; curriculum/GLOSSARY.md:650-653"
  - term: "Evaluation Rubric"
    definition: "Measurable criteria for evaluating subjective quality."
    source: "curriculum/GLOSSARY.md:195-211"
  - term: "Trace"
    definition: "Detailed log of agent input, reasoning, actions, and output; the primary debugging surface."
    source: "curriculum/GLOSSARY.md:717-732"
  - term: "Memory / State"
    definition: "Information retained between operations, including short-term, long-term, and file-based storage."
    source: "curriculum/GLOSSARY.md:444-454"
  - term: "Multi-Agent System"
    definition: "System with multiple independent agents coordinating, often Planner + Generator + Evaluator."
    source: "curriculum/GLOSSARY.md:471-483"
  - term: "Planner"
    definition: "Agent specialized in breaking problems into steps."
    source: "curriculum/GLOSSARY.md:489-503"
  - term: "Token Budget"
    definition: "Conscious management of token capacity and spending."
    source: "curriculum/GLOSSARY.md:673-696; docs/canonical/hybrid-context-stack.md:34-42"
  - term: "Intent as Five-Part Primitive"
    definition: "Intent with description, constraints, failure scenarios, success scenarios, and connections, checked before execution."
    source: "curriculum/GLOSSARY.md:395-410; docs/canonical/intent-five-part-primitive.md:31-48"
  - term: "ICE Craft Separation"
    definition: "Explicit separation of Intent, Context, and Expectations with owners so gaps are closed before execution."
    source: "curriculum/GLOSSARY.md:378-391"
  - term: "Fuzzy Compiler"
    definition: "Mental model where the LLM is a compiler backend, the harness is optimization passes, and generated code is a disposable build artifact."
    source: "curriculum/GLOSSARY.md:230-244"
  - term: "KODA"
    definition: "WhatsApp conversational supplement-sales agent and practical case study for all patterns."
    source: "curriculum/GLOSSARY.md:416-427; curriculum/04-nivel-4-koda-specific/01-koda-architecture.md:144-159"

