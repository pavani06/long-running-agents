# Analise de Conhecimento Nao-Obvio: Quarto Book Publishing
#
# Convencoes:
# - type: analise estruturada derivada do artigo de Prakhar Rathi
# - Estrutura: frameworks, patterns, operational_lessons, tradeoffs, failure_patterns, synthesis
# - Todo claim rastreavel ao artigo original
# - Sem marketing, self-promotion, anedotas, historias pessoais, filler, repeticao

meta:
  title: "Quarto Book Publishing: Extracao de Conhecimento Nao-Obvio"
  source: "https://levelup.gitconnected.com/write-a-book-using-jupyter-in-10-minutes-6da6fe916d77"
  author: "Prakhar Rathi"
  published: "2026-06-08"
  date: "2026-06-14"
  type: "analysis"
  extraction_rules:
    keep:
      - frameworks
      - architectures
      - workflows
      - implementation_details
      - operational_lessons
      - failures
      - tradeoffs
      - design_decisions_with_justification
      - documented_anti_patterns
      - structural_publishing_patterns
    ignore:
      - marketing
      - self_promotion
      - anecdotes
      - personal_stories
      - repetition
      - padding
      - filler
      - generic_advice_without_mechanics

frameworks:
  - name: "Quarto Publishing Model — Notebook-as-Source Compiler"
    description: >
      Quarto opera como um compilador de publicacao: o notebook (.ipynb) e o arquivo de
      configuracao (_quarto.yml) sao fontes; o HTML renderizado e o artefato de build.
      Quatro camadas: Source (notebooks, markdown), Config (_quarto.yml), Build (Quarto CLI),
      Deploy (quarto publish gh-pages).
    components:
      - name: "Source Layer"
        role: "Notebooks .ipynb, Markdown .qmd/.md — o autor escreve no ambiente de sempre"
        non_obvious: "O notebook ja e a fonte de publicacao. Nao ha conversao ou exportacao."
      - name: "Config Layer"
        role: "_quarto.yml — estrutura do livro, metadata, formato, tema, TOC"
        non_obvious: "Unico arquivo que define o que o livro e. Git diff audita a evolucao estrutural."
      - name: "Build Layer"
        role: "Quarto CLI — renderiza notebooks e markdown em HTML estatico"
        non_obvious: "Build e tudo-ou-nada: um notebook com erro quebra o build inteiro."
      - name: "Deploy Layer"
        role: "quarto publish gh-pages — cria branch gh-pages e publica em um comando"
        non_obvious: "Nao requer configuracao manual no GitHub; Quarto gerencia a branch gh-pages."
    architectural_inversion: >
      Diferente de Jupyter Book (Python + Node.js), Quarto e um unico binario autocontido.
      Isso elimina toda uma classe de falhas de dependencia entre toolchains — conflitos de
      versao entre Python, Node.js e Sphinx simplesmente nao existem.

  - name: "Bridge Model — Exploracao para Publicacao sem Mudanca de Workflow"
    description: >
      Quarto funciona como ponte entre o mundo exploratorio (notebooks como artefatos de
      experimentacao) e o mundo de publicacao (livros estruturados com navegacao, sidebar,
      formatos multiplos). A friccao de transicao e eliminada: o autor trabalha no notebook;
      o livro e o output compilado.
    two_worlds:
      exploratory: "Data scientists escrevem notebooks com codigo, outputs, graficos e narrativa misturados"
      publishing: "Livros e sites com estrutura navegavel, sidebar, capitulos, formatos multiplos"
    non_obvious: >
      Nao e conversao pos-escrita — o notebook e a fonte de publicacao desde o inicio.
      Isso e fundamentalmente diferente de workflows onde se escreve em um formato e publica
      em outro atraves de uma ferramenta separada.

  - name: "Single Binary Philosophy"
    description: >
      Quarto e um instalador unico, sem Node.js ou toolchain secundaria. Isso cria
      reproducibilidade total de ambiente e simplifica CI/CD.
    implications:
      - "Eliminacao de conflitos de versao entre toolchains"
      - "Instalacao reproduzivel em um comando"
      - "CI/CD trivial: GitHub Actions so precisa de Quarto + Python/Jupyter"
      - "Debugging simplificado: falha esta no notebook ou no Quarto, nao em 4 ferramentas interoperando"

  - name: "Config as Single Source of Truth"
    description: >
      O _quarto.yml e o unico arquivo que define metadata, estrutura e formato do livro.
      Nao ha configuracao espalhada entre setup.py, conf.py, _toc.yml, Makefile.
    non_obvious: >
      Uma superficie de configuracao auditavel e versionavel. Git diff no _quarto.yml
      mostra exatamente o que mudou na estrutura do livro — parts adicionados, capitulos
      reordenados, tema alterado.

patterns:
  - name: "Project Structure — Modular Chapter Organization"
    problem: "Livros tecnicos crescem caoticamente quando conteudo vive em diretorio unico."
    mechanism: >
      Estrutura canonica com _quarto.yml (config), index.qmd (landing page obrigatoria),
      e chapters/ com arquivos independentes (.ipynb, .qmd, .md — mixing livre). Naming
      convention numerico (01_, 02_) define ordem sem acoplamento. Permite autoria paralela,
      rebuild seletivo e organizacao por convencao, nao por ferramenta.

  - name: "Config-Driven Table of Contents — Parts as Semantic Grouping"
    problem: "Livros com muitos capitulos perdem coesao narrativa sem agrupamento semantico."
    mechanism: >
      _quarto.yml suporta hierarquia part > chapters. Parts sao mais que labels de TOC:
      o Quarto as renderiza como secoes visuais distintas na navegacao lateral. A estrutura
      do livro e codigo YAML, nao um artefato de design. Reorganizar e um commit.

  - name: "Landing Page as Structural Front Matter"
    problem: "Leitores precisam de orientacao imediata ao chegar a um livro tecnico."
    mechanism: >
      index.qmd e obrigatorio e estruturalmente distinto dos capitulos. Enquanto capitulos
      sao conteudo, o index e o front matter do livro: titulo, introducao, publico-alvo,
      instrucoes de navegacao. Padrao emprestado de documentacao de software (landing page
      de docs) aplicado a livros.

  - name: "Live Preview Development Loop"
    problem: "Ciclo editar-compilar-verificar em ferramentas tradicionais e lento, quebrando fluxo de escrita."
    mechanism: >
      quarto preview sobe servidor em localhost:4200 com hot reload. Salvar qualquer arquivo
      dispara re-renderizacao no navegador. Transforma publicacao de livro em loop de
      desenvolvimento analogo a frontend web (edit-save-see). Erros sao capturados antes do deploy.

  - name: "One-Command Deploy Pattern"
    problem: "Publicar site estatico requer multiplos passos manuais: build, criar branch, copiar artefatos, configurar GitHub Pages, push."
    mechanism: >
      quarto publish gh-pages executa pipeline completo em um comando: renderiza, cria/seleciona
      gh-pages branch, push dos HTML, imprime URL live. Deploy atomico sem configuracao manual
      no GitHub. Padrao 'ship from main'.

  - name: "CI/CD Auto-Deploy — Push-to-Publish Pipeline"
    problem: "Mesmo com one-command deploy, rodar manualmente a cada atualizacao cria atrito."
    mechanism: >
      GitHub Actions workflow em .github/workflows/publish.yml: every push to main triggers
      checkout, setup Python, install Jupyter, setup Quarto, quarto publish gh-pages. Livro
      sempre sincronizado com main. Deploy deixa de ser decisao e vira reflexo.

  - name: "Multi-Format Rendering Pipeline"
    problem: "Diferentes audiencias consomem conteudo em formatos diferentes."
    mechanism: >
      Mesmo source gera HTML, PDF, Word, ePub. Nao e conversao pos-build — e pipeline de
      renderizacao unico onde formato e parametro de configuracao. Cada formato pode ter
      opcoes independentes (tema HTML, template PDF, estilo Word). Fonte unica, saidas multiplas.

  - name: "Theme Swapping as Configuration"
    problem: "Design visual de livros tecnicos frequentemente requer iteracao com designer ou CSS."
    mechanism: >
      Quarto embute temas Bootstrap (cosmo, flatly, journal, lumen, sandstone) expostos como
      valores de configuracao em format.html.theme. Trocar tema e uma linha de YAML.
      Preview em tempo real permite testar temas em segundos. Decisao de design reduzida a
      escolha de configuracao versionada.

operational_lessons:
  - lesson: "Notebook errors kill the entire build — no partial recovery"
    context: >
      Se um notebook tem erro de execucao ou dependencia faltante, o build inteiro falha.
      Quarto nao faz skip de capitulos com erro. Notebooks publicaveis precisam ser mantidos
      como codigo: executaveis, com dependencias declaradas, sem celulas quebradas. Isso
      impoe disciplina de manutencao que muitos data scientists nao tem.

  - lesson: "Debugging is indirect — failure is in the notebook, not Quarto"
    context: >
      Quando o build falha, a mensagem de erro vem da execucao do notebook (kernel Python/R),
      nao do Quarto. A cadeia: celula do notebook → erro do kernel → Quarto interrompe build →
      mensagem generica. O autor precisa abrir o notebook, encontrar a celula, corrigir,
      rebuild. Nao ha skip parcial.

  - lesson: "Heavy notebooks degrade build performance significantly"
    context: >
      Notebooks com muitos outputs grandes (imagens alta resolucao, graficos interativos,
      tabelas extensas) tornam o build lento. Para publicacao, notebooks devem ser enxugados:
      resolucao reduzida, tabelas truncadas, celulas de debug removidas. O notebook de
      publicacao nao e o notebook de exploracao.

  - lesson: "Julia support is second-class — keep stack homogeneous"
    context: >
      Suporte a Julia existe mas e menos polido que Python/R. Projetos multi-linguagem
      encontrarao comportamento inconsistente. Recomendacao implicita: manter stack homogenea
      ou isolar capitulos Julia com testes extras de build.

  - lesson: "quarto check jupyter is a pre-build diagnostic gate"
    context: >
      quarto check jupyter verifica se Python e Jupyter estao instalados. E um gate pre-build
      manual. Incorporar no CI/CD como passo anterior ao build reduz falhas silenciosas por
      ambiente mal configurado — especialmente relevante em GitHub Actions efemeros.

  - lesson: "Pre-computed outputs mean no live execution — readers cannot run code"
    context: >
      Leitores veem outputs do momento do build, nao podem executar codigo ou alterar
      parametros. Limitacao arquitetonica de site estatico. Se o valor do livro depende de
      interatividade, Quarto precisa de complemento (Binder, JupyterHub).

tradeoffs:
  - decision: "Quarto (single binary) vs. Jupyter Book (Python + Node.js)"
    benefit: "Instalacao em um comando, sem conflitos de toolchain, CI/CD trivial"
    cost: "Ecossistema menor, menos plugins, comunidade mais nova"

  - decision: "Output estatico vs. output interativo (Binder)"
    benefit: "Hospedagem gratuita (GitHub Pages), carregamento instantaneo, zero manutencao de servidor"
    cost: "Leitores nao executam codigo; livros interativos precisam de complemento"

  - decision: "Build tudo-ou-nada vs. build parcial com skip de erros"
    benefit: "Garantia de livro publicado consistente e completo"
    cost: "Um notebook quebrado bloqueia deploy inteiro; debugging mais lento"

  - decision: "Configuracao declarativa (_quarto.yml) vs. programatica (Sphinx conf.py)"
    benefit: "Unico arquivo auditavel, estrutura visivel em git diff"
    cost: "Menos flexibilidade para logica condicional ou geracao dinamica de TOC"

  - decision: "Notebooks como fonte vs. Markdown puro"
    benefit: "Data scientists mantem workflow existente; outputs automaticamente incluidos"
    cost: "Notebooks com erros sao fontes quebradas; requer disciplina de manutencao"

  - decision: "Deploy one-command vs. pipeline manual"
    benefit: "Friccao de publicacao proxima de zero"
    cost: "Abstrai mecanica do deploy — dificulta debugging quando falha"

  - decision: "CI/CD auto-deploy em push vs. deploy manual"
    benefit: "Livro sempre atualizado com main; zero passos manuais"
    cost: "Erros em notebooks chegam a producao automaticamente se nao testados antes do push"

  - decision: "Temas built-in vs. CSS customizado"
    benefit: "Design profissional em uma linha de config"
    cost: "Limitado aos temas Bootstrap; customizacao profunda requer CSS"

  - decision: "Multi-formato (HTML/PDF/Word/ePub) vs. formato unico otimizado"
    benefit: "Mesma fonte atende multiplas audiencias"
    cost: "Formato generico pode nao ser otimo para nenhum caso especifico; PDF via LaTeX requer dependencias extras"

failure_patterns:
  - pattern: "Notebook error kills entire build"
    cause: "Quarto nao tem skip parcial — trata livro como unidade atomica de build"
    mitigation: "Rodar todos notebooks localmente antes do deploy; CI/CD com nbconvert --execute como gate pre-build"

  - pattern: "Missing dependency produces opaque failure"
    cause: "Quarto delega execucao ao Jupyter kernel; erro propagado sem enriquecimento"
    mitigation: "quarto check jupyter + pip freeze > requirements.txt + CI/CD instala deps explicitamente"

  - pattern: "Large outputs degrade rendering performance"
    cause: "Quarto embute outputs inline no HTML; sem otimizacao automatica de assets"
    mitigation: "Criar versao 'light' dos notebooks — reduzir resolucao, truncar tabelas, remover celulas de debug"

  - pattern: "Julia/Python mixed stack shows inconsistent behavior"
    cause: "Suporte a Julia e menos maduro; feature gap entre kernels"
    mitigation: "Manter stack homogenea; isolar capitulos Julia com CI/CD especifico"

  - pattern: "Config drift between local and CI/CD environment"
    cause: "Ambiente local tem dependencias nao declaradas; CI/CD parte de ambiente limpo"
    mitigation: "CI/CD instala todas dependencias explicitamente; quarto check no CI/CD captura gaps"

  - pattern: "GitHub Pages branch conflicts on concurrent deploys"
    cause: "quarto publish gh-pages faz push direto sem locking"
    mitigation: "CI/CD serializa naturalmente (single-job); deploys manuais concorrentes devem ser evitados"

synthesis:
  - "O insight unificador do Quarto e que ele implementa documentation-as-code com friccao extraordinariamente baixa. Tres implicacoes estruturais:"
  - "A configuracao e o contrato do livro: _quarto.yml nao e settings — e a definicao executavel do que o livro e. Estrutura, aparencia e deploy sao declarados em um artefato versionavel. Git diff audita a evolucao estrutural completa."
  - "A ponte entre exploracao e publicacao e o valor arquitetonico central: a decisao mais profunda nao e single binary — e eliminar a fronteira entre ambiente de trabalho (notebook) e artefato de publicacao (livro). O notebook e a fonte. O custo: notebooks precisam ser mantidos como codigo de producao."
  - "O one-command deploy e uma filosofia, nao uma feature: reduzir friccao de publicacao ao ponto onde deploy deixa de ser decisao e vira reflexo. Quando publicar e um push para main, o livro esta sempre live — exatamente como CI/CD transformou deploy de software."
  - "Para agentes long-running e publicacao de curriculo: Quarto permite tratar curriculo como codigo-fonte versionado, com build automatizado e deploy continuo. Parts/chapters mapeiam para niveis de curriculo. Config-driven TOC permite reorganizar estrutura sem mexer no conteudo."
