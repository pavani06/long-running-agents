meta:
  title: "Mental Model: long-running-agents"
  date: "2026-06-10"
  repo: "long-running-agents"
  type: "mental-model"

goals:
  - "Build and manage long-running AI agent workflows with `.opencode/` as the agent system, Node >= 20.18.0 as stack, and `.runtime/` plus `artifacts/` as runtime state. Sources: AGENTS.md:7, AGENTS.md:9, AGENTS.md:10, AGENTS.md:11, README.md:3."
  - "Teach a 12-week curriculum for reliable long-running AI systems applied to KODA, a WhatsApp supplement-sales agent that must maintain quality in 2+ hour conversations. Sources: docs/system-of-record.md:41, curriculum/README.md:5, curriculum/README.md:11, curriculum/README.md:25, curriculum/README.md:26."
  - "Teach harness patterns that manage memory/context, decompose work, and separate construction from evaluation. Sources: curriculum/README.md:19, curriculum/README.md:20, curriculum/README.md:21, curriculum/README.md:22, curriculum/README.md:23."
  - "Operationalize agent work through issue claim, isolated branch/worktree, execution brief, validation, draft PR, second-agent review, explicit merge approval, and cleanup. Sources: .opencode/skills/issue-start/SKILL.md:14, .opencode/skills/issue-review/SKILL.md:14, .opencode/skills/issue-finish/SKILL.md:14."
  - "Maintain documentation governance through explicit precedence: accepted ADRs, active canonical docs, validated evidence, analysis docs, archive docs, then READMEs and operational summaries. Sources: docs/system-of-record.md:5, docs/system-of-record.md:7, docs/system-of-record.md:8, docs/system-of-record.md:9, docs/system-of-record.md:10, docs/system-of-record.md:11, docs/system-of-record.md:12."

architecture:
  abstractions:
    - name: "System of record"
      role: "Resolves documentation conflicts and maps project domains."
      sources:
        - "docs/system-of-record.md:1"
        - "docs/system-of-record.md:3"
        - "docs/system-of-record.md:5"
    - name: "Documentation precedence"
      role: "Orders authority from accepted ADRs through canonical docs, evidence, analysis, archive, and READMEs."
      sources:
        - "docs/system-of-record.md:5"
        - "docs/system-of-record.md:7"
        - "docs/system-of-record.md:12"
    - name: "Curriculum"
      role: "Main product: a 12-week program with 4 levels, 8 core concepts, knowledge graphs, guides, templates, case studies, and references."
      sources:
        - "docs/system-of-record.md:39"
        - "docs/system-of-record.md:41"
        - "curriculum/README.md:5"
        - "curriculum/README.md:49"
        - "curriculum/README.md:162"
    - name: "Agent system"
      role: "`.opencode/` layer with agents and skills following HoP/Handoff Protocol scope, ownership, and validation gates."
      sources:
        - "AGENTS.md:9"
        - "docs/system-of-record.md:16"
        - "docs/system-of-record.md:18"
    - name: "HoP agents"
      role: "Rezek coordinates governance, KODA Init Basic collects phone/menu context, and Live WhatsApp Tester designs and operates live tests."
      sources:
        - ".opencode/agents/hop-orchestrator-rezek.md:21"
        - ".opencode/agents/koda-hop-init-basic.md:16"
        - ".opencode/agents/hop-live-whatsapp-tester.md:16"
        - ".opencode/agents/hop-live-whatsapp-tester.md:20"
    - name: "Issue lifecycle"
      role: "Safe workflow for claim, branch/worktree setup, brief, validation, draft PR, review, approved merge, and cleanup."
      sources:
        - ".opencode/skills/issue-start/SKILL.md:24"
        - ".opencode/skills/issue-review/SKILL.md:24"
        - ".opencode/skills/issue-finish/SKILL.md:25"
    - name: "Canonical patterns"
      role: "Nine active authoritative pattern documents under `docs/canonical/` that record maturity and gaps."
      sources:
        - "docs/system-of-record.md:115"
        - "docs/system-of-record.md:117"
        - "docs/system-of-record.md:121"
        - "docs/system-of-record.md:131"
    - name: "Tooling/runtime"
      role: "ESM Node project with Node >= 20.18.0 and real npm gates for lint and tests."
      sources:
        - "package.json:4"
        - "package.json:5"
        - "package.json:6"
        - "package.json:8"
        - "package.json:12"
    - name: "Static web portal"
      role: "Three static HTML artifacts plus a future SPA proposal with content chunking, hash routing, lazy Mermaid, and full-text search."
      sources:
        - "docs/system-of-record.md:66"
        - "docs/system-of-record.md:68"
        - "docs/system-of-record.md:72"
        - "docs/system-of-record.md:75"
  relationships:
    - from: "System of record"
      to: "All repository documentation"
      relationship: "Defines precedence and prevents lower-authority summaries from overriding accepted decisions or canonical docs."
      sources:
        - "docs/system-of-record.md:5"
        - "docs/system-of-record.md:7"
        - "docs/system-of-record.md:12"
    - from: "AGENTS.md"
      to: "All agent work"
      relationship: "Requires minimal changes, verification against real gates, and search before code."
      sources:
        - "AGENTS.md:22"
        - "AGENTS.md:30"
        - "AGENTS.md:53"
        - "AGENTS.md:96"
    - from: "Curriculum"
      to: "KODA"
      relationship: "Generic long-running-agent concepts culminate in KODA-specific architecture, journeys, feature patterns, rubrics, and real implementations."
      sources:
        - "curriculum/README.md:216"
        - "curriculum/README.md:219"
        - "curriculum/README.md:223"
    - from: "analyze-and-improve"
      to: "Mental-model artifacts"
      relationship: "Phase 0 builds `mental-model.md` and `mental-model.yaml` before any external-source analysis."
      sources:
        - ".opencode/skills/analyze-and-improve/SKILL.md:46"
        - ".opencode/skills/analyze-and-improve/SKILL.md:50"
        - ".opencode/skills/analyze-and-improve/SKILL.md:102"
        - ".opencode/skills/analyze-and-improve/SKILL.md:108"
    - from: "Deterministic Tool Dispatch"
      to: "Owned Agent Control Loop"
      relationship: "Structured JSON dispatch is the switch-statement component that enables loop ownership."
      sources:
        - "docs/canonical/deterministic-tool-dispatch.md:96"
        - "docs/canonical/deterministic-tool-dispatch.md:98"
        - "docs/canonical/deterministic-tool-dispatch.md:99"
    - from: "Owned Agent Control Loop"
      to: "Error Context Hygiene"
      relationship: "Loop intervention points such as summarize and break are where curated error context can execute."
      sources:
        - "docs/canonical/owned-agent-control-loop.md:117"
        - "docs/canonical/owned-agent-control-loop.md:119"
        - "docs/canonical/error-context-hygiene.md:136"
        - "docs/canonical/error-context-hygiene.md:139"
    - from: "Serializable Pause/Resume State"
      to: "State rebuild"
      relationship: "Pause/resume serialization is complementary to, and explicitly contrasted with, the repo's rebuild-state-per-turn model."
      sources:
        - "docs/canonical/serializable-pause-resume-state.md:50"
        - "docs/canonical/serializable-pause-resume-state.md:52"
        - "docs/canonical/serializable-pause-resume-state.md:124"
        - "docs/canonical/serializable-pause-resume-state.md:129"
    - from: "Context-reduction canonical patterns"
      to: "Long-session reliability"
      relationship: "Stable prompt, head/tail active context, addressable omitted memory, N+1 evals, and late-failure regressions form one validation chain."
      sources:
        - "docs/canonical/stable-harness-prompt.md:17"
        - "docs/canonical/head-tail-context-truncation.md:17"
        - "docs/canonical/addressable-memory-catalog.md:17"
        - "docs/canonical/n-plus-one-long-session-evals.md:17"
        - "docs/canonical/late-failure-regression-suite.md:17"
    - from: "HoP issue skills"
      to: "Merge governance"
      relationship: "Issue-start prepares, issue-review validates and stops before merge, and issue-finish merges only after explicit user approval."
      sources:
        - ".opencode/skills/issue-start/SKILL.md:14"
        - ".opencode/skills/issue-review/SKILL.md:14"
        - ".opencode/skills/issue-review/SKILL.md:209"
        - ".opencode/skills/issue-finish/SKILL.md:18"

