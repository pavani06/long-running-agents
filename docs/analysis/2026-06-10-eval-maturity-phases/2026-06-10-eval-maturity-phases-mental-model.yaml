        - "state persistence"
        - "harness evolution"
      outcome: "Proposta de arquitetura melhorada para KODA. Sources: curriculum/README.md:201, curriculum/README.md:204, curriculum/README.md:210, curriculum/INDEX.md:103, curriculum/INDEX.md:106, curriculum/EXECUTION_PLAN.md:188, curriculum/EXECUTION_PLAN.md:224, curriculum/EXECUTION_PLAN.md:226."
