terminology:
  - term: "Agent"
    definition: "Entidade autonoma de IA que toma acoes, usa ferramentas e executa tarefas em sequencia."
    source: "curriculum/GLOSSARY.md:9, curriculum/GLOSSARY.md:10"
  - term: "Agent Loop"
    definition: "Ciclo input -> pensar -> acao -> resultado -> repetir."
    source: "curriculum/GLOSSARY.md:20, curriculum/GLOSSARY.md:21"
  - term: "Context Window"
    definition: "Total de tokens que um modelo processa por vez, tratado como memoria imediata do agente."
    source: "curriculum/GLOSSARY.md:82, curriculum/GLOSSARY.md:83"
  - term: "Context Amnesia"
    definition: "Esquecimento de contexto anterior por exceder a janela de contexto."
    source: "curriculum/GLOSSARY.md:29, curriculum/GLOSSARY.md:30"
  - term: "Context Rot"
    definition: "Perda gradual de coerencia conforme o agente avanca na janela de contexto."
    source: "curriculum/GLOSSARY.md:73, curriculum/GLOSSARY.md:74"
  - term: "Context Anxiety"
    definition: "Comportamento ansioso ou precipitado perto do limite de contexto."
    source: "curriculum/GLOSSARY.md:62, curriculum/GLOSSARY.md:63, curriculum/GLOSSARY.md:65"
  - term: "Token Budget"
    definition: "Gerenciamento consciente dos tokens disponiveis e consumidos."
    source: "curriculum/GLOSSARY.md:459, curriculum/GLOSSARY.md:460"
  - term: "Harness"
    definition: "Infraestrutura e padroes que envolvem agentes para torna-los confiaveis por periodos longos."
    source: "curriculum/GLOSSARY.md:197, curriculum/GLOSSARY.md:198, curriculum/GLOSSARY.md:200, curriculum/GLOSSARY.md:204"
  - term: "Harness Evolution"
    definition: "Processo de simplificar ou remover componentes de harness conforme o modelo melhora."
    source: "curriculum/GLOSSARY.md:214, curriculum/GLOSSARY.md:215, curriculum/GLOSSARY.md:224"
  - term: "Generator"
    definition: "Agente responsavel por construir ou criar algo."
    source: "curriculum/GLOSSARY.md:147, curriculum/GLOSSARY.md:148"
  - term: "Evaluator"
    definition: "Agente separado responsavel por avaliar e gravar o trabalho de um Generator."
    source: "curriculum/GLOSSARY.md:109, curriculum/GLOSSARY.md:110"
  - term: "Generator/Evaluator Pattern"
    definition: "Padrao em que duas entidades separadas colaboram: uma gera, outra avalia."
    source: "curriculum/GLOSSARY.md:160, curriculum/GLOSSARY.md:161"
  - term: "Sprint Contract"
    definition: "Acordo entre generator e evaluator sobre o que pronto significa antes de comecar."
    source: "curriculum/GLOSSARY.md:95, curriculum/GLOSSARY.md:96, curriculum/GLOSSARY.md:423, curriculum/GLOSSARY.md:424"
  - term: "Evaluation Rubric"
    definition: "Criterios mensuraveis para avaliar qualidade subjetiva."
    source: "curriculum/GLOSSARY.md:125, curriculum/GLOSSARY.md:126"
  - term: "Trace"
    definition: "Log detalhado dos passos do agente e principal ferramenta de debugging de behavior."
    source: "curriculum/GLOSSARY.md:473, curriculum/GLOSSARY.md:474, curriculum/GLOSSARY.md:482, curriculum/GLOSSARY.md:486"
  - term: "Memory / State"
    definition: "Informacoes retidas entre operacoes, incluindo short-term, long-term e file-based."
    source: "curriculum/GLOSSARY.md:260, curriculum/GLOSSARY.md:261, curriculum/GLOSSARY.md:263, curriculum/GLOSSARY.md:266"
  - term: "Multi-Agent System"
    definition: "Sistema com multiplos agentes independentes coordenados, frequentemente Planner + Generator + Evaluator."
    source: "curriculum/GLOSSARY.md:287, curriculum/GLOSSARY.md:288, curriculum/GLOSSARY.md:290"
  - term: "Planner"
    definition: "Agente especializado em quebrar problema em etapas."
    source: "curriculum/GLOSSARY.md:305, curriculum/GLOSSARY.md:306"
  - term: "Compaction"
    definition: "Processo de resumir ou comprimir contexto antigo mantendo informacoes-chave."
    source: "curriculum/GLOSSARY.md:53, curriculum/GLOSSARY.md:54"
  - term: "KODA"
    definition: "Agente conversacional de IA para venda de suplementos esportivos via WhatsApp."
    source: "curriculum/GLOSSARY.md:232, curriculum/GLOSSARY.md:233, curriculum/GLOSSARY.md:235, curriculum/GLOSSARY.md:241"
  - term: "Deterministic Tool Dispatch"
    definition: "Reframe de tool use como JSON emitido pelo modelo mais codigo deterministico de dispatch."
    source: "docs/canonical/deterministic-tool-dispatch.md:22, docs/canonical/deterministic-tool-dispatch.md:24, docs/canonical/deterministic-tool-dispatch.md:26"
  - term: "Owned Agent Control Loop"
    definition: "Loop proprio de agente com prompt, context builder, switch statement e loop explicito."
    source: "docs/canonical/owned-agent-control-loop.md:20, docs/canonical/owned-agent-control-loop.md:22, docs/canonical/owned-agent-control-loop.md:24"
  - term: "Serializable Pause/Resume State"
    definition: "Serializacao do estado do agente para pausar e retomar ferramentas long-running sem perder contexto."
    source: "docs/canonical/serializable-pause-resume-state.md:13, docs/canonical/serializable-pause-resume-state.md:20, docs/canonical/serializable-pause-resume-state.md:22, docs/canonical/serializable-pause-resume-state.md:24"
  - term: "Addressable Memory Catalog"
    definition: "Catalogo compacto de conteudo omitido com id, kind, location, preview, scope e fetch."
    source: "docs/canonical/addressable-memory-catalog.md:17, docs/canonical/addressable-memory-catalog.md:19, docs/canonical/addressable-memory-catalog.md:21, docs/canonical/addressable-memory-catalog.md:30"

