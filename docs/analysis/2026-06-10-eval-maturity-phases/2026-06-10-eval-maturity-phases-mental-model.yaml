    - name: "Level 1 - Fundamentals"
      duration: "3-4h in README; expanded across weeks 1-2 in execution plan"
      central_question: "Por que agentes falham em tarefas longas?"
      content:
        - "3 problemas principais"
        - "context windows"
        - "token budgeting"
        - "basic harness patterns"
      exercises:
        - "History Windowing"
        - "Structured Output"
      outcome: "Entendimento dos problemas e dos padroes iniciais. Sources: curriculum/README.md:172, curriculum/README.md:175, curriculum/README.md:180, curriculum/INDEX.md:93, curriculum/INDEX.md:95, curriculum/EXECUTION_PLAN.md:75, curriculum/EXECUTION_PLAN.md:76, curriculum/EXECUTION_PLAN.md:99."
    - name: "Level 2 - Practical Patterns"
      duration: "6-8h"
      central_question: "Como fazemos agentes mais confiaveis?"
      content:
        - "Generator/Evaluator"
        - "Sprint Contracts"
        - "Rubric Design"
        - "Trace Reading"
      exercises:
        - "Generator/Evaluator"
        - "Sprint Contracts"
        - "Rubric Design"
        - "Error Context Hygiene"
      outcome: "Rubrics and generator/evaluator plan for KODA. Sources: curriculum/README.md:186, curriculum/README.md:189, curriculum/README.md:195, curriculum/INDEX.md:97, curriculum/INDEX.md:101, curriculum/EXECUTION_PLAN.md:150, curriculum/EXECUTION_PLAN.md:181, curriculum/EXECUTION_PLAN.md:184."
    - name: "Level 3 - Advanced Architecture"
      duration: "8-10h"
      central_question: "Como construimos sistemas sofisticados?"
      content:
