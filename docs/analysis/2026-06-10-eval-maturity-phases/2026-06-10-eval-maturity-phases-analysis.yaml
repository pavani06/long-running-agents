meta:
  title: "The Maturity Phases of Running Evals - Analise de Conhecimento Nao-Obvio"
  source: "/mnt/c/Users/pavan/Raw-Knowledge/sources/2026-06-10-the-maturity-phases-of-running-evals-phil-hetzel-braintrust.md"
  date: "2026-06-10"
  type: "analysis"

frameworks:
  - name: "Five-Phase Eval Maturity Model"
    components:
      - "Phase 1 - Ad hoc testing: prompt testado manualmente por feeling, sem avaliacao estruturada; sinal de avanco e regressao descoberta por reclamacao de usuarios. Source: /mnt/c/Users/pavan/Raw-Knowledge/sources/2026-06-10-the-maturity-phases-of-running-evals-phil-hetzel-braintrust.md:25."
      - "Phase 2 - Spot check evals: 10 a 50 casos escritos em planilha ou script simples, rodados manual ou semi-automaticamente; sinal de avanco e dor manual ou falhas fora do set. Source: /mnt/c/Users/pavan/Raw-Knowledge/sources/2026-06-10-the-maturity-phases-of-running-evals-phil-hetzel-braintrust.md:27."
      - "Phase 3 - Structured evals with metrics: test set, scoring criteria e metricas como accuracy, latency distributions e cost tracking; sinal de avanco e score que nao correlaciona com feedback de usuarios. Source: /mnt/c/Users/pavan/Raw-Knowledge/sources/2026-06-10-the-maturity-phases-of-running-evals-phil-hetzel-braintrust.md:29."
      - "Phase 4 - Production-grounded evals: eval sets sampleados de trafego real, com captura, storage, replay, A/B tests, canary gates e dashboards correlacionados a producao; sinal de avanco e edge cases ainda escapando apesar de dados representativos. Source: /mnt/c/Users/pavan/Raw-Knowledge/sources/2026-06-10-the-maturity-phases-of-running-evals-phil-hetzel-braintrust.md:31."
      - "Phase 5 - Continuous eval-driven development: evals integrados ao workflow, resultados em cada PR, regression suites autoexpansivas, eval tiers e falhas de producao virando casos automaticamente. Source: /mnt/c/Users/pavan/Raw-Knowledge/sources/2026-06-10-the-maturity-phases-of-running-evals-phil-hetzel-braintrust.md:33."
  - name: "Pain-Signal Transition Model"
    components:
      - "Transicoes sao disparadas por dor operacional, nao por calendario: reclamacoes de usuarios, sobrecarga manual, descorrelacao entre scores e realidade, ou edge cases escapando. Sources: /mnt/c/Users/pavan/Raw-Knowledge/sources/2026-06-10-the-maturity-phases-of-running-evals-phil-hetzel-braintrust.md:25, /mnt/c/Users/pavan/Raw-Knowledge/sources/2026-06-10-the-maturity-phases-of-running-evals-phil-hetzel-braintrust.md:27, /mnt/c/Users/pavan/Raw-Knowledge/sources/2026-06-10-the-maturity-phases-of-running-evals-phil-hetzel-braintrust.md:29, /mnt/c/Users/pavan/Raw-Knowledge/sources/2026-06-10-the-maturity-phases-of-running-evals-phil-hetzel-braintrust.md:31."
      - "O modelo exige honestidade sobre a fase atual: se o time ainda testa prompt por feeling, esta na fase 1, e o proximo passo e apenas tornar os casos repetiveis. Source: /mnt/c/Users/pavan/Raw-Knowledge/sources/2026-06-10-the-maturity-phases-of-running-evals-phil-hetzel-braintrust.md:37."
  - name: "Infrastructure Plus Organizational Muscle"
    components:
      - "Cada fase depende da infraestrutura e das praticas organizacionais da anterior; pular fases tende a criar eval infrastructure que ninguem usa. Source: /mnt/c/Users/pavan/Raw-Knowledge/sources/2026-06-10-the-maturity-phases-of-running-evals-phil-hetzel-braintrust.md:35."
      - "O bottleneck principal e compromisso organizacional, especialmente lideranca sustentando a regra 'we don't ship without evals'. Source: /mnt/c/Users/pavan/Raw-Knowledge/sources/2026-06-10-the-maturity-phases-of-running-evals-phil-hetzel-braintrust.md:35."

patterns:
  - name: "Eval Sampling from Production Traffic"
    problem: "Hand-crafted test sets cobrem principalmente cenarios conhecidos e podem nao representar comportamento real de usuarios."
    mechanism: "Capturar interacoes reais, armazenar dados suficientes para replay, samplear exemplos representativos e usa-los como base do eval set para alinhar distribuicao de teste e distribuicao real. Source: /mnt/c/Users/pavan/Raw-Knowledge/sources/2026-06-10-the-maturity-phases-of-running-evals-phil-hetzel-braintrust.md:31."
  - name: "PR Gates with Attached Eval Results"
    problem: "Mudancas em prompts, agentes ou scoring podem entrar sem evidencia de regressao ou melhoria no proprio review."
    mechanism: "Anexar resultados de eval a cada PR para tornar qualidade parte do criterio de merge e operacionalizar a politica de nao shippar sem evals. Sources: /mnt/c/Users/pavan/Raw-Knowledge/sources/2026-06-10-the-maturity-phases-of-running-evals-phil-hetzel-braintrust.md:33, /mnt/c/Users/pavan/Raw-Knowledge/sources/2026-06-10-the-maturity-phases-of-running-evals-phil-hetzel-braintrust.md:35."
  - name: "Eval Tiers by Cost and Cadence"
    problem: "Uma unica suite nao entrega feedback rapido, protecao de PR e cobertura profunda ao mesmo tempo."
    mechanism: "Rodar fast evals em cada commit, medium evals em cada PR e deep evals em agenda, balanceando custo, latencia de feedback e profundidade. Source: /mnt/c/Users/pavan/Raw-Knowledge/sources/2026-06-10-the-maturity-phases-of-running-evals-phil-hetzel-braintrust.md:33."
  - name: "Auto-Generated Regression Cases from Production Failures"
    problem: "Falhas descobertas por usuarios podem se repetir se dependem de curadoria manual para virar teste."
    mechanism: "Converter automaticamente production issues e failure modes descobertos em novos eval cases, fazendo a suite crescer conforme o sistema encontra falhas reais. Source: /mnt/c/Users/pavan/Raw-Knowledge/sources/2026-06-10-the-maturity-phases-of-running-evals-phil-hetzel-braintrust.md:33."
  - name: "Canary Deployments with Eval Gates"
    problem: "Deploy completo amplia regressao antes de observar impacto real."
    mechanism: "Liberar mudanca gradualmente e promover ou bloquear rollout por eval gates, A/B tests e metricas de producao correlacionadas. Source: /mnt/c/Users/pavan/Raw-Knowledge/sources/2026-06-10-the-maturity-phases-of-running-evals-phil-hetzel-braintrust.md:31."
  - name: "Dashboards Correlating Eval Scores and Production Metrics"
    problem: "Eval score isolado pode virar falsa seguranca quando nao reflete user outcomes."
    mechanism: "Mostrar scores ao longo do tempo junto com metricas de producao para auditar se o proxy de qualidade continua calibrado. Source: /mnt/c/Users/pavan/Raw-Knowledge/sources/2026-06-10-the-maturity-phases-of-running-evals-phil-hetzel-braintrust.md:31."

operational_lessons:
  - lesson: "Nao pule fases."
    context: "Continuous eval-driven development pressupoe habitos acumulados de escrever, rodar, interpretar e agir sobre evals; sem isso, infra fica ociosa. Source: /mnt/c/Users/pavan/Raw-Knowledge/sources/2026-06-10-the-maturity-phases-of-running-evals-phil-hetzel-braintrust.md:35."
  - lesson: "Organizational commitment matters more than tooling."
    context: "A fonte compara tooling in-house ou Braintrust como secundario; o gargalo e lideranca sustentar 'we don't ship without evals'. Sources: /mnt/c/Users/pavan/Raw-Knowledge/sources/2026-06-10-the-maturity-phases-of-running-evals-phil-hetzel-braintrust.md:29, /mnt/c/Users/pavan/Raw-Knowledge/sources/2026-06-10-the-maturity-phases-of-running-evals-phil-hetzel-braintrust.md:35."
  - lesson: "Repeatability comes before sophisticated metrics."
    context: "Spot checks sao limitados, mas criam a base repetivel sem a qual accuracy, latency e cost tracking nao medem uma superficie estavel. Sources: /mnt/c/Users/pavan/Raw-Knowledge/sources/2026-06-10-the-maturity-phases-of-running-evals-phil-hetzel-braintrust.md:27, /mnt/c/Users/pavan/Raw-Knowledge/sources/2026-06-10-the-maturity-phases-of-running-evals-phil-hetzel-braintrust.md:29."
  - lesson: "Eval scores must correlate with user feedback."
    context: "Quando structured metrics divergem do que usuarios reportam, a maturidade precisa avancar para production-grounded evals. Source: /mnt/c/Users/pavan/Raw-Knowledge/sources/2026-06-10-the-maturity-phases-of-running-evals-phil-hetzel-braintrust.md:29."
  - lesson: "Production is the strongest test-case generator only after enough volume and replay infrastructure."
    context: "Production-grounded evals dependem de volume suficiente e capacidade de capturar, armazenar e replayar interacoes reais. Source: /mnt/c/Users/pavan/Raw-Knowledge/sources/2026-06-10-the-maturity-phases-of-running-evals-phil-hetzel-braintrust.md:31."
  - lesson: "The mature state is self-improving, not merely automated."
    context: "Na fase 5, production failures viram casos de regressao e a suite melhora sem curadoria manual constante. Source: /mnt/c/Users/pavan/Raw-Knowledge/sources/2026-06-10-the-maturity-phases-of-running-evals-phil-hetzel-braintrust.md:33."

tradeoffs:
  - decision: "Ad hoc testing for initial speed"
    benefit: "Permite sair de zero rapidamente sem infraestrutura."
    cost: "Sem repetibilidade, cobertura ou sinal confiavel de regressao; usuarios viram detector de falhas."
  - decision: "Manual or semi-automated spot checks"
    benefit: "Baixo custo inicial e primeira forma de repetir os mesmos casos."
    cost: "Escala mal, raramente roda em CI/deploy e cobre casos que o time ja conhece."
  - decision: "Structured metrics on curated test sets"
    benefit: "Permite acompanhar accuracy, latency distributions e cost tracking ao longo do tempo."
    cost: "Scores enganam quando test set ou scoring criteria nao representam uso real."
  - decision: "Hand-crafted vs production-sampled test cases"
    benefit: "Casos manuais sao direcionados e rapidos; production sampling alinha o eval set a distribuicao real."
    cost: "Casos manuais perdem unknown unknowns; production sampling exige volume, captura, storage e replay."
  - decision: "Automated eval gates vs human judgment by feel"
    benefit: "Bloqueia regressao de forma consistente e auditavel."
    cost: "Exige metricas calibradas e compromisso para nao bypassar gates."
  - decision: "Fast/medium/deep eval tiers vs one suite"
    benefit: "Equilibra feedback rapido, protecao de PR e cobertura profunda."
    cost: "Aumenta complexidade operacional de agenda, interpretacao e manutencao."
  - decision: "Canary deployments with eval gates vs full rollout"
    benefit: "Reduz blast radius e valida mudanca com sinais reais."
    cost: "Exige pipeline de rollout, metricas de producao e criterios de promocao ou rollback."
  - decision: "Auto-generated failure cases vs manual curation"
    benefit: "Cria suite self-improving e evita reincidencia de incidentes."
    cost: "Pode incorporar ruido se a falha ou expected behavior nao forem classificados corretamente."

failure_patterns:
  - pattern: "Shipping by feel"
    cause: "Mudancas sao testadas manualmente algumas vezes e enviadas sem eval estruturado."
    mitigation: "Criar spot check set repetivel antes de escalar automacao. Source: /mnt/c/Users/pavan/Raw-Knowledge/sources/2026-06-10-the-maturity-phases-of-running-evals-phil-hetzel-braintrust.md:25."
  - pattern: "Spot check blind spot"
    cause: "Casos escritos pelo time refletem cenarios conhecidos, nao unknown unknowns."
    mitigation: "Evoluir para structured evals e depois production-grounded sampling. Source: /mnt/c/Users/pavan/Raw-Knowledge/sources/2026-06-10-the-maturity-phases-of-running-evals-phil-hetzel-braintrust.md:27."
  - pattern: "Manual eval bottleneck"
    cause: "O set de spot checks cresce ate ficar doloroso de rodar manualmente."
    mitigation: "Integrar evals a CI, PR ou deployment pipeline. Source: /mnt/c/Users/pavan/Raw-Knowledge/sources/2026-06-10-the-maturity-phases-of-running-evals-phil-hetzel-braintrust.md:27."
  - pattern: "Metric theater"
    cause: "Accuracy, latency ou cost scores sao monitorados, mas test set ou scoring criteria nao representam uso real."
    mitigation: "Calibrar scores contra feedback de usuarios e production metrics. Sources: /mnt/c/Users/pavan/Raw-Knowledge/sources/2026-06-10-the-maturity-phases-of-running-evals-phil-hetzel-braintrust.md:29, /mnt/c/Users/pavan/Raw-Knowledge/sources/2026-06-10-the-maturity-phases-of-running-evals-phil-hetzel-braintrust.md:31."
  - pattern: "Premature eval platform"
    cause: "Time tenta pular para fase 5 antes de aprender a rodar e agir sobre evals nas fases anteriores."
    mitigation: "Maturar sequencialmente e automatizar somente praticas ja entendidas. Source: /mnt/c/Users/pavan/Raw-Knowledge/sources/2026-06-10-the-maturity-phases-of-running-evals-phil-hetzel-braintrust.md:35."
  - pattern: "Representative-looking production set still misses edges"
    cause: "Volume, sampling ou cobertura de cauda longa ainda insuficientes mesmo com dados reais."
    mitigation: "Converter edge cases escapados em regression cases automaticos. Sources: /mnt/c/Users/pavan/Raw-Knowledge/sources/2026-06-10-the-maturity-phases-of-running-evals-phil-hetzel-braintrust.md:31, /mnt/c/Users/pavan/Raw-Knowledge/sources/2026-06-10-the-maturity-phases-of-running-evals-phil-hetzel-braintrust.md:33."
  - pattern: "Eval infrastructure nobody uses"
    cause: "Tooling existe, mas lideranca nao sustenta o gate e o time nao age sobre resultados."
    mitigation: "Adotar regra explicita de no ship without evals e colocar resultados no workflow de PR/deploy. Source: /mnt/c/Users/pavan/Raw-Knowledge/sources/2026-06-10-the-maturity-phases-of-running-evals-phil-hetzel-braintrust.md:35."

synthesis: >
  Eval maturity e uma escala de confianca operacional, nao uma escala de ferramenta. Cada fase remove uma ilusao diferente: feeling nao detecta regressao, memoria humana nao cobre casos, metricas sem distribuicao real nao predizem usuarios, dados de producao ainda precisam de feedback loop, e automacao so e madura quando incidentes viram regressao permanente. O ponto de inflexao e production-grounded evals, porque a qualidade do score depende da distribuicao avaliada. Para agentes long-running, evals funcionam como memoria institucional: gates so sao confiaveis quando correlacionam com user outcomes, e maturidade e sequencial porque a organizacao precisa aprender a interpretar manualmente antes de automatizar com seguranca.
