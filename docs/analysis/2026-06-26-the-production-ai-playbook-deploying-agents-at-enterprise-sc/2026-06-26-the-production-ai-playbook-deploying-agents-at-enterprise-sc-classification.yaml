    line: 0
    quote: No canonical doc for agent-specific data freshness pipeline, freshness
      guarantees, or staleness monitoring
  - file: 'NOT_FOUND: long-running-agents/curriculum/ and long-running-agents/docs/analysis/'
    line: 0
    quote: No curriculum module or analysis covering data pipelines designed for agent
      consumption
  - file: 'NOT_FOUND: plans/adr/ and .omo/plans/'
    line: 0
    quote: No ADRs or plans addressing agent-specific data freshness pipeline architecture
  - file: agent-analysis/Programa-conhecimento-aplicado/projeto-koda/freshness.py
    line: 74
    quote: 'Closest artifact: application-level freshness gate in KODA e-commerce
      domain — detects stale price/stock at send time, NOT a data pipeline infrastructure
      pattern'
  - file: obsidian-eval/src/ground-truth.ts
    line: 133
    quote: 'Closest artifact: epistemic drift detection between candidate principles
      and ground truths, NOT data freshness'
  integration_value: Low
  what_exists: 'NOT_FOUND across all evidence sources for a data pipeline architecture
    pattern. The closest artifacts are: (1) freshness.py in agent-analysis — application-level
    freshness gate in the KODA e-commerce domain that detects stale price/stock at
    send time, not a data pipeline infrastructure pattern; (2) checkDrift in obsidian-eval
    — epistemic drift detection between candidate principles and ground truths, not
    data freshness. Searched paths: long-running-agents/docs/canonical/ (all 85+ files),
    long-running-agents/docs/decisions/, long-running-agents/docs/analysis/, long-running-agents/curriculum/,
    plans/adr/, .omo/plans/, obsidian-eval/src/.'
  what_missing: 'No agent-specific data pipeline architecture: no freshness guarantees
    with SLAs for re-ingestion/re-embedding after source document changes, no consistency
    checks flagging contradictory records before agent ingestion, no staleness monitoring
    in the tracing layer that detects when agent responses reference outdated document
    versions, no event-driven update triggers for source document changes, no data
    pipelines designed for agent consumption rather than human dashboard consumption.'
- pattern_name: Governance Context Injection for PII Prevention
  classification: Missing
  evidence:
  - file: 'NOT_FOUND: long-running-agents/docs/canonical/ (all 85+ files)'
    line: 0
    quote: No PII, governance context, data catalog, or sensitive data detection canonical
      docs found
  - file: 'NOT_FOUND: long-running-agents/curriculum/ (all levels N1-N4)'
    line: 0
