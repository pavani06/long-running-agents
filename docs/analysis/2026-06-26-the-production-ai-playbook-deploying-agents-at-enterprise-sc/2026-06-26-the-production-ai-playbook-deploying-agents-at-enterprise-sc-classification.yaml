  integration_value: Low
  what_exists: NOT_FOUND across all evidence sources. ZERO PII-related canonical docs,
    curriculum materials, analysis documents, ADRs, or skill implementations. ZERO
    references to data catalog PII tagging, governance context injection, pre-generation
    deterministic PII detection, or compliance audit records for sensitive data. The
    KODA domain (e-commerce) operates in a PII-rich environment (customer names, addresses,
    payment info) but the repo addresses PII concerns only indirectly through general-purpose
    constraint-anchored evaluation and compartmented evaluation — never as a domain-specific
    governance injection pattern.
  what_missing: No PII tagging in any data catalog, no governance metadata injection
    into agent prompts (informing the model which fields are sensitive), no pre-generation
    deterministic PII detection via NER or regex, no post-generation PII scan as safety
    net, no audit record of governance context per query. The pattern's core mechanic
    (Unity Catalog → prompt injection → model awareness of PII fields) is entirely
    absent.
- pattern_name: Business-Outcome-First Eval Pipeline
  classification: Partial Coverage
  evidence:
  - file: long-running-agents/docs/canonical/pain-signal-eval-progression-gate.md
    line: 28
    quote: Treat eval maturity as a gate driven by pain signals instead of a calendar
      roadmap. The gate asks whether current evidence shows that the next eval capability
      is now necessary.
  - file: long-running-agents/docs/canonical/pain-signal-eval-progression-gate.md
    line: 44
    quote: User complaints repeat for known workflows → Add or expand Repeatable Agent
      Spot-Check Set
  - file: long-running-agents/docs/canonical/eval-to-production-correlation-tracking.md
    line: 1
    quote: Eval-to-Production Correlation Tracking
  - file: long-running-agents/docs/canonical/production-grounded-eval-sampling.md
    line: 1
    quote: Production-Grounded Eval Sampling
  integration_value: Medium
  what_exists: The repo ties eval investments to business-visible pain signals (user
    complaints, manual bottlenecks, escaped edge cases) via pain-signal-eval-progression-gate.md:28-50.
    Production-grounded eval sampling uses real production queries (not synthetic).
    Eval-to-production correlation tracking measures eval score vs. production outcomes.
    The KODA domain has business-specific eval rubrics and sprint contracts with human-escalation
    outcomes.
  what_missing: 'Missing the business-outcome-FIRST sequence: ''Define success in
    business terms → create golden answers from domain experts → build Python pipeline
    to compare AI outputs against business-outcome metrics.'' The repo''s eval investment
    starts from technical pain (incidents, regressions, manual bottlenecks), not from
    business outcome definition (deflection rate target, CSAT threshold, revenue impact).
    No golden answers authored by human domain experts as the eval foundation (200+
    queries with human-authored expectations). No deflection rate prediction from
    eval scores. No Python evaluation pipeline that compares agent outputs against
    business-outcome-aligned golden answers as the FIRST step before building technical
    eval infrastructure.'
- pattern_name: Model-Switching Architecture with Enterprise Eval Gate
  classification: Partial Coverage
  evidence:
  - file: long-running-agents/docs/canonical/neutral-selection-layer.md
    line: 28
    quote: 'A model-agnostic selection layer that sits between the model and the store,
      serving context through a uniform interface regardless of which model, vendor,
      or session requests it. Three properties define the layer: Neutral (not coupled
      to a single model), Horizontal (cross-agent, cross-session, cross-model), Structured
      (relational, not merely storage).'
  - file: long-running-agents/docs/canonical/neutral-selection-layer.md
    line: 71
    quote: Context survives model migrations — same structured record serves any model
  - file: long-running-agents/docs/canonical/neutral-selection-layer.md
    line: 73
    quote: 'Vendor independence: the organization''s most durable asset is not locked
      in'
  - file: long-running-agents/docs/canonical/llm-as-fuzzy-compiler.md
    line: 1
    quote: LLM as Fuzzy Compiler — model output as disposable artifact, constraints
      as durable
  - file: long-running-agents/docs/canonical/multi-model-evaluation-council.md
    line: 28
    quote: Use a model-diverse evaluation council for high-value decisions, risky
      agent behavior changes, ambiguous rubric cases, and production-impacting releases.
  - file: long-running-agents/docs/canonical/neutral-selection-layer.md
    line: 53
    quote: NOT_FOUND across all 85 canonical docs
  - file: long-running-agents/curriculum/GLOSSARY.md
    line: 530
    quote: 'Neutral Selection Layer: Camada de selecao model-agnostic e vendor-independent'
  integration_value: Medium
  what_exists: 'The repo has strong philosophical foundation for model independence:
    neutral-selection-layer.md defines model-agnostic context format, vendor adapter,
    and cross-model portability. LLM-as-fuzzy-compiler treats models as swappable
    compiler backends and generated code as disposable. Multi-model-evaluation-council
    uses model diversity for evaluation. Neutral selection layer is taught in the
    curriculum (N3 exercises). The codebase uses multiple LLM providers (DeepSeek
    for orchestrator, Anthropic for momus, etc.) demonstrating practical multi-model
    operation.'
  what_missing: 'The neutral-selection-layer is classified as ''Missing (P0)'' — it''s
    a documented pattern, not an implementation. Missing: an enterprise eval dataset
    that is maintained independently of any specific model provider (the dataset that
    tests model upgrades against domain-specific data before adoption), side-by-side
    model comparison infrastructure (run candidate model against enterprise eval dataset,
    compare to current baseline), a model-switching decision framework (switch/hold/hybrid
    based on eval comparison), provider-upgrade testing against enterprise-specific
    data (not public benchmarks), and a mechanical process for model comparison that
    replaces subjective debate with data-driven reports. The philosophical alignment
    exists but the concrete infrastructure does not.'
