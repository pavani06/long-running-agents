meta:
  title: 'Classification: Production AI Playbook Patterns vs ecossistema-pavan'
  date: '2026-06-26'
  type: classification
  source: 'The Production AI Playbook: Deploying Agents at Enterprise Scale by Sandipan
    Bhaumik (Databricks)'
summary:
  total_patterns: 13
  already_exists: 1
  partial_coverage: 9
  missing: 3
  better_implementation: 0
entries:
- pattern_name: 3-Layer Evaluation Architecture
  classification: Partial Coverage
  evidence:
  - file: long-running-agents/docs/canonical/eval-tier-stratification.md
    line: 32
    quote: Organize evals into fast, medium, and deep tiers. Each tier must declare
      runtime, cost, flakiness tolerance, trigger, threshold, reporting format, owner,
      and escalation policy.
  - file: long-running-agents/docs/canonical/eval-tier-stratification.md
    line: 62
    quote: The missing implementation is metadata and policy that make the tiers explicit.
  - file: long-running-agents/docs/canonical/generator-evaluator.md
    line: 31
    quote: Separate generation from evaluation into two distinct agents. The Generator
      is creative and user-facing... The Evaluator is impartial and constraint-facing...
  - file: long-running-agents/docs/canonical/constraint-anchored-evaluation.md
    line: 31
    quote: Anchor every evaluation to an explicit, verifiable constraint list.
  - file: long-running-agents/docs/canonical/compartmented-evaluation-architecture.md
    line: 31
    quote: Extend the Generator-Evaluator separation with explicit information compartmentation.
  integration_value: High
  what_exists: eval-tier-stratification provides a 3-tier model (fast/medium/deep)
    with metadata contracts and decision power per tier; generator-evaluator separates
    role-based evaluation; constraint-anchored-evaluation defines explicit constraint-based
    checking; compartmented-evaluation-architecture seals builder from validator surfaces.
    The repo has the architectural building blocks for multi-layer evaluation.
  what_missing: 'The specific 3-layer type taxonomy (Deterministic → Semantic → Behavioral)
    is not formalized. Layer 1 deterministic scanning (PII regex, schema validation,
    NER) is not named as a distinct layer. Layer 2 LLM-as-judge for semantic evaluation
    (groundedness, safety, faithfulness scores) is absent as a canonical pattern —
    NOT_FOUND in docs/canonical/ (searched: eval-tier-stratification, generator-evaluator,
    constraint-anchored-evaluation, compartmented-evaluation-architecture, repeatable-agent-spot-check-set).
    Layer 3 behavioral evaluation (tool call redundancy, loop detection, duplicate
    API calls, path efficiency) is NOT_FOUND in any canonical doc — trace-instrumentation.md
    covers span collection but not behavioral scoring.'
- pattern_name: Eval-Driven Development Timeline
  classification: Partial Coverage
  evidence:
  - file: long-running-agents/docs/canonical/pain-signal-eval-progression-gate.md
    line: 28
    quote: Treat eval maturity as a gate driven by pain signals instead of a calendar
      roadmap.
  - file: long-running-agents/docs/canonical/pain-signal-eval-progression-gate.md
    line: 42
    quote: Pain signal → Minimum next capability mapping (user complaints → spot-check
      set, manual review bottlenecks → tier stratification, escaped edge cases → regression
      flywheel).
  - file: long-running-agents/docs/canonical/pain-signal-eval-progression-gate.md
    line: 57
    quote: The repo already has adjacent decision habits for harness evolution and
      rollback.
  - file: long-running-agents/docs/canonical/pain-signal-eval-progression-gate.md
    line: 65
    quote: The missing implementation is a named eval progression gate that explicitly
      connects pain signals to the next minimum eval capability.
  integration_value: Medium
  what_exists: 'pain-signal-eval-progression-gate captures the core principle: invest
    in eval infrastructure driven by real failure signals, not calendar planning.
    The trigger mapping table links specific pain signals to minimum eval capabilities
    (spot-check sets, tier stratification, production sampling, regression flywheel).
    The repo also has harness-evolution practices that ask ''which concrete failure
    does this prevent?'' before investing.'
  what_missing: The specific 6-week infrastructure-first timeline (build eval weeks
    1-6, select model weeks 7-8 based on dataset comparison) is not present. The repo's
    philosophy is pain-signal-driven, not calendar-driven — it rejects the calendar
    roadmap in favor of evidence-gated progression. The 'model selection last' principle
    with eval dataset comparison is NOT_FOUND as an explicit strategy.
- pattern_name: Living Eval Dataset
  classification: Partial Coverage
  evidence:
  - file: long-running-agents/docs/canonical/production-failure-regression-flywheel.md
    line: 28
    quote: Every production failure that reveals a behavioral gap should become a
      durable eval regression case unless it is explicitly rejected as duplicate,
      unactionable, or out of scope.
  - file: long-running-agents/docs/canonical/production-failure-regression-flywheel.md
    line: 71
    quote: A failure intake process that accepts incidents, complaints, escaped edge
      cases, tool misuse, and scoring gaps.
  - file: long-running-agents/docs/canonical/production-grounded-eval-sampling.md
    line: 28
    quote: Create an end-to-end production-sampled eval dataset that can replay representative
      real interactions against candidate agent versions.
  - file: long-running-agents/docs/canonical/production-grounded-eval-sampling.md
    line: 37
    quote: 'Required dataset mechanics: Capture, Privacy filters, Retention policy,
      Sampling criteria, Coverage metadata, Expected-behavior labeling, Replay infrastructure,
      Refresh cadence.'
  - file: long-running-agents/docs/canonical/eval-tier-stratification.md
    line: 36
    quote: 'Fast: inner-loop confidence for known critical paths — seconds to minutes.'
  integration_value: High
  what_exists: production-failure-regression-flywheel defines converting production
    failures into durable regression cases with deduplication and tier assignment.
    production-grounded-eval-sampling defines the data pipeline (capture, privacy
    filters, retention, coverage metadata, labeling, replay, refresh). repeatable-agent-spot-check-set
    provides a seed of repeatable cases. eval-tier-stratification provides fast/medium/deep
    tiers supporting partitioned execution.
  what_missing: The explicit 'living eval dataset' concept with monotonic growth guarantee
    (~200 initial cases growing from every incident), per-category ownership and maintenance
    cycles (security, login, tool calls, knowledge retrieval, math/reasoning), and
    explicitly named partitioned execution plans (stratified CI subset vs. full merge
    suite) is not formalized as a single named artifact. The individual building blocks
    exist separately but the composition into a single growing, categorized, partitioned
    dataset is NOT_FOUND as a named entity.
- pattern_name: Production Incident to Eval Flywheel
  classification: Already Exists
  evidence:
  - file: long-running-agents/docs/canonical/production-failure-regression-flywheel.md
    line: 18
    quote: Every production failure that reveals a behavioral gap should become a
      durable eval regression case.
  - file: long-running-agents/docs/canonical/production-failure-regression-flywheel.md
    line: 31
    quote: 'Flywheel steps: 1. Intake a production failure... 2. Capture the interaction,
      trace, tool results, state snapshot... 3. Apply privacy filters... 4. Label
      expected behavior... 5. Deduplicate... 6. Add to eval tier... 7. Backfill baseline...
      8. Link to incident... 9. Periodically prune.'
  - file: long-running-agents/docs/canonical/production-failure-regression-flywheel.md
    line: 42
    quote: 'Failure taxonomy: prompt issue, tool misuse, context loss, state persistence,
      scoring gap, latency/cost regression, safety/policy issue, late-session failure.'
  - file: long-running-agents/docs/canonical/trace-instrumentation.md
    line: 28
    quote: 'Components: tracer.ts (state machine of spans), trace-cli.ts (CLI wrapper),
      task-wrapper.sh (bash wrapper), collect-session.sh (bridge), session-end-hook.sh
      (post-session hook), collector.ts (SQLite persistence).'
  - file: long-running-agents/docs/canonical/trace-instrumentation.md
    line: 76
    quote: 'Enforcement (4 Camadas): Template Injection, Auto-verificação pré-delegação,
      Warning pós-sessão, Health check cross-session.'
  integration_value: Low
  what_exists: The canonical doc production-failure-regression-flywheel defines an
    equivalent (and richer) 9-step flywheel covering intake, capture, privacy, labeling,
    deduplication, tier assignment, backfill, incident linking, and pruning, with
    an 8-category failure taxonomy. The runtime has a working flywheel daemon (60s
    loop processing ~/.reflection/qi-pending/), a QI loop (review-work → recommendation-writer
    → writing-plans → implement), a hybrid classifier (regex + cache + LLM-as-judge),
    and complete trace instrumentation (task-wrapper.sh → collect-session.sh → collector.ts
    → telemetry.db). The repo's version is more comprehensive than Bhaumik's 5-step
    loop.
  what_missing: N/A — Already Exists classification
- pattern_name: Behavioral Eval Path Analysis
  classification: Missing
  evidence:
  - file: NOT_FOUND
    line: 0
    quote: Searched long-running-agents/docs/canonical/ (106 entries) for behavioral
      eval, path analysis, tool call evaluation, loop detection, redundancy score.
      No canonical doc defines behavioral evaluation of agent execution paths.
  - file: long-running-agents/docs/canonical/trace-instrumentation.md
    line: 24
    quote: Padrão canônico para instrumentar toda chamada task() no runtime Sisyphus
      com spans de trace.
  - file: long-running-agents/docs/canonical/deterministic-tool-dispatch.md
    line: 33
    quote: Tools are not magical. Tools are JSON + deterministic code.
  - file: long-running-agents/docs/canonical/n-plus-one-long-session-evals.md
    line: 28
    quote: Evaluate the production context strategy by loading N turns, applying the
      same context-building... then testing turn N+1.
  integration_value: High
  what_exists: 'trace-instrumentation.md provides the span collection infrastructure
    that could power behavioral eval. deterministic-tool-dispatch.md defines tool
    calls as structured JSON dispatch, providing the data model. n-plus-one-long-session-evals.md
    evaluates behavioral continuity after context reduction but does not evaluate
    tool call paths. NOT_FOUND: redundancy score, loop detection flag, path efficiency
    score, duplicate API detection, per-query cost attribution in the canonical docs
    or curriculum.'
  what_missing: 'No formalization of behavioral path analysis as an evaluation layer.
    Missing: redundancy scoring of repeated tool calls, loop detection for semantic
    cycles in tool sequences, path efficiency ratio (necessary/total calls), duplicate
    API detection across endpoints, per-query cost attribution in dollars, and expected
    execution path templates per query category. The trace infrastructure exists but
    no evaluation logic consumes it for behavioral scoring.'
- pattern_name: Centralized Cross-Framework Tracing
  classification: Partial Coverage
  evidence:
  - file: long-running-agents/docs/canonical/trace-instrumentation.md
    line: 24
    quote: Padrão canônico para instrumentar toda chamada task() no runtime Sisyphus
      com spans de trace, garantindo que cada delegação produza um trace_id no telemetry.db.
  - file: long-running-agents/docs/canonical/trace-instrumentation.md
    line: 28
    quote: 'Componentes: tracer.ts, trace-cli.ts, task-wrapper.sh, collect-session.sh,
      session-end-hook.sh, collector.ts.'
  - file: long-running-agents/docs/canonical/trace-instrumentation.md
    line: 76
    quote: 4 camadas de enforcement + scavenger safety net (scavenge-sessions.sh,
      systemd timer 15min).
  - file: NOT_FOUND
    line: 0
    quote: Searched long-running-agents/docs/canonical/ for adapter pattern, OpenTelemetry,
      multi-framework trace unification, cross-framework schema. No canonical doc
      addresses collecting traces from multiple agent frameworks into a unified store.
  integration_value: Medium
  what_exists: 'trace-instrumentation.md defines a complete centralized trace pipeline
    for the Sisyphus/OpenCode runtime: task-wrapper.sh (instrumentation) → trace-state.json
    (tmpfs state) → collect-session.sh (dump) → collector.ts (SQLite persistence in
    telemetry.db). Multiple consumers exist: daily-summary.ts, budget-slo-check.sh,
    reflection-trace-analyze.sh, flywheel-daemon.service. The collector supports session-level
    dedup (PRIMARY KEY on session ID). scavenge-sessions.sh provides a safety net
    for orphaned artifacts (systemd timer every 15min).'
  what_missing: 'This is single-framework tracing (Sisyphus runtime only). Missing:
    per-framework adapter pattern for CrewAI, LangChain, or custom agents; OpenTelemetry
    integration; unified trace schema spanning multiple frameworks; text-to-SQL ad-hoc
    query interface over traces; cross-framework performance comparison capability;
    trace sampling at enterprise scale. The repo only has one agent framework to instrument,
    so cross-framework unification is not applicable — the infrastructure architecture
    is correct for the scale.'
- pattern_name: Prompt-as-Code with Causal Change Management
  classification: Partial Coverage
  evidence:
  - file: long-running-agents/docs/canonical/stable-harness-prompt.md
    line: 28
    quote: Separate the stable harness prompt from reducible context payload... it
      must preserve the active harness prompt as a first-class input with its own
      budget and version.
  - file: long-running-agents/docs/canonical/stable-harness-prompt.md
    line: 41
    quote: This pattern does not require a prompt to be immutable forever. It requires
      prompt changes to be deliberate, versioned, and evaluated separately from context
      compaction.
  - file: long-running-agents/docs/canonical/application-owned-agent-control-plane.md
    line: 29
    quote: The control plane is the contract... versioned prompt contracts, deliberate
      context construction, structured action schema, deterministic dispatch, loop
      policy, persistent execution state, and intervention gates.
  - file: long-running-agents/docs/canonical/owned-agent-control-loop.md
    line: 102
    quote: 'Prompt: Yes — system prompt is hand-authored (1800+ lines). Not versioned
      or eval''d as a separate component.'
  - file: long-running-agents/docs/canonical/llm-as-fuzzy-compiler.md
    line: 27
    quote: Code is a disposable build artifact and what matters is preserving the
      prompts, guardrails, and documentation that produced the code.
  integration_value: Medium
  what_exists: stable-harness-prompt.md defines the separation of harness prompt from
    reducible context and requires deliberate, versioned prompt changes evaluated
    separately from compaction. application-owned-agent-control-plane.md defines versioned
    prompt contracts as part of the owned control plane. llm-as-fuzzy-compiler.md
    treats prompts as first-class durable assets alongside guardrails and docs. The
    repo explicitly identifies prompt versioning as a gap in owned-agent-control-loop.md:102.
  what_missing: The specific 3-question causal commit discipline (why changed, what
    failure caused it, what failure it corrects) is NOT_FOUND as a formal requirement.
    No explicit prompt rollback infrastructure documented — concept exists (stable-harness-prompt
    implies rollback should be possible) but no operational procedure. No audit trail
    linking prompt changes to specific incidents or eval regressions. The concept
    of 'prompt-as-code with git versioning' exists partially (prompts are treated
    as durable assets and versioning is prescribed) but the causal change management
    discipline with 3 mandatory commit questions is not formalized.
- pattern_name: Eval Dashboard as Primary Detection Surface
  classification: Partial Coverage
  evidence:
  - file: long-running-agents/docs/canonical/production-failure-regression-flywheel.md
    line: 28
    quote: Every production failure that reveals a behavioral gap should become a
      durable eval regression case
  - file: long-running-agents/docs/canonical/eval-tier-stratification.md
    line: 28
    quote: Organize evals into fast, medium, and deep tiers. Each tier must declare
      runtime, cost, flakiness tolerance, trigger, threshold, reporting format, owner,
      and escalation policy.
  - file: long-running-agents/docs/canonical/pain-signal-eval-progression-gate.md
    line: 28
    quote: Treat eval maturity as a gate driven by pain signals instead of a calendar
      roadmap.
  - file: scripts/telemetry/flywheel-health.sh
    line: 1
    quote: Verificacao completa do pipeline flywheel — relatorio de saude com PASS/FAIL
      por componente
  - file: AGENTS.md
    line: 343
    quote: 'FLYWHEEL_ALERT:N detection gate: ''N flywheel finding(s) requerem atencao
      (severity P1 ou score >= 60)'''
  integration_value: Medium
  what_exists: The repo has a production failure regression flywheel that converts
    incidents into eval regression cases (production-failure-regression-flywheel.md:28-40),
    eval tier stratification with fast/medium/deep tiers (eval-tier-stratification.md:28-50),
    pain-signal-driven eval investment (pain-signal-eval-progression-gate.md:28-50),
    a flywheel daemon with anomaly detection (60s loop, anomaly_score >= 80 triggers
    QI loop), SLO checker with burn rate alerts, and the FLYWHEEL_ALERT gate that
    injects findings into session context.
  what_missing: 'Missing the eval dashboard as PRIMARY detection surface: no real-time
    quality dashboard showing pass/fail rates per eval layer/category/agent, no streaming
    eval results feeding an always-on monitoring surface, no anomaly alerts keyed
    to eval quality regression thresholds (as opposed to operational/trace anomaly
    alerts). The flywheel detects trace anomalies and operational failures — not eval
    quality regressions surfaced as the first place to look during incidents. The
    repo detects failures post-hoc via traces, not pre-emptively via eval quality
    dashboards.'
- pattern_name: Multi-Agent Fault Tolerance
  classification: Partial Coverage
  evidence:
  - file: long-running-agents/docs/canonical/tested-degradation-ladder.md
    line: 29
    quote: 'Define a tested degradation ladder: an ordered contract that starts at
      failure classification, allows bounded repair only when recovery is plausible,
      falls back to a conservative safe action or hold when automation is unsafe,
      escalates to a human with summarized context when automated recovery is insufficient,
      logs the outcome, and tests each rung before production reliance'
  - file: long-running-agents/docs/canonical/tested-degradation-ladder.md
    line: 46
    quote: '[4. Human escalation / context to continue work]'
  - file: long-running-agents/docs/canonical/error-context-hygiene.md
    line: 93
    quote: bounded retry integration with max_retries, one-line error summaries, context
      injection by attempt, success detection, and pending-error cleanup
  - file: long-running-agents/docs/canonical/owned-agent-control-loop.md
    line: 68
    quote: 'loop intervention points: break, summarize, LM-as-judge, human approval
      gate, and force terminate'
  - file: .opencode/skills/analyze-and-improve/harness/retry.py
    line: 25
    quote: Exponential backoff retry logic — stdlib only (asyncio, random, time, typing)
  integration_value: High
  what_exists: The repo has a tested degradation ladder pattern (tested-degradation-ladder.md:29-63)
    that defines failure classification → retry with repair → safe fallback or hold
    → human escalation → outcome log + rung tests. Exponential backoff retry with
    jitter is implemented in harness/retry.py. Error context hygiene provides bounded
    retry with summarized errors and cleanup. Owned agent control loop defines explicit
    intervention points including break, human approval gate, and force terminate.
    Multi-model evaluation council routes to retry, needs-human, or rubric-update
    (multi-model-evaluation-council.md:30-47).
  what_missing: Missing Saga pattern (compensating transactions across distributed
    agents — no compensating action design or reverse-order rollback for multi-step
    agent workflows). Missing Circuit Breaker at the agent orchestration layer (no
    failure-rate-threshold-based tripping that stops cascading failures by routing
    to fallback — the HoP circuit-breaker.js referenced by codegraph is in Documents/Codex/,
    not in this repo). The degradation ladder covers single-agent failure recovery,
    not multi-agent distributed transaction fault tolerance with Saga rollback and
    rate-threshold circuit breaking.
