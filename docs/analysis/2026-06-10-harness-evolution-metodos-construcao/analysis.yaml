meta:
  title: "Knowledge Extraction: Harness Evolution and Construction Methods"
  source: "docs/articles/harness-evolution-metodos-construcao.md"
  date: "2026-06-10"
  type: "analysis"
frameworks:
  - name: "Harness as production control structure"
    components: ["LLM core", "context management", "work decomposition", "external evaluation", "state persistence", "auditable constraints"]
  - name: "Three structural failure model"
    components: ["context loss", "fragile planning", "blind self-evaluation"]
  - name: "BUILD -> STABILIZE -> SIMPLIFY -> REMOVE lifecycle"
    components: ["BUILD defensive validation and fallbacks", "STABILIZE effectiveness and false-positive measurement", "SIMPLIFY layer-by-layer reduction", "REMOVE documented archival and possible reactivation"]
  - name: "4-component owned control loop"
    components: ["Prompt", "Context Builder", "Switch Statement", "Loop"]
  - name: "Context engineering discipline"
    components: ["Head-Tail Context Truncation", "Addressable Memory Catalog", "Stable Harness Prompt", "Error Context Hygiene", "deliberate token selection"]
  - name: "Permanent-invariant model"
    components: ["customer safety", "irreversible decision checkpoints", "availability fallback", "Evaluator as gatekeeper", "State Persistence"]
patterns:
  - name: "History Windowing"
    problem: "Full history increases latency and cost, while complete truncation loses decisions and commitments."
    mechanism: "Keep last 15-20 messages, compressed old-history summary, and non-expiring critical metadata; response time improved from 4.2s to 1.8s and satisfaction from 72% to 94%."
  - name: "Structured Generation"
    problem: "Free-form output cannot be reliably validated before customer delivery."
    mechanism: "Force JSON fields such as recommendation, reasoning, confidence, and risk_flags, then validate format and business rules; recommendation errors dropped from 8.2% to 0.3%."
  - name: "State Persistence"
    problem: "Failures or restarts cause amnesia when state only lives in volatile context."
    mechanism: "Persist versioned preferences, decisions, commitments, cart, and constraints in file or database and reload at conversation start."
  - name: "Fallback & Retry"
    problem: "Without fallback, every error becomes a dead session or manual ticket."
    mechanism: "Escalate through retry with new prompt, safe recommendation fallback, and human escalation; test fallback under production-like conditions."
  - name: "Guardrails & Constraints"
    problem: "Prompt-only constraints cannot guarantee budget, availability, timing, safety, or domain rules."
    mechanism: "Define constraints before generation and validate them in code after generation."
  - name: "Generator/Evaluator"
    problem: "A model is unreliable at judging its own generated ideas."
    mechanism: "Generator creates 3 candidates; Evaluator scores relevance, price, and clarity; precision rose from 75% to 98%, satisfaction from 70% to 88%, API cost rose 15%, and revenue rose 30%."
  - name: "Head-Tail Context Truncation"
    problem: "Naive truncation loses either original goal or latest state."
    mechanism: "Preserve head and tail, move middle to recoverable external memory with stable handles."
  - name: "Addressable Memory Catalog"
    problem: "External memory is unusable if the agent cannot decide what to retrieve."
    mechanism: "Represent omitted content with id, location, preview, and fetch; tune preview size to avoid both blindness and context pollution."
  - name: "Stable Harness Prompt"
    problem: "Context reduction can remove safety and tool-contract instructions."
    mechanism: "Treat harness prompt as first-class block with budget and version; remove payload and old history instead."
  - name: "Error Context Hygiene"
    problem: "Stale errors cause spiral out and retry loops."
    mechanism: "After a failed tool call is followed by success, clear pending errors and keep a one-line summary."
  - name: "Feature-flagged removal architecture"
    problem: "Big-bang removal obscures causality and raises regression risk."
    mechanism: "One component at a time with independent feature flag, 14+ day shadow test, 5% -> 25% -> 100% canary, and 14-day observation gap."
  - name: "Component archival pattern"
    problem: "Deleting removed components loses institutional memory and reversibility."
    mechanism: "Archive under archive/components/<name>/ with README and ADR explaining existence, removal reason, validation metrics, post-removal result, and reactivation path."
operational_lessons:
  - lesson: "Architecture must be revalidated when model capability changes."
    context: "Context Loader was justified for a 32K-token model that lost attention after 40 minutes, but became questionable when a newer model kept 98% accuracy at 100K tokens."
  - lesson: "Real marginal value can be far lower than perceived safety value."
    context: "Context Loader cost 450ms, 1200 tokens, and 3 maintenance hours per month while preventing 0.008% of errors, 12 cases in 145K turns; later measurement found 59 preventions in 145K turns, 0.04%."
  - lesson: "False positives must count as component cost."
    context: "Context Loader produced 340 false positives versus 59 real preventions, 28 times more incorrect blocks than correct ones."
  - lesson: "Shadow tests reveal marginal outcome impact."
    context: "A 50% traffic shadow test with and without Context Loader found only 0.4% accuracy difference, statistically insignificant."
  - lesson: "Simplification should be staged and measured."
    context: "3 waves with 7-14 day shadow tests eliminated 1200 tokens/turn and 450ms while accuracy dropped only 0.2%."
  - lesson: "Harness evolution needs an operating cadence."
    context: "Week 1 review and plan, weeks 2-3 implementation, weeks 4-12 observation without further change."
  - lesson: "One In, One Out prevents indefinite harness growth."
    context: "Every new harness component marks an existing one for removal investigation in the next cycle."
  - lesson: "ROI thresholds convert intuition into governance."
    context: "ROI = (Prevented Errors x Average Error Cost) / Component Operational Cost; below 1x for two consecutive quarters makes a component a removal candidate."
  - lesson: "A leaner harness can preserve quality while improving economics."
    context: "KODA moved from 11 components, 4000ms, 3200 tokens, R$ 0.048/turn to 6 components, 1300ms, 1200 tokens, R$ 0.018/turn with same accuracy."
tradeoffs:
  - decision: "Use Generator/Evaluator instead of self-evaluation."
    benefit: "Precision rose from 75% to 98%, satisfaction from 70% to 88%, and revenue increased 30%."
    cost: "API calls increased by 15%."
  - decision: "Simplify a heavy harness after model capability improves."
    benefit: "Latency dropped from 4000ms to 1300ms, tokens from 3200 to 1200, and cost from R$ 0.048 to R$ 0.018 per turn with same accuracy."
    cost: "Requires dashboards, shadow tests, canary rollout, and careful observation."
  - decision: "Build defensively during initial model integration."
    benefit: "Protects against unknown weaknesses with validation, limits, fallbacks, and detailed prompts."
    cost: "Unreviewed components become bug surface, latency, token spend, maintenance load, and onboarding complexity."
  - decision: "Use previews in addressable memory."
    benefit: "Agent can choose what omitted content to fetch without loading all external memory."
    cost: "Small previews hide relevance; large previews recreate context pollution."
  - decision: "Remove components with feature flags and canaries."
    benefit: "Maintains causal attribution and reduces regression risk."
    cost: "Slower removal process and higher observability discipline."
  - decision: "Archive removed components rather than deleting them outright."
    benefit: "Preserves institutional memory and rapid reactivation path."
    cost: "Creates historical documentation and archive surface that must remain organized."
failure_patterns:
  - pattern: "Discarding full history"
    cause: "Treating compression as deletion and losing decisions, preferences, or commitments."
    mitigation: "Extract critical metadata before compressing and keep recent 15-20 messages plus summary."
  - pattern: "JSON-only validation"
    cause: "Equating syntactic structure with business correctness."
    mitigation: "Validate domain rules such as allergies, budget, availability, contraindications, and safety constraints after generation."
  - pattern: "Volatile session state"
    cause: "Keeping important preferences and cart state only in conversation context."
    mitigation: "Persist versioned state fields and reload them at conversation start."
  - pattern: "Untested fallback"
    cause: "Defining retry or human escalation paths without exercising them realistically."
    mitigation: "Test fallback and retry paths in production-like scenarios."
  - pattern: "Prompt-only guardrails"
    cause: "Assuming model instructions enforce budgets, products, timelines, or safety."
    mitigation: "Implement post-generation constraint validation in code."
  - pattern: "Self-evaluation bias"
    cause: "The generator is invested in its own output and searches for confirming evidence."
    mitigation: "Use a separate Evaluator with explicit rubrics and approval/rejection authority."
  - pattern: "Harness ossification"
    cause: "Components created for older model weaknesses remain active after model capability changes."
    mitigation: "Run quarterly reviews, measure ROI, run shadow tests, simplify gradually, and remove documented components."
  - pattern: "False-positive control component"
    cause: "Protection logic blocks valid cases more often than it prevents real failures."
    mitigation: "Track false positives as first-class cost and compare against prevented failures."
  - pattern: "Context spiral from stale errors"
    cause: "Old tool failures remain in active window after later success."
    mitigation: "Clear pending errors and summarize the resolved incident in one line."
  - pattern: "Big-bang component removal"
    cause: "Removing multiple protections at once without isolation or observation."
    mitigation: "Use one-at-a-time removal, feature flags, 14+ day shadow tests, canary rollout, and 14-day observation gaps."
synthesis: "Harnesses are adaptive compensation infrastructure. Mature teams separate permanent domain invariants, such as customer safety, irreversible decisions, availability fallback, external evaluation, and persistent state, from contingent protections such as context loaders and budget guards. The operating model combines four loops: owned agent control loop, Generator/Evaluator quality loop, context engineering loop, and quarterly harness-evolution loop. Model improvement does not remove engineering; it shifts work from defensive construction to measurement, staged simplification, and documented removal. The target is the smallest measured harness that preserves invariants and remains reversible."
