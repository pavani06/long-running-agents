meta:
  title: "Classification: Harness Evolution and Construction Methods"
  type: "analysis"
  date: "2026-06-10"
  target_repository: "long-running-agents"
  system_of_record: "docs/system-of-record.md"
  patterns_source: "docs/analysis/2026-06-10-harness-evolution-metodos-construcao/patterns.yaml"
  canonical_scope:
    source: "docs/system-of-record.md:124-159"
    existing_canonical_docs_read: 27
    missing_listed_canonical_docs:
      - path: "docs/canonical/obsidian-document-conventions.md"
        listed_at: "docs/system-of-record.md:155"
