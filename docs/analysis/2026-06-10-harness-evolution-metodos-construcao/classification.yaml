classifications:
  - number: 1
    pattern: "Application-Owned Agent Control Plane"
    classification: "Partial Coverage"
    integration_value: "High"
    justification: >-
      The repository has an owned inner-loop model and a broader closed-loop operating model, but no single canonical control-plane contract combining prompt versioning, context construction, structured action schema, deterministic dispatch, loop policy, persistent execution state, and intervention gates.
    evidence:
      - file: "docs/canonical/owned-agent-control-loop.md"
        lines: "29-31"
        note: "Own the control loop and decompose it into explicit components."
      - file: "docs/canonical/owned-agent-control-loop.md"
        lines: "33-51"
        note: "Prompt, Context Builder, Switch Statement, and Loop with intervention points."
      - file: "docs/canonical/owned-agent-control-loop.md"
        lines: "68-75"
        note: "Loop controls include break, summarize, LM-as-judge, human approval, and force terminate."
      - file: "docs/canonical/owned-agent-control-loop.md"
        lines: "96-107"
        note: "Full loop ownership is still incomplete because LangGraph owns internal iteration."
      - file: "docs/canonical/closed-loop-agent-operating-system.md"
        lines: "28-37"
        note: "Broader closed-loop OS covers state intake, priority synthesis, execution routing, and feedback writeback."
    missing:
      - "Unified application-owned control-plane contract."
      - "Integrated structured action schema, durable execution state, versioned prompt/tool contracts, and intervention gates."
  - number: 2
    pattern: "Context Working Set with Recoverable Middle"
    classification: "Already Exists"
    integration_value: "Low"
    justification: >-
      Head-Tail Context Truncation with Recoverable Middle covers the same name-level concept, mechanism, and tradeoffs, with Addressable Memory Catalog and Stable Harness Prompt completing the working-set details.
    evidence:
      - file: "docs/canonical/head-tail-context-truncation.md"
        lines: "20-24"
        note: "Defines the long-session context-loss problem."
      - file: "docs/canonical/head-tail-context-truncation.md"
        lines: "26-39"
        note: "Defines stable prompt, head, tail, latest result, recoverable middle, memory store, IDs, location, and preview."
      - file: "docs/canonical/head-tail-context-truncation.md"
        lines: "63-70"
        note: "Documents tradeoffs."
      - file: "docs/canonical/addressable-memory-catalog.md"
        lines: "26-43"
        note: "Defines omitted-memory catalog fields and retrieval behavior."
      - file: "docs/canonical/stable-harness-prompt.md"
        lines: "26-41"
        note: "Defines stable harness prompt preservation during context reduction."
    missing: []
  - number: 3
    pattern: "Error Hygiene Recovery Loop"
    classification: "Already Exists"
    integration_value: "Low"
    justification: >-
      Error Context Hygiene directly covers the target pattern's name, mechanism, retry-loop integration, recovery cleanup behavior, and tradeoffs.
    evidence:
      - file: "docs/canonical/error-context-hygiene.md"
        lines: "20-27"
        note: "Defines context pollution, spiral-out, and stale error bias."
      - file: "docs/canonical/error-context-hygiene.md"
        lines: "28-39"
        note: "Defines summarize, clear on success, never blind-append, and keep only needed information."
      - file: "docs/canonical/error-context-hygiene.md"
        lines: "41-58"
        note: "Shows error summarizer and clear-pending-errors mechanism."
      - file: "docs/canonical/error-context-hygiene.md"
        lines: "93-106"
        note: "Integrates the mechanism into a bounded retry loop."
      - file: "docs/canonical/error-context-hygiene.md"
        lines: "136-143"
        note: "Documents tradeoffs."
    missing: []
  - number: 4
    pattern: "Structured Generation and Constraint Validation Circuit"
    classification: "Partial Coverage"
    integration_value: "High"
    justification: >-
      Deterministic Tool Dispatch covers structured JSON-to-code routing, and Constraint-Anchored Evaluation covers explicit constraint verification, but no canonical doc unifies shape validation, domain validation, repair or rejection, risk flags, and audit logging as one circuit.
    evidence:
      - file: "docs/canonical/deterministic-tool-dispatch.md"
        lines: "20-29"
        note: "Frames model output as JSON routed by application code."
      - file: "docs/canonical/deterministic-tool-dispatch.md"
        lines: "31-36"
        note: "States the tools-as-JSON-plus-deterministic-code reframe."
      - file: "docs/canonical/deterministic-tool-dispatch.md"
        lines: "37-57"
        note: "Shows structured output dispatched to deterministic handlers."
      - file: "docs/canonical/constraint-anchored-evaluation.md"
        lines: "29-33"
        note: "Defines explicit verifiable constraints and aggregate verdict."
      - file: "docs/canonical/constraint-anchored-evaluation.md"
        lines: "35-50"
        note: "Defines verification matrix and approved-only-if-all-constraints-pass circuit."
      - file: "docs/canonical/constraint-anchored-evaluation.md"
        lines: "80-89"
        note: "Documents tradeoffs."
    missing:
      - "Unified structured generation plus post-generation constraint-validation circuit."
      - "Repair, rejection, risk flag, and audit-ready evidence policy."
  - number: 5
    pattern: "Independent Generator-Evaluator Gate"
    classification: "Already Exists"
    integration_value: "Low"
    justification: >-
      Generator-Evaluator directly covers independent generation and evaluation, including distinct roles, context needs, verdicts, feedback loops, and tradeoffs; Multi-Model Evaluation Council extends the evaluator side.
    evidence:
      - file: "docs/canonical/generator-evaluator.md"
        lines: "21-27"
        note: "Defines self-evaluation confirmation bias."
      - file: "docs/canonical/generator-evaluator.md"
        lines: "29-31"
        note: "Defines the two-agent Generator and Evaluator solution."
      - file: "docs/canonical/generator-evaluator.md"
        lines: "33-75"
        note: "Shows approval and rejection feedback loop."
      - file: "docs/canonical/generator-evaluator.md"
        lines: "77-83"
        note: "Defines responsibilities, context needs, outputs, and failure modes."
      - file: "docs/canonical/generator-evaluator.md"
        lines: "107-116"
        note: "Documents tradeoffs."
      - file: "docs/canonical/multi-model-evaluation-council.md"
        lines: "28-40"
        note: "Defines independent multi-model evaluator mechanics."
    missing: []
  - number: 6
    pattern: "Versioned Durable Agent State"
    classification: "Partial Coverage"
    integration_value: "High"
    justification: >-
      External State Persistence and Serializable Pause/Resume State cover durable storage and resume mechanics, with some version references, but no canonical doc unifies versioned state schema, migration policy, writeback policy, reload policy, and audit trail.
    evidence:
      - file: "docs/canonical/external-state-persistence.md"
        lines: "29-57"
        note: "Defines extracting critical data, writing to external storage, loading on the next turn, and merging into context."
      - file: "docs/canonical/external-state-persistence.md"
        lines: "57-57"
        note: "Decouples agent memory from model memory."
      - file: "docs/canonical/external-state-persistence.md"
        lines: "59-65"
        note: "Distinguishes durable state from ephemeral content."
      - file: "docs/canonical/serializable-pause-resume-state.md"
        lines: "31-57"
        note: "Serializes context, execution state, and business state for pause/resume."
      - file: "docs/canonical/serializable-pause-resume-state.md"
        lines: "78-89"
        note: "Compares serialization and state rebuild tradeoffs."
      - file: "docs/canonical/stable-harness-prompt.md"
        lines: "41-41"
        note: "Prompt changes should be deliberate, versioned, and evaluated separately."
    missing:
      - "Versioned state schema and migration policy."
      - "Unified writeback, reload, and audit-trail contract for durable agent state."
  - number: 7
    pattern: "Tested Degradation Ladder"
    classification: "Partial Coverage"
    integration_value: "High"
    justification: >-
      Canonical docs cover retry hygiene, loop intervention points, human approval, escalation, regression tests, eval tiers, and production failure flywheels, but no doc defines one tested degradation ladder from failure classification through retry, fallback or hold, human escalation, and production-like fallback tests.
    evidence:
      - file: "docs/canonical/error-context-hygiene.md"
        lines: "93-106"
        note: "Defines bounded retry-loop integration."
      - file: "docs/canonical/error-context-hygiene.md"
        lines: "120-125"
        note: "Identifies existing fallback mechanisms and the context-layer addition."
      - file: "docs/canonical/owned-agent-control-loop.md"
        lines: "68-75"
        note: "Names break, summarize, LM-as-judge, human approval, and force terminate controls."
      - file: "docs/canonical/multi-model-evaluation-council.md"
        lines: "37-45"
        note: "Defines retry, needs-human, disagreement escalation, and human review routing."
      - file: "docs/canonical/eval-tier-stratification.md"
        lines: "26-50"
        note: "Defines eval tiers with threshold, reporting, owner, and escalation metadata."
      - file: "docs/canonical/production-failure-regression-flywheel.md"
        lines: "28-40"
        note: "Requires production failures to become durable eval regression cases."
    missing:
      - "Named degradation ladder with ordered rungs."
      - "Failure classifier, retry eligibility, fallback or hold policy, human escalation route, outcome logging, and tests for each rung."
  - number: 8
    pattern: "Invariant-Compensation Split"
    classification: "Missing"
    integration_value: "High"
    justification: >-
      NOT_FOUND after reading the system of record and all 27 existing canonical docs. Adjacent cost, removal, prompt-stability, and harness-evolution references exist, but no canonical pattern classifies harness controls as permanent domain invariants versus temporary model-specific compensations.
    evidence:
      - file: "docs/system-of-record.md"
        lines: "124-159"
        note: "Canonical active pattern scope used for exhaustive review."
      - file: "docs/canonical/pain-signal-eval-progression-gate.md"
        lines: "57-60"
        note: "Nearest non-equivalent adjacent coverage: failure prevented, cost, removal safety, and rollback speed."
      - file: "docs/canonical/stable-harness-prompt.md"
        lines: "26-41"
        note: "Nearest non-equivalent adjacent coverage: stable prompt preservation, not invariant/compensation classification."
      - file: "docs/canonical/eval-tier-stratification.md"
        lines: "38-50"
        note: "Nearest non-equivalent adjacent coverage: eval cost and threshold metadata, not harness-control classification."
    not_found_confirmation: >-
      No canonical doc defines harness component inventory with failure-prevention rationale, domain-invariant criteria, compensation criteria, false-positive/cost metrics, and keep/simplify/measure/remove decisions.
  - number: 9
    pattern: "Measured Harness Evolution Lifecycle"
    classification: "Partial Coverage"
    integration_value: "High"
    justification: >-
      Canonical docs cover measurement, shadow/canary rollout, eval tiers, PR gates, production correlation, and failure regression, but no doc defines BUILD, STABILIZE, SIMPLIFY, REMOVE with component archive, ROI calculation, reversible removal, and reactivation path.
    evidence:
      - file: "docs/canonical/pain-signal-eval-progression-gate.md"
        lines: "51-51"
        note: "Decision record includes pain, evidence, current capability, chosen next step, owner, operating cost, and review date."
      - file: "docs/canonical/pain-signal-eval-progression-gate.md"
        lines: "57-60"
        note: "Adjacent harness-evolution and rollback questions."
      - file: "docs/canonical/production-grounded-eval-sampling.md"
        lines: "28-52"
        note: "Defines production-sampled replay and quality, latency, cost, and failure-class deltas."
      - file: "docs/canonical/eval-to-production-correlation-tracking.md"
        lines: "28-50"
        note: "Defines correlation tracking between eval scores, production outcomes, releases, and recalibration triggers."
      - file: "docs/canonical/late-failure-regression-suite.md"
        lines: "50-53"
        note: "References regression before canary, staged rollout, shadow diffs, canary metrics, rollback decisions, and observation windows."
      - file: "docs/canonical/pr-gated-eval-enforcement.md"
        lines: "30-43"
        note: "Defines baseline/candidate PR eval reports with quality, latency, cost, thresholds, failure examples, and merge policy."
    missing:
      - "BUILD, STABILIZE, SIMPLIFY, REMOVE lifecycle."
      - "Component archive with reason, metrics, validation results, rollback path, and reactivation path."
