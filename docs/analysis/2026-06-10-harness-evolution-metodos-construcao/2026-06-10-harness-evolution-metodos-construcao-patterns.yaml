meta:
  title: "Pattern Extraction: Harness Evolution and Construction Methods"
  source: "docs/analysis/2026-06-10-harness-evolution-metodos-construcao/2026-06-10-harness-evolution-metodos-construcao-analysis.md"
  date: "2026-06-10"
  type: "patterns"
patterns:
  - name: "Application-Owned Agent Control Plane"
    problem_solved: "Opaque agent runtimes make it hard to inspect, pause, validate, or terminate long-running agent behavior."
    inputs:
      - "Versioned harness prompt and tool contracts."
      - "Context builder inputs such as task state, memory, history, and retrieved facts."
      - "Structured action schema produced by the model."
      - "Deterministic dispatch handlers and loop policies."
      - "Persistent execution state and intervention gates."
    outputs:
      - "An explicit agent loop owned by application code."
      - "Inspectable action traces and handler results."
      - "Continue, summarize, judge, human-approval, terminate, or handoff decisions."
    benefits:
      - "Makes the agent runtime debuggable and testable as normal application control flow."
      - "Gives developers precise intervention points before the workflow drifts or runs too long."
      - "Reduces dependency on framework-owned loops that hide critical decisions."
    limitations:
      - "Requires engineering ownership of loop code instead of relying only on framework defaults."
      - "Adds application surface area that must be tested and maintained."
      - "May be unnecessary for single-shot or very low-risk model calls."
    components:
      - "Versioned prompt contract."
      - "Context builder."
      - "Structured action schema."
      - "Deterministic dispatcher."
      - "Loop controller."
      - "Persistent state interface."
      - "Intervention gates."
    flow:
      - "Load current execution state and durable facts."
      - "Build the model context from approved sources."
      - "Ask the model for the next structured action."
      - "Dispatch the action through deterministic code."
      - "Persist the result and decide whether to continue, summarize, judge, pause, hand off, or terminate."

  - name: "Context Working Set with Recoverable Middle"
    problem_solved: "Long agent sessions overflow the context window or lose original goals, current state, and past decisions during truncation."
    inputs:
      - "Stable harness prompt, original objective, and permanent instructions."
      - "Recent tail state, latest tool results, and current task position."
      - "Summarized middle history and critical non-expiring metadata."
      - "Addressable memory catalog with handles, previews, locations, and fetch operations."
    outputs:
      - "A bounded active context window for the next model call."
      - "Recoverable omitted memory that the agent can request by handle."
      - "Preserved goal, safety contract, current state, and durable decisions."
    benefits:
      - "Lowers latency and token cost without reducing context management to blind deletion."
      - "Keeps both the original mission and latest state visible to the model."
      - "Lets the agent recover omitted details only when they become relevant."
    limitations:
      - "Requires disciplined summarization, cataloging, and retrieval policy."
      - "Preview size is a tradeoff: too small hides relevance, too large pollutes active context."
      - "Bad catalog metadata can make important memory effectively unrecoverable."
    components:
      - "Stable harness prompt block."
      - "Head section with original objective."
      - "Tail section with current state."
      - "Critical metadata set."
      - "Compressed middle summary."
      - "Addressable memory catalog."
      - "Fetch policy."
    flow:
      - "Preserve the stable prompt and original objective."
      - "Keep the latest task state and tool result in the tail."
      - "Extract decisions, preferences, and commitments into non-expiring metadata."
      - "Move middle history into addressable memory with previews and fetch handles."
      - "Assemble the bounded context window and fetch omitted memory only when relevant."

  - name: "Error Hygiene Recovery Loop"
    problem_solved: "Raw or stale tool errors in context can cause retry spirals and corrections for problems that have already been resolved."
    inputs:
      - "Failed tool call, exception, or API error."
      - "Pending error list and current retry state."
      - "Subsequent successful tool call or recovery signal."
      - "Context update policy for errors and recoveries."
    outputs:
      - "A concise actionable error summary when the model needs to retry."
      - "Cleared pending errors after successful recovery."
      - "A short resolved-error note instead of repeated stack traces."
    benefits:
      - "Reduces context pollution from stack traces and old failures."
      - "Helps the agent retry with useful information rather than panic on noisy logs."
      - "Prevents stale errors from biasing later decisions after progress resumes."
    limitations:
      - "Requires ownership of context assembly and error lifecycle state."
      - "Over-aggressive cleanup can hide unresolved failures."
      - "Poor retry limits can still produce loops even with cleaner context."
    components:
      - "Error capture."
      - "Pending error registry."
      - "Error summarizer."
      - "Retry limiter."
      - "Recovery detector."
      - "Context cleanup policy."
    flow:
      - "Capture the failed tool call and classify the error."
      - "Summarize only the actionable recovery information into context."
      - "Allow bounded retry when recovery is plausible."
      - "When a later call succeeds, clear stale pending errors."
      - "Keep only a short resolved-error note if the event remains relevant."

  - name: "Structured Generation and Constraint Validation Circuit"
    problem_solved: "Free-form model output and JSON-only checks cannot safely drive agent actions or customer-facing recommendations."
    inputs:
      - "Target output schema such as action JSON, recommendation fields, confidence, and risk flags."
      - "Business, safety, budget, availability, and timing constraints."
      - "Candidate model output."
      - "Post-generation validators implemented outside the prompt."
    outputs:
      - "Validated structured action or recommendation."
      - "Rejection, repair request, risk flag, or safe next action when constraints fail."
      - "Audit-ready evidence that both shape and domain rules were checked."
    benefits:
      - "Lets deterministic code route model output without parsing prose."
      - "Separates syntactic validity from semantic domain correctness."
      - "Makes guardrails enforceable by code instead of prompt instruction alone."
    limitations:
      - "Schemas cannot capture every semantic failure mode."
      - "Validators must evolve with product rules and available tools."
      - "Overly broad constraints can increase false positives and block valid actions."
    components:
      - "Output schema."
      - "Generation prompt."
      - "Domain constraint set."
      - "Post-generation validator."
      - "Repair or rejection policy."
      - "Audit log."
    flow:
      - "Ask the model to emit the required structured output."
      - "Validate the output shape."
      - "Validate domain constraints outside the prompt."
      - "Route valid output to deterministic code."
      - "Reject, repair, flag, or fall back when validation fails."

  - name: "Independent Generator-Evaluator Gate"
    problem_solved: "The same model that generates an answer is biased toward approving its own output."
    inputs:
      - "Task context and user goal."
      - "Multiple generated candidates or a candidate action plan."
      - "Explicit evaluation rubric and domain constraints."
      - "Independent evaluator model, human reviewer, or deterministic scoring code."
    outputs:
      - "Scored candidates with reasons for approval or rejection."
      - "Selected answer, revision request, or escalation."
      - "Feedback that can be fed into another generation pass."
    benefits:
      - "Improves quality by separating creative generation from critical judgment."
      - "Makes approval criteria visible and repeatable."
      - "Supports safer release of high-stakes agent decisions."
    limitations:
      - "Adds latency, cost, and evaluator calibration work."
      - "Evaluators can still be wrong when the rubric is incomplete or poorly grounded."
      - "Low-stakes or deterministic tasks may not justify the extra loop."
    components:
      - "Generator."
      - "Candidate set."
      - "Evaluation rubric."
      - "Independent evaluator."
      - "Approval threshold."
      - "Feedback channel."
    flow:
      - "Generate one or more candidate outputs."
      - "Score each candidate against the rubric and constraints."
      - "Approve the best candidate, reject all candidates, or request revision."
      - "Feed evaluator feedback into the next generation pass when needed."
      - "Escalate when no candidate meets the threshold."

  - name: "Versioned Durable Agent State"
    problem_solved: "Agents that keep important state only in the model context lose continuity after crashes, restarts, payment events, callbacks, or long pauses."
    inputs:
      - "User preferences, decisions, commitments, cart or workflow state, and active constraints."
      - "State schema version and migration policy."
      - "Writeback rules from agent events and tool results."
      - "Reload policy at the start of each conversation or loop resume."
    outputs:
      - "Reloadable state record outside the context window."
      - "Audit trail for decisions and commitments."
      - "Reconstructed agent context after interruption or resume."
    benefits:
      - "Preserves continuity across failures and asynchronous workflows."
      - "Enables debugging and auditability for long-running agent behavior."
      - "Keeps critical facts from depending on fragile conversation history."
    limitations:
      - "Requires schema governance, privacy handling, and stale-state management."
      - "Does not eliminate the need to select which state belongs in active context."
      - "Migration mistakes can corrupt continuity across versions."
    components:
      - "Versioned state schema."
      - "State store."
      - "Writeback policy."
      - "Reload policy."
      - "Audit trail."
      - "Migration path."
    flow:
      - "Extract durable facts from agent events and tool results."
      - "Write state through a versioned schema."
      - "Reload state when a conversation starts or a paused loop resumes."
      - "Inject only relevant state into active context."
      - "Audit state changes when debugging or reviewing the workflow."

  - name: "Tested Degradation Ladder"
    problem_solved: "Runtime failures become dead sessions or manual tickets when retry, safe fallback, and human escalation paths are not designed and exercised."
    inputs:
      - "Error taxonomy and retry eligibility rules."
      - "Alternate retry prompt or repair strategy."
      - "Safe fallback response or conservative action policy."
      - "Human escalation channel and production-like fallback tests."
    outputs:
      - "Controlled retry attempt when recovery is plausible."
      - "Safe fallback or hold decision when recovery is unsafe."
      - "Human escalation with enough context to continue the workflow."
      - "Test evidence that the degradation path actually works."
    benefits:
      - "Keeps agent workflows operational when tools or model calls fail."
      - "Reduces manual tickets for recoverable failures."
      - "Prevents untested fallback logic from failing exactly when needed."
    limitations:
      - "Can hide root causes if fallback success is treated as full recovery."
      - "Human escalation adds latency and operational dependency."
      - "Safe fallbacks must be domain-specific to avoid misleading users."
    components:
      - "Failure classifier."
      - "Retry policy."
      - "Fallback action."
      - "Human escalation route."
      - "Production-like fallback tests."
      - "Outcome logging."
    flow:
      - "Classify the failure and decide whether retry is allowed."
      - "Retry with a targeted repair strategy when safe."
      - "Use a conservative fallback or hold action when retry is unsafe or exhausted."
      - "Escalate to a human with summarized context when automated recovery is insufficient."
      - "Test each rung of the ladder before relying on it in production."

  - name: "Invariant-Compensation Split"
    problem_solved: "Teams either remove essential safeguards when models improve or keep obsolete components that only compensated for older model weaknesses."
    inputs:
      - "Inventory of harness components and the failure each component is meant to prevent."
      - "Domain risk classes such as customer safety, irreversible decisions, availability, evaluation, and state persistence."
      - "Current model capability, incident history, and component metrics."
      - "False-positive, latency, token, cost, and maintenance data."
    outputs:
      - "Component classification as domain invariant or model-specific compensation."
      - "Keep, simplify, measure, or removal-candidate decision."
      - "Explicit rationale for why a control is permanent or temporary."
    benefits:
      - "Protects controls that should not disappear just because the model improved."
      - "Turns simplification into a governed decision rather than cleanup by intuition."
      - "Makes obsolete harness weight visible without weakening core safety."
    limitations:
      - "Requires product and domain judgment, not just telemetry."
      - "Early systems may lack enough data to classify components confidently."
      - "Misclassifying an invariant as compensation can create high-severity regressions."
    components:
      - "Harness component inventory."
      - "Failure-prevention rationale."
      - "Domain invariant criteria."
      - "Compensation criteria."
      - "Cost and false-positive metrics."
      - "Decision log."
    flow:
      - "List each component and the failure it prevents."
      - "Classify the failure as a permanent domain risk or a model-specific weakness."
      - "Compare observed benefit against cost and false positives."
      - "Keep invariants, simplify uncertain components, and mark low-value compensations for measurement or removal."
      - "Record the rationale so future teams know why the component exists."

  - name: "Measured Harness Evolution Lifecycle"
    problem_solved: "Harnesses ossify into latency, token cost, false positives, and maintenance burden when components are never revalidated after model or workflow changes."
    inputs:
      - "Component inventory with purpose, owner, and operating cost."
      - "Metrics for prevented failures, false positives, latency, tokens, maintenance, and user outcomes."
      - "Shadow test results, feature flags, canary plan, and observation window."
      - "Archive template for removed components and reactivation path."
    outputs:
      - "BUILD, STABILIZE, SIMPLIFY, or REMOVE decision for each component."
      - "Staged simplification or removal plan with causal attribution preserved."
      - "Archived component record with reason, metrics, validation, and rollback path."
    benefits:
      - "Keeps the harness as small as possible while preserving measured quality."
      - "Counts false positives and operational cost as first-class design signals."
      - "Makes removal reversible and institutionally documented instead of destructive."
    limitations:
      - "Requires enough traffic, observability, and patience for shadow and canary windows."
      - "Slower than big-bang cleanup because one component changes at a time."
      - "Bad metrics or short observation windows can produce false confidence."
    components:
      - "BUILD phase."
      - "STABILIZE measurement phase."
      - "SIMPLIFY reduction phase."
      - "REMOVE archival phase."
      - "ROI calculation."
      - "Shadow and canary controls."
      - "Component archive."
    flow:
      - "Build defensive controls while uncertainty is high."
      - "Stabilize by measuring prevented failures, false positives, and operating cost."
      - "Simplify one layer at a time under shadow tests."
      - "Remove low-value components through feature flags and canaries."
      - "Archive removed components with metrics, validation results, and reactivation path."
