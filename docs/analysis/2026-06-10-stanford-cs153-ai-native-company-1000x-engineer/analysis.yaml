meta:
  title: "Stanford CS153 AI Native Company - Analise de Conhecimento Nao-Obvio"
  source: "/mnt/c/Users/pavan/Raw-Knowledge/sources/2026-06-10-stanford-cs153-ai-native-company-1000x-engineer.md"
  date: "2026-06-10"
  type: "analysis"

frameworks:
  - name: "Closed-Loop Company"
    components:
      - "Estado observavel: codigo, GitHub, Discord, reunioes gravadas, DMs, artefatos de cliente e memoria compartilhada entram no campo de leitura do agente. Source: /mnt/c/Users/pavan/Raw-Knowledge/sources/2026-06-10-stanford-cs153-ai-native-company-1000x-engineer.md:1041."
      - "Controlador agentico: agente como Hermes ou Open Claw fica embutido no tecido de decisao, nao como chatbot externo. Source: /mnt/c/Users/pavan/Raw-Knowledge/sources/2026-06-10-stanford-cs153-ai-native-company-1000x-engineer.md:1035."
      - "Feedback loop: agente sugere proximos itens e bug fixes a partir do estado completo, reduzindo erro acumulado como em um controlador PID. Sources: /mnt/c/Users/pavan/Raw-Knowledge/sources/2026-06-10-stanford-cs153-ai-native-company-1000x-engineer.md:1011, /mnt/c/Users/pavan/Raw-Knowledge/sources/2026-06-10-stanford-cs153-ai-native-company-1000x-engineer.md:1054."
      - "Memoria operacional: estado e colocado em Gbrain ou memoria equivalente para self-healing. Source: /mnt/c/Users/pavan/Raw-Knowledge/sources/2026-06-10-stanford-cs153-ai-native-company-1000x-engineer.md:1057."
  - name: "Software Factory"
    components:
      - "Geracao abundante por agentes substitui a fase de copilot, mas o volume de codigo nao e a metrica final. Sources: /mnt/c/Users/pavan/Raw-Knowledge/sources/2026-06-10-stanford-cs153-ai-native-company-1000x-engineer.md:424, /mnt/c/Users/pavan/Raw-Knowledge/sources/2026-06-10-stanford-cs153-ai-native-company-1000x-engineer.md:493."
      - "Gates de qualidade como plan-eng-review buscam 80-90% de cobertura antes de producao. Source: /mnt/c/Users/pavan/Raw-Knowledge/sources/2026-06-10-stanford-cs153-ai-native-company-1000x-engineer.md:443."
      - "Metrica real e funcionamento para operador e clientes pagantes, nao LOC isolado. Source: /mnt/c/Users/pavan/Raw-Knowledge/sources/2026-06-10-stanford-cs153-ai-native-company-1000x-engineer.md:463."
      - "Direcao desejada e codigo denso e conciso para o proposito, nao maximizar linhas. Source: /mnt/c/Users/pavan/Raw-Knowledge/sources/2026-06-10-stanford-cs153-ai-native-company-1000x-engineer.md:470."
  - name: "Latent vs Deterministic Space"
    components:
      - "Sistemas agenticos quebram quando trabalho deterministico fica em markdown ou trabalho latente fica hardcoded em codigo. Source: /mnt/c/Users/pavan/Raw-Knowledge/sources/2026-06-10-stanford-cs153-ai-native-company-1000x-engineer.md:616."
      - "Latent space serve para matching semantico, julgamento e ambiguidade contextual. Source: /mnt/c/Users/pavan/Raw-Knowledge/sources/2026-06-10-stanford-cs153-ai-native-company-1000x-engineer.md:626."
      - "Deterministic space serve para escala, exatidao, tempo, calendario, roteamento, testes e invariantes formais. Sources: /mnt/c/Users/pavan/Raw-Knowledge/sources/2026-06-10-stanford-cs153-ai-native-company-1000x-engineer.md:639, /mnt/c/Users/pavan/Raw-Knowledge/sources/2026-06-10-stanford-cs153-ai-native-company-1000x-engineer.md:719."
      - "A arquitetura correta em problemas grandes e compor latent e deterministic, nao escolher apenas um. Source: /mnt/c/Users/pavan/Raw-Knowledge/sources/2026-06-10-stanford-cs153-ai-native-company-1000x-engineer.md:645."
  - name: "Skill/Resolver/Skillify Organizational Model"
    components:
      - "Skill e uma capacidade/runbook legivel por humano ou agente, com possiveis chamadas a codigo. Source: /mnt/c/Users/pavan/Raw-Knowledge/sources/2026-06-10-stanford-cs153-ai-native-company-1000x-engineer.md:666."
      - "Resolver e org chart/context router que carrega capacidades apenas quando necessarias. Sources: /mnt/c/Users/pavan/Raw-Knowledge/sources/2026-06-10-stanford-cs153-ai-native-company-1000x-engineer.md:739, /mnt/c/Users/pavan/Raw-Knowledge/sources/2026-06-10-stanford-cs153-ai-native-company-1000x-engineer.md:951."
      - "Skillify transforma workflow correto em habilidade testada, registrada, roteavel e auditavel. Source: /mnt/c/Users/pavan/Raw-Knowledge/sources/2026-06-10-stanford-cs153-ai-native-company-1000x-engineer.md:788."
      - "Check-resolvable mapeia para audit/compliance; trigger evals mapeiam para performance reviews. Sources: /mnt/c/Users/pavan/Raw-Knowledge/sources/2026-06-10-stanford-cs153-ai-native-company-1000x-engineer.md:842, /mnt/c/Users/pavan/Raw-Knowledge/sources/2026-06-10-stanford-cs153-ai-native-company-1000x-engineer.md:977."
  - name: "Taste as Eval Ownership"
    components:
      - "Quando shipping code vai a zero, taste para discernir bom/ruim permanece escasso. Source: /mnt/c/Users/pavan/Raw-Knowledge/sources/2026-06-10-stanford-cs153-ai-native-company-1000x-engineer.md:1148."
      - "Taste vira criterios de produto: seguir instrucao, responder corretamente, preservar confianca, atingir metas e cumprir regras de dominio. Source: /mnt/c/Users/pavan/Raw-Knowledge/sources/2026-06-10-stanford-cs153-ai-native-company-1000x-engineer.md:1184."
      - "Human-in-the-loop rotula falhas e le traces para decidir quando skillificar ou melhorar evals. Sources: /mnt/c/Users/pavan/Raw-Knowledge/sources/2026-06-10-stanford-cs153-ai-native-company-1000x-engineer.md:1196, /mnt/c/Users/pavan/Raw-Knowledge/sources/2026-06-10-stanford-cs153-ai-native-company-1000x-engineer.md:1202."

patterns:
  - name: "Skill -> Resolver -> Skillify Pipeline"
    problem: "Agentes acumulam instrucoes em Claude.md, repetem workflows manualmente e perdem contexto conforme a memoria cresce."
    mechanism: "Executar workflow uma vez, ajustar input/output, mandar skillify, gerar skill e codigo, escrever unit tests, LLM evals, integration test, resolver trigger, trigger eval, check-resolvable, smoke test e schema. Sources: /mnt/c/Users/pavan/Raw-Knowledge/sources/2026-06-10-stanford-cs153-ai-native-company-1000x-engineer.md:795, /mnt/c/Users/pavan/Raw-Knowledge/sources/2026-06-10-stanford-cs153-ai-native-company-1000x-engineer.md:806."
  - name: "Resolver as Progressive Disclosure for Agent Context"
    problem: "Claude.md monolitico vira deposito de instrucoes globais que polui ou estoura contexto."
    mechanism: "Converter instrucoes em regras de carregamento sob demanda, como carregar change-log.md apenas ao escrever changelog ou skill especifica quando uma assinatura precisa ser checada. Sources: /mnt/c/Users/pavan/Raw-Knowledge/sources/2026-06-10-stanford-cs153-ai-native-company-1000x-engineer.md:760, /mnt/c/Users/pavan/Raw-Knowledge/sources/2026-06-10-stanford-cs153-ai-native-company-1000x-engineer.md:773."
  - name: "Deterministic Guardrail for Exact Context"
    problem: "O modelo alucina timezone, hora ou calendario quando contexto verificavel fica no latent space."
    mechanism: "Escrever codigo deterministico com testes, como context-now.mjs, e fornecer fatos de tempo e agenda ao agente. Source: /mnt/c/Users/pavan/Raw-Knowledge/sources/2026-06-10-stanford-cs153-ai-native-company-1000x-engineer.md:719."
  - name: "Plan-Eng-Review and Plan-CEO-Review Split"
    problem: "Um unico modo de agente mistura qualidade de implementacao com direcao de produto."
    mechanism: "Usar plan-eng-review para cobertura/qualidade/producao e plan-ceo-review para versao 10x, ideal platonico e roadmap entre estado atual e destino. Sources: /mnt/c/Users/pavan/Raw-Knowledge/sources/2026-06-10-stanford-cs153-ai-native-company-1000x-engineer.md:443, /mnt/c/Users/pavan/Raw-Knowledge/sources/2026-06-10-stanford-cs153-ai-native-company-1000x-engineer.md:542."
  - name: "Cross-Modal Eval Loop"
    problem: "Avaliacao por um unico modelo pode perder dimensoes de qualidade ou reforcar vieses."
    mechanism: "Varios modelos frontier avaliam inputs/outputs, atribuem rating, devolvem feedback ao sub-agente original e alimentam nova tentativa. Source: /mnt/c/Users/pavan/Raw-Knowledge/sources/2026-06-10-stanford-cs153-ai-native-company-1000x-engineer.md:1211."
  - name: "Trace -> Eval -> Replay -> Self-Heal Loop"
    problem: "Falhas dependentes de dominio nao aparecem em benchmarks publicos genericos."
    mechanism: "Capturar traces, detectar failure cases, converter falhas em evals, replayar constantemente e usar os resultados para melhorar prompts e habilidades. Source: /mnt/c/Users/pavan/Raw-Knowledge/sources/2026-06-10-stanford-cs153-ai-native-company-1000x-engineer.md:1240."
  - name: "Gbrain Three-Layer Memory and Dynamic Ontology"
    problem: "Wiki baseada apenas em grep cai quando o volume de conhecimento cresce."
    mechanism: "Adicionar vector search, RRF fusion, backlinks, graph database e epistemology system; evoluir para ontologia dinamica por tipo de usuario. Sources: /mnt/c/Users/pavan/Raw-Knowledge/sources/2026-06-10-stanford-cs153-ai-native-company-1000x-engineer.md:854, /mnt/c/Users/pavan/Raw-Knowledge/sources/2026-06-10-stanford-cs153-ai-native-company-1000x-engineer.md:912."
  - name: "Forward-Deployed Workflow Wedge"
    problem: "Founders sem dominio automatizam superficie em vez de workflows reais e messy."
    mechanism: "Escolher workflow doloroso, entrar fundo no cliente, shadowar ou tomar funcao no dominio, mapear trabalho repetitivo em telefone/email/planilhas e mover esse trabalho para agentes integrados. Sources: /mnt/c/Users/pavan/Raw-Knowledge/sources/2026-06-10-stanford-cs153-ai-native-company-1000x-engineer.md:1301, /mnt/c/Users/pavan/Raw-Knowledge/sources/2026-06-10-stanford-cs153-ai-native-company-1000x-engineer.md:1346."

operational_lessons:
  - lesson: "Boil the ocean becomes a capacity heuristic, not a smell."
    context: "Agentes recalibram escopo porque o proprio Claude pode estimar tres semanas e terminar em uma hora apos aprovacao. Sources: /mnt/c/Users/pavan/Raw-Knowledge/sources/2026-06-10-stanford-cs153-ai-native-company-1000x-engineer.md:561, /mnt/c/Users/pavan/Raw-Knowledge/sources/2026-06-10-stanford-cs153-ai-native-company-1000x-engineer.md:587."
  - lesson: "Test coverage is the anti-slop gate."
    context: "Tan apresenta 80-90% de cobertura como mecanismo para transformar demo code agentico em producao usavel. Source: /mnt/c/Users/pavan/Raw-Knowledge/sources/2026-06-10-stanford-cs153-ai-native-company-1000x-engineer.md:441."
  - lesson: "Claude.md growth is a context architecture smell."
    context: "Instrucoes acumuladas globalmente devem virar skills carregadas sob demanda por resolver. Sources: /mnt/c/Users/pavan/Raw-Knowledge/sources/2026-06-10-stanford-cs153-ai-native-company-1000x-engineer.md:739, /mnt/c/Users/pavan/Raw-Knowledge/sources/2026-06-10-stanford-cs153-ai-native-company-1000x-engineer.md:760."
  - lesson: "Skillify without tests is incomplete."
    context: "Fazer uma vez nao basta; a habilidade precisa de unit tests, LLM evals, integration tests, resolver trigger, trigger eval, check-resolvable, smoke test e schema. Source: /mnt/c/Users/pavan/Raw-Knowledge/sources/2026-06-10-stanford-cs153-ai-native-company-1000x-engineer.md:806."
  - lesson: "Middle management shrinks when routing becomes machine-readable."
    context: "Hu descreve empresas AI-native mais planas porque parte da funcao de middle management era rotear informacao lossy. Source: /mnt/c/Users/pavan/Raw-Knowledge/sources/2026-06-10-stanford-cs153-ai-native-company-1000x-engineer.md:1087."
  - lesson: "Everyone becomes a builder, but outcomes still need DRI."
    context: "Pessoas nao tecnicas constroem automacoes, mas todo outcome precisa de owner direto que orquestra ICs e agentes. Sources: /mnt/c/Users/pavan/Raw-Knowledge/sources/2026-06-10-stanford-cs153-ai-native-company-1000x-engineer.md:1094, /mnt/c/Users/pavan/Raw-Knowledge/sources/2026-06-10-stanford-cs153-ai-native-company-1000x-engineer.md:1103."
  - lesson: "AI founder is a tooling edge role."
    context: "Founders precisam estar na fronteira de ferramentas porque quem ainda opera em paradigma de copilot do ano anterior nao incorpora agentic coding. Sources: /mnt/c/Users/pavan/Raw-Knowledge/sources/2026-06-10-stanford-cs153-ai-native-company-1000x-engineer.md:1124, /mnt/c/Users/pavan/Raw-Knowledge/sources/2026-06-10-stanford-cs153-ai-native-company-1000x-engineer.md:1133."
  - lesson: "Domain evals must replace generic benchmarks."
    context: "Benchmarks como MMLU nao dizem se o agente preserva confianca, segue regra de dominio ou atinge objetivo de negocio. Source: /mnt/c/Users/pavan/Raw-Knowledge/sources/2026-06-10-stanford-cs153-ai-native-company-1000x-engineer.md:1166."

tradeoffs:
  - decision: "Latent judgment vs deterministic exactness"
    benefit: "Usa LLM para ambiguidade e codigo para invariantes, evitando alucinacoes de tempo, escala e calendario."
    cost: "Exige engenharia para decidir a fronteira e testes para as partes deterministicamente verificaveis."
  - decision: "Resolver vs monolithic Claude.md"
    benefit: "Reduz tokens globais e carrega instrucoes apenas quando relevantes."
    cost: "Exige taxonomia de skills, triggers e evals de roteamento."
  - decision: "Formal skillify vs repeated manual workflow"
    benefit: "Transforma sucesso pontual em capacidade reutilizavel, testada e auditavel."
    cost: "A maior parte do trabalho vira compliance, testes e resolvability, nao escrever markdown."
  - decision: "LOC as capacity signal vs quality metric"
    benefit: "Pode indicar escala de producao quando acompanhado de testes e uso real."
    cost: "E gameavel e isoladamente nao prova valor; clientes e funcionamento sao a metrica real."
  - decision: "Flat agentic org vs traditional middle management"
    benefit: "Menos roteamento humano de informacao lossy e mais ICs construindo."
    cost: "Exige artefatos legiveis por agente, read access amplo e ownership DRI explicito."
  - decision: "Generic benchmarks vs domain evals"
    benefit: "Domain evals medem o que usuarios e negocio realmente valorizam."
    cost: "Custa leitura de traces, labeling humano e rubricas especificas."
  - decision: "Cross-modal evaluation vs single evaluator"
    benefit: "Diversidade de modelos pode melhorar feedback e reduzir bugs."
    cost: "Aumenta custo, latencia e complexidade de agregacao de julgamentos."
  - decision: "Fixed ontology vs dynamic ontology"
    benefit: "Schema fixo acelera um caso de uso inicial; dinamico adapta memoria a diferentes usuarios."
    cost: "Ontologia dinamica exige governanca de schema e tracking epistemico mais complexo."

failure_patterns:
  - pattern: "Latent/deterministic inversion"
    cause: "Trabalho exato fica em markdown ou julgamento aberto fica hardcoded em codigo."
    mitigation: "Mover tempo, calendario, escala e invariantes para codigo testado; deixar julgamento semantico no LLM. Source: /mnt/c/Users/pavan/Raw-Knowledge/sources/2026-06-10-stanford-cs153-ai-native-company-1000x-engineer.md:616."
  - pattern: "Timezone hallucination"
    cause: "Agente usa latent space para inferir contexto temporal verificavel."
    mitigation: "Fornecer hora e agenda por ferramenta deterministica testada como context-now.mjs. Source: /mnt/c/Users/pavan/Raw-Knowledge/sources/2026-06-10-stanford-cs153-ai-native-company-1000x-engineer.md:719."
  - pattern: "Claude.md token overflow"
    cause: "Cada correcao de comportamento vira instrucao global permanente."
    mitigation: "Transformar instrucoes em skills carregadas sob demanda por resolver. Source: /mnt/c/Users/pavan/Raw-Knowledge/sources/2026-06-10-stanford-cs153-ai-native-company-1000x-engineer.md:739."
  - pattern: "Skillify as one-shot macro"
    cause: "Workflow funciona uma vez, mas nao e testado, roteavel nem auditavel."
    mitigation: "Adicionar unit tests, LLM evals, integration tests, resolver trigger, trigger eval, check-resolvable, smoke test e schema. Source: /mnt/c/Users/pavan/Raw-Knowledge/sources/2026-06-10-stanford-cs153-ai-native-company-1000x-engineer.md:806."
  - pattern: "Duplicate or overlapping skills"
    cause: "Falta de DRY e check-resolvable permite multiplas skills para o mesmo trabalho."
    mitigation: "Validar resolvability e deduplicacao antes de aceitar skill nova. Source: /mnt/c/Users/pavan/Raw-Knowledge/sources/2026-06-10-stanford-cs153-ai-native-company-1000x-engineer.md:842."
  - pattern: "Trigger eval false confidence"
    cause: "Matching de trigger tambem e operacao latente e pode nao acionar skill existente."
    mitigation: "Usar LLM-as-judge eval para amplitude e precisao do trigger. Source: /mnt/c/Users/pavan/Raw-Knowledge/sources/2026-06-10-stanford-cs153-ai-native-company-1000x-engineer.md:977."
  - pattern: "Open-loop company drift"
    cause: "Informacao vive em cabecas, DMs e notas nao escritas, acumulando erro decisorio."
    mitigation: "Dar ao agente read access aos artefatos e memoria compartilhada para fechar o loop. Source: /mnt/c/Users/pavan/Raw-Knowledge/sources/2026-06-10-stanford-cs153-ai-native-company-1000x-engineer.md:1000."
  - pattern: "Benchmark theater"
    cause: "Benchmark generico nao representa confianca, regras de dominio ou objetivos do produto."
    mitigation: "Criar evals especificos a partir de traces reais e criterios de taste. Source: /mnt/c/Users/pavan/Raw-Knowledge/sources/2026-06-10-stanford-cs153-ai-native-company-1000x-engineer.md:1166."
  - pattern: "Trace blindness"
    cause: "Falhas acontecem, mas nao sao capturadas, rotuladas nem replayadas."
    mitigation: "Converter failure cases em evals e replay constante. Source: /mnt/c/Users/pavan/Raw-Knowledge/sources/2026-06-10-stanford-cs153-ai-native-company-1000x-engineer.md:1240."
  - pattern: "Domain shallow automation"
    cause: "Founder automatiza superficie sem entender workflows messy do cliente."
    mitigation: "Fazer forward-deployed discovery, shadowing e automacao do trabalho repetitivo real. Source: /mnt/c/Users/pavan/Raw-Knowledge/sources/2026-06-10-stanford-cs153-ai-native-company-1000x-engineer.md:1346."

synthesis: >
  A empresa AI-native transforma conhecimento tacito em superficies executaveis, testaveis e roteaveis. A unidade basica deixa de ser apenas codigo ou pessoa: vira uma capacidade descrita em markdown, conectada a codigo deterministico, descoberta por resolver, validada por evals e alimentada por traces. Skill/resolver/skillify funciona como teoria de org design: skill e capacidade, resolver e org chart, check-resolvable e audit/compliance, trigger eval e performance review. Taste vira infraestrutura de qualidade por meio de rubricas, trace reading e labeling. Closed-loop company generaliza eval-driven development para a organizacao inteira: o mesmo loop aparece em tool calls, software factory e decisoes da empresa.
