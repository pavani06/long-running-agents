terminology:
  - term: "Agent"
    definition: "Autonomous AI entity that takes actions, uses tools, and executes sequential tasks."
    source: "curriculum/GLOSSARY.md:16-23"
  - term: "Agent Loop"
    definition: "Repeated input, reasoning, action, result, and repeat cycle."
    source: "curriculum/GLOSSARY.md:27-33"
  - term: "Context Window"
    definition: "Total tokens a model can process at once, treated as immediate memory."
    source: "curriculum/GLOSSARY.md:89-98"
  - term: "Context Amnesia"
    definition: "Forgetting prior context after exceeding the context window."
    source: "curriculum/GLOSSARY.md:36-43"
  - term: "Context Rot"
    definition: "Gradual coherence loss as an agent advances through context."
    source: "curriculum/GLOSSARY.md:80-85"
  - term: "Context Anxiety"
    definition: "Rushed or anxious behavior near the context limit."
    source: "curriculum/GLOSSARY.md:69-76"
  - term: "Token Budget"
    definition: "Conscious accounting of available and consumed tokens."
    source: "curriculum/GLOSSARY.md:466-477"
  - term: "Harness"
    definition: "Infrastructure and patterns around agents that keep them reliable over long periods."
    source: "curriculum/GLOSSARY.md:204-217"
  - term: "Harness Evolution"
    definition: "Simplifying or removing harness components as models improve."
    source: "curriculum/GLOSSARY.md:221-233"
  - term: "Generator"
    definition: "Agent responsible for building or creating something."
    source: "curriculum/GLOSSARY.md:154-163"
  - term: "Evaluator"
    definition: "Separate agent responsible for evaluating and grading generator output."
    source: "curriculum/GLOSSARY.md:116-128"
  - term: "Generator/Evaluator Pattern"
    definition: "Two separate entities collaborate: one generates and the other evaluates."
    source: "curriculum/GLOSSARY.md:167-185"
  - term: "Sprint Contract"
    definition: "Pre-work agreement between generator and evaluator about what done means."
    source: "curriculum/GLOSSARY.md:102-110, curriculum/GLOSSARY.md:430-433"
  - term: "Evaluation Rubric"
    definition: "Measurable criteria for judging subjective quality."
    source: "curriculum/GLOSSARY.md:132-148"
  - term: "Memory / State"
    definition: "Information retained across operations, including short-term, long-term, and file-based forms."
    source: "curriculum/GLOSSARY.md:267-277"
  - term: "Multi-Agent System"
    definition: "Multiple independent agents coordinating, commonly Planner plus Generator plus Evaluator."
    source: "curriculum/GLOSSARY.md:294-306"
  - term: "Planner"
    definition: "Agent specialized in decomposing a problem into steps or sprints."
    source: "curriculum/GLOSSARY.md:312-326"
  - term: "Compaction"
    definition: "Compressing or summarizing old context while preserving key information."
    source: "curriculum/GLOSSARY.md:60-66"
  - term: "Trace"
    definition: "Detailed log of agent steps used for behavior debugging."
    source: "curriculum/GLOSSARY.md:480-495"
  - term: "KODA"
    definition: "WhatsApp supplement-sales conversational agent and case study for applying the program."
    source: "curriculum/GLOSSARY.md:239-250"
  - term: "Deterministic Tool Dispatch"
    definition: "Tool use reframed as model-emitted JSON followed by deterministic application code."
    source: "docs/canonical/deterministic-tool-dispatch.md:22-35"
  - term: "Owned Agent Control Loop"
    definition: "Agent architecture decomposed into owned prompt, context builder, switch statement, and loop."
    source: "docs/canonical/owned-agent-control-loop.md:31-75"
  - term: "Addressable Memory Catalog"
    definition: "Compact omitted-context interface with id, kind, location, preview, scope, and fetch."
    source: "docs/canonical/addressable-memory-catalog.md:28-43"
  - term: "N+1 Long-Session Eval"
    definition: "Fixture that loads N realistic turns, applies production context strategy, then grades behavior on turn N+1."
    source: "docs/canonical/n-plus-one-long-session-evals.md:26-40"

curriculum:
  levels:
    - name: "Level 1 - Fundamentals"
      focus: "Why long tasks fail: context windows, token budgeting, and basic harness patterns."
      progression: "3-4h in the overview; execution plan expands weeks 1-2 with History Windowing and Structured Output exercises."
      sources:
        - "curriculum/README.md:177-189"
        - "curriculum/QUICK_START.md:34-89"
        - "curriculum/EXECUTION_PLAN.md:64-113"
    - name: "Level 2 - Practical Patterns"
      focus: "Generator/Evaluator, Sprint Contracts, Rubric Design, and Trace Reading."
      progression: "6-8h, aimed at applying reliability patterns in real code; index includes the fourth Error Context Hygiene exercise."
      sources:
        - "curriculum/README.md:193-204"
        - "curriculum/QUICK_START.md:93-157"
        - "curriculum/INDEX.md:104-109"
    - name: "Level 3 - Advanced Architecture"
      focus: "Multi-agent systems, state persistence, file-based coordination, server-side compaction, and harness evolution."
      progression: "8-10h, with 3-agent design, state persistence, and harness evolution exercises."
      sources:
        - "curriculum/README.md:208-219"
        - "curriculum/QUICK_START.md:160-222"
        - "curriculum/INDEX.md:110-113"
    - name: "Level 4 - KODA-specific"
      focus: "KODA architecture, customer journeys, feature patterns, KODA rubrics, harness improvements, real-world exercises, and case studies."
      progression: "Continuous application phase from weeks 7-12, including improvements, deployment, lessons learned, mentoring, and next-cycle planning."
      sources:
        - "curriculum/README.md:223-234"
        - "curriculum/QUICK_START.md:226-258"
        - "curriculum/EXECUTION_PLAN.md:237-310"
  concepts:
    - "Context Management. Sources: curriculum/README.md:238-257, curriculum/MASTER_PLAN.md:331-348."
    - "Planning vs. Execution. Sources: curriculum/README.md:238-257, curriculum/MASTER_PLAN.md:331-348."
    - "Generator/Evaluator. Sources: curriculum/README.md:238-257, curriculum/MASTER_PLAN.md:331-348."
    - "Sprint Contracts. Sources: curriculum/README.md:238-257, curriculum/MASTER_PLAN.md:331-348."
    - "State Persistence. Sources: curriculum/README.md:238-257, curriculum/MASTER_PLAN.md:331-348."
    - "Harness Evolution. Sources: curriculum/README.md:238-257, curriculum/MASTER_PLAN.md:331-348."
    - "Multi-Agent Coordination. Sources: curriculum/README.md:238-257, curriculum/MASTER_PLAN.md:331-348."
    - "Evaluation Rubrics. Sources: curriculum/README.md:238-257, curriculum/MASTER_PLAN.md:331-348."

