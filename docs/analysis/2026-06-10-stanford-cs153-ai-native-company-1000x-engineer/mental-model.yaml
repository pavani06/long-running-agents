meta:
  title: "Mental Model: Stanford CS153 AI-Native Company 1000x Engineer"
  date: "2026-06-10"
  repo: "long-running-agents"
  type: "mental-model"

goals:
  - "Teach and operationalize reliable long-running AI agents that avoid context loss, fragile planning, and blind self-evaluation through harnesses. Sources: README.md:3, README.md:7-13."
  - "Serve business builders and agent-system builders from beginner level through production practice. Sources: README.md:15-17."
  - "Deliver a 12-week curriculum with 4 levels, 8 core concepts, 35+ diagrams, and KODA as the applied case study. Sources: curriculum/README.md:10-13, curriculum/README.md:20-33."
  - "Maintain a documentation source-of-truth hierarchy across ADRs, canonical docs, evidence, analyses, archives, and operational summaries. Sources: docs/system-of-record.md:14-21, AGENTS.md:64-75."
  - "Run agent work through .opencode issue lifecycle, review, merge, documentation, planning, and live-test skills. Sources: AGENTS.md:7-12, .opencode/skills/issue-start/SKILL.md:12-15, .opencode/skills/issue-review/SKILL.md:12-15, .opencode/skills/issue-finish/SKILL.md:12-15."

