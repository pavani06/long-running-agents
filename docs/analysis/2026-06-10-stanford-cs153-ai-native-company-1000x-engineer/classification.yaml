metadata:
  title: "Classification: Stanford CS153 AI Native Company Patterns"
  type: analysis
  date: "2026-06-10"
  target_repository: long-running-agents
  source_patterns: "docs/analysis/2026-06-10-stanford-cs153-ai-native-company-1000x-engineer/patterns.md"
  search_scope:
    - "docs/decisions/**/*.md"
    - "docs/canonical/*.md"
    - "docs/evidence/**/*.md"
    - "docs/analysis/**/*.md"
    - "curriculum/**/*.md"
    - ".opencode/skills/*/SKILL.md"
  corpus_notes:
    - "docs/decisions/**/*.md returned no Markdown files"
    - "docs/evidence/**/*.md returned no Markdown files"
classifications:
  - number: 1
    pattern: "Closed-Loop Agent Operating System"
    classification: "Partial Coverage"
    integration_value: High
    justification: "The repo has source-of-truth hierarchy, operational issue lifecycle, agent dashboard, and analysis pipeline, but not one closed-loop operating system that continuously reads company/product artifacts, recommends next work, updates operational memory, and feeds outcomes back into prioritization."
    evidence:
      - type: file_line
        reference: "docs/system-of-record.md:14-21"
        note: "Documentation precedence hierarchy."
      - type: file_line
        reference: "docs/system-of-record.md:25-46"
        note: "Agent system, lifecycle skills, orchestrator, and analysis pipeline mapped into project domains."
      - type: file_line
        reference: ".opencode/skills/orchestrator/SKILL.md:12-15"
        note: "Orchestrator fetches state, summarizes work, suggests issues, generates prompts, and cleans sessions."
      - type: file_line
        reference: ".opencode/skills/orchestrator/SKILL.md:27-62"
        note: "Dashboard and priority logic for next task."
      - type: file_line
        reference: ".opencode/skills/analyze-and-improve/SKILL.md:46-56"
        note: "Repository model through integration and curriculum deep integration pipeline."
      - type: not_found
        reference: "docs/canonical/*.md, curriculum/**/*.md, .opencode/skills/*/SKILL.md"
        note: "Exact pattern name not found; docs/decisions and docs/evidence had no Markdown files."
  - number: 2
    pattern: "Agentic Software Factory Quality Gate"
    classification: "Better Implementation"
    integration_value: Low
    justification: "The repo exceeds the extracted pattern with issue-review workflow, second-agent review, eval-sensitive PR reporting, eval tiers, baseline/candidate deltas, waiver metadata, and durable evidence expectations."
    evidence:
      - type: file_line
        reference: ".opencode/skills/issue-review/SKILL.md:12-15"
        note: "Validation, draft PR, second-agent review, and no merge without confirmation."
      - type: file_line
        reference: ".opencode/skills/issue-review/SKILL.md:44-85"
        note: "Real gates, surface-specific gates, eval impact, baseline/candidate versions, tier selection, deltas, traces, and merge recommendation."
      - type: file_line
        reference: "docs/canonical/pr-gated-eval-enforcement.md:28-53"
        note: "Eval-specific PR reports and blocking thresholds."
      - type: file_line
        reference: "docs/canonical/eval-tier-stratification.md:28-49"
        note: "Fast/medium/deep tier metadata and escalation policy."
      - type: file_line
        reference: "docs/canonical/production-grounded-eval-sampling.md:28-50"
        note: "Production-sampled replay with privacy, labels, and reporting."
      - type: not_found
        reference: "docs/canonical/*.md, curriculum/**/*.md, .opencode/skills/*/SKILL.md"
        note: "Exact pattern name not found; equivalent is distributed across review and eval-gate docs."
  - number: 3
    pattern: "Latent-Deterministic Boundary Enforcement"
    classification: "Already Exists"
    integration_value: Low
    justification: "The repo already separates model-owned judgment from code-owned exactness through deterministic tool dispatch and the LLM-agent versus deterministic-service boundary."
    evidence:
      - type: file_line
        reference: "docs/canonical/deterministic-tool-dispatch.md:22-35"
        note: "Model emits JSON; code parses, routes, validates, executes, and handles errors."
      - type: file_line
        reference: "docs/canonical/deterministic-tool-dispatch.md:45-66"
        note: "Switch statement is deterministic, testable, auditable, observable, and circuit-breakable."
      - type: file_line
        reference: "curriculum/05-core-concepts/07-multi-agent-coordination.md:129-146"
        note: "Deterministic services versus LLM agents."
      - type: file_line
        reference: "curriculum/05-core-concepts/07-multi-agent-coordination.md:146-148"
        note: "Use deterministic services for if/else or arithmetic and LLM agents for judgment."
      - type: not_found
        reference: "docs/canonical/*.md, curriculum/**/*.md, .opencode/skills/*/SKILL.md"
        note: "Exact pattern name not found; mechanism exists under other names."
  - number: 4
    pattern: "Skill-Resolver-Skillify Capability Pipeline"
    classification: "Partial Coverage"
    integration_value: High
    justification: "The repo has skills and an analysis-to-improvement pipeline, but lacks resolver metadata, trigger evals, check-resolvable, smoke tests, storage schema, and an acceptance gate proving routability."
    evidence:
      - type: file_line
        reference: "docs/system-of-record.md:34-43"
        note: "Operational skills are registered in the source-of-truth map."
      - type: file_line
        reference: ".opencode/skills/analyze-and-improve/SKILL.md:46-56"
        note: "Improvement generation and integration phases after classification."
      - type: file_line
        reference: ".opencode/skills/analyze-and-improve/SKILL.md:102-119"
        note: "Output slots for analysis artifacts and concrete artifacts such as canonical docs, skills, and exercises."
      - type: file_line
        reference: ".opencode/skills/error-context-hygiene/SKILL.md:15-20"
        note: "Example of a concrete operational skill with explicit rules."
      - type: file_line
        reference: "docs/analysis/2026-06-10-stanford-cs153-ai-native-company-1000x-engineer/analysis.md:84"
        note: "Stanford mechanic lists skillify plus tests, resolver trigger, trigger eval, check-resolvable, smoke test, and storage schema."
      - type: not_found
        reference: "docs/canonical/*.md, curriculum/**/*.md, .opencode/skills/*/SKILL.md"
        note: "Outside the current Stanford analysis package, skillify/check-resolvable/trigger-eval/resolver-metadata implementation was not found."
  - number: 5
    pattern: "Resolver-Based Context Progressive Disclosure"
    classification: "Partial Coverage"
    integration_value: High
    justification: "The repo uses load-on-demand skills and compaction, but does not formalize resolver-based progressive disclosure with trigger evals, resolver miss handling, positive/negative trigger examples, or anti-bloat governance."
    evidence:
      - type: file_line
        reference: ".opencode/skills/issue-start/SKILL.md:16-23"
        note: "Issue-start skill has task-scoped loading conditions."
      - type: file_line
        reference: ".opencode/skills/issue-review/SKILL.md:16-23"
        note: "Issue-review skill has task-scoped loading conditions."
      - type: file_line
        reference: ".opencode/skills/issue-review/SKILL.md:38-40"
        note: "Compaction before review keeps context focused on diff and validation."
      - type: file_line
        reference: ".opencode/skills/issue-finish/SKILL.md:25-46"
        note: "Merge/cleanup is isolated to a separate mechanical context after approval."
      - type: file_line
        reference: "docs/analysis/2026-06-10-stanford-cs153-ai-native-company-1000x-engineer/analysis.md:150"
        note: "Anti-pattern: global prompt growth instead of loading specific skills on demand."
      - type: file_line
        reference: "docs/analysis/2026-06-10-stanford-cs153-ai-native-company-1000x-engineer/analysis.md:197-200"
        note: "Token overflow, one-shot skillify, duplicate skills, and trigger-eval false confidence failure modes."
      - type: not_found
        reference: "docs/canonical/*.md, curriculum/**/*.md, .opencode/skills/*/SKILL.md"
        note: "Exact pattern name not found."
  - number: 6
    pattern: "Split-Brain Planning Review"
    classification: "Partial Coverage"
    integration_value: Medium
    justification: "The repo separates planning, execution, generation, evaluation, and second-agent review, but lacks distinct engineering-quality and product/CEO-destination planning reviewers with separate rubrics."
    evidence:
      - type: file_line
        reference: "curriculum/05-core-concepts/02-planning-execution-separation.md:47-54"
        note: "Planner and Executor phases avoid planning/execution collapse."
      - type: file_line
        reference: "curriculum/05-core-concepts/02-planning-execution-separation.md:60-72"
        note: "Planner, Generator, and Evaluator responsibilities."
      - type: file_line
        reference: "curriculum/05-core-concepts/03-generator-evaluator-pattern.md:151-153"
        note: "Separate creating from judging so the system proves it is right."
      - type: file_line
        reference: ".opencode/skills/refine-issue/SKILL.md:8-21"
        note: "Issue decomposition into executable sub-issues with dependency relationships."
      - type: file_line
        reference: ".opencode/skills/issue-review/SKILL.md:12-15"
        note: "Validation and second-agent review before merge."
      - type: not_found
        reference: "docs/canonical/*.md, curriculum/**/*.md, .opencode/skills/*/SKILL.md"
        note: "Exact pattern name plus Stanford-specific CEO-review and 10x ambition review mechanics were not found outside current pattern file."
  - number: 7
    pattern: "Multi-Model Evaluation Council"
    classification: "Partial Coverage"
    integration_value: Medium
    justification: "The repo teaches independent evaluator plurality and disagreement escalation, but not evaluator model diversity, formal council aggregation, or calibration across model-specific blind spots."
    evidence:
      - type: file_line
        reference: "curriculum/05-core-concepts/08-evaluation-rubrics.md:156-164"
        note: "Evaluation coordination strategies include Dual/Ensemble Evaluator and Continuous Calibration Loop."
      - type: file_line
        reference: "curriculum/05-core-concepts/08-evaluation-rubrics.md:162-166"
        note: "Two or more Evaluators apply the same rubric independently, compare scores, and escalate divergence."
      - type: file_line
        reference: "curriculum/06-knowledge-graphs/detailed-graphs/evaluation-rubrics-graphs.md:827"
        note: "Dual/Ensemble Evaluator with independent evaluators, score comparison, and divergence tolerance."
      - type: file_line
        reference: "curriculum/06-knowledge-graphs/detailed-graphs/evaluation-rubrics-graphs.md:1660"
        note: "Human review calibrates rubrics, audits gray zones, and reviews evaluator divergences."
      - type: not_found
        reference: "docs/canonical/*.md, curriculum/**/*.md, .opencode/skills/*/SKILL.md"
        note: "Exact pattern name and model-diversity/council aggregation language were not found outside current pattern file."
  - number: 8
    pattern: "Trace-Eval-Replay Self-Healing Flywheel"
    classification: "Already Exists"
    integration_value: Low
    justification: "The repo already documents the same canonical flywheel: capture production failures and traces, label expected behavior, replay baseline and candidate versions, assign eval tiers, and preserve links to incidents and PRs."
    evidence:
      - type: file_line
        reference: "docs/canonical/production-failure-regression-flywheel.md:22-24"
        note: "Production failures repeat when they rely on human memory rather than permanent tests."
      - type: file_line
        reference: "docs/canonical/production-failure-regression-flywheel.md:28-40"
        note: "Failure intake, trace capture, privacy, labels, dedupe, tier assignment, backfill, links, and pruning."
      - type: file_line
        reference: "docs/canonical/production-failure-regression-flywheel.md:42-53"
        note: "Failure taxonomy."
      - type: file_line
        reference: "docs/canonical/production-grounded-eval-sampling.md:28-50"
        note: "Production-sampled replay datasets with traces, state snapshots, labels, baseline/candidate replay, and reporting."
      - type: file_line
        reference: "curriculum/07-implementation-guides/05-trace-analysis-guide.md:73-101"
        note: "Trace anatomy for diagnosis."
      - type: not_found
        reference: "docs/canonical/*.md, curriculum/**/*.md, .opencode/skills/*/SKILL.md"
        note: "Exact pattern name not found; equivalent exists as Production Failure Regression Flywheel."
  - number: 9
    pattern: "Epistemic Memory Graph"
    classification: "Partial Coverage"
    integration_value: Medium
    justification: "The repo has knowledge graphs, addressable memory catalogs, retrieval warnings, manifests, and graph documentation, but lacks epistemic labels, hybrid retrieval fusion, and dynamic ontology governance for agent memory."
    evidence:
      - type: file_line
        reference: "docs/canonical/addressable-memory-catalog.md:22-24"
        note: "External memory must expose compact information for retrieval decisions."
      - type: file_line
        reference: "docs/canonical/addressable-memory-catalog.md:28-43"
        note: "Stable IDs, kind, location, preview, scope, and fetch contract."
      - type: file_line
        reference: "docs/canonical/addressable-memory-catalog.md:51-55"
        note: "Adjacent retrieval, privacy/scope filters, output refs, manifests, and memory-store mechanics."
      - type: file_line
        reference: "docs/canonical/addressable-memory-catalog.md:57-66"
        note: "Missing explicit implementation and observability for offered/fetched IDs."
      - type: file_line
        reference: "curriculum/06-knowledge-graphs/01-concept-ecosystem.md:75-91"
        note: "Knowledge graphs connect concepts into an ecosystem."
      - type: file_line
        reference: "curriculum/08-tools-templates/knowledge-graph-template.md:51-60"
        note: "Knowledge graph method for dependencies, operational order, and maturity timelines."
      - type: not_found
        reference: "docs/canonical/*.md, curriculum/**/*.md, .opencode/skills/*/SKILL.md"
        note: "Exact pattern name and epistemic/hunch/person-specific/world-knowledge/reciprocal-rank-fusion/dynamic-ontology mechanics were not found outside current pattern file."
  - number: 10
    pattern: "Taste-to-Domain-Eval Ownership Loop"
    classification: "Better Implementation"
    integration_value: Low
    justification: "The repo has a richer KODA-specific domain-eval system with weighted rubrics, blockers, decision logic, audit fields, Generator/Evaluator loops, state files, human review, continuous calibration, production outcomes, and eval-to-production correlation tracking."
    evidence:
      - type: file_line
        reference: "curriculum/04-nivel-4-koda-specific/04-evaluation-rubrics-koda.md:22-45"
        note: "KODA evaluation is grounded in commercial, relational, and safety risk."
      - type: file_line
        reference: "curriculum/04-nivel-4-koda-specific/04-evaluation-rubrics-koda.md:50-58"
        note: "KODA rubric families, criteria, weights, blockers, decision logic, feedback loops, audit IDs, calibration, and evidence."
      - type: file_line
        reference: "curriculum/04-nivel-4-koda-specific/04-evaluation-rubrics-koda.md:85-126"
        note: "Evaluator applies rubric, scores, feeds back, decides, and blocks customer output when needed."
      - type: file_line
        reference: "curriculum/05-core-concepts/08-evaluation-rubrics.md:152-166"
        note: "Rubric orchestration strategies from hard-rule pregates to continuous calibration."
      - type: file_line
        reference: "docs/canonical/eval-to-production-correlation-tracking.md:28-50"
        note: "Correlation tracking between eval scores and production outcomes."
      - type: not_found
        reference: "docs/canonical/*.md, curriculum/**/*.md, .opencode/skills/*/SKILL.md"
        note: "Exact pattern name not found; repo implementation is more mature under KODA rubrics and eval correlation."
  - number: 11
    pattern: "Domain-Embedded Workflow Automation Wedge"
    classification: "Partial Coverage"
    integration_value: Medium
    justification: "The repo deeply embeds KODA workflows, customer journeys, order-processing steps, and domain-specific evals, but does not formalize shadowing messy work or choosing the first automation wedge from observed operations."
    evidence:
      - type: file_line
        reference: "curriculum/04-nivel-4-koda-specific/02-customer-journey-flows.md:36-46"
        note: "Awareness state with trigger, goal, guard, and output."
      - type: file_line
        reference: "curriculum/04-nivel-4-koda-specific/02-customer-journey-flows.md:76-110"
        note: "Consideration decomposed into discovery, filtering, comparison, validation, and guard conditions."
      - type: file_line
        reference: "curriculum/09-case-studies/04-koda-order-processing.md:18-28"
        note: "Six-stage order-processing pain with costly single-agent errors."
      - type: file_line
        reference: "curriculum/09-case-studies/04-koda-order-processing.md:31-45"
        note: "Each processing step becomes sprint contracts with Generator/Evaluator responsibilities, tests, and criteria."
      - type: file_line
        reference: "curriculum/04-nivel-4-koda-specific/04-evaluation-rubrics-koda.md:24-45"
        note: "Workflow quality tied to history, preferences, restrictions, budget, tone, commercial pressure, and business validation."
      - type: not_found
        reference: "docs/canonical/*.md, curriculum/**/*.md, .opencode/skills/*/SKILL.md"
        note: "Exact pattern name plus shadowing notes and automation wedge mechanics were not found outside current pattern file."
