terminology:
  - term: "Agent"
    definition: "Autonomous LLM-based entity that can take actions, use tools, and execute tasks in sequence."
    source: "curriculum/GLOSSARY.md:17-24"
  - term: "Agent Loop"
    definition: "Repeated input -> think -> action -> result -> repeat cycle."
    source: "curriculum/GLOSSARY.md:28-35"
  - term: "Context Window"
    definition: "Total number of tokens a model can process at once; the agent's immediate memory."
    source: "curriculum/GLOSSARY.md:97-107"
  - term: "Context Amnesia"
    definition: "Forgetting prior context after exceeding the useful context window."
    source: "curriculum/GLOSSARY.md:37-45"
  - term: "Context Rot"
    definition: "Gradual coherence loss as the agent advances through the context window."
    source: "curriculum/GLOSSARY.md:88-94"
  - term: "Context Anxiety"
    definition: "Rushed behavior near the context limit."
    source: "curriculum/GLOSSARY.md:77-85"
  - term: "Context Progressive Disclosure"
    definition: "Architecture where instructions and capabilities are loaded by resolver-triggered skills rather than living in one monolithic prompt."
    source: "curriculum/GLOSSARY.md:110-113"
  - term: "Harness"
    definition: "Infrastructure and patterns around agents that make them reliable for long periods."
    source: "curriculum/GLOSSARY.md:265-278"
  - term: "Harness Evolution"
    definition: "Simplifying or removing harness components as models improve."
    source: "curriculum/GLOSSARY.md:282-295"
  - term: "Generator"
    definition: "Agent responsible for building or creating output."
    source: "curriculum/GLOSSARY.md:215-225"
  - term: "Evaluator"
    definition: "Separate agent responsible for evaluating Generator work against rubrics."
    source: "curriculum/GLOSSARY.md:131-143"
  - term: "Generator/Evaluator Pattern"
    definition: "Two separate entities collaborate: one generates, one evaluates."
    source: "curriculum/GLOSSARY.md:228-248; docs/canonical/generator-evaluator.md:29-85"
  - term: "Sprint Contract"
    definition: "Pre-work agreement about what done means before execution starts."
    source: "curriculum/GLOSSARY.md:117-126"
  - term: "Evaluation Rubric"
    definition: "Measurable criteria for evaluating subjective quality."
    source: "curriculum/GLOSSARY.md:147-163"
  - term: "Trace"
    definition: "Detailed log of an agent's inputs, reasoning, actions, and outputs."
    source: "curriculum/GLOSSARY.md:653-668"
  - term: "Memory / State"
    definition: "Information retained between operations, including short-term, long-term, and file-based storage."
    source: "curriculum/GLOSSARY.md:380-390"
  - term: "Multi-Agent System"
    definition: "System with multiple independent coordinated agents, commonly Planner, Generator, and Evaluator."
    source: "curriculum/GLOSSARY.md:407-419"
  - term: "Planner"
    definition: "Agent specialized in breaking a problem into steps."
    source: "curriculum/GLOSSARY.md:425-439"
  - term: "KODA"
    definition: "WhatsApp supplement-sales conversational AI agent and case study for the program."
    source: "curriculum/GLOSSARY.md:352-363"
  - term: "ICE Craft Separation"
    definition: "Separation of agentic work into Intent, Context, and Expectations with explicit owners."
    source: "curriculum/GLOSSARY.md:314-327; docs/canonical/ice-craft-separation.md:31-58"
  - term: "Intent as Five-Part Primitive"
    definition: "Intent structured as description, constraints, failure scenarios, success scenarios, and connections."
    source: "curriculum/GLOSSARY.md:331-346; docs/canonical/intent-five-part-primitive.md:33-48"
  - term: "Human-Owned Expectations Boundary"
    definition: "Done and failure criteria are artifacts authored by the outcome owner and consumed by the harness."
    source: "curriculum/GLOSSARY.md:298-309"
  - term: "Token Budget"
    definition: "Conscious management of available, consumed, and reserved tokens."
    source: "curriculum/GLOSSARY.md:622-632; docs/canonical/explicit-token-budget-ledger.md:13-15"
  - term: "Token Economics of Gap-Filling"
    definition: "Attribution model linking token cost to gaps in Intent, Context, and Expectations."
    source: "curriculum/GLOSSARY.md:636-649"
  - term: "Fuzzy Compiler"
    definition: "Mental model where LLM is a compiler backend, harnesses are optimization passes, and generated code is a build artifact."
    source: "curriculum/GLOSSARY.md:182-197; .opencode/skills/llm-as-fuzzy-compiler/SKILL.md:13-21"
  - term: "Persona-Based Documentation"
    definition: "Persona-specific NFR documents loaded by relevant agents or reviewers."
    source: "curriculum/GLOSSARY.md:452-466; .opencode/skills/persona-based-documentation/SKILL.md:13-21"
  - term: "Presence-in-the-Loop Metric"
    definition: "Governance metric that measures human involvement during agentic execution."
    source: "curriculum/GLOSSARY.md:470-484"
  - term: "Verification Loop"
    definition: "Cycle where Generator creates, tests or Evaluator verifies, and feedback returns to Generator."
    source: "curriculum/GLOSSARY.md:674-687"

curriculum:
  levels:
    - name: "Nivel 1 - Fundamentos"
      focus: "Why agents fail: context, token budget, and basic harness patterns."
      duration: "3-4h overview"
      artifacts:
        - "3 lessons"
        - "2 exercises"
        - "KODA application"
      source: "curriculum/README.md:188-198; curriculum/MASTER_PLAN.md:180-197"
    - name: "Nivel 2 - Padroes Praticos"
      focus: "Generator/Evaluator, Sprint Contracts, Rubric Design, Trace Reading, Error Context Hygiene, and Intent Five-Part Primitive."
      duration: "6-8h overview"
      artifacts:
        - "4 lessons"
        - "5 exercises"
        - "KODA rubrics and generator/evaluator application"
      source: "curriculum/README.md:202-213; curriculum/INDEX.md:105-111; curriculum/MASTER_PLAN.md:201-220"
    - name: "Nivel 3 - Arquitetura Avancada"
      focus: "Multi-agent systems, state persistence, file-based coordination, compaction, harness evolution, review governance, and presence metrics."
