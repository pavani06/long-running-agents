meta:
  title: "Mental Model: The Anatomy of Intent - ICE in IDSD"
  date: "2026-06-11"
  repo: "long-running-agents"
  type: "mental-model"

goals:
  - "Build and manage long-running AI agent workflows through `.opencode/`, Node >= 20.18.0/ESM, `.runtime/`, `artifacts/`, and accepted decisions under `docs/decisions/`. Sources: AGENTS.md:7-12, README.md:107-113."
  - "Teach why long-running agents fail through context loss, fragile planning, and blind self-evaluation, then teach harnesses that manage context, decompose work, and separate generation from evaluation. Sources: README.md:3-13."
  - "Serve business builders and production operators of agentic systems, from beginners through advanced architects. Sources: README.md:15-17."
  - "Deliver a 12-week, 4-level curriculum with 8 core concepts, 35+ diagrams, exercises, templates, and KODA-specific application. Sources: curriculum/README.md:11-13, curriculum/MASTER_PLAN.md:18-27."
  - "Apply the curriculum to KODA, a WhatsApp supplement-sales agent that must maintain quality across 2+ hour conversations. Sources: curriculum/README.md:33-34, curriculum/GLOSSARY.md:352-363."
  - "Govern documentation by explicit precedence: accepted ADRs, active canonical docs, validated evidence, analyses, archive docs, then READMEs and operational summaries. Sources: docs/system-of-record.md:14-21, AGENTS.md:64-75."
  - "Transform external knowledge into concrete repository improvements through analyze-and-improve phases: repository mental model, extraction, patterns, classification, improvements, integration, and curriculum integration. Sources: .opencode/skills/analyze-and-improve/SKILL.md:47-57, .opencode/skills/analyze-and-improve/SKILL.md:171-249."

architecture:
  abstractions:
    - name: "System of Record"
      role: "Source of truth for precedence, project domains, source inventory, and pending gaps."
      sources:
        - "docs/system-of-record.md:12-23"
    - name: "Documentation Precedence"
      role: "Authority ladder from accepted ADRs through canonical docs, evidence, analyses, archive docs, and operational summaries."
      sources:
        - "docs/system-of-record.md:14-21"
        - "AGENTS.md:64-75"
    - name: "Operational Contract"
      role: "Repository rules for task scope, minimum viable change, validation gates, security constraints, and Obsidian documentation conventions."
      sources:
        - "AGENTS.md:14-32"
        - "AGENTS.md:53-85"
        - "AGENTS.md:120-238"
    - name: "Canonical Pattern Catalog"
      role: "Authoritative library for agentic architecture, context engineering, evals, governance, intent/ICE, and review patterns."
      sources:
        - "docs/system-of-record.md:135-211"
    - name: "Curriculum"
      role: "Primary product: 12-week program with 4 levels, 8 core concepts, exercises, solutions, KODA applications, knowledge graphs, guides, templates, and case studies."
      sources:
        - "docs/system-of-record.md:57-82"
        - "curriculum/README.md:11-13"
        - "curriculum/MASTER_PLAN.md:178-267"
    - name: "Agent System / HoP"
      role: "`.opencode` layer of agents and skills for orchestration, issue lifecycle, review, documentation, analysis, and governance gates."
      sources:
        - "docs/system-of-record.md:25-55"
        - "README.md:62-66"
    - name: "Issue Lifecycle"
      role: "Safe work lifecycle: claim, isolated worktree, execution brief, validation, draft PR, second-agent review, explicit merge, cleanup."
      sources:
        - ".opencode/skills/issue-start/SKILL.md:78-149"
        - ".opencode/skills/issue-review/SKILL.md:44-226"
        - ".opencode/skills/issue-finish/SKILL.md:50-170"
    - name: "Application-Owned Control Plane"
      role: "Control-plane contract joining versioned prompt, context builder, structured action schema, deterministic dispatch, loop policy, persistent state, and intervention gates."
      sources:
        - "docs/canonical/application-owned-agent-control-plane.md:27-75"
    - name: "Context and Memory Stack"
      role: "Stable prompt, durable state, head/tail anchors, summaries, omitted-memory catalog, token ledger, and budget-aware handoff."
      sources:
        - "docs/canonical/hybrid-context-stack.md:28-42"
        - "docs/canonical/hybrid-context-stack.md:71-82"
    - name: "Evaluation and Review Stack"
      role: "Generator/Evaluator, fast/medium/deep eval tiers, PR gates, regression flywheels, shadow review, and contextual severity."
      sources:
        - "docs/canonical/generator-evaluator.md:29-85"
        - "docs/canonical/eval-tier-stratification.md:20-50"
        - "docs/canonical/shadow-review-pipeline.md:13-28"
    - name: "Intent and ICE Layer"
      role: "Intent, Context, and Expectations as separate crafts with explicit owners; intent can be validated as a five-part primitive before execution."
      sources:
        - "docs/canonical/ice-craft-separation.md:29-77"
        - "docs/canonical/intent-five-part-primitive.md:29-52"
    - name: "KODA Case Domain"
      role: "Applied proof surface for WhatsApp sales, product discovery, order processing, fulfillment, customer journeys, rubrics, and harness improvements."
      sources:
        - "curriculum/README.md:33-34"
        - "curriculum/README.md:232-243"
        - "curriculum/GLOSSARY.md:352-363"
  relationships:
    - from: "System of Record"
      to: "Documentation surfaces"
      relationship: "Defines source authority before lower-precedence docs, analyses, or operational summaries can settle conflicts."
      sources:
        - "docs/system-of-record.md:14-21"
    - from: "AGENTS.md"
      to: "Agent work"
      relationship: "Constrains agent behavior, validation, security, and Obsidian documentation output."
      sources:
        - "AGENTS.md:14-32"
        - "AGENTS.md:53-85"
        - "AGENTS.md:120-238"
    - from: "Canonical docs"
      to: "Curriculum"
      relationship: "Canonical docs name patterns; curriculum converts them into lessons, exercises, KODA applications, graphs, guides, and templates."
      sources:
        - "docs/system-of-record.md:135-211"
        - "curriculum/INDEX.md:82-180"
    - from: "Curriculum"
      to: "KODA"
      relationship: "Generic concepts in levels 1-3 culminate in KODA-specific architecture, journeys, feature patterns, rubrics, exercises, and case studies."
      sources:
        - "curriculum/README.md:186-243"
        - "curriculum/INDEX.md:56-65"
    - from: "HoP skills"
      to: "Repository execution"
      relationship: "Issue-start prepares, issue-review validates and stops, issue-finish merges after explicit approval, and orchestrator coordinates without implementing."
      sources:
        - ".opencode/skills/issue-start/SKILL.md:12-15"
        - ".opencode/skills/issue-review/SKILL.md:12-15"
        - ".opencode/skills/issue-finish/SKILL.md:12-15"
        - ".opencode/skills/orchestrator/SKILL.md:12-17"
    - from: "Application-Owned Control Plane"
      to: "Owned Agent Control Loop"
      relationship: "Extends the four owned loop components with structured action, persistent state, and explicit intervention gates."
      sources:
        - "docs/canonical/application-owned-agent-control-plane.md:29-75"
        - "docs/canonical/owned-agent-control-loop.md:29-75"
    - from: "Context and Memory Stack"
      to: "Long-session continuity"
      relationship: "Preserves stable prompt and durable facts, pins head/tail anchors, summarizes or catalogs the middle, and emits budget decisions."
      sources:
        - "docs/canonical/hybrid-context-stack.md:34-42"
        - "docs/canonical/hybrid-context-stack.md:121-136"
    - from: "Evaluation Stack"
      to: "Production quality"
      relationship: "Separates generation from judgment and maps evidence depth to local, PR, release, incident, and canary triggers."
      sources:
        - "docs/canonical/generator-evaluator.md:31-85"
        - "docs/canonical/eval-tier-stratification.md:26-72"
    - from: "Intent and ICE Layer"
      to: "Harness execution"
      relationship: "Humans own Intent and Expectations; the harness owns Context and Loop; gaps become routed questions instead of inferred agent decisions."
      sources:
        - "docs/canonical/ice-craft-separation.md:31-63"
        - "docs/canonical/intent-five-part-primitive.md:43-52"

