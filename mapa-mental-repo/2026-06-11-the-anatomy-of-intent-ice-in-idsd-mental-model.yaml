      source: "curriculum/README.md:217-228; curriculum/INDEX.md:112-122; curriculum/MASTER_PLAN.md:224-243"
    - name: "Nivel 4 - KODA-specific"
      focus: "KODA architecture, journeys, feature patterns, KODA rubrics, harness improvements, real-world exercises, and case studies."
      duration: "continuous"
      artifacts:
