# Mental Model YAML — ecossistema-pavan
# Typed mirror of the mental model markdown
# Generated: 2026-06-26

meta:
  title: "Mental Model — ecossistema-pavan"
  date: 2026-06-26
  repo: ecossistema-pavan
  type: mental-model
  sources:
    - AGENTS.md
    - long-running-agents/README.md
    - long-running-agents/docs/system-of-record.md
    - long-running-agents/curriculum/GLOSSARY.md
    - long-running-agents/docs/ecosystem-glossary.md
    - obsidian-eval/README.md
    - .omo/plans/
    - plans/adr/

goals:
  - "Resolver degradação de agentes de IA em execuções longas via harness engineering, não prompts/modelos melhores"
  - "Currículo completo de 12 semanas (4 níveis, 8 conceitos core) sobre construção de agentes long-running"
  - "85+ padrões canônicos de arquitetura agentica como sistema de referência autoritativo"
  - "Runtime programável para vaults Obsidian (obsidian-eval, @pavani/obsidian-eval no npm)"
  - "Pipeline de ingestão de conhecimento externo (analyze-and-improve, 7 fases)"
  - "Sistema de agentes com Handoff Protocol — 28 skills, 3 agentes, 237 testes"
  - "Stack de telemetria com learning flywheel cross-session de ciclo fechado"
  - "Livro agentico publicado via Quarto (10 capítulos, 70+ padrões mapeados)"
  - "Runtime privado cross-session (sisyphus-runtime) com handoffs, fatos duráveis, pipeline de conhecimento"

architecture:
  abstractions:
    - name: Vault
      definition: "Repositório de conhecimento em Markdown gerenciado pelo obsidian-eval, com MANIFEST.md declarando exports/imports"
      location: obsidian-eval/src/types.ts
    - name: CanonicalDoc
      definition: "Documento autoritativo (type: canonical) que define padrão reutilizável de design de agente"
      location: long-running-agents/docs/canonical/
    - name: Skill
      definition: "Conjunto de instruções e workflows para domínio específico, carregado via skill(name=...)"
      location: ~/.config/opencode/skills/
    - name: Handoff
      definition: "Snapshot de estado de sessão OpenCode persistido como nota (type: session-handoff) no vault de runtime"
      location: ~/sisyphus-runtime/sessions/
    - name: DurableFact
      definition: "Conhecimento persistido com valid_from/valid_to, confidence, provenance"
      location: ~/sisyphus-runtime/facts/
    - name: ExecutionGraph
      definition: "DAG de tarefas com nós, status (pending/in_progress/completed/blocked), estimativas de tokens, contexto de retomada"
      location: obsidian-eval/src/execution-graph.ts
    - name: TraceSpan
      definition: "Registro instrumentado de chamada task(): categoria, subagent_type, duração, tokens, success/failure"
      location: ~/scripts/telemetry/trace-cli.ts
    - name: KnowledgePipeline
      definition: "Fluxo completo: handoff → compressWorkingMemory → relevanceScore → promotePatterns → buildProvenance → checkDrift → appendFact"
      location: obsidian-eval/src/memory-layers.ts
    - name: LearningFlywheel
      definition: "Sistema que detecta padrões de falha, classifica severidade e dispara correção automática via QI loop (60s daemon)"
      location: ~/scripts/telemetry/flywheel-daemon.service
    - name: TokenBudget
      definition: "Orçamento de tokens com 4 fases: green (>60%), yellow (>40%), orange (>20%), red (≤20%)"
      location: ~/.config/opencode/skills/budget-monitor/
    - name: GroundTruth
      definition: "Assertions imutáveis definidas por humanos que bloqueiam contaminação do pipeline de conhecimento"
      location: ~/sisyphus-runtime/facts/_global/ground-truth.md
    - name: ADR
      definition: "Architecture Decision Record formalizado com contexto, opções, trade-offs e consequências"
      location: plans/adr/
    - name: SystemOfRecord
      definition: "Documento que define precedência (6 níveis) e fontes canônicas de cada domínio"
      location: long-running-agents/docs/system-of-record.md
    - name: EpistemicGraph
      definition: "Grafo de entidades e relacionamentos extraído automaticamente do vault de runtime (174 nós, 191 edges)"
      location: obsidian-eval/src/epistemic-graph.ts

  relationships:
    - from: Handoff
      to: canonical-context skill
      description: "Injeta contexto de continuidade na sessão N+1"
    - from: Handoff
      to: KnowledgePipeline
      description: "Alimenta compressWorkingMemory → promotePatterns → DurableFact"
    - from: DurableFact
      to: checkDrift
      description: "Validação contra Ground Truths antes da promoção"
    - from: KnowledgePipeline
      to: ReflectionLoop
      description: "Pipeline diário (09:00 BRT): Gather → Analyze → Synthesize → Apply"
    - from: TraceSpan
      to: TelemetryDB
      description: "Persistência em SQLite para dashboards, SLOs e análise"
    - from: TelemetryDB
      to: FlywheelDaemon
      description: "Processa triggers a cada 60s → consumer dispara QI loop se anomaly_score ≥ 80"
    - from: ExecutionGraph
      to: canonical-context skill
      description: "Fornece estado de execução para retomada cross-session"
    - from: EpistemicGraph
      to: Vault
      description: "Extrai entidades e relacionamentos do vault de runtime"

