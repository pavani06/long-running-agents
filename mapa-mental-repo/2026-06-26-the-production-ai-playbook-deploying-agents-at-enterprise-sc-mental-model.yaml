terminology:
  # N1 — Fundamentos
  - term: Agent
    definition: "Entidade autônoma de IA (baseada em LLM) que toma ações, usa ferramentas e executa tarefas em sequência"
    source: curriculum/GLOSSARY.md:18
    level: 1
  - term: Context Window
    definition: "Número total de tokens que um modelo pode processar por vez — a memória imediata do agente"
    source: curriculum/GLOSSARY.md:158
    level: 1
  - term: Context Amnesia
    definition: "Quando um agente esquece contexto anterior por ter excedido a janela de contexto"
    source: curriculum/GLOSSARY.md:50
    level: 1
  - term: Token
    definition: "Unidade básica de texto que um LLM processa (~4 caracteres)"
    source: curriculum/GLOSSARY.md:770
    level: 1
  - term: Token Budget
    definition: "Gerenciamento consciente de quantos tokens estão disponíveis e como são alocados"
    source: curriculum/GLOSSARY.md:783
    level: 1
  - term: Harness
    definition: "Infraestrutura e padrões que envolvem agentes para torná-los confiáveis por períodos longos"
    source: curriculum/GLOSSARY.md:370
    level: 1

  # N2 — Padrões Práticos
  - term: Generator-Evaluator
    definition: "Duas entidades separadas: uma gera, outra avalia. Previne sycophancy"
    source: curriculum/GLOSSARY.md:333
    level: 2
  - term: Sprint Contract
    definition: "Acordo negociado entre generator e evaluator sobre o que 'pronto' significa"
    source: curriculum/GLOSSARY.md:191
    level: 2
  - term: ICE Craft Separation
    definition: "Decomposição em Intent, Context, Expectations com donos explícitos"
    source: curriculum/GLOSSARY.md:419
    level: 2
  - term: Intent as Five-Part Primitive
    definition: "Formalização do intent em 5 campos: description, constraints, failure scenarios, success scenarios, connections"
    source: curriculum/GLOSSARY.md:436
    level: 2
  - term: Two-Implementations Goal Test
    definition: "Heurística: duas implementações diferentes podem ambas satisfazer? → goal vs spec"
    source: curriculum/GLOSSARY.md:849
    level: 2
  - term: Goal Atomicity Split
    definition: "Um goal = uma sentença sem conjunções, sem 'and', sem 'then'"
    source: curriculum/GLOSSARY.md:304
    level: 2
  - term: Trace (Agent Trace)
    definition: "Log detalhado de cada passo do agente — ferramenta primária de debugging"
    source: curriculum/GLOSSARY.md:830
    level: 2

  # N3 — Arquitetura Avançada
  - term: Multi-Agent System
    definition: "Múltiplos agentes independentes que coordenam entre si"
    source: curriculum/GLOSSARY.md:512
    level: 3
  - term: Harness Evolution
    definition: "Processo de simplificar/remover componentes de harness conforme o modelo melhora"
    source: curriculum/GLOSSARY.md:387
    level: 3
  - term: LLM as Fuzzy Compiler
    definition: "LLM como compilador fuzzy, harness como passes de otimização, código como artefato descartável"
    source: curriculum/GLOSSARY.md:271
    level: 3
  - term: Compartmented Evaluation
    definition: "Builder e Validator com superfícies de informação seladas"
    source: curriculum/GLOSSARY.md:90
    level: 3
  - term: Garbage Collection Day
    definition: "Meta-loop semanal de limpeza de harness: revisão de slop, guardrails, manutenção"
    source: curriculum/GLOSSARY.md:291
    level: 3
  - term: Relational Context Graph
    definition: "Grafo com edges tipados: dependency, provenance, supersession, causation"
    source: curriculum/GLOSSARY.md:612
    level: 3
  - term: Tiered Context Storage
    definition: "3 tiers (hot/warm/cold) com promoção/demissão dinâmica por relevância"
    source: curriculum/GLOSSARY.md:814
    level: 3
  - term: Selection-Budgeted Retrieval
    definition: "Retrieval com ranking por valor/custo, budget awareness"
    source: curriculum/GLOSSARY.md:661
    level: 3
  - term: Deliberate Forgetting
    definition: "Esquecimento como operação intencional de primeira classe"
    source: curriculum/GLOSSARY.md:205
    level: 3

  # Ecossistema — Runtime
  - term: Vault
    definition: "Repositório de conhecimento em Markdown gerenciado pelo obsidian-eval, com MANIFEST.md"
    source: docs/ecosystem-glossary.md:40
    level: ecosystem
  - term: Cross-vault Wikilink
    definition: "Wikilink com prefixo vault:<nome>/ que referencia outro vault"
    source: docs/ecosystem-glossary.md:96
    level: ecosystem
  - term: Knowledge Pipeline
    definition: "Fluxo completo: handoff → compress → relevance → promote → provenance → drift → append"
    source: docs/ecosystem-glossary.md:194
    level: ecosystem
  - term: Handoff
    definition: "Snapshot de estado de sessão OpenCode (type: session-handoff) com continuity_message, open_decisions, memory_handles"
    source: docs/ecosystem-glossary.md:208
    level: ecosystem
  - term: Durable Fact
    definition: "Conhecimento persistido com valid_from/valid_to, confidence, provenance"
    source: docs/ecosystem-glossary.md:248
    level: ecosystem
  - term: Reflection Loop
    definition: "Pipeline cross-session: Gather → Analyze → Synthesize → Apply (diário 09:00 BRT)"
    source: docs/ecosystem-glossary.md:327
    level: ecosystem
  - term: Ground Truth
    definition: "Assertions imutáveis (5) que bloqueiam contaminação do pipeline"
    source: docs/ecosystem-glossary.md:492
    level: ecosystem
  - term: Drift Detection
    definition: "Verificação de que princípio candidato não contradiz ground truth (Jaccard similarity > 0.3)"
    source: docs/ecosystem-glossary.md:510
    level: ecosystem
  - term: Telemetry DB
    definition: "Banco SQLite com métricas de sessão: tokens, traces, SLOs, burn rates"
    source: docs/ecosystem-glossary.md:117
    level: ecosystem
  - term: Execution Graph
    definition: "DAG de tarefas com nós, status, estimativas de tokens, contexto de retomada O(1)"
    source: docs/ecosystem-glossary.md:177
    level: ecosystem
  - term: Epistemic Graph
    definition: "Grafo de entidades e relacionamentos extraído do vault de runtime (174 nós, 191 edges)"
    source: docs/ecosystem-glossary.md:469
    level: ecosystem
  - term: System of Record
    definition: "Documento que define precedência (6 níveis) e fontes canônicas de cada domínio"
    source: docs/ecosystem-glossary.md:569
    level: ecosystem
  - term: Orchestrator
    definition: "Agente principal (Sisyphus) que decompõe tarefas e delega para sub-agentes especializados"
    source: docs/ecosystem-glossary.md:445
    level: ecosystem
  - term: Token Budget (ecosystem)
    definition: "Orçamento de tokens com 4 fases: green (>60%), yellow (>40%), orange (>20%), red (≤20%)"
    source: docs/ecosystem-glossary.md:418
    level: ecosystem

curriculum:
  levels:
    - name: N1 — Fundamentos
      duration: 3-4h
      question: "Por que agentes falham em tarefas longas?"
      concepts:
        - context-window
        - token-budget
        - basic-harness
        - amnesia
        - context-rot
      exercises: 3
      lessons: 3
    - name: N2 — Padrões Práticos
      duration: 6-8h
      question: "Como fazer agentes mais confiáveis?"
      concepts:
        - generator-evaluator
        - sprint-contracts
        - rubrics
        - trace-reading
        - ice-separation
        - intent-primitives
      exercises: 7
      lessons: 4
    - name: N3 — Arquitetura Avançada
      duration: 8-10h
      question: "Como construir sistemas sofisticados?"
      concepts:
        - multi-agent
        - state-persistence
        - file-coordination
        - harness-evolution
        - fuzzy-compiler
        - tiered-context
        - constraint-engineering
      exercises: 13
      lessons: 5
    - name: N4 — Aplicação KODA
      duration: "Contínuo (semanas 5-12)"
      question: "Como aplicar tudo em produção?"
      concepts:
        - koda-architecture
        - customer-journeys
        - feature-patterns
        - production-evals
        - harness-improvements
      exercises: 5
      lessons: 5

  concepts:
    - name: Context Management
      where: 05-core-concepts/01-context-management.md
      level: 1
      status: pending
    - name: Planning-Execution Separation
      where: 05-core-concepts/02-planning-execution-separation.md
      level: 2
      status: pending
    - name: Generator-Evaluator Pattern
      where: 05-core-concepts/03-generator-evaluator-pattern.md
      level: 2
      status: pending
    - name: Sprint Contracts
      where: 05-core-concepts/04-sprint-contracts.md
      level: 2
      status: pending
    - name: State Persistence
      where: 05-core-concepts/05-state-persistence.md
      level: 3
      status: pending
    - name: Harness Evolution
      where: 05-core-concepts/06-harness-evolution.md
      level: 3
      status: pending
    - name: Multi-Agent Coordination
      where: 05-core-concepts/07-multi-agent-coordination.md
      level: 3
      status: pending
    - name: Evaluation Rubrics
      where: 05-core-concepts/08-evaluation-rubrics.md
      level: 2
      status: pending

