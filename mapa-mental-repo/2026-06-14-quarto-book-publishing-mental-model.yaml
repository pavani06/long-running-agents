terminology:
  - term: "Agent"
    definition: "Entidade autônoma de IA que toma ações, usa ferramentas e executa tarefas em sequência."
    source: "curriculum/GLOSSARY.md:17-24"
  - term: "Agent Loop"
    definition: "Ciclo repetitivo input -> pensamento -> ação -> resultado -> repetição."
    source: "curriculum/GLOSSARY.md:28-35"
  - term: "Context Amnesia"
    definition: "Esquecimento de contexto anterior por excesso da janela de contexto."
    source: "curriculum/GLOSSARY.md:37-45"
  - term: "Context Window"
    definition: "Total de tokens que um modelo processa de uma vez, equivalente à memória imediata."
    source: "curriculum/GLOSSARY.md:145-154"
  - term: "Context Progressive Disclosure"
    definition: "Arquitetura em que instruções/capacidades vivem em skills acionadas por resolver, não em prompt monolítico."
    source: "curriculum/GLOSSARY.md:158-162"
  - term: "Sprint Contract"
    definition: "Acordo prévio entre generator e evaluator sobre o que significa pronto."
    source: "curriculum/GLOSSARY.md:165-174"
  - term: "Evaluator"
    definition: "Agente separado responsável por avaliar o trabalho de um Generator contra rubrics."
    source: "curriculum/GLOSSARY.md:179-191"
  - term: "Evaluation Rubric"
    definition: "Critérios mensuráveis para avaliar qualidade subjetiva."
    source: "curriculum/GLOSSARY.md:195-211"
  - term: "Generator"
    definition: "Agente responsável por construir ou criar algo."
    source: "curriculum/GLOSSARY.md:279-288"
  - term: "Generator/Evaluator Pattern"
    definition: "Duas entidades separadas colaboram: uma gera, outra avalia."
    source: "curriculum/GLOSSARY.md:292-310"
  - term: "Harness"
    definition: "Infraestrutura e padrões que envolvem agentes para torná-los confiáveis em execuções longas."
    source: "curriculum/GLOSSARY.md:329-342"
  - term: "Harness Evolution"
    definition: "Processo de simplificar ou remover componentes de harness conforme o modelo melhora."
    source: "curriculum/GLOSSARY.md:346-358"
  - term: "Intent as Five-Part Primitive"
    definition: "Intent formalizada como description, constraints, failure scenarios, success scenarios e connections."
    source: "curriculum/GLOSSARY.md:395-410"
  - term: "KODA"
    definition: "Agente conversacional para venda de suplementos via WhatsApp e case study do programa."
    source: "curriculum/GLOSSARY.md:416-427"
  - term: "Memory / State"
    definition: "Informações retidas entre operações em short-term, long-term ou file-based storage."
    source: "curriculum/GLOSSARY.md:444-454"
  - term: "Multi-Agent System"
    definition: "Sistema com múltiplos agentes independentes, como Planner, Generator e Evaluator."
    source: "curriculum/GLOSSARY.md:471-483"
  - term: "Planner"
    definition: "Agente especializado em quebrar problemas em etapas."
    source: "curriculum/GLOSSARY.md:489-503"
  - term: "Self-Evaluation"
    definition: "Anti-padrão em que o agente avalia o próprio trabalho."
    source: "curriculum/GLOSSARY.md:590-609"
  - term: "Token Budget"
    definition: "Gerenciamento consciente de tokens usados e disponíveis."
    source: "curriculum/GLOSSARY.md:686-696"
  - term: "Trace"
    definition: "Log detalhado de input, reasoning, ações e output do agente."
    source: "curriculum/GLOSSARY.md:717-732"
  - term: "Verification Loop"
    definition: "Ciclo Generator -> Test -> Evaluator -> Feedback."
    source: "curriculum/GLOSSARY.md:754-767"
curriculum:
  levels:
    - name: "Nível 1 - Fundamentos"
      focus: "Por que agentes falham: context windows, token budgeting e padrões básicos de harness."
      duration: "3-4 horas"
      artifacts: ["lições de fundamentos", "2 exercícios", "KODA applications", "critérios para mapear conceitos para KODA"]
      source: "curriculum/README.md:190-203; curriculum/MASTER_PLAN.md:184-202"
    - name: "Nível 2 - Padrões Práticos"
      focus: "Generator/Evaluator, Sprint Contracts, Rubric Design e Trace Reading."
      duration: "6-8 horas"
      artifacts: ["4 tópicos principais", "exercícios", "KODA applications", "rubrics e aplicação de padrões em código real"]
      source: "curriculum/README.md:206-218; curriculum/MASTER_PLAN.md:205-225"
    - name: "Nível 3 - Arquitetura Avançada"
      focus: "Multi-agent systems, state persistence, file-based coordination, server-side compaction e harness evolution."
      duration: "8-10 horas"
      artifacts: ["5 tópicos arquiteturais", "exercícios avançados", "apoio a decisões arquiteturais KODA"]
      source: "curriculum/README.md:221-233; curriculum/MASTER_PLAN.md:228-248"
    - name: "Nível 4 - KODA-Específico"
      focus: "Arquitetura real KODA, customer journeys, feature patterns, rubrics KODA e melhorias de harness."
      duration: "contínuo; 10+ horas no Master Plan"
      artifacts: ["5 módulos KODA", "real-world exercises", "case studies", "participação em decisões arquiteturais"]
      source: "curriculum/README.md:236-248; curriculum/MASTER_PLAN.md:251-270"
  concepts:
    - name: "Context Management"
      source: "curriculum/README.md:251-270; curriculum/MASTER_PLAN.md:349-367"
    - name: "Planning vs. Execution"
      source: "curriculum/README.md:251-270; curriculum/MASTER_PLAN.md:349-367"
    - name: "Generator/Evaluator"
      source: "curriculum/README.md:251-270; curriculum/MASTER_PLAN.md:349-367"
    - name: "Sprint Contracts"
      source: "curriculum/README.md:251-270; curriculum/MASTER_PLAN.md:349-367"
    - name: "State Persistence"
      source: "curriculum/README.md:251-270; curriculum/MASTER_PLAN.md:349-367"
    - name: "Harness Evolution"
      source: "curriculum/README.md:251-270; curriculum/MASTER_PLAN.md:349-367"
    - name: "Multi-Agent Coordination"
      source: "curriculum/README.md:251-270; curriculum/MASTER_PLAN.md:349-367"
    - name: "Evaluation Rubrics"
      source: "curriculum/README.md:251-270; curriculum/MASTER_PLAN.md:349-367"
