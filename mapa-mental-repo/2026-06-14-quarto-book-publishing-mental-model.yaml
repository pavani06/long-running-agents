goals:
  - "Manter uma base de conhecimento e programa curricular para construir sistemas de IA que operam por horas ou dias sem perder contexto, planejamento ou julgamento de qualidade. Source: README.md:3-13."
  - "Ensinar builders de negócio e sistemas agenticos, incluindo iniciantes e operadores em produção que buscam confiabilidade. Source: README.md:15-18."
  - "Tratar harnesses como resposta central para perda de contexto, planejamento frágil e autoavaliação cega. Source: README.md:7-13; curriculum/README.md:21-34."
  - "Entregar um currículo de 12 semanas, 4 níveis, 8 conceitos core e 35+ diagramas. Source: curriculum/README.md:13; curriculum/README.md:251-270; curriculum/README.md:274-288."
  - "Aplicar os padrões em KODA, agente de venda de suplementos via WhatsApp usado como caso real do currículo. Source: README.md:26-30; curriculum/README.md:33-35; curriculum/GLOSSARY.md:416-427."
  - "Operacionalizar trabalho agentic com `.opencode/`, Handoff Protocol, issue lifecycle, validation gates e documentação Obsidian. Source: AGENTS.md:7-12; docs/system-of-record.md:25-58; .opencode/skills/issue-start/SKILL.md:12-15."
  - "Processar fontes externas futuras via pipeline controlado: modelo mental do repo, extração, padrões, classificação, melhorias, integração e integração curricular. Source: .opencode/skills/analyze-and-improve/SKILL.md:47-57; .opencode/skills/analyze-and-improve/SKILL.md:171-279."
architecture:
  abstractions:
    - name: "System of Record"
      role: "Fonte de verdade para precedência documental e mapa dos domínios do projeto."
      source: "docs/system-of-record.md:12-21; docs/system-of-record.md:23-29"
    - name: "Operational Contract"
      role: "AGENTS.md define regras obrigatórias: uma tarefa por sessão, não assumir, mudança mínima, validação, segurança, busca antes de codar e convenções Obsidian."
      source: "AGENTS.md:14-48; AGENTS.md:69-123; AGENTS.md:136-154; AGENTS.md:239-254"
    - name: "Canonical Pattern Library"
      role: "docs/canonical/ é a camada autoritativa ativa para padrões de sistemas e contratos, abaixo apenas de ADRs aceitos."
      source: "docs/system-of-record.md:14-21; docs/system-of-record.md:140-223"
    - name: "Curriculum"
      role: "Produto principal do repo: programa completo de 12 semanas aplicado a KODA, com níveis, exercícios, knowledge graphs, guias, templates e estudos de caso."
      source: "docs/system-of-record.md:62-88; curriculum/README.md:13; curriculum/README.md:57-186"
    - name: "KODA Case Domain"
      role: "Domínio aplicado: sistema multi-agente de venda via WhatsApp com discovery, catálogo, recomendação, pedido, pagamento e fulfillment."
      source: "curriculum/04-nivel-4-koda-specific/01-koda-architecture.md:144-159; curriculum/04-nivel-4-koda-specific/01-koda-architecture.md:313-327"
    - name: "HoP Agent System"
      role: "Camada `.opencode` com orquestrador primário, subagentes KODA e tester live; segue escopo fechado, dono e gates."
      source: "docs/system-of-record.md:25-58; .opencode/agents/hop-orchestrator-rezek.md:21-39; .opencode/agents/koda-hop-init-basic.md:18-52; .opencode/agents/hop-live-whatsapp-tester.md:18-76"
    - name: "Issue Lifecycle"
      role: "Fluxo operacional claim -> worktree -> execution brief -> validation -> draft PR -> second-agent review -> explicit merge -> cleanup."
      source: ".opencode/skills/issue-start/SKILL.md:12-15; .opencode/skills/issue-start/SKILL.md:24-171; .opencode/skills/issue-review/SKILL.md:12-15; .opencode/skills/issue-finish/SKILL.md:12-15"
    - name: "Analyze-and-Improve Harness"
      role: "Pipeline que transforma fonte externa em análise, padrões classificados, artefatos concretos e integração no repo."
      source: ".opencode/skills/analyze-and-improve/SKILL.md:47-57; .opencode/skills/analyze-and-improve/SKILL.md:130-149; .opencode/skills/analyze-and-improve/SKILL.md:653-807"
    - name: "Mental Model Cache"
      role: "mapa-mental-repo/ versiona modelos mentais por data e source slug para uso incremental."
      source: ".opencode/skills/analyze-and-improve/SKILL.md:150-168; mapa-mental-repo/2026-06-12-idsd-method-mental-model.md:1-16"
    - name: "Stack and Validation Tooling"
      role: "Projeto Node ESM com Node >= 20.18.0, ESLint e scripts reais de lint/test; docs são validadas por script Obsidian."
      source: "README.md:107-113; package.json:1-21; scripts/check-obsidian-conventions.sh:18-46; scripts/check-obsidian-conventions.sh:283-312"
  relationships:
    - from: "System of Record"
      to: "Documentation Surfaces"
      relationship: "Conflitos documentais resolvem por ADRs aceitos, canonicals ativos, evidências, análises, arquivo e READMEs/resumos operacionais."
      source: "docs/system-of-record.md:14-21; AGENTS.md:80-91"
    - from: "Canonical Pattern Library"
      to: "Curriculum"
      relationship: "Canonicals formalizam padrões que o currículo ensina por níveis, conceitos, exercícios e aplicações KODA."
      source: "docs/system-of-record.md:140-223; curriculum/README.md:251-270; curriculum/MASTER_PLAN.md:349-367"
    - from: "Curriculum"
      to: "KODA Case Domain"
      relationship: "O Nível 4 converte padrões gerais em arquitetura KODA, customer journeys, feature patterns, rubricas, melhorias e exercícios reais."
      source: "curriculum/README.md:236-248; curriculum/MASTER_PLAN.md:251-270; curriculum/04-nivel-4-koda-specific/01-koda-architecture.md:89-101"
    - from: "HoP Agent System"
      to: "Issue Lifecycle"
      relationship: "Skills e agentes transformam trabalho em sessões rastreáveis com issue, worktree, validação, PR, revisão e cleanup."
      source: "docs/system-of-record.md:31-58; .opencode/skills/issue-start/SKILL.md:24-171; .opencode/skills/issue-review/SKILL.md:44-100; .opencode/skills/issue-finish/SKILL.md:50-84"
    - from: "Orchestrator Skill"
      to: "Worker Sessions"
      relationship: "O orchestrator lista issues/PRs/worktrees, sugere próxima issue e gera prompt de worker que carrega issue-start, implementa, roda issue-review e só finaliza com issue-finish."
      source: ".opencode/skills/orchestrator/SKILL.md:12-25; .opencode/skills/orchestrator/SKILL.md:27-62; .opencode/skills/orchestrator/SKILL.md:74-96"
    - from: "Owned Agent Control Loop"
      to: "Deterministic Tool Dispatch"
      relationship: "O loop do agente é decomposto em Prompt, Context Builder, Switch Statement e Loop; o dispatch determinístico é o Switch Statement."
      source: "docs/canonical/owned-agent-control-loop.md:29-75; docs/canonical/deterministic-tool-dispatch.md:31-67; docs/canonical/owned-agent-control-loop.md:126-131"
    - from: "Serializable State"
      to: "KODA State Persistence"
      relationship: "O padrão canônico descreve serialização/rebuild de estado; KODA usa SQLite, JSON state files, locks e audit trail como camada de persistência."
      source: "docs/canonical/serializable-pause-resume-state.md:31-76; curriculum/04-nivel-4-koda-specific/01-koda-architecture.md:259-269; curriculum/04-nivel-4-koda-specific/01-koda-architecture.md:303-309"
    - from: "Eval Tier Stratification"
      to: "PR and Release Gates"
      relationship: "A taxonomia fast/medium/deep define quando uma suite bloqueia inner loop, PR ou rollout; issue-review exige gates reais e seleção de tier para mudanças eval-sensitive."
      source: "docs/canonical/eval-tier-stratification.md:20-49; .opencode/skills/issue-review/SKILL.md:44-85"
    - from: "Closed-Loop Agent OS"
      to: "Analyze-and-Improve"
      relationship: "O OS conecta intake de estado, síntese de prioridade, execução roteada e writeback; analyze-and-improve implementa um loop knowledge -> patterns -> classification -> improvements -> integration."
      source: "docs/canonical/closed-loop-agent-operating-system.md:26-45; .opencode/skills/analyze-and-improve/SKILL.md:47-57"
